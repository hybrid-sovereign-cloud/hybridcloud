# Sample CloudOSO — acme-dev-openstack
# Source: CloudOSO/config/samples/cloudoso-dev.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/cloudoso/acme-dev-openstack.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: CloudOSO
metadata:
  name: acme-dev-openstack
  namespace: entity-acme-corp
spec:
  project: acme-dev
  vaultPath: oso/accounts/example-admin
  baseDomain: lab.example.com
  projectDomain: example_domain
  externalNetwork: ext-net
  route53VaultPath: oso/accounts/route53-openstack
  toolRbac:
    projectAdminRbac:
    - acme-platform-admins
    projectMemberRbac:
    - acme-infra-team
    projectViewerRbac:
    - acme-devs
    - acme-viewers
