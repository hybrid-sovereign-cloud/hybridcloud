  baseDomain: lab.example.com
  projectDomain: example_domain
  externalNetwork: internet
  landingzone: default
  designateZoneId: 895a1406-9ad2-4372-80f9-4e23fe1fd9ef
  designateProjectId: aaf08e3b0b774c7e919379af9e947cba
  designateDnsProject: lab-project
