# Sample Entity — waynetech
# Source: Entity/config/samples/entity-waynetech.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/entity/waynetech.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Entity
metadata:
  name: waynetech
  namespace: sovereign-cloud
spec:
  description: 'Wayne Technologies — compliance-ready tenant with audit and cloud
    admin

    roles configured. Demonstrates AWS + OSO dual-cloud administration pattern.

    '
  billingID: BILL-WAYNE-007
  websiteLink: https://waynetech.example.com
  namespaceRbac:
    entityAdmin:
    - waynetech-admins
    auditor:
    - waynetech-auditors
    cloudAWSAdmin:
    - waynetech-cloud-team
    cloudOSOAdmin:
    - waynetech-cloud-team
    identityAdmin:
    - waynetech-admins
