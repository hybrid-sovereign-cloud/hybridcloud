# Sample Entity — globex-industries
# Source: Entity/config/samples/entity-globex-industries.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/entity/globex-industries.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Entity
metadata:
  name: globex-industries
  namespace: sovereign-cloud
spec:
  description: 'Globex Industries — integration-test tenant demonstrating minimal
    RBAC

    configuration with 3 active roles. Use as a lightweight fixture for

    cross-tenant isolation tests.

    '
  billingID: BILL-GLOBEX-042
  websiteLink: https://globex.example.com
  namespaceRbac:
    entityAdmin:
    - globex-admins
    auditor:
    - globex-auditors
    identityAdmin:
    - globex-admins
