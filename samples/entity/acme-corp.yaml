# Sample Entity — acme-corp
# Source: Entity/config/samples/entity-acme-corp.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/entity/acme-corp.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Entity
metadata:
  name: acme-corp
  namespace: sovereign-cloud
spec:
  description: ACME Corporation — primary tenant demonstrating the 14 named RBAC roles.
    Each role key maps to a list of Rbac CR names whose Keycloak group path is resolved
    at reconcile time and bound to the corresponding K8s Role.
  billingID: ACME-2024-001
  websiteLink: https://acme-corp.example.com
  namespaceRbac:
    entityAdmin:
    - acme-platform-admins
    auditor:
    - acme-auditors
    - acme-viewers
    BobsTeam:
    - acme-viewers
    cloudOSOAdmin:
    - acme-infra-team
    - acme-platform-admins
    cloudOSOView:
    - acme-devs
    - acme-viewers
    cloudAWSAdmin:
    - acme-infra-team
    - acme-platform-admins
    cloudAWSView:
    - acme-devs
    platformOpenshiftAdmin:
    - acme-platform-admins
    - acme-infra-team
    platformOpenshiftView:
    - acme-devs
    - acme-viewers
    teamAdmin:
    - acme-platform-admins
    - acme-devs
    teamView:
    - acme-viewers
    projectAdmin:
    - acme-platform-admins
    - acme-devs
    projectView:
    - acme-viewers
    assignmentAdmin:
    - acme-platform-admins
    identityAdmin:
    - acme-platform-admins
