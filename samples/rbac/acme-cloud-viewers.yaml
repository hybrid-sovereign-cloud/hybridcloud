# Sample Rbac — acme-cloud-viewers
# Source: plugin_rbac/config/samples/rbac-acme-cloud-viewers.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/rbac/acme-cloud-viewers.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Rbac
metadata:
  name: acme-cloud-viewers
  namespace: entity-acme-corp
spec:
  config: keycloak-sovereign-tenants-services
  description: Cloud environment read-only access for Acme Corp -- view CloudOSO and
    CloudAWS environments
