# Sample CloudAWS — acme-dev-aws
# Source: CloudAWS/config/samples/cloudaws-dev.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/cloudaws/acme-dev-aws.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: CloudAWS
metadata:
  name: acme-dev-aws
  namespace: entity-acme-corp
spec:
  account: '000000000000'
  vaultPath: aws/accounts/acme-dev
  baseDomain: sandbox.example.com
  toolRbac:
    accountAdminRbac:
    - acme-platform-admins
    accountPoweruserRbac:
    - acme-infra-team
    accountViewerRbac:
    - acme-devs
    - acme-viewers
