# Sample CloudAWS — ses12-env
# Source: bootstrap/samples/templates/cloudaws-ses12-env.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/cloudaws/ses12-env.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: CloudAWS
metadata:
  name: ses12-env
  namespace: entity-acme-corp
spec:
  account: '000000000000'
  vaultPath: aws/accounts/example-admin
  baseDomain: sandbox.example.com
  landingzone: default
