# Sample Assignment — acme-ses10-platform-ops
# Source: Assignment/config/samples/assignment-ses10-platform-ops.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/assignment/acme-ses10-platform-ops.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Assignment
metadata:
  name: acme-ses10-platform-ops
  namespace: entity-acme-corp
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  openshift: ocp-ses10
  team: platform-ops
  projects:
  - data-pipeline
  - infra-automation
  toolRbac:
    assignmentAdmin: acme-assignment-admins
    assignmentDeveloper: acme-developers
    assignmentViewer: acme-platform-viewers
    assignmentOps: acme-devops
