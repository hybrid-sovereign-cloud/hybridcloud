# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/assignment/acme-ses13-platform-eng.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Assignment
metadata:
  name: acme-ses13-platform-eng
  namespace: entity-acme-corp
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  openshift: ocp-ses13
  team: platform-engineering
  projects:
  - website-redesign
  - data-pipeline
  toolRbac:
    assignmentAdmin: acme-assignment-admins
    assignmentDeveloper: acme-developers
    assignmentViewer: acme-platform-viewers
    assignmentOps: acme-devops
