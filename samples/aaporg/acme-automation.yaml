# Sample AAPOrg — acme-automation
# Source: plugin_aap/config/samples/aaporg-acme-automation.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/aaporg/acme-automation.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: AAPOrg
metadata:
  name: acme-automation
  namespace: entity-acme-corp
spec:
  aapConfig: aap-sovereign-services
  description: Primary automation organization for Acme Corp
  aapAdminRbac:
  - acme-aap-admins
  - acme-devops
  aapJobExecutorRbac:
  - acme-aap-executors
  - acme-operators
