# Sample AAPOrg — acme-test-aap
# Source: plugin_aap/config/samples/aaporg-acme-test.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/aaporg/acme-test-aap.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: AAPOrg
metadata:
  name: acme-test-aap
  namespace: entity-acme-corp
spec:
  aapConfig: aap-sovereign-services
  description: Test AAP Organization for Phase 6 lifecycle validation
  aapAdminRbac:
  - acme-corp-platform-engineering-admins
  - acme-corp-platform-ops-admins
  aapJobExecutorRbac:
  - acme-corp-platform-engineering-editors
  - acme-corp-platform-ops-editors
