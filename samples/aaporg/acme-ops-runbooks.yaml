# Sample AAPOrg — acme-ops-runbooks
# Source: plugin_aap/config/samples/aaporg-acme-ops-runbooks.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/aaporg/acme-ops-runbooks.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: AAPOrg
metadata:
  name: acme-ops-runbooks
  namespace: entity-acme-corp
spec:
  aapConfig: aap-sovereign-services
  description: Operations runbooks and day-2 automation for Acme Corp
  aapAdminRbac:
  - acme-aap-admins
  aapJobExecutorRbac:
  - acme-operators
