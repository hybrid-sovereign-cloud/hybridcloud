# Sample AAPOrg — globex-automation
# Source: plugin_aap/config/samples/aaporg-globex.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/aaporg/globex-automation.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: AAPOrg
metadata:
  name: globex-automation
  namespace: entity-globex
spec:
  aapConfig: aap-sovereign-services
  aapAdminRbac:
  - globex-platform-admins
  aapJobExecutorRbac:
  - globex-developers
