# Sample AAPOrg — acme-corp-automation
# Source: plugin_aap/config/samples/aaporg-acme-corp.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/aaporg/acme-corp-automation.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: AAPOrg
metadata:
  name: acme-corp-automation
  namespace: entity-acme-corp
spec:
  aapConfig: aap-sovereign-services
  aapAdminRbac:
  - acme-platform-admins
  aapJobExecutorRbac:
  - acme-developers
