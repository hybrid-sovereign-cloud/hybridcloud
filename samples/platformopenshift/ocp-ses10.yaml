# Sample PlatformOpenshift — ocp-ses10
# Source: PlatformOpenshift/config/samples/ocp-ses10.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/platformopenshift/ocp-ses10.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses10
  namespace: entity-acme-corp
spec:
  type: aws
  aws:
    environment: ses10-env
    region: us-east-1
    clusterType: standalone
    controlPlaneCount: 3
    workerCount: 2
  toolRbac:
    clusterAdminRbac:
    - acme-ses10-cluster-admins
    clusterOperatorRbac:
    - acme-ses10-cluster-operators
    clusterDeveloperRbac:
    - acme-ses10-cluster-developers
    clusterViewerRbac:
    - acme-ses10-cluster-viewers
  clusterViewerRbac:
  - acme-platform-viewers
  - acme-ses10-cluster-admins
  - acme-ses10-cluster-operators
  - acme-ses10-cluster-developers
  - acme-ses10-cluster-viewers
