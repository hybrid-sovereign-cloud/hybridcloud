# Sample PlatformOpenshift — ocp-ses13
# Source: bootstrap/samples/templates/platformopenshift-ocp-ses13.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/platformopenshift/ocp-ses13.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses13
  namespace: entity-acme-corp
spec:
  type: openstack
  openstack:
    environment: ses13-env
    controlPlaneCount: 3
    workerCount: 2
    controlPlaneFlavor: b1.3xlarge
    workerFlavor: s1.3xlarge
    externalNetwork: internet
  toolRbac:
    clusterAdminRbac:
    - acme-ses13-cluster-admins
    clusterOperatorRbac:
    - acme-ses13-cluster-operators
    clusterDeveloperRbac:
    - acme-ses13-cluster-developers
    clusterViewerRbac:
    - acme-ses13-cluster-viewers
  clusterViewerRbac:
  - acme-platform-viewers
  - acme-ses13-cluster-admins
  - acme-ses13-cluster-operators
  - acme-ses13-cluster-developers
  - acme-ses13-cluster-viewers
