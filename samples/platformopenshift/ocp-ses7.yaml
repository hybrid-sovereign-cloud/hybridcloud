# Sample PlatformOpenshift — ocp-ses7
# Source: PlatformOpenshift/config/samples/ocp-ses7.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/platformopenshift/ocp-ses7.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses7
  namespace: entity-acme-corp
spec:
  type: aws
  aws:
    environment: ses7-env
    region: us-east-1
    clusterType: standalone
    controlPlaneCount: 3
    workerCount: 2
