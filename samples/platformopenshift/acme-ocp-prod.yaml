# Sample PlatformOpenshift — acme-ocp-prod
# Source: PlatformOpenshift/config/samples/ocp-prod.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/platformopenshift/acme-ocp-prod.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: acme-ocp-prod
  namespace: entity-acme-corp
spec:
  type: openstack
  openstack:
    environment: acme-dev-openstack
    controlPlaneCount: 3
    workerCount: 5
    controlPlaneFlavor: m1.xlarge
    workerFlavor: m1.large
    externalNetwork: ext-net
  toolRbac:
    clusterAdminRbac:
    - acme-platform-admins
    clusterOperatorRbac:
    - acme-infra-team
    clusterDeveloperRbac:
    - acme-devs
    clusterViewerRbac:
    - acme-viewers
