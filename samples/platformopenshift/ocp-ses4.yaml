# Sample PlatformOpenshift — ocp-ses4
# Source: PlatformOpenshift/config/samples/ocp-ses4.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/platformopenshift/ocp-ses4.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses4
  namespace: entity-acme-corp
spec:
  type: openstack
  openstack:
    environment: ses4-env
    controlPlaneCount: 3
    workerCount: 3
    controlPlaneFlavor: b1.xlarge
    workerFlavor: b1.large
    externalNetwork: ext-net
