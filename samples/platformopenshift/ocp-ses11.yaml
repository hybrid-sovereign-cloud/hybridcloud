# Sample PlatformOpenshift — ocp-ses11
# Source: PlatformOpenshift/config/samples/ocp-ses11.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/platformopenshift/ocp-ses11.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses11
  namespace: entity-acme-corp
spec:
  type: openstack
  openstack:
    environment: ses11-env
    controlPlaneCount: 3
    workerCount: 2
    controlPlaneFlavor: b1.xlarge
    workerFlavor: b1.large
    externalNetwork: ext-net
