# Sample VaultKV — acme-test-kv
# Source: plugin_vault/config/samples/vaultkv-acme-test.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/vaultkv/acme-test-kv.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: VaultKV
metadata:
  name: acme-test-kv
  namespace: entity-acme-corp
spec:
  vault: acme-test-vault
  adminRbacGroups:
  - acme-corp-platform-engineering-admins
  readerRbacGroups:
  - acme-corp-platform-engineering-viewers
  opsRbacGroups:
  - acme-corp-platform-ops-admins
