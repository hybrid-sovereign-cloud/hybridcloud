# Sample QuayOrg — acme-registry
# Source: plugin_quay/config/samples/quayorg-acme-corp.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/quayorg/acme-registry.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: QuayOrg
metadata:
  name: acme-registry
  namespace: entity-acme-corp
spec:
  quayConfig: quay-sovereign-services
  quayAdminRbac:
  - acme-platform-admins
  quayCreatorRbac:
  - acme-developers
  quayMemberRbac:
  - acme-viewers
