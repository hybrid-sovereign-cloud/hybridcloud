# Sample QuayOrg for acme-corp (entity-acme-corp)
apiVersion: hybridsovereign.redhat/v1alpha1
kind: QuayOrg
metadata:
  name: acme-registry
  namespace: entity-acme-corp
spec:
  quayConfig: quay-sovereign-services
  quayAdminRbac:
    - acme-quay-admins
  quayCreatorRbac:
    - acme-developers
  quayMemberRbac:
    - acme-viewers
