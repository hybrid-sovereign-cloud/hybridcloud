# Sample QuayOrg — acme-containers
# Source: plugin_quay/config/samples/quayorg-acme-containers.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/quayorg/acme-containers.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: QuayOrg
metadata:
  name: acme-containers
  namespace: entity-acme-corp
spec:
  quayConfig: quay-sovereign-services
  quayAdminRbac:
  - acme-quay-admins
  quayCreatorRbac:
  - acme-developers
  - acme-devops
  quayMemberRbac:
  - acme-operators
  - acme-viewers
