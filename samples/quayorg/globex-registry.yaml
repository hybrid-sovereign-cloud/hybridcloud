# Sample QuayOrg — globex-registry
# Source: plugin_quay/config/samples/quayorg-globex.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/quayorg/globex-registry.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: QuayOrg
metadata:
  name: globex-registry
  namespace: entity-globex-industries
spec:
  quayConfig: quay-sovereign-services
  quayAdminRbac:
  - globex-admins
  quayCreatorRbac:
  - globex-engineers
  quayMemberRbac:
  - globex-viewers
