# Sample QuayOrg — acme-test-quay
# Source: plugin_quay/config/samples/quayorg-acme-test.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/quayorg/acme-test-quay.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: QuayOrg
metadata:
  name: acme-test-quay
  namespace: entity-acme-corp
spec:
  quayConfig: quay-sovereign-services
  quayAdminRbac:
  - acme-corp-platform-engineering-admins
  quayMemberRbac:
  - acme-corp-platform-engineering-viewers
  - acme-corp-platform-ops-editors
