# Sample QuayOrg — acme-ci-images
# Source: plugin_quay/config/samples/quayorg-acme-ci-images.yaml
# Apply manually to services cluster (NOT via ArgoCD):
#   oc apply -f samples/quayorg/acme-ci-images.yaml --context=services-admin
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: QuayOrg
metadata:
  name: acme-ci-images
  namespace: entity-acme-corp
spec:
  quayConfig: quay-sovereign-services
  quayAdminRbac:
  - acme-quay-admins
  quayMemberRbac:
  - acme-developers
  - acme-operators
