{{- if include "sovereign-init.bootstrapSecrets" . }}
{{- /*
  Creates quay-pull-secret (dockerconfigjson) in every namespace that needs it
  for image pulls from . This is the ONLY chart allowed to
  create secrets from environment variables.
*/ -}}
{{- $registry := .Values.oci.registry }}
{{- $user := .Values.oci.robotUsername }}
{{- $pass := .Values.oci.robotPassword }}
{{- $auth := printf "%s:%s" $user $pass | b64enc }}
{{- $dockercfg := printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" $registry $user $pass $auth }}
{{- range .Values.pullSecretNamespaces }}
{{- if not (lookup "v1" "Namespace" "" .) }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ . }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: quay-pull-secret
  namespace: {{ . }}
  labels:
    {{- include "sovereign-init.labels" $ | nindent 4 }}
  annotations:
    managed-by: sovereign-init-chart
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: {{ $dockercfg | quote }}
{{- end }}
{{- end }}
