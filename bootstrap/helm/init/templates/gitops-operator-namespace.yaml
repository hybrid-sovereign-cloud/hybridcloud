{{- if and .Values.gitopsOperator.enabled (include "sovereign-init.bootstrapOperator" .) (.Values.gitopsOperator.installOperator | default true) }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.gitopsOperator.operatorNamespace }}
  labels:
    {{- include "sovereign-init.labels" . | nindent 4 }}
    openshift.io/cluster-monitoring: "true"
{{- end }}
