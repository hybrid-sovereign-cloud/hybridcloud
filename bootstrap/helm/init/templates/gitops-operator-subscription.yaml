{{- if and .Values.gitopsOperator.enabled (include "sovereign-init.bootstrapOperator" .) (.Values.gitopsOperator.installOperator | default true) }}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-gitops-operator
  namespace: {{ .Values.gitopsOperator.operatorNamespace }}
  labels:
    {{- include "sovereign-init.labels" . | nindent 4 }}
spec:
  channel: {{ .Values.gitopsOperator.channel | quote }}
  installPlanApproval: {{ .Values.gitopsOperator.installPlanApproval }}
  name: openshift-gitops-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
{{- end }}
