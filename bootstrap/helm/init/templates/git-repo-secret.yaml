{{- if include "sovereign-init.bootstrapSecrets" . }}
---
# ArgoCD repository credential secret for the bootstrap Git repo.
# ArgoCD detects this secret via the label argocd.argoproj.io/secret-type=repository.
apiVersion: v1
kind: Secret
metadata:
  name: sovereign-bootstrap-repo
  namespace: {{ .Values.argocd.namespace }}
  labels:
    argocd.argoproj.io/secret-type: repository
    {{- include "sovereign-init.labels" . | nindent 4 }}
  annotations:
    managed-by: sovereign-init-chart
type: Opaque
stringData:
  type: git
  url: {{ .Values.gitops.repoURL | quote }}
  password: {{ .Values.gitops.token | quote }}
  username: "git"
{{- end }}
