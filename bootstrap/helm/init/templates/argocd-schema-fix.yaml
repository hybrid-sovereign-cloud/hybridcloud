{{- if .Values.bootstrap.operator }}
{{- /*
  ArgoCD OpenAPI v2 Schema Compatibility Shim
  ===========================================
  ArgoCD's embedded kube-openapi library fails to resolve JSON Pointer ~1-encoded $ref
  keys in the aggregated /openapi/v2 spec when MCE (multicluster-engine) is installed.
  The ocm-proxyserver and other MCE aggregated API servers use ~1-encoded keys in $ref
  but kube-openapi looks them up literally (without URL-decoding ~1 → /).

  This shim registers a fake APIService backed by a minimal HTTPS server. The server
  dynamically discovers all missing tilde-encoded definitions from the live cluster
  OpenAPI spec and re-serves them under their tilde-encoded keys so kube-openapi can
  resolve the references. The cluster cache sync then succeeds.

  This is a permanent workaround until ArgoCD/kube-openapi fixes upstream (~1 decoding).
*/ -}}
---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd-schema-fix
  labels:
    {{- include "sovereign-init.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: schema-fix-server
  namespace: argocd-schema-fix
  labels:
    {{- include "sovereign-init.labels" . | nindent 4 }}
---
# schema-fix-server needs to GET /openapi/v2 from the cluster API server
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: schema-fix-openapi-reader
  labels:
    {{- include "sovereign-init.labels" . | nindent 4 }}
rules:
  - nonResourceURLs: ["/openapi/v2", "/openapi/v3", "/openapi/v3/*"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: schema-fix-openapi-reader
  labels:
    {{- include "sovereign-init.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: schema-fix-openapi-reader
subjects:
  - kind: ServiceAccount
    name: schema-fix-server
    namespace: argocd-schema-fix
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: schema-fix-server
  namespace: argocd-schema-fix
  labels:
    {{- include "sovereign-init.labels" . | nindent 4 }}
data:
  serve.sh: |
    #!/bin/sh
    set -e
    mkdir -p /tmp/certs
    openssl genrsa -out /tmp/certs/server.key 2048 2>/dev/null
    openssl req -new -x509 -key /tmp/certs/server.key -out /tmp/certs/server.crt \
      -days 3650 -subj "/CN=argocd-schema-fix.argocd-schema-fix.svc" 2>/dev/null
    echo "Schema fix: TLS cert generated, starting HTTPS server on :6443"
    exec python3 /config/server.py

  server.py: |
    import http.server, ssl, json, urllib.request, os, threading, time, re

    KUBE_API = os.environ.get('KUBERNETES_SERVICE_HOST', 'kubernetes.default.svc')
    KUBE_PORT = os.environ.get('KUBERNETES_SERVICE_PORT', '443')
    TOKEN_FILE = '/var/run/secrets/kubernetes.io/serviceaccount/token'
    CA_FILE = '/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'

    def kube_get(path):
        with open(TOKEN_FILE) as f:
            token = f.read().strip()
        ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
        ctx.load_verify_locations(CA_FILE)
        req = urllib.request.Request(
            f'https://{KUBE_API}:{KUBE_PORT}{path}',
            headers={'Authorization': f'Bearer {token}'}
        )
        with urllib.request.urlopen(req, context=ctx) as r:
            return json.loads(r.read())

    def load_shims():
        """Build shim definitions by:
        1. Scanning aggregated /openapi/v2 for ~1-encoded $ref keys not in definitions
        2. Scanning per-group /openapi/v3 for all schema names → add tilde-encoded stubs
           (v3 is not affected by our own contributions to the v2 aggregated spec)
        """
        v2_spec = kube_get('/openapi/v2')
        v2_defs = v2_spec.get('definitions', {})
        v2_str = json.dumps(v2_spec)
        all_v2_refs = set(re.findall(r'"#/definitions/([^"]+)"', v2_str))

        shims = {}

        # Step 1: from aggregated v2 — find all tilde-encoded $ref keys missing from defs
        for tilde_key in all_v2_refs:
            if '~1' not in tilde_key:
                continue
            slash_key = tilde_key.replace('~1', '/').replace('~0', '~')
            if slash_key in v2_defs:
                # Add the slash-decoded definition under the tilde-encoded key
                shims[tilde_key] = v2_defs[slash_key]

        # Step 2: from per-group v3 — get all schema names from API groups that have
        # slash-separated definition names (these are the ones that cause ~1 ref issues)
        try:
            v3_index = kube_get('/openapi/v3')
            for path_info in v3_index.get('paths', {}).values():
                group_path = path_info.get('serverRelativeURL', '')
                if not group_path:
                    continue
                try:
                    v3_spec = kube_get(group_path.split('?')[0])
                    for schema_name in v3_spec.get('components', {}).get('schemas', {}).keys():
                        if '/' not in schema_name:
                            continue
                        tilde_key = schema_name.replace('~', '~0').replace('/', '~1')
                        if tilde_key not in shims:
                            slash_key = schema_name
                            if slash_key in v2_defs:
                                shims[tilde_key] = v2_defs[slash_key]
                            else:
                                shims[tilde_key] = {
                                    'type': 'object',
                                    'x-kubernetes-preserve-unknown-fields': True
                                }
                except Exception:
                    pass
        except Exception as e:
            print(f'v3 group scan failed (non-fatal): {e}', flush=True)

        return shims

    SHIMS = {}
    LOCK = threading.Lock()

    def refresh_loop():
        global SHIMS
        time.sleep(90)  # Let old pod terminate and API aggregation cache refresh
        while True:
            try:
                s = load_shims()
                with LOCK:
                    SHIMS = s
                print(f'Schema shims refreshed: {len(s)} definitions', flush=True)
            except Exception as e:
                print(f'Shim refresh failed: {e}', flush=True)
            time.sleep(120)  # Re-check every 2 minutes

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if '/openapi/v2' in self.path:
                with LOCK:
                    shims = dict(SHIMS)
                body = json.dumps({
                    'swagger': '2.0',
                    'info': {'title': 'ArgoCD Schema Compatibility Shim', 'version': '0.2.0'},
                    'paths': {
                        '/apis/schemafix.sovereign-bootstrap.io/v1/': {'get': {
                            'operationId': 'listSchemaFixResources',
                            'produces': ['application/json'],
                            'responses': {'200': {'description': 'OK'}}
                        }}
                    },
                    'definitions': shims
                }).encode()
            else:
                body = b'{"apiVersion":"v1","groupVersion":"schemafix.sovereign-bootstrap.io/v1","resources":[]}'
            self.send_response(200)
            self.send_header('Content-Type', 'application/json')
            self.send_header('Content-Length', str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, *a):
            pass

    try:
        SHIMS = load_shims()
        print(f'Initial shims loaded: {len(SHIMS)} definitions', flush=True)
    except Exception as e:
        print(f'Initial shim load failed (will retry): {e}', flush=True)
        threading.Thread(target=refresh_loop, daemon=True).start()
    else:
        threading.Thread(target=refresh_loop, daemon=True).start()

    httpd = http.server.HTTPServer(('', 6443), Handler)
    tls_ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
    tls_ctx.load_cert_chain('/tmp/certs/server.crt', '/tmp/certs/server.key')
    httpd.socket = tls_ctx.wrap_socket(httpd.socket, server_side=True)
    print('Schema fix server ready on :6443', flush=True)
    httpd.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-fix-server
  namespace: argocd-schema-fix
  labels:
    {{- include "sovereign-init.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schema-fix-server
  template:
    metadata:
      labels:
        app: schema-fix-server
    spec:
      serviceAccountName: schema-fix-server
      imagePullSecrets:
        - name: quay-pull-secret
      containers:
        - name: server
          image: {{ .Values.argocdSchemaFix.image | default "quay.example.com/hybrid-sovereign/ansible-runner:latest" }}
          command: ["/bin/sh", "/config/serve.sh"]
          ports:
            - containerPort: 6443
              name: https
          volumeMounts:
            - name: config
              mountPath: /config
          readinessProbe:
            tcpSocket:
              port: 6443
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
      volumes:
        - name: config
          configMap:
            name: schema-fix-server
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-schema-fix
  namespace: argocd-schema-fix
  labels:
    {{- include "sovereign-init.labels" . | nindent 4 }}
spec:
  ports:
    - port: 443
      targetPort: 6443
      name: https
  selector:
    app: schema-fix-server
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1.schemafix.sovereign-bootstrap.io
  labels:
    {{- include "sovereign-init.labels" . | nindent 4 }}
spec:
  group: schemafix.sovereign-bootstrap.io
  groupPriorityMinimum: 1
  insecureSkipTLSVerify: true
  service:
    name: argocd-schema-fix
    namespace: argocd-schema-fix
    port: 443
  version: v1
  versionPriority: 1
{{- end }}
