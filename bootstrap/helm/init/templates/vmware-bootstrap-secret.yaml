{{- /*
  Bootstrap secret for VMware vCenter credentials.
  Created during 'make init-central-secrets' when VMWARE_HOST/USERNAME/PASSWORD are set.
  The vmwareInit sovereignJob (wave 24) reads this Secret and writes to Vault KV
  at path central/data/vmware-credentials. After that, the MTV ExternalSecret pulls
  from Vault into openshift-mtv namespace.
*/ -}}
{{- if and (include "sovereign-init.bootstrapSecrets" .) .Values.vmware.host }}
---
apiVersion: v1
kind: Secret
metadata:
  name: vmware-bootstrap-credentials
  namespace: sovereign-cloud-jobs
  labels:
    {{- include "sovereign-init.labels" . | nindent 4 }}
  annotations:
    managed-by: sovereign-init-chart
type: Opaque
stringData:
  host: {{ .Values.vmware.host | quote }}
  username: {{ .Values.vmware.username | quote }}
  password: {{ .Values.vmware.password | quote }}
  thumbprint: {{ .Values.vmware.thumbprint | default "" | quote }}
{{- end }}
