{{- /*
  Bootstrap secret for Gitea admin credentials.
  Created during 'make init-central-argo' from environment variables.
  Gitea deploys at wave 18, before Vault is initialized (wave 23), so this
  k8s Secret acts as a bridge until Vault KV is available.
  After vault-kv (wave 24), the giteaInit job pushes these credentials to Vault.
*/ -}}
{{- if and (include "sovereign-init.bootstrapSecrets" .) .Values.gitea.adminPassword }}
{{- range list "gitea" "sovereign-cloud-jobs" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-admin-credentials
  namespace: {{ . }}
  labels:
    {{- include "sovereign-init.labels" $ | nindent 4 }}
  annotations:
    managed-by: sovereign-init-chart
type: Opaque
stringData:
  admin_user: {{ $.Values.gitea.adminUser | default "gitea_admin" | quote }}
  admin_password: {{ $.Values.gitea.adminPassword | quote }}
  admin_email: {{ $.Values.gitea.adminEmail | default "admin@sovereign.local" | quote }}
  username: {{ $.Values.gitea.adminUser | default "gitea_admin" | quote }}
  password: {{ $.Values.gitea.adminPassword | quote }}
{{- end }}
{{- end }}
