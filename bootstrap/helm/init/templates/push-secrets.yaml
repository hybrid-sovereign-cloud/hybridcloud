{{- if include "sovereign-init.bootstrapSecrets" . }}
{{- /*
  PushSecret resources that push the init-seeded credentials into Vault.
  These activate once the External Secrets Operator + ClusterSecretStore
  "vault-backend" are available.
*/ -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: bootstrap-oci-creds
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-init.labels" . | nindent 4 }}
  annotations:
    managed-by: sovereign-init-chart
type: Opaque
stringData:
  registry: {{ .Values.oci.registry | quote }}
  username: {{ .Values.oci.robotUsername | quote }}
  password: {{ .Values.oci.robotPassword | quote }}
{{- if .Values.pushSecrets.enabled }}
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: push-oci-creds-to-vault
  namespace: {{ .Values.argocd.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "99"
spec:
  refreshInterval: "1h"
  secretStoreRefs:
    - name: vault-backend
      kind: ClusterSecretStore
  selector:
    secret:
      name: bootstrap-oci-creds
  data:
    - match:
        secretKey: registry
        remoteRef:
          remoteKey: oci-credentials
          property: registry
      conversionStrategy: None
    - match:
        secretKey: username
        remoteRef:
          remoteKey: oci-credentials
          property: username
      conversionStrategy: None
    - match:
        secretKey: password
        remoteRef:
          remoteKey: oci-credentials
          property: password
      conversionStrategy: None
{{- end }}
{{- end }}
