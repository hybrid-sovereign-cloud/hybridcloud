{{- if include "sovereign-init.bootstrapSecrets" . }}
---
# ArgoCD repository credential TEMPLATE for all OCI charts under .
# ArgoCD v3 requires OCI repository secrets to contain only hostname+port in the URL.
# Using a repo-creds (credential template) with the registry hostname covers every
# chart under oci://{{ .Values.oci.registry }}/{{ .Values.oci.namespace }} without
# needing per-chart repository entries that would fail v3 URL validation.
apiVersion: v1
kind: Secret
metadata:
  name: sovereign-oci-creds
  namespace: {{ .Values.argocd.namespace }}
  labels:
    argocd.argoproj.io/secret-type: repo-creds
    {{- include "sovereign-init.labels" . | nindent 4 }}
  annotations:
    managed-by: sovereign-init-chart
type: Opaque
stringData:
  type: helm
  name: sovereign-oci
  enableOCI: "true"
  url: {{ printf "oci://%s" .Values.oci.registry | quote }}
  username: {{ .Values.oci.robotUsername | quote }}
  password: {{ .Values.oci.robotPassword | quote }}
{{- end }}
