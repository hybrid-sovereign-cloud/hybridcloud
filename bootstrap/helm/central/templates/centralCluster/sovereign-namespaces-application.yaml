{{- if and (include "sovereign-central.applicationsEnabled" .) .Values.sovereignNamespaces.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sovereign-namespaces-central
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: namespaces
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.sovereignNamespaces.syncWave | quote }}
spec:
  project: central

  source:
    repoURL: {{ printf "oci://%s/%s/sovereign-namespaces" .Values.oci.registry .Values.oci.repositoryBase | quote }}
    chart: sovereign-namespaces
    targetRevision: {{ .Values.sovereignNamespaces.chartVersion | quote }}
    helm:
      releaseName: sovereign-namespaces-central
      values: |
        {{- toYaml .Values.sovereignNamespaces.values | nindent 8 }}

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
{{- end }}
