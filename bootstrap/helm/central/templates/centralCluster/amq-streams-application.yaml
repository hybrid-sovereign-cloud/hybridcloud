{{- if and (include "sovereign-central.applicationsEnabled" .) .Values.amqStreams.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amq-streams
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.amqStreams.syncWave | quote }}
spec:
  project: central
  source:
    repoURL: {{ printf "oci://%s/%s/amq-streams" .Values.oci.registry .Values.oci.repositoryBase | quote }}
    chart: amq-streams
    targetRevision: {{ .Values.amqStreams.chartVersion | quote }}
    helm:
      releaseName: amq-streams
      values: |
        {{- toYaml .Values.amqStreams.values | nindent 8 }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.amqStreams.destinationNamespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
{{- end }}
