{{- if and (include "sovereign-central.applicationsEnabled" .) .Values.acmPolicies.enabled }}
---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-spoke-external-secrets
  namespace: {{ .Values.acmPolicies.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.acmPolicies.syncWave | quote }}
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    {{- if .Values.acmPolicies.externalSecrets.enabled }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-external-secrets-namespace
        spec:
          remediationAction: enforce
          severity: low
          evaluationInterval:
            compliant: 24h
            noncompliant: 24h
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: external-secrets
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-external-secrets-operatorgroup
        spec:
          remediationAction: enforce
          severity: low
          evaluationInterval:
            compliant: 24h
            noncompliant: 24h
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1
                kind: OperatorGroup
                metadata:
                  name: external-secrets-operator
                  namespace: external-secrets
                spec:
                  targetNamespaces:
                    - external-secrets
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-external-secrets-subscription
        spec:
          remediationAction: enforce
          severity: low
          evaluationInterval:
            compliant: 24h
            noncompliant: 24h
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: external-secrets-operator
                  namespace: external-secrets
                spec:
                  channel: {{ .Values.acmPolicies.externalSecrets.channel | quote }}
                  installPlanApproval: Automatic
                  name: external-secrets-operator
                  source: {{ .Values.acmPolicies.externalSecrets.source | quote }}
                  sourceNamespace: {{ .Values.acmPolicies.externalSecrets.sourceNamespace | quote }}
    {{- end }}
---
apiVersion: cluster.open-cluster-management.io/v1beta2
kind: ManagedClusterSetBinding
metadata:
  name: default
  namespace: {{ .Values.acmPolicies.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.acmPolicies.syncWave | quote }}
spec:
  clusterSet: default
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-policy-spoke-external-secrets
  namespace: {{ .Values.acmPolicies.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.acmPolicies.syncWave | quote }}
placementRef:
  name: placement-policy-spoke-external-secrets
  kind: Placement
  apiGroup: cluster.open-cluster-management.io
subjects:
  - name: policy-spoke-external-secrets
    kind: Policy
    apiGroup: policy.open-cluster-management.io
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-spoke-external-secrets
  namespace: {{ .Values.acmPolicies.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.acmPolicies.syncWave | quote }}
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            {{- range .Values.acmPolicies.clusterSelector.matchExpressions }}
            - key: {{ .key }}
              operator: {{ .operator }}
              values:
                {{- range .values }}
                - {{ . | quote }}
                {{- end }}
            {{- end }}
{{- end }}
