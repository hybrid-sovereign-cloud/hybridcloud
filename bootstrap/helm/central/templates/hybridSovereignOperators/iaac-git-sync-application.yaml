{{- if and (include "sovereign-central.applicationsEnabled" .) .Values.iaacGitSync.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iaac-git-sync
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.iaacGitSync.syncWave | quote }}
spec:
  project: services
  source:
    repoURL: "https://github.com/hybrid-sovereign-cloud/hybridcloud.git"
    path: iaac/helm
    targetRevision: HEAD
    helm:
      releaseName: iaac-git-sync
      values: |
        {{- toYaml .Values.iaacGitSync.values | nindent 8 }}
  destination:
    server: {{ .Values.servicesCluster.server | quote }}
    namespace: {{ .Values.iaacGitSync.destinationNamespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
{{- end }}
