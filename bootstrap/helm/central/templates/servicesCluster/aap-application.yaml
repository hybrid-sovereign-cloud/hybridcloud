{{- if and (include "sovereign-central.applicationsEnabled" .) .Values.aap.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aap-services
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: automation
    sovereign-cloud/target: services
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.aap.syncWave | quote }}
spec:
  project: services

  source:
    repoURL: {{ printf "oci://%s/%s/aap" .Values.oci.registry .Values.oci.repositoryBase | quote }}
    chart: aap
    targetRevision: {{ .Values.aap.chartVersion | quote }}
    helm:
      releaseName: aap-services
      values: |
        {{- toYaml .Values.aap.values | nindent 8 }}

  destination:
    server: {{ .Values.servicesCluster.server | quote }}
    namespace: {{ .Values.aap.destinationNamespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
{{- end }}
