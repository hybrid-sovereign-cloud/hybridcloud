{{- if and (include "sovereign-central.applicationsEnabled" .) .Values.externalSecretsServices.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-services
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
    sovereign-cloud/target: services
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.externalSecretsServices.syncWave | quote }}
spec:
  project: services

  source:
    repoURL: {{ printf "oci://%s/%s/external-secrets" .Values.oci.registry .Values.oci.repositoryBase | quote }}
    chart: external-secrets
    targetRevision: {{ .Values.externalSecretsServices.chartVersion | quote }}
    helm:
      releaseName: external-secrets-services
      valuesObject:
        {{- toYaml .Values.externalSecretsServices.values | nindent 10 }}

  destination:
    server: {{ .Values.servicesCluster.server | quote }}
    namespace: {{ .Values.externalSecretsServices.values.namespace | default "external-secrets" }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
{{- end }}
