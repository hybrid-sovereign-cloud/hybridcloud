apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: services
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: "App-of-Apps for Services cluster resources"
  sourceRepos:
    - '*'
  destinations:
    - namespace: '*'
      server: {{ .Values.servicesCluster.server | quote }}
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
