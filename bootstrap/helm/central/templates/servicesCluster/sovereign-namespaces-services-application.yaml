{{- if and (include "sovereign-central.applicationsEnabled" .) .Values.sovereignNamespacesServices.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sovereign-namespaces-services
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: namespaces
    sovereign-cloud/target: services
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.sovereignNamespacesServices.syncWave | quote }}
spec:
  project: services

  source:
    repoURL: {{ printf "oci://%s/%s/sovereign-namespaces" .Values.oci.registry .Values.oci.repositoryBase | quote }}
    chart: sovereign-namespaces
    targetRevision: {{ .Values.sovereignNamespacesServices.chartVersion | quote }}
    helm:
      releaseName: sovereign-namespaces-services
      values: |
        {{- toYaml .Values.sovereignNamespacesServices.values | nindent 8 }}

  destination:
    server: {{ .Values.servicesCluster.server | quote }}
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.target.deletionPolicy
        - .spec.refreshInterval
      jsonPointers:
        - /spec/dataFrom
        - /metadata/annotations
{{- end }}
