{{- if and (include "sovereign-central.applicationsEnabled" .) .Values.eventForwarder.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: event-forwarder
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: eda
    sovereign-cloud/target: services
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.eventForwarder.syncWave | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: services

  source:
    repoURL: {{ printf "oci://%s/%s/event-forwarder" .Values.oci.registry .Values.oci.repositoryBase | quote }}
    chart: event-forwarder
    targetRevision: {{ .Values.eventForwarder.chartVersion | quote }}
    helm:
      releaseName: event-forwarder
      values: |
        image:
          repository: {{ .Values.eventForwarder.image.repository }}
          tag: {{ .Values.eventForwarder.image.tag | quote }}
        eventStream:
          url: {{ .Values.eventForwarder.eventStreamUrl | quote }}
        vaultSecretPath: {{ .Values.eventForwarder.vaultSecretPath | quote }}

  destination:
    server: {{ .Values.servicesCluster.server | quote }}
    namespace: sovereign-cloud-plugins

  ignoreDifferences:
    {{- include "sovereign-central.esoIgnoreDifferences" . | nindent 4 }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
{{- end }}
