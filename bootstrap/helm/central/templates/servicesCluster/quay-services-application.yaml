{{- if and (include "sovereign-central.applicationsEnabled" .) .Values.quayServices.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quay-services
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: registry
    sovereign-cloud/target: services
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.quayServices.syncWave | quote }}
spec:
  project: services

  source:
    repoURL: {{ printf "oci://%s/%s/quay" .Values.oci.registry .Values.oci.repositoryBase | quote }}
    chart: quay
    targetRevision: {{ .Values.quayServices.chartVersion | quote }}
    helm:
      releaseName: quay-services
      values: |
        {{- toYaml .Values.quayServices.values | nindent 8 }}

  destination:
    server: {{ .Values.servicesCluster.server | quote }}
    namespace: {{ .Values.quayServices.destinationNamespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  ignoreDifferences:
    - group: ""
      kind: Secret
      name: {{ .Values.quayServices.values.registry.configBundleSecretName | default (printf "%s-config-bundle" (.Values.quayServices.values.registry.name | default "sovereign-registry")) }}
      jsonPointers:
        - /data/config.yaml
{{- end }}
