# ─── Sovereign Cloud Dashboard (services cluster) ──────────────────────────
sovereignDashboard:
  enabled: true
  chartVersion: "0.9.18"
  syncWave: "40"
  destinationNamespace: sovereign-cloud
  values:
    namespace: sovereign-cloud
    clusterDomain: apps.services.example.com
    image:
      repository: quay.example.com/hybrid-sovereign/sovereign-cloud-dashboard
      tag: "1.9.4"
      pullPolicy: Always
    imagePullSecrets:
      - name: quay-pull-secret
    oauthProxy:
      image: registry.redhat.io/openshift4/ose-oauth-proxy:v4.14
      # cookieSecret and clientSecret are NOT stored here.
      # Vault key pulled via ExternalSecret into the sovereign-cloud namespace.
      externalSecret:
        enabled: true
        secretStoreName: vault-backend
        secretStoreKind: ClusterSecretStore
        vaultPath: "dashboard-oauth"
        refreshInterval: "1h"
    route:
      enabled: true
    env:
      ENTITY_NAMESPACE: sovereign-cloud
      NODE_ENV: production
      OAUTH_SYNC_VERSION: "2"

