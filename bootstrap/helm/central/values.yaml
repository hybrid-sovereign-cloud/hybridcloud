# ─── Rebuild baseline (005-phased-env-rebuild) ───────────────────────────────
# applicationsEnabled MUST stay true so sovereign-central-apps syncs.
# Every Application-level *.enabled below MUST be false for phased rebuild.
# Enable one component per commit — see specs/005-phased-env-rebuild/quickstart.md
# Do NOT change nested chart sub-values (vault HA, keycloak instance, etc.) here.

# ─── ArgoCD namespace ─────────────────────────────────────────────────────────
argocd:
  namespace: openshift-gitops
  # Per-Application automated sync retry (after controller terminates sync at 10m).
  syncPolicy:
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

# Master switch: when false, no Application CRs render at all. For phased rebuild
# keep true and disable each component's enabled flag individually.
applicationsEnabled: true

# ─── Services cluster (managed by central ArgoCD) ────────────────────────────
servicesCluster:
  server: "https://api.services.example.com:6443"

# ─── OCI registry that stores platform Helm charts ───────────────────────────
oci:
  registry: "quay.example.com"
  repositoryBase: "hybrid-sovereign"

# ─── Sovereign Namespaces (central cluster) ──────────────────────────────────
sovereignNamespaces:
  enabled: true
  chartVersion: "0.2.7"
  syncWave: "1"
  values:
    namespaces:
      - name: sovereign-cloud-jobs
        enabled: true
      - name: sovereign-cloud-helpers
        enabled: true
      - name: gitea
        enabled: true
      # central-vault, central-rhbk, central-quay, and aap are created by their
      # respective charts. Do NOT add them here to avoid ArgoCD ownership conflicts.
    oauth:
      enabled: true
      identityProviderName: "sovereign-central"
      clientId: "openshift-central"
      clientSecretName: "sovereign-central-oauth-secret"
      issuer: "https://rhbk-central.apps.central.example.com/realms/sovereign-central"
      caConfigMap: "keycloak-central-ca"

# ─── Sovereign Namespaces (services cluster) ────────────────────────────────
sovereignNamespacesServices:
  enabled: true
  chartVersion: "0.2.7"
  syncWave: "1"
  values:
    ociPullSecret:
      enabled: true
      vaultPath: "oci-credentials"
      secretStoreName: "vault-backend"
      secretStoreKind: "ClusterSecretStore"
    namespaces:
      - name: sovereign-cloud-jobs
        enabled: true
      - name: sovereign-cloud-helpers
        enabled: true
      - name: sovereign-cloud
        enabled: true
      - name: sovereign-cloud-plugins
        enabled: true
      - name: services-rhbk
        enabled: true
      - name: services-quay
        enabled: true
      # aap and services-vault namespaces are created by their respective charts
      # (aap/templates/operator.yaml and vault/templates/namespace.yaml).
      # Do NOT add them here to avoid ArgoCD ownership conflicts.
    oauth:
      enabled: true
      identityProviderName: "sovereign-services"
      clientId: "openshift-services"
      clientSecretName: "sovereign-services-oauth-secret"
      issuer: "https://rhbk-services.apps.services.example.com/realms/sovereign-tenants"
      caConfigMap: "keycloak-services-ca"

# ─── RHBK Central (Keycloak) ─────────────────────────────────────────────────
rhbk:
  enabled: true
  chartVersion: "0.10.2"
  syncWave: "20"
  destinationNamespace: central-rhbk
  values:
    namespace: central-rhbk
    instanceName: rhbk-central
    pushSecretToVault: true
    vaultSecretPath: "central/data/rhbk-central-admin"
    operator:
      channel: stable-v26.4
    keycloak:
      enabled: true
      instances: 2
      hostname: "rhbk-central.apps.central.example.com"
      db:
        enabled: true
        vendor: postgres
        host: "rhbk-pgcluster-primary.central-rhbk.svc"
        database: keycloak
        usernameSecret:
          name: rhbk-pgcluster-pguser-keycloak
          key: user
        passwordSecret:
          name: rhbk-pgcluster-pguser-keycloak
          key: password
        crunchy:
          enabled: true
          name: rhbk-pgcluster
          instances: 2
          storage: 10Gi
          backupStorage: 10Gi
      tls:
        enabled: false

# ─── RHBK Services (Keycloak) ────────────────────────────────────────────────
rhbkServices:
  enabled: true
  chartVersion: "0.10.2"
  syncWave: "20"
  destinationNamespace: services-rhbk
  values:
    namespace: services-rhbk
    instanceName: rhbk-services
    pushSecretToVault: true
    vaultSecretPath: "central/data/rhbk-services-admin"
    operator:
      channel: stable-v26.4
    keycloak:
      enabled: true
      instances: 2
      hostname: "rhbk-services.apps.services.example.com"
      db:
        enabled: true
        vendor: postgres
        host: "rhbk-pgcluster-primary.services-rhbk.svc"
        database: keycloak
        usernameSecret:
          name: rhbk-pgcluster-pguser-keycloak
          key: user
        passwordSecret:
          name: rhbk-pgcluster-pguser-keycloak
          key: password
        crunchy:
          enabled: true
          name: rhbk-pgcluster
          instances: 2
          storage: 10Gi
          backupStorage: 10Gi
      tls:
        enabled: false

# ─── RHBK Config (DEPRECATED — replaced by sovereignJobs keycloak* jobs) ─────
rhbkConfig:
  enabled: false
  chartVersion: "0.4.0"
  syncWave: "30"
  destinationNamespace: central-rhbk
  values:
    namespace: central-rhbk
    ansibleJob:
      enabled: false

# ─── ACS (disabled) ──────────────────────────────────────────────────────────
acs:
  enabled: true
  chartVersion: "0.2.0"
  syncWave: "25"
  destinationNamespace: rhacs-operator
  values:
    namespace: rhacs-operator
    central:
      enabled: true
      namespace: stackrox
      instanceName: stackrox-central-services
    consolePlugin:
      enabled: true

acsServices:
  enabled: false
  chartVersion: "0.2.0"
  syncWave: "25"
  destinationNamespace: rhacs-operator
  values:
    namespace: rhacs-operator
    central:
      enabled: false
    consolePlugin:
      enabled: true

# ─── Vault Central ───────────────────────────────────────────────────────────
vault:
  enabled: true
  chartVersion: "0.6.11"
  syncWave: "15"
  destinationNamespace: central-vault
  values:
    namespace: central-vault
    pushSecretToVault: false
    vault:
      global:
        openshift: true
        imagePullSecrets:
          - name: quay-pull-secret
      server:
        standalone:
          enabled: false
        ha:
          enabled: true
          replicas: 3
          raft:
            enabled: true
            config: |
              ui = true
              listener "tcp" {
                tls_disable = 1
                address = "[::]:8200"
                cluster_address = "[::]:8201"
              }
              storage "raft" {
                path = "/vault/data"
              }
              service_registration "kubernetes" {}
        dataStorage:
          enabled: true
          size: 10Gi
        route:
          enabled: true
          host: vault-central.apps.central.example.com
          tls:
            termination: edge
            insecureEdgeTerminationPolicy: Redirect
        image:
          repository: quay.example.com/hybrid-sovereign/vault
          tag: "1.21.2"
      ui:
        enabled: true
      injector:
        enabled: true
        image:
          repository: quay.example.com/hybrid-sovereign/vault-k8s
          tag: "1.5.0"

# ─── Vault Services ─────────────────────────────────────────────────────────
vaultServices:
  enabled: true
  chartVersion: "0.6.11"
  syncWave: "15"
  destinationNamespace: services-vault
  values:
    namespace: services-vault
    pushSecretToVault: false
    ociCredentials:
      enabled: true
      vaultPath: "oci-credentials"
      secretStoreName: "vault-backend"
      secretStoreKind: "ClusterSecretStore"
    vault:
      global:
        openshift: true
        imagePullSecrets:
          - name: quay-pull-secret
      server:
        standalone:
          enabled: false
        ha:
          enabled: true
          replicas: 3
          raft:
            enabled: true
            config: |
              ui = true
              listener "tcp" {
                tls_disable = 1
                address = "[::]:8200"
                cluster_address = "[::]:8201"
              }
              storage "raft" {
                path = "/vault/data"
                retry_join {
                  leader_api_addr = "http://vault-services-0.vault-services-internal.services-vault.svc:8200"
                }
                retry_join {
                  leader_api_addr = "http://vault-services-1.vault-services-internal.services-vault.svc:8200"
                }
                retry_join {
                  leader_api_addr = "http://vault-services-2.vault-services-internal.services-vault.svc:8200"
                }
              }
              service_registration "kubernetes" {}
        dataStorage:
          enabled: true
          size: 10Gi
        route:
          enabled: true
          host: vault-services.apps.services.example.com
          tls:
            termination: edge
            insecureEdgeTerminationPolicy: Redirect
        image:
          repository: quay.example.com/hybrid-sovereign/vault
          tag: "1.21.2"
        readinessProbe:
          enabled: true
          path: "/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"
      ui:
        enabled: true
      injector:
        enabled: true
        image:
          repository: quay.example.com/hybrid-sovereign/vault-k8s
          tag: "1.5.0"

# ─── Vault Services Init (separate App to avoid StatefulSet health deadlock) ─
vaultServicesInit:
  enabled: true
  chartVersion: "0.2.3"
  syncWave: "20"
  values:
    namespace: services-vault
    serviceAccount: vault-init-runner
    image: "quay.example.com/hybrid-sovereign/ansible-runner:latest"
    imagePullSecretName: "quay-pull-secret"
    secretName: "vault-services-init-secrets"
    vaultAddr: "http://vault-services-0.vault-services-internal.services-vault.svc:8200"
    vaultNamespace: "services-vault"
    activeDeadlineSeconds: 600
    backoffLimit: 5
    pushSecretToVaultCentral: true
    pushSecretStoreName: "vault-backend"
    vaultCentralPath: "vault-services-init"

# ─── RHACM ───────────────────────────────────────────────────────────────────
rhacm:
  enabled: true
  chartVersion: "0.5.0"
  enableMultiClusterHub: true
  destinationNamespace: open-cluster-management
  syncWave: "10"
  values:
    operator:
      channel: release-2.16
      installPlanApproval: Automatic
    multiClusterHub:
      enabled: true
      availabilityConfig: High
      disableHubSelfManagement: false
      components:
        console: true
        search: true
        cluster-lifecycle: true
        volsync: false
        cluster-backup: false

# ─── AAP (services cluster) ─────────────────────────────────────────────────
aap:
  enabled: true
  chartVersion: "0.5.3"
  syncWave: "30"
  destinationNamespace: aap
  values:
    namespace: aap
    instance:
      enabled: true
      name: sovereign-aap
    controller:
      enabled: true
    eda:
      enabled: false
    hub:
      enabled: false
    postgres:
      enabled: true
      name: aap-pgcluster
      instances: 2
      storage: 10Gi
      backupStorage: 10Gi

# ─── AAP (central cluster — EDA controller) ────────────────────────────────
aapCentral:
  enabled: true
  chartVersion: "0.3.9"
  syncWave: "30"
  destinationNamespace: aap
  values:
    namespace: aap
    name: sovereign-aap
    controller:
      enabled: true
      replicas: 1
    eda:
      enabled: true
      replicas: 1
    hub:
      enabled: false
    postgres:
      enabled: true
      name: aap-pgcluster
      instances: 2
      storage: 10Gi
      backupStorage: 10Gi
      syncRunId: "2026-07-15-external-postgres-v7"

# ─── Plugin IaaC Operator (services cluster) — Go direct Gitea sync ─────────
pluginIaac:
  enabled: false
  chartVersion: "0.2.1"
  syncWave: "40"
  destinationNamespace: sovereign-cloud-plugins
  values:
    namespace: sovereign-cloud-plugins
    createNamespace: false
    replicas: 2
    leaderElection: true
    metricsPort: 8443
    image:
      repository: quay.example.com/hybrid-sovereign/plugin-iaac
      tag: "v0.2.0"
      pullPolicy: Always
    imagePullSecrets:
      - name: quay-pull-secret
    gitea:
      url: "https://gitea.apps.central.example.com"
      repoOwner: "gitea_admin"
      repoName: "tenancy_repo"
      secretName: "gitea-admin-token"
      tokenSecretKey: "admin_token"
      externalSecret:
        enabled: true
        secretStoreName: vault-backend
        secretStoreKind: ClusterSecretStore
        vaultPath: gitea-admin
    defaultIaac:
      enabled: true
      name: iaac

# ─── Event Forwarder (services cluster) ─────────────────────────────────────
eventForwarder:
  enabled: false
  chartVersion: "0.5.4"
  syncWave: "32"
  image:
    repository: quay.example.com/hybrid-sovereign/event-forwarder
    tag: "0.3.0"
  eventStreamUrl: "https://aap.apps.central.example.com/eda-event-streams/api/eda/v1/external_event_stream/4392c64b-2faf-4414-a6e6-5ff1bc8d5a75/post/"
  vaultSecretPath: "event-forwarder"

# ─── OpenShift Virtualization (CNV) — central cluster ───────────────────────
cnv:
  enabled: true
  chartVersion: "0.1.0"
  syncWave: "12"
  destinationNamespace: openshift-cnv
  values:
    namespace: openshift-cnv
    subscription:
      channel: stable
      installPlanApproval: Automatic
      source: redhat-operators
      sourceNamespace: openshift-marketplace
    hyperconverged:
      enabled: true
      name: kubevirt-hyperconverged
      featureGates:
        deployKubeSecondaryDNS: false
        enableCommonBootImageImport: false
      infra:
        nodePlacement: {}
      workloads:
        nodePlacement: {}
    pdb:
      virtApi:
        enabled: true
        minAvailable: 1
      virtController:
        enabled: true
        minAvailable: 1

# ─── Migration Toolkit for Virtualization (MTV) — central cluster ────────────
mtv:
  enabled: true
  chartVersion: "0.1.8"
  syncWave: "28"
  destinationNamespace: openshift-mtv
  values:
    namespace: openshift-mtv
    subscription:
      channel: release-v2.12
      installPlanApproval: Automatic
      source: redhat-operators
      sourceNamespace: openshift-marketplace
    forkliftController:
      enabled: true
      name: forklift-controller
      controller:
        replicas: 2
      ui:
        replicas: 2
    vmwareProvider:
      enabled: true
      name: vmware-vcenter
      type: vsphere
      url: "https://vcenter.lab.example.com/sdk"
      credentialsSecretName: vmware-vcenter-secret
    externalSecret:
      enabled: true
      name: vmware-vcenter-es
      secretStoreName: vault-backend
      secretStoreKind: ClusterSecretStore
      vaultPath: vmware-credentials
      refreshInterval: "1h"
      targetSecretName: vmware-vcenter-secret
    pdb:
      mtvController:
        enabled: true
        minAvailable: 1

# ─── ODF / Noobaa (central) ─────────────────────────────────────────────────
odf:
  enabled: true
  chartVersion: "0.6.0"
  syncWave: "12"
  destinationNamespace: openshift-storage
  values:
    namespace: openshift-storage
    noobaa:
      enabled: true
      name: noobaa

# ─── ODF / Noobaa (services) ────────────────────────────────────────────────
odfServices:
  enabled: true
  chartVersion: "0.6.0"
  syncWave: "12"
  destinationNamespace: openshift-storage
  values:
    namePrefix: "svc-"
    skipNamespace: true
    namespace: openshift-storage
    noobaa:
      enabled: true
      name: noobaa
    edaLogsObc:
      enabled: true

# ─── Quay (central) ─────────────────────────────────────────────────────────
# Temporarily disabled to free CPU/memory for AAP controller/EDA on central.
quay:
  enabled: false
  chartVersion: "0.6.3"
  syncWave: "35"
  destinationNamespace: central-quay
  values:
    namespace: central-quay
    registry:
      enabled: true
      name: sovereign-registry
      configBundle: |
        SERVER_HOSTNAME: quay.example.com
        FEATURE_USER_INITIALIZE: true
        FEATURE_SUPERUSERS_FULL_ACCESS: true
        SUPER_USERS:
          - sovereign_admin
        FEATURE_USER_CREATION: false
        FEATURE_TEAM_SYNCING: true
        TEAM_RESYNC_STALE_TIME: "60m"
        FEATURE_NONSUPERUSER_TEAM_SYNCING_SETUP: false
      configBundleSecretName: sovereign-registry-config-bundle
      components:
        objectstorage:
          managed: true
        postgres:
          managed: false
        clair:
          managed: true
        redis:
          managed: true
        mirror:
          managed: true
        route:
          managed: true
        tls:
          managed: true
        monitoring:
          managed: false
        quay:
          overrides:
            resources:
              requests:
                cpu: "500m"
                memory: "4Gi"
              limits:
                cpu: "2"
                memory: "8Gi"
        horizontalpodautoscaler:
          managed: false
    crunchy:
      enabled: true
      name: quay-pgcluster
      instances: 2
      storage: 20Gi
      backupStorage: 20Gi

# ─── Quay (services) ────────────────────────────────────────────────────────
quayServices:
  enabled: true
  chartVersion: "0.6.3"
  syncWave: "35"
  destinationNamespace: services-quay
  values:
    namePrefix: "svc-"
    skipNamespace: true
    namespace: services-quay
    registry:
      enabled: true
      name: svc-sovereign-registry
      configBundle: |
        SERVER_HOSTNAME: svc-sovereign-registry-quay-services-quay.apps.services.example.com
        FEATURE_USER_INITIALIZE: true
        FEATURE_SUPERUSERS_FULL_ACCESS: true
        SUPER_USERS:
          - sovereign_admin
        FEATURE_USER_CREATION: true
        FEATURE_TEAM_SYNCING: true
        TEAM_RESYNC_STALE_TIME: "60m"
        FEATURE_NONSUPERUSER_TEAM_SYNCING_SETUP: false
      configBundleSecretName: svc-sovereign-registry-config-bundle
      components:
        objectstorage:
          managed: true
        postgres:
          managed: false
        clair:
          managed: false
        redis:
          managed: true
        mirror:
          managed: false
        monitoring:
          managed: false
        horizontalpodautoscaler:
          managed: true
          overrides:
            minReplicas: 1
            maxReplicas: 2
        clairpostgres:
          managed: false
        route:
          managed: true
        tls:
          managed: true
        quay:
          overrides:
            resources:
              requests:
                cpu: "250m"
                memory: "4Gi"
              limits:
                cpu: "2"
                memory: "8Gi"
    crunchy:
      enabled: true
      name: svc-quay-pgcluster
      instances: 2
      storage: 20Gi
      backupStorage: 20Gi

# ─── Gitea (services cluster) ──────────────────────────────────────────────
gitea:
  enabled: false
  chartVersion: "0.4.3"
  syncWave: "18"
  values:
    gitea:
      global:
        security:
          allowInsecureImages: true
        imagePullSecrets:
          - quay-pull-secret
      replicaCount: 1
      image:
        registry: quay.example.com
        repository: hybrid-sovereign/gitea
        tag: "1.25.5"
        rootless: true
      gitea:
        admin:
          # Credentials sourced from k8s Secret 'gitea-admin-credentials' (created by init chart from env vars)
          # DEVIATION: Gitea chart deploys at wave 18, before Vault is initialized (wave 23).
          # A k8s Secret pre-created during 'make init-central-argo' is used as a bridge.
          # Post-init, credentials are pushed to Vault via PushSecret in giteaInit job.
          existingSecret: "gitea-admin-credentials"
        config:
          server:
            DOMAIN: "gitea-gitea.apps.services.example.com"
            ROOT_URL: "https://gitea.apps.central.example.com"
          database:
            DB_TYPE: postgres
          session:
            PROVIDER: memory
          cache:
            ADAPTER: memory
          queue:
            TYPE: level
      postgresql:
        enabled: true
        image:
          registry: quay.example.com
          repository: hybrid-sovereign/postgresql
          tag: "17.6.0-debian-12-r4"
        volumePermissions:
          image:
            registry: quay.example.com
            repository: hybrid-sovereign/os-shell
            tag: "12-debian-12-r51"
      postgresql-ha:
        enabled: false
      redis:
        enabled: false
      redis-cluster:
        enabled: false
      valkey-cluster:
        enabled: true
        image:
          registry: quay.example.com
          repository: hybrid-sovereign/valkey-cluster
          tag: "8.1.3-debian-12-r3"
        volumePermissions:
          image:
            registry: quay.example.com
            repository: hybrid-sovereign/os-shell
            tag: "12-debian-12-r51"
        sysctlImage:
          registry: quay.example.com
          repository: hybrid-sovereign/os-shell
          tag: "12-debian-12-r51"
      persistence:
        enabled: true
        size: 10Gi
      route:
        enabled: true
        tls:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
    pullSecret:
      # Disabled: quay-pull-secret is provisioned by the init chart via make init-central-argo.
      # The OCI robot credentials must NEVER be committed to git.
      enabled: false
      dockerconfigjson: ""
    giteaTokenExternalSecret:
      enabled: true
      targetNamespace: sovereign-cloud-plugins
      targetSecretName: gitea-admin-token
      secretStoreName: vault-backend
      secretStoreKind: ClusterSecretStore
      vaultPath: gitea-admin
      refreshInterval: "1h"
    adminCredentialsExternalSecret:
      enabled: true
      namespace: gitea
      secretName: gitea-admin-credentials
      secretStoreName: vault-backend
      secretStoreKind: ClusterSecretStore
      vaultPath: gitea-admin
      refreshInterval: "1h"
    pullSecretExternalSecret:
      enabled: false
      namespace: gitea
      secretStoreName: vault-backend
      secretStoreKind: ClusterSecretStore
      vaultPath: oci-credentials
      refreshInterval: "1h"

# ─── Gitea (central cluster instance) ───────────────────────────────────────
# Manages the Gitea instance running on the central cluster itself.
# This is separate from the services-cluster Gitea (managed by the 'gitea' app above).
giteaCentral:
  enabled: true
  chartVersion: "0.4.6"
  syncWave: "18"
  values:
    gitea:
      global:
        security:
          allowInsecureImages: true
        imagePullSecrets:
          - quay-pull-secret
      replicaCount: 1
      strategy:
        type: Recreate
      image:
        registry: quay.example.com
        repository: hybrid-sovereign/gitea
        tag: "1.25.5"
        rootless: true
      gitea:
        admin:
          existingSecret: "gitea-admin-credentials"
        additionalConfigFromEnvs:
          - name: GITEA__DATABASE__PASSWD
            valueFrom:
              secretKeyRef:
                name: gitea-pgcluster-pguser-gitea
                key: password
        config:
          server:
            DOMAIN: "gitea-gitea.apps.central.example.com"
            ROOT_URL: "https://gitea.apps.central.example.com"
          database:
            DB_TYPE: postgres
            HOST: "gitea-pgcluster-primary.gitea.svc:5432"
            NAME: gitea
            USER: gitea
            SSL_MODE: require
          session:
            PROVIDER: memory
          cache:
            ADAPTER: memory
          queue:
            TYPE: level
      postgresql:
        enabled: false
      postgresql-ha:
        enabled: false
      redis:
        enabled: false
      redis-cluster:
        enabled: false
      valkey-cluster:
        enabled: true
        image:
          registry: quay.example.com
          repository: hybrid-sovereign/valkey-cluster
          tag: "8.1.3-debian-12-r3"
        volumePermissions:
          image:
            registry: quay.example.com
            repository: hybrid-sovereign/os-shell
            tag: "12-debian-12-r51"
        sysctlImage:
          registry: quay.example.com
          repository: hybrid-sovereign/os-shell
          tag: "12-debian-12-r51"
      persistence:
        enabled: true
        size: 10Gi
      route:
        enabled: true
        tls:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
    pullSecret:
      enabled: false
      dockerconfigjson: ""
    giteaTokenExternalSecret:
      enabled: false
    adminCredentialsExternalSecret:
      enabled: true
      namespace: gitea
      secretName: gitea-admin-credentials
      secretStoreName: vault-backend
      secretStoreKind: ClusterSecretStore
      vaultPath: gitea-admin
      refreshInterval: "1h"
    pullSecretExternalSecret:
      enabled: false
    crunchy:
      enabled: true
      name: gitea-pgcluster
      namespace: gitea
      instances: 2
      storage: 10Gi
      backupStorage: 10Gi

# ─── Crunchy Postgres (central) ─────────────────────────────────────────────
crunchyPostgres:
  enabled: true
  chartVersion: "0.5.0"
  syncWave: "11"
  destinationNamespace: postgres-operator
  values:
    namespace: postgres-operator

# ─── Crunchy Postgres (services) ────────────────────────────────────────────
crunchyPostgresServices:
  enabled: true
  chartVersion: "0.5.0"
  syncWave: "11"
  destinationNamespace: postgres-operator
  values:
    namePrefix: "svc-"
    namespace: postgres-operator

# ─── External Secrets Operator (central) ────────────────────────────────────
externalSecrets:
  enabled: true
  chartVersion: "0.1.4"
  syncWave: "5"

  values:
    operator:
      channel: stable
      installPlanApproval: Automatic
      source: community-operators
      sourceNamespace: openshift-marketplace
    namespace: external-secrets

# ─── DNS Forwarder (services) ────────────────────────────────────────────────
# Adds lab.example.com → 127.0.0.1/127.0.0.1 forwarder to the services
# cluster CoreDNS so pods can resolve internal lab hostnames (vCenter, ESXi, etc.)
# without falling through to public DNS which has no knowledge of private hosts.
dnsForwarderServices:
  enabled: true
  chartVersion: "0.1.0"
  syncWave: "2"
  values:
    servers:
      - name: lab-signal9-forwarder
        zones:
          - lab.example.com
        policy: Sequential
        upstreams:
          - 127.0.0.1
          - 127.0.0.1

# ─── External Secrets Operator (services) ───────────────────────────────────
externalSecretsServices:
  enabled: true
  chartVersion: "0.1.4"
  syncWave: "5"
  values:
    operator:
      channel: stable
      installPlanApproval: Automatic
      source: community-operators
      sourceNamespace: openshift-marketplace
    namespace: external-secrets

# ─── Vault Central Namespace (backup copies of init secrets) ─────────────────
vaultCentralNamespace:
  enabled: true
  chartVersion: "0.1.9"
  syncWave: "27"
  argocdChartsRepo: false
  values:
    namespace: vault-central
    secretStore:
      name: vault-backend
      kind: ClusterSecretStore
    vaultInitSecretsCopy:
      enabled: true
    vaultServicesInitSecretsCopy:
      enabled: true
    # Services vault init PushSecret disabled: services-vault namespace is on services cluster
    vaultServicesInitPushSecret:
      enabled: false
    dashboardCentralReader:
      enabled: true
      namespace: sovereign-cloud-jobs
      jobServiceAccount: sovereign-ansible-runner
      image: "quay.example.com/hybrid-sovereign/ansible-runner:latest"
      imagePullSecrets:
        - name: quay-pull-secret
      vaultAddr: "http://vault-active.central-vault.svc:8200"
      vaultPath: "central/data/dashboard-central-reader"
      apiServer: "https://api.central.example.com:6443"
    edaS3Creds:
      enabled: true
      bucketName: "eda-job-logs"
      endpoint: "https://s3.apps.services.example.com"
    centralServiceAccounts:
      # DEVIATION: awshelper-creator-sa disabled — HELPERAWS operator is obsolete (feature 009).
      # WHY: User confirmed no active tenants; helper_CloudAWS operator will not be re-deployed.
      # WHERE: vaultCentralNamespace.centralServiceAccounts.awshelper-creator-sa
      # REMEDIATION: If CloudAWS helper is reintroduced, create a dedicated operator chart.
      awshelper-creator-sa:
        enabled: false
        namespace: sovereign-cloud-jobs
        clusterRoleRules:
          - apiGroups: ["helper.hybridsovereign.redhat"]
            resources: ["*"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
          - apiGroups: [""]
            resources: ["namespaces", "secrets", "configmaps"]
            verbs: ["get", "list", "watch", "create", "update", "patch"]
      # DEVIATION: osohelper-creator-sa disabled — HELPEROSO operator is obsolete (feature 009).
      # WHY: User confirmed no active tenants; helper_CloudOSO operator will not be re-deployed.
      # WHERE: vaultCentralNamespace.centralServiceAccounts.osohelper-creator-sa
      # REMEDIATION: If CloudOSO helper is reintroduced, create a dedicated operator chart.
      osohelper-creator-sa:
        enabled: false
        namespace: sovereign-cloud-jobs
        clusterRoleRules:
          - apiGroups: ["helper.hybridsovereign.redhat"]
            resources: ["*"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
          - apiGroups: [""]
            resources: ["namespaces", "secrets", "configmaps"]
            verbs: ["get", "list", "watch", "create", "update", "patch"]
      aap-central-cluster-sa:
        enabled: true
        namespace: sovereign-cloud-jobs
        clusterRoleRules:
          - apiGroups: ["external-secrets.io"]
            resources: ["externalsecrets"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
          - apiGroups: [""]
            resources: ["secrets", "namespaces"]
            verbs: ["get", "list", "watch"]

# ─── ArgoCD Repo Secret: cluster_builds (Gitea → Vault → ESO) ────────────────
argocdClusterBuildsRepo:
  enabled: false  # Phase 5: direct Helm by operators replaces Gitea→ArgoCD cluster-build flow
  giteaUrl: "https://gitea.apps.central.example.com"
  giteaUser: "gitea_admin"

# ─── Vault ClusterSecretStore (central) — uses k8s auth ─────────────────────
vaultSecretStore:
  enabled: true
  chartVersion: "0.3.3"
  syncWave: "22"
  values:
    vault:
      server: "http://vault-active.central-vault.svc:8200"
      path: "central"
    auth:
      type: kubernetes
      mountPath: "kubernetes-central"
      role: "external-secrets"
      serviceAccountName: "external-secrets-vault-sa"
      serviceAccountNamespace: "external-secrets"

# ─── Vault ClusterSecretStore (services → vault-central via external route) ─
# Uses kubernetes-services auth mount on central vault (k8s auth, no root token)
vaultSecretStoreServices:
  enabled: true
  chartVersion: "0.3.3"
  syncWave: "22"
  values:
    vault:
      server: "https://vault-central.apps.central.example.com"
      path: "central"
      caBundle: ""
    auth:
      type: kubernetes
      mountPath: "kubernetes-services"
      role: "external-secrets"
      serviceAccountName: "vault-eso-sa"
      serviceAccountNamespace: "external-secrets"

# ─── Sovereign Jobs RBAC ────────────────────────────────────────────────────
sovereignJobsRbac:
  enabled: true
  chartVersion: "0.1.10"
  syncWave: "3"
  values:
    namespace: sovereign-cloud-jobs
    serviceAccount: sovereign-ansible-runner
    imagePullSecrets:
      - name: quay-pull-secret

# ─── Sovereign Jobs (individual Ansible job Applications) ────────────────────
sovereignJobs:
  chartVersion: "0.1.7"
  namespace: sovereign-cloud-jobs
  serviceAccount: sovereign-ansible-runner
  image: "quay.example.com/hybrid-sovereign/ansible-runner:latest"
  backoffLimit: 5
  imagePullSecrets:
    - name: quay-pull-secret
  jobs:
    vaultInit:
      enabled: true
      playbook: vault-init.yml
      activeDeadlineSeconds: 600
      syncWave: "23"
      env:
        - name: VAULT_ADDR
          value: "http://vault.central-vault.svc:8200"
        - name: VAULT_SECRET_NAMESPACE
          value: "central-vault"
        - name: VAULT_NAMESPACE
          value: "central-vault"
    vaultKv:
      enabled: true
      playbook: vault-kv.yml
      activeDeadlineSeconds: 600
      syncWave: "24"
      env:
        - name: VAULT_ADDR
          value: "http://vault.central-vault.svc:8200"
        - name: VAULT_NAMESPACE
          value: "central-vault"
    openshiftVaultSeed:
      enabled: true
      playbook: openshift-vault-seed.yml
      activeDeadlineSeconds: 300
      syncWave: "24"
      env:
        - name: VAULT_ADDR
