# ─── Cluster Builds ApplicationSet ───────────────────────────────────────────
# Monitors cluster_builds Gitea repo for Application definitions in aws/*.yaml.
# The giteaClusterBuildsRepo sovereign job (wave 37) creates the repo and the
# ArgoCD repo secret before this ApplicationSet (wave 50) is deployed.
clusterBuilds:
  enabled: false  # direct Helm by operators replaces Gitea→ArgoCD cluster-build flow
  syncWave: "50"
  repoURL: "https://gitea.apps.central.example.com/gitea_admin/cluster_builds.git"
  chartsRepoURL: "oci://quay.example.com/hybrid-sovereign/mce-cluster-build"
  mceChartName: "mce-cluster-build"
  mceChartVersion: "0.2.0"

# ─── ACM Policy: install ExternalSecrets on provisioned clusters ──────────────
acmPolicies:
  enabled: false
  syncWave: "55"
  namespace: openshift-gitops
  externalSecrets:
    enabled: true
    channel: stable
    source: community-operators
    sourceNamespace: openshift-marketplace
  clusterSelector:
    matchExpressions:
      - key: vendor
        operator: In
        values:
          - OpenShift
      - key: local-cluster
        operator: NotIn
        values:
          - "true"

# ─── ACM Policy: basechart — install ESO + GitOps on basechart:true clusters ─
# Installs External Secrets Operator and OpenShift GitOps Operator via OLM.
acmBasechart:
  enabled: false
  syncWave: "56"
  namespace: openshift-gitops
  externalSecrets:
    enabled: true
    channel: stable
    source: community-operators
    sourceNamespace: openshift-marketplace
  gitopsOperator:
    enabled: true
    channel: latest
    source: redhat-operators
    sourceNamespace: openshift-marketplace
  istioOperator:
    enabled: true
    channel: stable

# ─── AMQ Streams (central cluster) ───────────────────────────────────────────
amqStreams:
  enabled: true
  chartVersion: "0.2.3"
  syncWave: "13"
  destinationNamespace: amq-streams
  values:
    namespace: amq-streams
    kafka:
      enabled: true
      name: hybridsovereign-kafka
      replicas: 3
      storage: 10Gi
      listeners:
        internalPlain: true
        internalTls: true
        externalRoute: true
        externalPort: 9094

# ─── HybridSovereign Primary Operator (services) ─────────────────────────────
hybridsovereignPrimaryOperator:
