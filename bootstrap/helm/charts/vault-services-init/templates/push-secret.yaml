{{- if .Values.pushSecretToVaultCentral }}
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: push-vault-services-init-secrets
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  deletionPolicy: None
  refreshInterval: 1h
  secretStoreRefs:
    - name: {{ .Values.pushSecretStoreName }}
      kind: ClusterSecretStore
  selector:
    secret:
      name: {{ .Values.secretName }}
  data:
    - match:
        secretKey: root_token
        remoteRef:
          remoteKey: {{ .Values.vaultCentralPath }}
          property: root_token
      conversionStrategy: None
    - match:
        secretKey: unseal_keys
        remoteRef:
          remoteKey: {{ .Values.vaultCentralPath }}
          property: unseal_keys
      conversionStrategy: None
    - match:
        secretKey: unseal_keys_base64
        remoteRef:
          remoteKey: {{ .Values.vaultCentralPath }}
          property: unseal_keys_base64
      conversionStrategy: None
  updatePolicy: Replace
{{- end }}
