gitea:
  global:
    storageClass: ""
    security:
      allowInsecureImages: true
    imagePullSecrets:
      - quay-pull-secret

  replicaCount: 1

  image:
    registry: quay.example.com
    repository: hybrid-sovereign/gitea
    tag: "1.25.5"
    rootless: true

  gitea:
    admin:
      existingSecret: ""
    config:
      server:
        DOMAIN: ""
        ROOT_URL: ""
      database:
        DB_TYPE: postgres
      session:
        PROVIDER: memory
      cache:
        ADAPTER: memory
      queue:
        TYPE: level

  postgresql:
    enabled: true
    image:
      registry: quay.example.com
      repository: hybrid-sovereign/postgresql
      tag: "17.6.0-debian-12-r4"
    volumePermissions:
      image:
        registry: quay.example.com
        repository: hybrid-sovereign/os-shell
        tag: "12-debian-12-r51"

  postgresql-ha:
    enabled: false

  redis:
    enabled: false

  redis-cluster:
    enabled: false

  valkey-cluster:
    enabled: true
    image:
      registry: quay.example.com
      repository: hybrid-sovereign/valkey-cluster
      tag: "8.1.3-debian-12-r3"
    volumePermissions:
      image:
        registry: quay.example.com
        repository: hybrid-sovereign/os-shell
        tag: "12-debian-12-r51"
    sysctlImage:
      registry: quay.example.com
      repository: hybrid-sovereign/os-shell
      tag: "12-debian-12-r51"

  persistence:
    enabled: true
    size: 10Gi

  ingress:
    enabled: false

  route:
    enabled: true

pullSecret:
  enabled: false
  dockerconfigjson: ""

giteaTokenExternalSecret:
  enabled: false
  targetNamespace: sovereign-cloud-plugins
  targetSecretName: gitea-admin-token
  secretStoreName: vault-backend
  secretStoreKind: ClusterSecretStore
  vaultPath: gitea-admin
  refreshInterval: "1h"

adminCredentialsExternalSecret:
  enabled: false
  namespace: gitea
  secretName: gitea-admin-credentials
  secretStoreName: vault-backend
  secretStoreKind: ClusterSecretStore
  vaultPath: gitea-admin
  refreshInterval: "1h"

pullSecretExternalSecret:
  enabled: false
  namespace: gitea
  secretStoreName: vault-backend
  secretStoreKind: ClusterSecretStore
  vaultPath: oci-credentials
  refreshInterval: "1h"

crunchy:
  enabled: false
  name: gitea-pgcluster
  namespace: gitea
  instances: 2
  storage: 10Gi
  backupStorage: 10Gi
