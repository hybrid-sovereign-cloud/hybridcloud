{{- if .Values.crunchy.enabled }}
---
apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: {{ .Values.crunchy.name | default "gitea-pgcluster" }}
  namespace: {{ .Values.crunchy.namespace | default "gitea" }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  postgresVersion: 16
  instances:
    - name: pgha
      replicas: {{ .Values.crunchy.instances | default 2 }}
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.crunchy.storage | default "10Gi" }}
  backups:
    pgbackrest:
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: {{ .Values.crunchy.backupStorage | default "10Gi" }}
  users:
    - name: gitea
      databases:
        - gitea
      options: "SUPERUSER"
{{- end }}
