{{- if .Values.giteaTokenExternalSecret.enabled }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.giteaTokenExternalSecret.targetNamespace }}
  labels:
    app.kubernetes.io/part-of: sovereign-cloud
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitea-admin-token
  namespace: {{ .Values.giteaTokenExternalSecret.targetNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ .Values.giteaTokenExternalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.giteaTokenExternalSecret.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.giteaTokenExternalSecret.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.giteaTokenExternalSecret.targetSecretName | default "gitea-admin-token" }}
    creationPolicy: Owner
  data:
    - secretKey: admin_user
      remoteRef:
        key: {{ .Values.giteaTokenExternalSecret.vaultPath }}
        property: admin_user
    - secretKey: admin_password
      remoteRef:
        key: {{ .Values.giteaTokenExternalSecret.vaultPath }}
        property: admin_password
    - secretKey: admin_token
      remoteRef:
        key: {{ .Values.giteaTokenExternalSecret.vaultPath }}
        property: admin_token
{{- end }}
