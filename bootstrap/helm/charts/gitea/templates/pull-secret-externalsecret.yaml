{{- if .Values.pullSecretExternalSecret.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: quay-pull-secret-es
  namespace: {{ .Values.pullSecretExternalSecret.namespace | default "gitea" }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ .Values.pullSecretExternalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.pullSecretExternalSecret.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.pullSecretExternalSecret.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: quay-pull-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      mergePolicy: Replace
      data:
        .dockerconfigjson: |
          {"auths":{"{{ `{{.registry}}` }}":{"username":"{{ `{{.username}}` }}","password":"{{ `{{.password}}` }}","auth":"{{ `{{ printf "%s:%s" .username .password | b64enc }}` }}"}}}
  data:
    - secretKey: registry
      remoteRef:
        key: {{ .Values.pullSecretExternalSecret.vaultPath | default "oci-credentials" }}
        property: registry
    - secretKey: username
      remoteRef:
        key: {{ .Values.pullSecretExternalSecret.vaultPath | default "oci-credentials" }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.pullSecretExternalSecret.vaultPath | default "oci-credentials" }}
        property: password
{{- end }}
