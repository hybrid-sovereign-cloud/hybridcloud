{{- if .Values.pullSecret.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: quay-pull-secret
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "2"
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.pullSecret.dockerconfigjson | quote }}
{{- end }}
