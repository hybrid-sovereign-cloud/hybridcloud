{{- if .Values.pushSecrets }}
{{- range .Values.pushSecrets }}
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "99"
spec:
  refreshInterval: "1h"
  secretStoreRefs:
    - name: vault-backend
      kind: ClusterSecretStore
  selector:
    secret:
      name: {{ .sourceSecret }}
  data:
    {{- range .keys }}
    - match:
        secretKey: {{ .secretKey }}
        remoteRef:
          remoteKey: {{ .remoteKey }}
          property: {{ .property }}
      conversionStrategy: None
    {{- end }}
{{- end }}
{{- end }}
