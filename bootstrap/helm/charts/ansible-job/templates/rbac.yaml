{{- if .Values.rbac.create | default false }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.job.serviceAccount }}
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.job.serviceAccount }}-admin
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ .Values.job.serviceAccount }}
    namespace: {{ .Values.namespace }}
{{- end }}
