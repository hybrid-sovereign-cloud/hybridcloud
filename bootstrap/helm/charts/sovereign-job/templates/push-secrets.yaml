{{- range $name, $ps := .Values.pushSecrets }}
{{- if $ps.enabled }}
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: {{ $name | kebabcase }}
  namespace: {{ $.Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRefs:
    - name: {{ $ps.secretStore | default "vault-backend" }}
      kind: ClusterSecretStore
  selector:
    secret:
      name: {{ $ps.secretName }}
  data:
    {{- range $ps.data }}
    - match:
        secretKey: {{ .secretKey }}
        remoteRef:
          remoteKey: {{ .remoteKey }}
          property: {{ .property }}
      conversionStrategy: None
    {{- end }}
{{- end }}
{{- end }}
