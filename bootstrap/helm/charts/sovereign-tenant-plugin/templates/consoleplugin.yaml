apiVersion: console.openshift.io/v1
kind: ConsolePlugin
metadata:
  name: {{ .Values.plugin.name }}
  labels:
    app: {{ .Values.plugin.name }}
    app.kubernetes.io/part-of: sovereign-cloud
spec:
  displayName: {{ .Values.plugin.displayName | quote }}
  backend:
    service:
      basePath: /
      name: {{ .Values.plugin.name }}
      namespace: {{ .Values.namespace }}
      port: {{ .Values.service.port }}
    type: Service
