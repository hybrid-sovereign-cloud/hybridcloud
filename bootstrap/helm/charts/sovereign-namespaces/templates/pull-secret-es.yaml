{{- if .Values.ociPullSecret.enabled }}
{{- $vaultPath := .Values.ociPullSecret.vaultPath }}
{{- $secretStoreName := .Values.ociPullSecret.secretStoreName }}
{{- $secretStoreKind := .Values.ociPullSecret.secretStoreKind }}
{{- range .Values.namespaces }}
{{- if and .enabled (ne .pullSecret false) }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: quay-pull-secret
  namespace: {{ .name }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 30m
  secretStoreRef:
    name: {{ $secretStoreName | quote }}
    kind: {{ $secretStoreKind | quote }}
  target:
    name: quay-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "{{ `{{.registry}}` }}": {
                "username": "{{ `{{.username}}` }}",
                "password": "{{ `{{.password}}` }}",
                "auth": "{{ `{{(printf "%s:%s" .username .password) | b64enc}}` }}"
              }
            }
          }
  data:
    - secretKey: registry
      remoteRef:
        key: {{ $vaultPath }}
        property: registry
        decodingStrategy: None
        conversionStrategy: Default
    - secretKey: username
      remoteRef:
        key: {{ $vaultPath }}
        property: username
        decodingStrategy: None
        conversionStrategy: Default
    - secretKey: password
      remoteRef:
        key: {{ $vaultPath }}
        property: password
        decodingStrategy: None
        conversionStrategy: Default
{{- end }}
{{- end }}
{{- end }}
