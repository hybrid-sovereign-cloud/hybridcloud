{{- if .Values.networkPolicies.enabled }}
---
# Deny all ingress/egress by default in sovereign-cloud
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: sovereign-cloud
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow router ingress and kube-apiserver/vault/keycloak egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-egress
  namespace: sovereign-cloud
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
        - port: 8200
          protocol: TCP
        - port: 8080
          protocol: TCP
{{- end }}
