{{- if .Values.eda.rbac.enabled | default true }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eda-activation-secrets-reader
  labels:
    app.kubernetes.io/managed-by: sovereign-cloud
    app.kubernetes.io/component: eda
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["argocd-cluster-services"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eda-activation-secrets-reader
  labels:
    app.kubernetes.io/managed-by: sovereign-cloud
    app.kubernetes.io/component: eda
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eda-activation-secrets-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eda-activation-k8s-manager
  labels:
    app.kubernetes.io/managed-by: sovereign-cloud
    app.kubernetes.io/component: eda
rules:
  - apiGroups: [""]
    resources: ["namespaces", "configmaps", "secrets", "services", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["hybridsovereign.redhat"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["config.openshift.io"]
    resources: ["consoles"]
    verbs: ["get", "list"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eda-activation-k8s-manager
  labels:
    app.kubernetes.io/managed-by: sovereign-cloud
    app.kubernetes.io/component: eda
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eda-activation-k8s-manager
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Release.Namespace }}
{{- end }}
