{{- if .Values.postgres.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.name }}-external-postgres-sync
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 5
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.name }}-external-postgres-sync
      containers:
        - name: sync
          image: {{ .Values.postgres.syncImage | default "registry.redhat.io/openshift4/ose-cli:latest" }}
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              NS="{{ .Values.namespace }}"
              PG_PREFIX="{{ .Values.postgres.name | default "aap-pgcluster" }}"
              RUN_ID="${RUN_ID:-initial}"

              wait_pg_secret() {
                local secret="$1"
                echo "Waiting for Postgres user secret ${secret}..."
                for i in $(seq 1 60); do
                  oc get secret "${secret}" -n "${NS}" >/dev/null 2>&1 && return 0
                  sleep 10
                done
                oc get secret "${secret}" -n "${NS}" >/dev/null
              }

              read_pg_secret() {
                local secret="$1"
                wait_pg_secret "${secret}"
                PG_HOST=$(oc get secret "${secret}" -n "${NS}" -o jsonpath='{.data.host}' | base64 -d)
                PG_PORT=$(oc get secret "${secret}" -n "${NS}" -o jsonpath='{.data.port}' | base64 -d)
                PG_DB=$(oc get secret "${secret}" -n "${NS}" -o jsonpath='{.data.dbname}' | base64 -d)
                PG_USER=$(oc get secret "${secret}" -n "${NS}" -o jsonpath='{.data.user}' | base64 -d)
                PG_PASS=$(oc get secret "${secret}" -n "${NS}" -o jsonpath='{.data.password}' | base64 -d)
              }

              apply_pg_secret() {
                local target="$1"
                local managed="${2:-false}"
                local args=(
                  --from-literal=host="${PG_HOST}"
                  --from-literal=port="${PG_PORT}"
                  --from-literal=database="${PG_DB}"
                  --from-literal=username="${PG_USER}"
                  --from-literal=password="${PG_PASS}"
                  --from-literal=type=unmanaged
                  --from-literal=run_id="${RUN_ID}"
                )
                if [ "${managed}" = "true" ]; then
                  args+=(--from-literal=managed_by_aap=true)
                else
                  args+=(--from-literal=sslmode=prefer)
                fi
                oc create secret generic "${target}" -n "${NS}" \
                  "${args[@]}" \
                  --dry-run=client -o yaml | oc apply -f -
              }

              read_pg_secret "${PG_PREFIX}-pguser-gateway"
              apply_pg_secret "{{ .Values.name }}-external-postgres" false

              read_pg_secret "${PG_PREFIX}-pguser-controller"
              apply_pg_secret "{{ .Values.name }}-controller-postgres-configuration" true

              CTRL_APP_SECRET="{{ .Values.name }}-controller-app-credentials"
              WS_SECRET=""
              if oc get secret "{{ .Values.name }}-controller-broadcast-websocket" -n "${NS}" >/dev/null 2>&1; then
                WS_SECRET=$(oc get secret "{{ .Values.name }}-controller-broadcast-websocket" -n "${NS}" -o jsonpath='{.data.secret}' | base64 -d)
              fi
              export PG_HOST PG_PORT PG_DB PG_USER PG_PASS WS_SECRET
              CREDS_FILE=$(mktemp)
              python3 - <<'PY' > "${CREDS_FILE}"
              import os
              host = os.environ["PG_HOST"]
              port = os.environ["PG_PORT"]
              db = os.environ["PG_DB"]
              user = os.environ["PG_USER"]
              password = os.environ["PG_PASS"]
              ws = os.environ.get("WS_SECRET", "")
              print("DATABASES = {")
              print("    'default': {")
              print("        'ATOMIC_REQUESTS': True,")
              print("        'ENGINE': 'awx.main.db.profiled_pg',")
              print(f"        'NAME': {db!r},")
              print(f"        'USER': {user!r},")
              print(f"        'PASSWORD': {password!r},")
              print(f"        'HOST': {host!r},")
              print(f"        'PORT': {port!r},")
              print("        'OPTIONS': { 'sslmode': 'prefer',")
              print("        },")
              print("    }")
              print("}")
              print("")
              print("LISTENER_DATABASES = {")
              print("    'default': {")
              print("        'OPTIONS': {")
              print("            'keepalives': 1,")
              print("            'keepalives_idle': 5,")
              print("            'keepalives_interval': 5,")
              print("            'keepalives_count': 5,")
              print("        },")
              print("    }")
              print("}")
              print("")
              print(f"BROADCAST_WEBSOCKET_SECRET = {ws!r}")
              PY
              LDAP_FILE=$(mktemp)
              printf '%s\n' "# LDAP configuration" > "${LDAP_FILE}"
              EE_FILE=$(mktemp)
              printf '%s\n' "# Execution environments configuration" > "${EE_FILE}"
              oc create secret generic "${CTRL_APP_SECRET}" -n "${NS}" \
                --from-file=credentials.py="${CREDS_FILE}" \
                --from-file=ldap.py="${LDAP_FILE}" \
                --from-file=execution_environments.py="${EE_FILE}" \
                --dry-run=client -o yaml | oc apply -f -
              rm -f "${CREDS_FILE}" "${LDAP_FILE}" "${EE_FILE}"

              read_pg_secret "${PG_PREFIX}-pguser-eda"
              apply_pg_secret "{{ .Values.name }}-eda-postgres-configuration" true

              echo "Synced gateway, controller, and EDA postgres secrets (run_id=${RUN_ID})"

              GATEWAY_SVC="{{ .Values.name }}"
              echo "Ensuring gateway Service ${GATEWAY_SVC} targets proxy port 8080..."
              if oc get svc "${GATEWAY_SVC}" -n "${NS}" >/dev/null 2>&1; then
                CURRENT_TP=$(oc get svc "${GATEWAY_SVC}" -n "${NS}" -o jsonpath='{.spec.ports[0].targetPort}')
                if [ "${CURRENT_TP}" != "8080" ]; then
                  oc patch svc "${GATEWAY_SVC}" -n "${NS}" --type=json \
                    -p='[{"op":"replace","path":"/spec/ports/0/targetPort","value":8080}]'
                  echo "Patched ${GATEWAY_SVC} targetPort ${CURRENT_TP} -> 8080"
                else
                  echo "${GATEWAY_SVC} targetPort already 8080"
                fi
              fi

              GW_ADMIN_SECRET="{{ .Values.name }}-admin-password"
              GW_URL="http://${GATEWAY_SVC}.${NS}.svc"
              echo "Bootstrapping sovereign organization on gateway..."
              for i in $(seq 1 60); do
                if curl -sf "${GW_URL}/api/gateway/v1/ping/" >/dev/null 2>&1; then
                  break
                fi
                sleep 10
              done
              curl -sf "${GW_URL}/api/gateway/v1/ping/" >/dev/null

              wait_pg_secret "${GW_ADMIN_SECRET}"
              GW_PASS=$(oc get secret "${GW_ADMIN_SECRET}" -n "${NS}" -o jsonpath='{.data.password}' | base64 -d)
              ORG_COUNT=$(curl -sk -u "admin:${GW_PASS}" \
                "${GW_URL}/api/gateway/v1/organizations/?name=sovereign" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('count',0))")
              if [ "${ORG_COUNT}" -ge 1 ]; then
                echo "Gateway organization sovereign already exists"
              else
                HTTP=$(curl -sk -o /tmp/gw-org.json -w '%{http_code}' -u "admin:${GW_PASS}" \
                  -H 'Content-Type: application/json' \
                  -d '{"name":"sovereign","description":"Hybrid Sovereign Cloud automation organization"}' \
                  "${GW_URL}/api/gateway/v1/organizations/")
                if echo "${HTTP}" | grep -qE '^20'; then
                  echo "Created gateway organization sovereign (HTTP ${HTTP})"
                else
                  echo "Gateway org create returned HTTP ${HTTP}: $(cat /tmp/gw-org.json)"
                  exit 1
                fi
              fi
              echo "Gateway bootstrap complete (run_id=${RUN_ID})"
          env:
            - name: RUN_ID
              value: {{ .Values.postgres.syncRunId | default "2026-07-14-external-postgres" | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
{{- end }}
