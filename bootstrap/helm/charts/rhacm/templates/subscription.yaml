---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: advanced-cluster-management
  namespace: {{ include "rhacm.namespace" . }}
  labels:
    {{- include "rhacm.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  channel: {{ .Values.operator.channel | quote }}
  installPlanApproval: {{ .Values.operator.installPlanApproval }}
  name: {{ .Values.operator.packageName }}
  source: {{ .Values.operator.catalogSource }}
  sourceNamespace: {{ .Values.operator.catalogSourceNamespace }}
  {{- if .Values.operator.startingCSV }}
  startingCSV: {{ .Values.operator.startingCSV | quote }}
  {{- end }}
