---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "rhacm.namespace" . }}
  labels:
    {{- toYaml .Values.namespace.labels | nindent 4 }}
    {{- include "rhacm.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
