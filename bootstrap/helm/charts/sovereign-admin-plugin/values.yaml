namespace: sovereign-cloud

image:
  repository: quay.example.com/hybrid-sovereign/sovereign-admin-plugin
  tag: "1.0.5"
  pullPolicy: Always

imagePullSecrets:
  - name: quay-pull-secret

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

service:
  port: 9001

plugin:
  name: sovereign-admin-plugin
  displayName: "Sovereign Admin"
