namespace: sovereign-cloud

image:
  repository: /hybrid-sovereign/sovereign-admin-plugin
  tag: "1.2.10"
  pullPolicy: Always

imagePullSecrets:
  - name: quay-pull-secret

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

service:
  port: 9001

plugin:
  name: sovereign-admin-plugin
  displayName: "Sovereign Cloud"
