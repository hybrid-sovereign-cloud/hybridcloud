apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.plugin.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.plugin.name }}
    app.kubernetes.io/part-of: sovereign-cloud
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: {{ .Values.plugin.name }}-serving-cert
spec:
  selector:
    app: {{ .Values.plugin.name }}
  ports:
    - name: 9001-tcp
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
