{{- if .Values.vaultInitPushSecret.enabled }}
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: push-vault-init-secrets
  namespace: {{ .Values.vaultInitPushSecret.sourceNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  deletionPolicy: None
  refreshInterval: 1h
  secretStoreRefs:
    - name: {{ .Values.secretStore.name }}
      kind: {{ .Values.secretStore.kind }}
  selector:
    secret:
      name: {{ .Values.vaultInitPushSecret.sourceSecretName }}
  data:
    - match:
        secretKey: root_token
        remoteRef:
          remoteKey: {{ .Values.vaultInitPushSecret.remoteKey }}
          property: root_token
      conversionStrategy: None
    - match:
        secretKey: unseal_keys
        remoteRef:
          remoteKey: {{ .Values.vaultInitPushSecret.remoteKey }}
          property: unseal_keys
      conversionStrategy: None
    - match:
        secretKey: unseal_keys_base64
        remoteRef:
          remoteKey: {{ .Values.vaultInitPushSecret.remoteKey }}
          property: unseal_keys_base64
      conversionStrategy: None
  updatePolicy: Replace
{{- end }}

