{{- range $name, $sa := .Values.centralServiceAccounts }}
{{- if $sa.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ $sa.namespace | default "sovereign-cloud-jobs" }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  {{- toYaml $sa.clusterRoleRules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ $sa.namespace | default "sovereign-cloud-jobs" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-token
  namespace: {{ $sa.namespace | default "sovereign-cloud-jobs" }}
  annotations:
    kubernetes.io/service-account.name: {{ $name }}
    argocd.argoproj.io/sync-wave: "6"
type: kubernetes.io/service-account-token
---
apiVersion: batch/v1
kind: Job
metadata:
  name: push-{{ $name }}
  namespace: {{ $sa.namespace | default "sovereign-cloud-jobs" }}
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 120
  template:
    spec:
      serviceAccountName: {{ $.Values.dashboardCentralReader.jobServiceAccount | default "sovereign-ansible-runner" }}
      restartPolicy: OnFailure
      imagePullSecrets:
        {{- toYaml $.Values.dashboardCentralReader.imagePullSecrets | nindent 8 }}
      containers:
        - name: push-token
          image: {{ $.Values.dashboardCentralReader.image | default "quay.example.com/hybrid-sovereign/ansible-runner:latest" }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              NS="{{ $sa.namespace | default "sovereign-cloud-jobs" }}"
              VAULT_ADDR="{{ $.Values.dashboardCentralReader.vaultAddr | default "http://vault-active.central-vault.svc:8200" }}"
              SECRET_NAME="{{ $name }}-token"
              VAULT_PATH="central/data/{{ $name }}"

              echo "Reading vault root token..."
              VAULT_TOKEN=$(oc get secret vault-init-secrets -n central-vault -o jsonpath='{.data.root_token}' | base64 -d)

              echo "Reading SA token for {{ $name }}..."
              SA_TOKEN=$(oc get secret "$SECRET_NAME" -n "$NS" -o jsonpath='{.data.token}' | base64 -d)
              CA_CRT=$(oc get secret "$SECRET_NAME" -n "$NS" -o jsonpath='{.data.ca\.crt}')

              if [ -z "$SA_TOKEN" ]; then
                echo "ERROR: SA token not yet available for {{ $name }}"
                exit 1
              fi

              echo "Pushing to Vault at $VAULT_PATH..."
              API_SERVER="{{ $.Values.dashboardCentralReader.apiServer | default "" }}"
              HTTP=$(curl -sk -o /dev/null -w "%{http_code}" \
                -X POST "$VAULT_ADDR/v1/$VAULT_PATH" \
                -H "X-Vault-Token: $VAULT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"data\":{\"token\":\"$SA_TOKEN\",\"bearer_token\":\"$SA_TOKEN\",\"ca.crt\":\"$CA_CRT\",\"host\":\"$API_SERVER\",\"api_server\":\"$API_SERVER\"}}")
              echo "Vault write HTTP: $HTTP"
              [[ "$HTTP" =~ ^2 ]] && echo "{{ $name }} SA token pushed to Vault" || exit 1
{{- end }}
{{- end }}
