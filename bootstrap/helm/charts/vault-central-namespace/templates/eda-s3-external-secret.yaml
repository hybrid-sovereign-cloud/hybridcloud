{{- if .Values.edaS3Creds.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: eda-s3-creds
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: vault-central-namespace
    app.kubernetes.io/component: eda-s3-logs
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.secretStore.name }}
  target:
    name: eda-s3-creds
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      data:
        s3_access_key: "{{ `{{ .s3_access_key }}` }}"
        s3_secret_key: "{{ `{{ .s3_secret_key }}` }}"
        s3_bucket: {{ .Values.edaS3Creds.bucketName | quote }}
        s3_endpoint: {{ .Values.edaS3Creds.endpoint | quote }}
  data:
    - secretKey: s3_access_key
      remoteRef:
        key: eda-s3-logs
        property: access_key
    - secretKey: s3_secret_key
      remoteRef:
        key: eda-s3-logs
        property: secret_key
{{- end }}
