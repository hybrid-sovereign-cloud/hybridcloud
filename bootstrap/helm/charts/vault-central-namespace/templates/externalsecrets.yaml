{{- if .Values.vaultInitSecretsCopy.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.vaultInitSecretsCopy.targetSecretName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: vault-central-namespace
    app.kubernetes.io/component: vault-init-backup
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ .Values.vaultInitSecretsCopy.refreshInterval }}
  secretStoreRef:
    kind: {{ .Values.secretStore.kind }}
    name: {{ .Values.secretStore.name }}
  target:
    name: {{ .Values.vaultInitSecretsCopy.targetSecretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    {{- range .Values.vaultInitSecretsCopy.keys }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ $.Values.vaultInitSecretsCopy.vaultPath }}
        property: {{ .property }}
    {{- end }}
{{- end }}

