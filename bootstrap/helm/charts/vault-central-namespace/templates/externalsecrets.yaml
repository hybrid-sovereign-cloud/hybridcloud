    kind: {{ .Values.secretStore.kind }}
    name: {{ .Values.secretStore.name }}
  target:
    name: {{ .Values.vaultServicesInitSecretsCopy.targetSecretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    {{- range .Values.vaultServicesInitSecretsCopy.keys }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ $.Values.vaultServicesInitSecretsCopy.vaultPath }}
        property: {{ .property }}
    {{- end }}
{{- end }}
