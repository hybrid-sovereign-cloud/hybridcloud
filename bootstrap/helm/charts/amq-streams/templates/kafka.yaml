apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: hybridsovereign
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: amq-streams
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  targetNamespaces:
    - {{ .Values.namespace }}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: amq-streams
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  channel: {{ .Values.operator.channel }}
  installPlanApproval: {{ .Values.operator.installPlanApproval }}
  name: amq-streams
  source: {{ .Values.operator.source }}
  sourceNamespace: {{ .Values.operator.sourceNamespace }}
---
{{- if .Values.kafka.enabled }}
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: {{ .Values.kafka.nodePool.name }}
  namespace: {{ .Values.namespace }}
  labels:
    strimzi.io/cluster: {{ .Values.kafka.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: {{ .Values.kafka.replicas }}
  roles:
    {{- toYaml .Values.kafka.nodePool.roles | nindent 4 }}
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: {{ .Values.kafka.storage }}
        deleteClaim: false
    kraftMetadata: shared
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: {{ .Values.kafka.name }}
  namespace: {{ .Values.namespace }}
  annotations:
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
    argocd.argoproj.io/sync-wave: "5"
spec:
  kafka:
    {{- if .Values.kafka.version }}
    version: {{ .Values.kafka.version | quote }}
    {{- end }}
    {{- if .Values.kafka.metadataVersion }}
    metadataVersion: {{ .Values.kafka.metadataVersion | quote }}
    {{- end }}
    listeners:
      {{- if .Values.kafka.listeners.internalPlain }}
      - name: plain
        port: 9092
        type: internal
        tls: false
      {{- end }}
      {{- if .Values.kafka.listeners.internalTls }}
      - name: tls
        port: 9093
        type: internal
        tls: true
      {{- end }}
      {{- if .Values.kafka.listeners.externalRoute }}
      - name: external
        port: {{ .Values.kafka.listeners.externalPort }}
        type: route
        tls: true
        authentication:
          type: scram-sha-512
      {{- end }}
    config:
      offsets.topic.replication.factor: {{ .Values.kafka.replicas }}
      transaction.state.log.replication.factor: {{ .Values.kafka.replicas }}
      transaction.state.log.min.isr: {{ max 1 (sub .Values.kafka.replicas 1) }}
      default.replication.factor: {{ .Values.kafka.replicas }}
      min.insync.replicas: {{ max 1 (sub .Values.kafka.replicas 1) }}
  entityOperator:
    topicOperator: {}
    userOperator: {}
{{- range .Values.topics }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    strimzi.io/cluster: {{ $.Values.kafka.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  partitions: {{ .partitions }}
  replicas: {{ .replicas }}
{{- end }}
{{- if .Values.kafkaUsers.producer.enabled }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: {{ .Values.kafkaUsers.producer.name }}
  namespace: {{ .Values.namespace }}
  labels:
    strimzi.io/cluster: {{ .Values.kafka.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      {{- range .Values.kafkaUsers.producer.acls }}
      - resource:
          type: topic
          name: {{ .topic }}
          patternType: literal
        operations:
          {{- toYaml .operations | nindent 10 }}
      {{- end }}
{{- end }}
{{- if .Values.kafkaUsers.consumer.enabled }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: {{ .Values.kafkaUsers.consumer.name }}
  namespace: {{ .Values.namespace }}
  labels:
    strimzi.io/cluster: {{ .Values.kafka.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      {{- range .Values.kafkaUsers.consumer.acls }}
      - resource:
          type: {{ .type | default "topic" }}
          name: {{ .topic | default .group }}
          patternType: {{ .patternType | default "literal" }}
        operations:
          {{- toYaml .operations | nindent 10 }}
      {{- end }}
{{- end }}
{{- end }}
