namespace: amq-streams

operator:
  channel: stable
  installPlanApproval: Automatic
  source: redhat-operators
  sourceNamespace: openshift-marketplace

kafka:
  enabled: true
  name: hybridsovereign-kafka
  replicas: 3
  storage: 10Gi
  version: "3.9.0"
  metadataVersion: "3.9-IV2"
  nodePool:
    name: dual-role
    roles:
      - controller
      - broker
  listeners:
    internalPlain: true
    internalTls: true
    externalRoute: true
    externalPort: 9094

topics:
  - name: hybridsovereign-events
    partitions: 6
    replicas: 3
  - name: hybridsovereign-audit
    partitions: 3
    replicas: 3

kafkaUsers:
  producer:
    enabled: true
    name: hybridsovereign-producer
    acls:
      - topic: hybridsovereign-events
        operations: [Write, Describe, Create]
  consumer:
    enabled: true
    name: hybridsovereign-eda-consumer
    acls:
      - topic: hybridsovereign-events
        operations: [Read, Describe]
      - group: eda-
        patternType: prefix
        type: group
        operations: [Read, Describe]
