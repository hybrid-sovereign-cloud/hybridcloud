namespace: amq-streams

operator:
  channel: stable
  installPlanApproval: Automatic
  source: redhat-operators
  sourceNamespace: openshift-marketplace

kafka:
  enabled: true
  name: hybridsovereign-kafka
  replicas: 3
  storage: 10Gi
  zookeeper:
    replicas: 3
    storage: 5Gi

topics:
  - name: hybridsovereign-events
    partitions: 6
    replicas: 3
  - name: hybridsovereign-audit
    partitions: 3
    replicas: 3
