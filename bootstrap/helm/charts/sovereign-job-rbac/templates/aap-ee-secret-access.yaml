---
# Allow AAP Execution Environments to read the argocd-cluster-services secret
# so they can connect to the services cluster.
# AAP EE runs under:
#   - "default" SA in aap namespace (activation pods)
#   - "sovereign-aap-controller" SA in aap namespace (automation controller task pods)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aap-ee-argocd-secret-reader
  namespace: openshift-gitops
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["argocd-cluster-services", "eda-s3-creds"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aap-ee-argocd-secret-reader
  namespace: openshift-gitops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aap-ee-argocd-secret-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: aap
  - kind: ServiceAccount
    name: sovereign-aap-controller
    namespace: aap
---
# Allow AAP EE to read vault-init-secrets in central-vault namespace
# (needed by cloudoso and platformopenshift roles that call Vault API directly
# to store/retrieve OpenStack application credentials and cluster install-config).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aap-ee-vault-init-secret-reader
  namespace: central-vault
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vault-init-secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aap-ee-vault-init-secret-reader
  namespace: central-vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aap-ee-vault-init-secret-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: aap
  - kind: ServiceAccount
    name: sovereign-aap-controller
    namespace: aap
---
# Allow AAP Execution Environments to manage ExternalSecrets and Secrets
# in sovereign-cloud-jobs namespace (needed by cloudoso and similar roles
# that create temporary ExternalSecrets for credential retrieval).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aap-ee-externalsecret-manager
  namespace: sovereign-cloud-jobs
rules:
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aap-ee-externalsecret-manager
  namespace: sovereign-cloud-jobs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aap-ee-externalsecret-manager
subjects:
  - kind: ServiceAccount
    name: default
    namespace: aap
  - kind: ServiceAccount
    name: sovereign-aap-controller
    namespace: aap
