{{- if .Values.registry.enabled }}
---
apiVersion: quay.redhat.com/v1
kind: QuayRegistry
metadata:
  name: {{ .Values.registry.name }}
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
{{- if .Values.registry.configBundle }}
  configBundleSecret: {{ .Values.registry.configBundleSecretName | default (printf "%s-config-bundle" .Values.registry.name) }}
{{- end }}
  components:
    - kind: objectstorage
      managed: {{ .Values.registry.components.objectstorage.managed }}
    - kind: postgres
      managed: {{ .Values.registry.components.postgres.managed }}
    - kind: clair
      managed: {{ .Values.registry.components.clair.managed }}
    - kind: redis
      managed: {{ .Values.registry.components.redis.managed }}
    - kind: mirror
      managed: {{ .Values.registry.components.mirror.managed }}
    - kind: route
      managed: {{ .Values.registry.components.route.managed }}
    - kind: tls
      managed: {{ .Values.registry.components.tls.managed }}
    - kind: monitoring
      managed: {{ .Values.registry.components.monitoring.managed }}
    - kind: quay
      managed: true
      {{- if .Values.registry.components.quay }}
      {{- with .Values.registry.components.quay.overrides }}
      overrides:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
    - kind: horizontalpodautoscaler
      {{- $hpaManaged := .Values.registry.components.horizontalpodautoscaler.managed }}
      {{- if (kindIs "invalid" $hpaManaged) }}
      managed: true
      {{- else }}
      managed: {{ $hpaManaged }}
      {{- end }}
    - kind: clairpostgres
      {{- $cpManaged := .Values.registry.components.clairpostgres.managed }}
      {{- if (kindIs "invalid" $cpManaged) }}
      managed: true
      {{- else }}
      managed: {{ $cpManaged }}
      {{- end }}
{{- end }}
