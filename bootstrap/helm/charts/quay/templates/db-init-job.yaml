{{- if and .Values.crunchy.enabled (not .Values.registry.components.postgres.managed) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: quay-db-init
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: quay-db-init
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: quay-db-init
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: quay-db-init
subjects:
  - kind: ServiceAccount
    name: quay-db-init
    namespace: {{ .Values.namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: quay-db-init
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 300
  template:
    spec:
      serviceAccountName: quay-db-init
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: quay-pull-secret
      volumes:
        - name: shared-data
          emptyDir: {}
      initContainers:
        - name: extract-db-uri
          image: {{ .Values.dbInitJob.image | default "quay.example.com/hybrid-sovereign/ansible-runner:latest" }}
          env:
            - name: CRUNCHY_SECRET
              value: "{{ .Values.crunchy.name }}-pguser-quay"
            - name: NS
              value: "{{ .Values.namespace }}"
          volumeMounts:
            - name: shared-data
              mountPath: /shared
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              echo "Reading Crunchy postgres URI..."
              DB_URI=$(oc get secret "$CRUNCHY_SECRET" -n "$NS" -o jsonpath='{.data.uri}' | base64 -d)
              if [ -z "$DB_URI" ]; then
                echo "ERROR: Could not read DB URI from $CRUNCHY_SECRET"
                exit 1
              fi
              echo "$DB_URI" > /shared/db-uri.txt
              echo "DB_URI written to shared volume"
        - name: enable-pg-extensions
          image: registry.developers.crunchydata.com/crunchydata/crunchy-postgres:ubi9-16.13-2610
          volumeMounts:
            - name: shared-data
              mountPath: /shared
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              DB_URI=$(cat /shared/db-uri.txt)
              echo "Waiting for PostgreSQL to be ready..."
              for i in $(seq 1 30); do
                if psql "$DB_URI" -c "SELECT 1" >/dev/null 2>&1; then
                  echo "PostgreSQL is ready"
                  break
                fi
                echo "Attempt $i: waiting..."; sleep 5
              done
              echo "Enabling PostgreSQL extensions..."
              psql "$DB_URI" -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;" && \
                echo "pg_trgm enabled"
              psql "$DB_URI" -c "CREATE EXTENSION IF NOT EXISTS fuzzystrmatch;" && \
                echo "fuzzystrmatch enabled"
      containers:
        - name: inject-db-uri
          image: {{ .Values.dbInitJob.image | default "quay.example.com/hybrid-sovereign/ansible-runner:latest" }}
          env:
            - name: CRUNCHY_SECRET
              value: "{{ .Values.crunchy.name }}-pguser-quay"
            - name: BUNDLE_SECRET
              value: "{{ .Values.registry.configBundleSecretName | default (printf "%s-config-bundle" .Values.registry.name) }}"
            - name: NS
              value: "{{ .Values.namespace }}"
          volumeMounts:
            - name: shared-data
              mountPath: /shared
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              DB_URI=$(cat /shared/db-uri.txt)
              echo "Reading current configBundle..."
              CURRENT_CONFIG=$(oc get secret "$BUNDLE_SECRET" -n "$NS" -o jsonpath='{.data.config\.yaml}' | base64 -d)
              if echo "$CURRENT_CONFIG" | grep -q "^DB_URI:"; then
                echo "DB_URI already present in configBundle, skipping injection"
              else
                echo "Injecting DB_URI into configBundle..."
                NEW_CONFIG=$(printf '%s\nDB_URI: %s' "$CURRENT_CONFIG" "$DB_URI")
                NEW_CONFIG_B64=$(echo "$NEW_CONFIG" | base64 -w0)
                oc patch secret "$BUNDLE_SECRET" -n "$NS" \
                  --type=merge \
                  -p "{\"data\":{\"config.yaml\":\"${NEW_CONFIG_B64}\"}}"
                echo "configBundle updated with DB_URI"
              fi
{{- end }}
