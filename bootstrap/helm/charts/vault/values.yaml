namespace: vault

pushSecretToVault: false

# ─── OCI pull secret via ExternalSecret (for services cluster vault namespace) ─
ociCredentials:
  enabled: false
  vaultPath: "oci-credentials"
  secretStoreName: "vault-backend"
  secretStoreKind: "ClusterSecretStore"


vault:
  global:
    openshift: true
  server:
    ha:
      enabled: true
      replicas: 3
      raft:
        enabled: true
        config: |
          ui = true
          listener "tcp" {
            tls_disable = 1
            address = "[::]:8200"
            cluster_address = "[::]:8201"
          }
          storage "raft" {
            path = "/vault/data"
            retry_join {
              leader_api_addr = "http://vault-services-0.vault-services-internal.vault.svc:8200"
            }
            retry_join {
              leader_api_addr = "http://vault-services-1.vault-services-internal.vault.svc:8200"
            }
            retry_join {
              leader_api_addr = "http://vault-services-2.vault-services-internal.vault.svc:8200"
            }
          }
          service_registration "kubernetes" {}
    dataStorage:
      enabled: true
      size: 10Gi
    route:
      enabled: true
      host: ""
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
    image:
      repository: quay.example.com/hybrid-sovereign/vault
      tag: "1.21.2"
    readinessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"
  ui:
    enabled: true
  injector:
    enabled: true
    image:
      repository: quay.example.com/hybrid-sovereign/vault-k8s
      tag: "1.5.0"
