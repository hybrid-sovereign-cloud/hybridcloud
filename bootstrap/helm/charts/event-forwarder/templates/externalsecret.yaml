apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: event-forwarder-token
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ .Values.eventStream.tokenSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.eventStream.tokenSecretKey }}
      remoteRef:
        key: {{ .Values.vaultSecretPath }}
        property: token
