apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: event-forwarder
  labels:
    app.kubernetes.io/name: event-forwarder
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
