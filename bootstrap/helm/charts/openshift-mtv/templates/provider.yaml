{{- if .Values.vmwareProvider.enabled }}
---
apiVersion: forklift.konveyor.io/v1beta1
kind: Provider
metadata:
  name: {{ .Values.vmwareProvider.name }}
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  type: {{ .Values.vmwareProvider.type }}
  url: {{ .Values.vmwareProvider.url | quote }}
  secret:
    name: {{ .Values.vmwareProvider.credentialsSecretName }}
    namespace: {{ .Values.namespace }}
{{- end }}
