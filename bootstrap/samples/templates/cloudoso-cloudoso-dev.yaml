{{- if .Values.samples.cloudoso.cloudoso_dev.enabled }}
apiVersion: hybridsovereign.redhat/v1alpha1
kind: CloudOSO
metadata:
  name: acme-dev-openstack
  namespace: entity-acme-corp
spec:
  project: acme-dev
  vaultPath: oso/accounts/shc_admin
  baseDomain: lab.example.com
  projectDomain: shc_domain
  externalNetwork: ext-net
  route53VaultPath: oso/accounts/route53-openstack
  toolRbac:
    projectAdminRbac:
      - acme-platform-admins    # Full OpenStack project control
    projectMemberRbac:
      - acme-infra-team         # Create VMs, networks, volumes
    projectViewerRbac:
      - acme-devs               # Read-only project view
      - acme-viewers
{{- end }}
