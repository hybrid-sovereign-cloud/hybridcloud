{{- if .Values.samples.platformopenshift.ocp_ses11.enabled }}
---
# PlatformOpenshift for ocp-ses11 — OpenStack cluster using ses11-env
# Prerequisites: CloudOSO ses11-env status.ready == true
# Apply manually to services cluster after ses11-env CloudOSO is ready.
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses11
  namespace: entity-acme-corp
spec:
  type: openstack
  openstack:
    environment: "ses11-env"
    controlPlaneCount: 3
    workerCount: 2
    controlPlaneFlavor: "b1.xlarge"
    workerFlavor: "b1.large"
    externalNetwork: "ext-net"
{{- end }}
