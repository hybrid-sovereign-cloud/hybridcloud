{{- if .Values.samples.platformopenshift.ocp_ses7.enabled }}
---
# PlatformOpenshift for ocp-ses7 — AWS cluster using ses7-env
# Apply manually to services cluster AFTER ses7-env CloudAWS is ready.
# Prerequisites: CloudAWS ses7-env status.ready == true
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses7
  namespace: entity-acme-corp
spec:
  type: aws
  aws:
    environment: "ses7-env"
    region: "us-east-1"
    clusterType: "standalone"
    controlPlaneCount: 3
    workerCount: 2
{{- end }}
