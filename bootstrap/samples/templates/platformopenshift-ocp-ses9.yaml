{{- if .Values.samples.platformopenshift.ocp_ses9.enabled }}
---
# PlatformOpenshift for ocp-ses9 — OpenStack cluster using ses8-env
# Deployed alongside ocp-ses8 to validate no DNS conflict with same CloudOSO environment.
# Apply manually to services cluster AFTER ses8-env CloudOSO is ready.
# Prerequisites: CloudOSO ses8-env status.ready == true, ocp-ses8 ready
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses9
  namespace: entity-acme-corp
spec:
  type: openstack
  openstack:
    environment: "ses8-env"
    controlPlaneCount: 3
    workerCount: 3
    controlPlaneFlavor: "b1.xlarge"
    workerFlavor: "b1.large"
    externalNetwork: "ext-net"
  clusterViewerRbac:
    - acme-platform-viewers
{{- end }}
