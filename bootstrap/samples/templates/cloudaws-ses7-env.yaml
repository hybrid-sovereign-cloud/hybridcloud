{{- if .Values.samples.cloudaws.ses7_env.enabled }}
---
# CloudAWS for ses7-env — acme-corp AWS environment
# Apply manually to services cluster: oc apply -f config/samples/ses7-env.yaml
# The operator creates AWSHelper type:environmentprep on the central cluster.
# Route53 subdomain: <sha256_slug>.sandbox5530.opentlc.com
apiVersion: hybridsovereign.redhat/v1alpha1
kind: CloudAWS
metadata:
  name: ses7-env
  namespace: entity-acme-corp
spec:
  account: "390403869973"
  vaultPath: "aws/accounts/shc_admin"
  baseDomain: "sandbox5530.opentlc.com"
{{- end }}
