{{- if .Values.samples.quay.quayorg_acme_containers.enabled }}
apiVersion: hybridsovereign.redhat/v1alpha1
kind: QuayOrg
metadata:
  name: acme-containers
  namespace: entity-acme-corp
spec:
  quayConfig: quay-sovereign-services
  quayAdminRbac:
    - acme-quay-admins
  quayCreatorRbac:
    - acme-developers
    - acme-devops
  quayMemberRbac:
    - acme-operators
    - acme-viewers
{{- end }}
