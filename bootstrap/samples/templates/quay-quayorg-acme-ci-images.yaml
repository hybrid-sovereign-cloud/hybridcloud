{{- if .Values.samples.quay.quayorg_acme_ci_images.enabled }}
apiVersion: hybridsovereign.redhat/v1alpha1
kind: QuayOrg
metadata:
  name: acme-ci-images
  namespace: entity-acme-corp
spec:
  quayConfig: quay-sovereign-services
  quayAdminRbac:
    - acme-quay-admins
  quayMemberRbac:
    - acme-developers
    - acme-operators
{{- end }}
