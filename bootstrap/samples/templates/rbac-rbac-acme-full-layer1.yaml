{{- if .Values.samples.rbac.rbac_acme_full_layer1.enabled }}
---
# Layer 1 – entityAdmin: full namespace RBAC creator (auto-included in all bindings)
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Rbac
metadata:
  name: acme-platform-admins
  namespace: entity-acme-corp
spec:
  config: keycloak-sovereign-tenants-services
  description: Platform administrators with full entity-level access
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Rbac
metadata:
  name: acme-infra-team
  namespace: entity-acme-corp
spec:
  config: keycloak-sovereign-tenants-services
  description: Infrastructure engineers managing cloud environments and clusters
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Rbac
metadata:
  name: acme-devs
  namespace: entity-acme-corp
spec:
  config: keycloak-sovereign-tenants-services
  description: Application developers with deploy access
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Rbac
metadata:
  name: acme-viewers
  namespace: entity-acme-corp
spec:
  config: keycloak-sovereign-tenants-services
  description: Read-only observers (auditors, stakeholders)
{{- end }}
