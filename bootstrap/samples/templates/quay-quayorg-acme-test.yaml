{{- if .Values.samples.quay.quayorg_acme_test.enabled }}
---
# Test QuayOrg CR for Phase 6 lifecycle validation
# Tests: org creation, team memberships, OIDC login URL, status lifecycle, delete cleanup
apiVersion: hybridsovereign.redhat/v1alpha1
kind: QuayOrg
metadata:
  name: acme-test-quay
  namespace: entity-acme-corp
spec:
  quayConfig: quay-sovereign-services
  quayAdminRbac:
    - acme-corp-platform-engineering-admins
  quayMemberRbac:
    - acme-corp-platform-engineering-viewers
    - acme-corp-platform-ops-editors
{{- end }}
