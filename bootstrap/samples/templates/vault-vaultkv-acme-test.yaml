{{- if .Values.samples.vault.vaultkv_acme_test.enabled }}
---
# Test VaultKV CR for Phase 6 lifecycle validation
# Tests: KV engine mount, policy creation, RBAC group bindings, delete cleanup
apiVersion: hybridsovereign.redhat/v1alpha1
kind: VaultKV
metadata:
  name: acme-test-kv
  namespace: entity-acme-corp
spec:
  vault: acme-test-vault
  adminRbacGroups:
    - acme-corp-platform-engineering-admins
  readerRbacGroups:
    - acme-corp-platform-engineering-viewers
  opsRbacGroups:
    - acme-corp-platform-ops-admins
{{- end }}
