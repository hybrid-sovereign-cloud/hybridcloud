{{- if .Values.samples.platformopenshift.ocp_ses8.enabled }}
---
# PlatformOpenshift for ocp-ses8 — OpenStack cluster using ses8-env
# Apply manually to services cluster AFTER ses8-env CloudOSO is ready.
# Prerequisites: CloudOSO ses8-env status.ready == true
# Validates: two OCP clusters can deploy to same CloudOSO environment without DNS conflict
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses8
  namespace: entity-acme-corp
spec:
  type: openstack
  openstack:
    environment: "ses8-env"
    controlPlaneCount: 3
    workerCount: 3
    controlPlaneFlavor: "b1.xlarge"
    workerFlavor: "b1.large"
    externalNetwork: "ext-net"
  clusterViewerRbac:
    - acme-platform-viewers
{{- end }}
