{{- if .Values.samples.vault.vaultkv_acme_infra_secrets.enabled }}
apiVersion: hybridsovereign.redhat/v1alpha1
kind: VaultKV
metadata:
  name: acme-infra-secrets
  namespace: entity-acme-corp
spec:
  vault: acme-vault
  vaultAdminRbac:
    - acme-vault-admins
    - acme-devops
  vaultReaderRbac:
    - acme-operators
{{- end }}
