{{- if .Values.samples.platformopenshift.ocp_prod.enabled }}
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: acme-ocp-prod
  namespace: entity-acme-corp
spec:
  type: openstack
  openstack:
    environment: acme-dev-openstack
    controlPlaneCount: 3
    workerCount: 5
    controlPlaneFlavor: m1.xlarge
    workerFlavor: m1.large
    externalNetwork: ext-net
  toolRbac:
    clusterAdminRbac:
      - acme-platform-admins    # cluster-admin on the provisioned OCP cluster
    clusterOperatorRbac:
      - acme-infra-team         # self-provisioner — manage workloads and namespaces
    clusterDeveloperRbac:
      - acme-devs               # edit — deploy and manage application workloads
    clusterViewerRbac:
      - acme-viewers            # view — read-only cluster access
{{- end }}
