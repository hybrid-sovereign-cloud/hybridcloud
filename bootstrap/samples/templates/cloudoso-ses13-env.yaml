{{- if .Values.samples.cloudoso.ses13_env.enabled }}
---
# CloudOSO for ses13-env — acme-corp OpenStack environment for ocp-ses13 (internet + Designate)
apiVersion: hybridsovereign.redhat/v1alpha1
kind: CloudOSO
metadata:
  name: ses13-env
  namespace: entity-acme-corp
spec:
  vaultPath: "oso/accounts/shc_admin"
  baseDomain: "shc."
  projectDomain: "shc_domain"
  externalNetwork: "internet"
  landingzone: "default"
  designateZoneId: "895a1406-9ad2-4372-80f9-4e23fe1fd9ef"
  designateProjectId: "aaf08e3b0b774c7e919379af9e947cba"
  designateDnsProject: "lab-project"
{{- end }}
