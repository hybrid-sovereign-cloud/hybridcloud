{{- if .Values.samples.assignment.assignment_ses12_platform_ops.enabled }}
---
# ocp-ses12 (AWS) — platform-ops team
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Assignment
metadata:
  name: acme-ses12-platform-ops
  namespace: entity-acme-corp
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  openshift: ocp-ses12
  team: platform-ops
  projects:
    - data-pipeline
    - infra-automation
  toolRbac:
    assignmentAdmin: acme-assignment-admins
    assignmentDeveloper: acme-developers
    assignmentViewer: acme-platform-viewers
    assignmentOps: acme-devops
{{- end }}
