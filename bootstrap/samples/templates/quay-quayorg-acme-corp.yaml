{{- if .Values.samples.quay.quayorg_acme_corp.enabled }}
apiVersion: hybridsovereign.redhat/v1alpha1
kind: QuayOrg
metadata:
  name: acme-registry
  namespace: entity-acme-corp
spec:
  quayConfig: quay-sovereign-services
  quayAdminRbac:
    - acme-platform-admins
  quayCreatorRbac:
    - acme-developers
  quayMemberRbac:
    - acme-viewers
{{- end }}
