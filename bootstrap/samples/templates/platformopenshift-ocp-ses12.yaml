{{- if .Values.samples.platformopenshift.ocp_ses12.enabled }}
---
# PlatformOpenshift for ocp-ses12 — AWS cluster using ses12-env
# Prerequisites: CloudAWS ses12-env status.ready == true
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses12
  namespace: entity-acme-corp
spec:
  type: aws
  aws:
    environment: "ses12-env"
    region: us-east-1
    clusterType: standalone
    controlPlaneCount: 3
    workerCount: 2
    controllerFlavor: m5.xlarge
    workerFlavor: m5.large
  toolRbac:
    clusterAdminRbac:
      - acme-ses12-cluster-admins
    clusterOperatorRbac:
      - acme-ses12-cluster-operators
    clusterDeveloperRbac:
      - acme-ses12-cluster-developers
    clusterViewerRbac:
      - acme-ses12-cluster-viewers
  clusterViewerRbac:
    - acme-platform-viewers
    - acme-ses12-cluster-admins
    - acme-ses12-cluster-operators
    - acme-ses12-cluster-developers
    - acme-ses12-cluster-viewers
{{- end }}
