{{- if .Values.samples.platformopenshift.ocp_ses4.enabled }}
---
# PlatformOpenshift for ocp-ses4 — OpenStack cluster using ses4-env
# Apply manually to services cluster AFTER ses4-env CloudOSO is ready.
# Prerequisites: CloudOSO ses4-env status.ready == true
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses4
  namespace: entity-acme-corp
spec:
  type: openstack
  openstack:
    environment: "ses4-env"
    controlPlaneCount: 3
    workerCount: 3
    controlPlaneFlavor: "b1.xlarge"
    workerFlavor: "b1.large"
    externalNetwork: "ext-net"
{{- end }}
