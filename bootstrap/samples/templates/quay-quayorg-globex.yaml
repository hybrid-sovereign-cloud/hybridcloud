{{- if .Values.samples.quay.quayorg_globex.enabled }}
apiVersion: hybridsovereign.redhat/v1alpha1
kind: QuayOrg
metadata:
  name: globex-registry
  namespace: entity-globex-industries
spec:
  quayConfig: quay-sovereign-services
  quayAdminRbac:
    - globex-admins
  quayCreatorRbac:
    - globex-engineers
  quayMemberRbac:
    - globex-viewers
{{- end }}
