{{- if .Values.samples.cloudaws.cloudaws_dev.enabled }}
apiVersion: hybridsovereign.redhat/v1alpha1
kind: CloudAWS
metadata:
  name: acme-dev-aws
  namespace: entity-acme-corp
spec:
  account: "123456789012"
  vaultPath: aws/accounts/acme-dev
  baseDomain: sandbox5530.opentlc.com
  toolRbac:
    accountAdminRbac:
      - acme-platform-admins    # AdministratorAccess
    accountPoweruserRbac:
      - acme-infra-team         # PowerUserAccess — all services except IAM
    accountViewerRbac:
      - acme-devs               # ViewOnlyAccess
      - acme-viewers
{{- end }}
