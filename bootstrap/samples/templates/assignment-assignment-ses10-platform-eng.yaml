{{- if .Values.samples.assignment.assignment_ses10_platform_eng.enabled }}
---
# ocp-ses10 (AWS) — platform-engineering team with full toolRbac
# Prerequisites:
#   - PlatformOpenshift ocp-ses10 status.ready == true
#   - Team platform-engineering status.ready == true
#   - Project website-redesign + data-pipeline status.ready == true
#   - Rbac CRs acme-assignment-admins, acme-developers, acme-platform-viewers, acme-devops exist + synced
#   - assignment-central-rbac deployed and ExternalSecret assignment-acm-creator-sa Synced
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Assignment
metadata:
  name: acme-ses10-platform-eng
  namespace: entity-acme-corp
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  openshift: ocp-ses10
  team: platform-engineering
  projects:
    - website-redesign
    - data-pipeline
  toolRbac:
    assignmentAdmin: acme-assignment-admins
    assignmentDeveloper: acme-developers
    assignmentViewer: acme-platform-viewers
    assignmentOps: acme-devops
{{- end }}
