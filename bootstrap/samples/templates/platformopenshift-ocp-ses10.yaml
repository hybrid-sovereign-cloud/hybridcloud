{{- if .Values.samples.platformopenshift.ocp_ses10.enabled }}
---
# PlatformOpenshift for ocp-ses10 — AWS cluster using ses10-env
# Apply manually to services cluster AFTER ses10-env CloudAWS is ready.
# Prerequisites: CloudAWS ses10-env status.ready == true
# This cluster is publicly accessible (AWS LoadBalancer DNS)
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses10
  namespace: entity-acme-corp
spec:
  type: aws
  aws:
    environment: "ses10-env"
    region: "us-east-1"
    clusterType: "standalone"
    controlPlaneCount: 3
    workerCount: 2
  toolRbac:
    clusterAdminRbac:
      - acme-ses10-cluster-admins
    clusterOperatorRbac:
      - acme-ses10-cluster-operators
    clusterDeveloperRbac:
      - acme-ses10-cluster-developers
    clusterViewerRbac:
      - acme-ses10-cluster-viewers
  # clusterViewerRbac gives these groups read-only access to THIS CR on the services cluster
  clusterViewerRbac:
    - acme-platform-viewers
    - acme-ses10-cluster-admins
    - acme-ses10-cluster-operators
    - acme-ses10-cluster-developers
    - acme-ses10-cluster-viewers
{{- end }}
