{{- if .Values.samples.entity.entity_globex_industries.enabled }}
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Entity
metadata:
  name: globex-industries
  namespace: sovereign-cloud
spec:
  description: |
    Globex Industries — integration-test tenant demonstrating minimal RBAC
    configuration with 3 active roles. Use as a lightweight fixture for
    cross-tenant isolation tests.
  billingID: "BILL-GLOBEX-042"
  websiteLink: "https://globex.example.com"
  namespaceRbac:
    entityAdmin:
      - globex-admins
    auditor:
      - globex-auditors
    identityAdmin:
      - globex-admins
{{- end }}
