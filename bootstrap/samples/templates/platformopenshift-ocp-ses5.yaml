{{- if .Values.samples.platformopenshift.ocp_ses5.enabled }}
---
# PlatformOpenshift for ocp-ses5 — OpenStack cluster using ses5-env
# Apply manually to services cluster AFTER ses5-env CloudOSO is ready.
# Prerequisites: CloudOSO ses5-env status.ready == true
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses5
  namespace: entity-acme-corp
spec:
  type: openstack
  openstack:
    environment: "ses5-env"
    controlPlaneCount: 3
    workerCount: 3
    controlPlaneFlavor: "b1.xlarge"
    workerFlavor: "b1.large"
    externalNetwork: "ext-net"
{{- end }}
