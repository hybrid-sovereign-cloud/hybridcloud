{{- if .Values.samples.cloudoso.ses4_env.enabled }}
---
# CloudOSO for ses4-env — acme-corp OpenStack environment #1
# Apply manually to services cluster: oc apply -f config/samples/ses4-env.yaml
# The operator creates OSOHelper type:environmentprep on the central cluster.
# Project name is deterministic: acme-corp_ses4-env
apiVersion: hybridsovereign.redhat/v1alpha1
kind: CloudOSO
metadata:
  name: ses4-env
  namespace: entity-acme-corp
spec:
  vaultPath: "oso/accounts/shc_admin"
  baseDomain: ""
  projectDomain: "shc_domain"
  externalNetwork: "ext-net"
  route53VaultPath: "oso/accounts/route53-openstack"
{{- end }}
