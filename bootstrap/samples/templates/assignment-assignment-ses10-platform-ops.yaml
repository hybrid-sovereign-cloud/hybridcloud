{{- if .Values.samples.assignment.assignment_ses10_platform_ops.enabled }}
---
# ocp-ses10 (AWS) — platform-ops team
# Prerequisites: same as assignment-ses10-platform-eng
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Assignment
metadata:
  name: acme-ses10-platform-ops
  namespace: entity-acme-corp
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  openshift: ocp-ses10
  team: platform-ops
  projects:
    - data-pipeline
    - infra-automation
  toolRbac:
    assignmentAdmin: acme-assignment-admins
    assignmentDeveloper: acme-developers
    assignmentViewer: acme-platform-viewers
    assignmentOps: acme-devops
{{- end }}
