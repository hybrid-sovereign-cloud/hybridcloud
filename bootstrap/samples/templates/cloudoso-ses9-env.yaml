{{- if .Values.samples.cloudoso.ses9_env.enabled }}
---
# CloudOSO for ses9-env — acme-corp OpenStack environment #4 (for ocp-ses9)
# Apply manually to services cluster: oc apply -f config/samples/ses9-env.yaml
# The operator creates OSOHelper type:environmentprep on the central cluster.
# Project name is deterministic: acme-corp_ses9-env
apiVersion: hybridsovereign.redhat/v1alpha1
kind: CloudOSO
metadata:
  name: ses9-env
  namespace: entity-acme-corp
spec:
  vaultPath: "oso/accounts/shc_admin"
  baseDomain: "lab.example.com"
  projectDomain: "shc_domain"
  externalNetwork: "ext-net"
  route53VaultPath: "oso/accounts/route53-openstack"
{{- end }}
