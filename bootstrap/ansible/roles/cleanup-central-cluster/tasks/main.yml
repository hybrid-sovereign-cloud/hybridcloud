---
# ─── Step 1: Remove MultiClusterHub ───────────────────────────────────────────
- name: Remove MultiClusterHub resource
  when: remove_multicluster_hub
  block:
    - name: List MultiClusterHub resources
      kubernetes.core.k8s_info:
        api_version: operator.open-cluster-management.io/v1
        kind: MultiClusterHub
        namespace: "{{ multicluster_hub_namespace }}"
      register: mch_list
      ignore_errors: true

    - name: Delete MultiClusterHub resources
      kubernetes.core.k8s:
        state: absent
        api_version: operator.open-cluster-management.io/v1
        kind: MultiClusterHub
        name: "{{ item.metadata.name }}"
        namespace: "{{ multicluster_hub_namespace }}"
      loop: "{{ mch_list.resources | default([]) }}"
      ignore_errors: true

    - name: Wait for MultiClusterHub to delete
      kubernetes.core.k8s_info:
        api_version: operator.open-cluster-management.io/v1
        kind: MultiClusterHub
        namespace: "{{ multicluster_hub_namespace }}"
      register: mch_wait
      retries: 30
      delay: 15
      until: mch_wait.resources | length == 0
      ignore_errors: true

# ─── Step 2: Delete OLM subscriptions and CSVs ────────────────────────────────
- name: Delete OLM subscriptions on central cluster
  kubernetes.core.k8s:
    state: absent
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ item.1 }}"
    namespace: "{{ item.0.namespace }}"
  loop: "{{ central_olm_subscriptions | subelements('names') }}"
  ignore_errors: true

- name: List and delete all CSVs per namespace
  block:
    - name: List CSVs in operator namespaces
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        namespace: "{{ item.namespace }}"
      register: central_csvs
      loop: "{{ central_olm_subscriptions }}"
      ignore_errors: true

    - name: Delete CSVs
      kubernetes.core.k8s:
        state: absent
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        name: "{{ item.1.metadata.name }}"
        namespace: "{{ item.0.item.namespace }}"
      loop: "{{ central_csvs.results | subelements('resources', skip_missing=True) }}"
      ignore_errors: true

# ─── Step 3: Delete platform namespaces ───────────────────────────────────────
- name: Delete platform namespaces on central cluster
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ item }}"
  loop: "{{ central_platform_namespaces }}"
  ignore_errors: true

- name: Wait for namespaces to terminate
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ item }}"
  register: central_ns_wait
  loop: "{{ central_platform_namespaces }}"
  retries: 30
  delay: 10
  until: central_ns_wait.resources | length == 0
  ignore_errors: true

# ─── Step 4: Remove sovereign-cloud-jobs and sovereign-cloud-helpers ──────────
- name: Remove sovereign job namespaces (after all workloads are gone)
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ item }}"
  loop:
    - sovereign-cloud-jobs
    - sovereign-cloud-helpers
  ignore_errors: true
