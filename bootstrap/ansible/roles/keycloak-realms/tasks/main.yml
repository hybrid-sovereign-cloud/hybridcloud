---
- name: Check if realm exists
  ansible.builtin.uri:
    url: "{{ keycloak_url }}/admin/realms/{{ item.name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ keycloak_token }}"
    validate_certs: false
    status_code: [200, 404]
  register: realm_check
  loop: "{{ keycloak_realms }}"
  retries: 3
  delay: 5

- name: Create realms that do not exist
  ansible.builtin.uri:
    url: "{{ keycloak_url }}/admin/realms"
    method: POST
    headers:
      Authorization: "Bearer {{ keycloak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      id: "{{ item.item.name }}"
      realm: "{{ item.item.name }}"
      enabled: true
      displayName: "{{ item.item.display_name | default(item.item.name) }}"
      registrationAllowed: false
      loginWithEmailAllowed: true
      sslRequired: none
    validate_certs: false
    status_code: [201, 409]
  loop: "{{ realm_check.results }}"
  when: item.status == 404
  loop_control:
    label: "{{ item.item.name }}"
  retries: 3
  delay: 5
