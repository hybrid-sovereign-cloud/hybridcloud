---
- name: Verify Keycloak is accessible
  ansible.builtin.uri:
    url: "{{ keycloak_url }}/realms/master"
    method: GET
    validate_certs: false
    status_code: [200]
  register: kc_health
  retries: 30
  delay: 10
  until: kc_health.status == 200

- name: Obtain admin bearer token
  ansible.builtin.uri:
    url: "{{ keycloak_url }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      client_id: admin-cli
      username: "{{ keycloak_admin_user }}"
      password: "{{ keycloak_admin_password }}"
      grant_type: password
    validate_certs: false
    status_code: [200]
  register: keycloak_token_result
  retries: 5
  delay: 10
  until: keycloak_token_result.status == 200

- name: Set bearer token fact
  ansible.builtin.set_fact:
    keycloak_token: "{{ keycloak_token_result.json.access_token }}"
