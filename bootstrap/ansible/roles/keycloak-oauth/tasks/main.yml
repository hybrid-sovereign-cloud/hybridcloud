---
- name: Create OAuth secret for central cluster
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: sovereign-central-oauth-secret
        namespace: openshift-config
      type: Opaque
      stringData:
        clientSecret: "{{ keycloak_client_secrets[central_oauth_client_id] }}"
  retries: 5
  delay: 5

- name: Read central cluster ingress CA
  kubernetes.core.k8s_info:
    kind: ConfigMap
    name: default-ingress-cert
    namespace: openshift-config-managed
  register: _central_ingress_ca
  retries: 3
  delay: 5

- name: Create CA ConfigMap for central Keycloak IDP
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: keycloak-central-ca
        namespace: openshift-config
      data:
        ca.crt: "{{ _central_ingress_ca.resources[0].data['ca-bundle.crt'] }}"
  retries: 3
  delay: 5
  when: _central_ingress_ca.resources | length > 0

- name: Add Keycloak as OAuth identity provider on central cluster
  kubernetes.core.k8s:
    state: present
    merge_type: merge
    definition:
      apiVersion: config.openshift.io/v1
      kind: OAuth
      metadata:
        name: cluster
      spec:
        identityProviders:
          - name: sovereign-central
            type: OpenID
            mappingMethod: claim
            openID:
              clientID: "{{ central_oauth_client_id }}"
              clientSecret:
                name: sovereign-central-oauth-secret
              ca:
                name: keycloak-central-ca
              issuer: "{{ keycloak_central_url }}/realms/{{ central_realm }}"
              claims:
                preferredUsername:
                  - preferred_username
                name:
                  - name
                email:
                  - email
                groups:
                  - groups
  retries: 3
  delay: 10

- name: Create OAuth secret for services cluster
  kubernetes.core.k8s:
    host: "{{ ocp_services_server }}"
    api_key: "{{ services_cluster_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: sovereign-services-oauth-secret
        namespace: openshift-config
      type: Opaque
      stringData:
        clientSecret: "{{ keycloak_client_secrets[services_oauth_client_id] }}"
  retries: 5
  delay: 5
  when: ocp_services_server | length > 0

- name: Read services cluster ingress CA
  kubernetes.core.k8s_info:
    host: "{{ ocp_services_server }}"
    api_key: "{{ services_cluster_token }}"
    validate_certs: false
    kind: ConfigMap
    name: default-ingress-cert
    namespace: openshift-config-managed
  register: _svc_ingress_ca
  retries: 3
  delay: 5
  when: ocp_services_server | length > 0

- name: Create CA ConfigMap for services Keycloak IDP
  kubernetes.core.k8s:
    host: "{{ ocp_services_server }}"
    api_key: "{{ services_cluster_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: keycloak-services-ca
        namespace: openshift-config
      data:
        ca.crt: "{{ _svc_ingress_ca.resources[0].data['ca-bundle.crt'] }}"
  retries: 3
  delay: 5
  when:
    - ocp_services_server | length > 0
    - _svc_ingress_ca.resources | length > 0

- name: Add Keycloak as OAuth identity provider on services cluster
  kubernetes.core.k8s:
    host: "{{ ocp_services_server }}"
    api_key: "{{ services_cluster_token }}"
    validate_certs: false
    state: present
    merge_type: merge
    definition:
      apiVersion: config.openshift.io/v1
      kind: OAuth
      metadata:
        name: cluster
      spec:
        identityProviders:
          - name: sovereign-services
            type: OpenID
            mappingMethod: claim
            openID:
              clientID: "{{ services_oauth_client_id }}"
              clientSecret:
                name: sovereign-services-oauth-secret
              ca:
                name: keycloak-services-ca
              issuer: "{{ keycloak_services_url }}/realms/{{ services_realm }}"
              claims:
                preferredUsername:
                  - preferred_username
                name:
                  - name
                email:
                  - email
                groups:
                  - groups
  retries: 3
  delay: 10
  when: ocp_services_server | length > 0
