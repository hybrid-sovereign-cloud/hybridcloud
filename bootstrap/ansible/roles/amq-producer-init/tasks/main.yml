---
- name: Read Strimzi producer credentials
  kubernetes.core.k8s_info:
    kind: Secret
    name: "{{ kafka_producer_user }}"
    namespace: "{{ kafka_namespace }}"
  register: amq_producer_secret
  retries: 30
  delay: 20
  until: amq_producer_secret.resources | length > 0
  no_log: true

- name: Read Strimzi consumer credentials
  kubernetes.core.k8s_info:
    kind: Secret
    name: "{{ kafka_consumer_user }}"
    namespace: "{{ kafka_namespace }}"
  register: amq_consumer_secret
  retries: 30
  delay: 20
  until: amq_consumer_secret.resources | length > 0
  no_log: true

- name: Read Kafka cluster clients CA certificate
  kubernetes.core.k8s_info:
    kind: Secret
    name: "{{ kafka_cluster_name }}-clients-ca-cert"
    namespace: "{{ kafka_namespace }}"
  register: amq_clients_ca_secret
  retries: 30
  delay: 20
  until: amq_clients_ca_secret.resources | length > 0
  no_log: true

- name: Decode Kafka credential fields
  ansible.builtin.set_fact:
    amq_producer_username: "{{ kafka_producer_user }}"
    amq_producer_password: "{{ amq_producer_secret.resources[0].data.password | b64decode }}"
    amq_consumer_username: "{{ kafka_consumer_user }}"
    amq_consumer_password: "{{ amq_consumer_secret.resources[0].data.password | b64decode }}"
    amq_producer_ca: "{{ amq_clients_ca_secret.resources[0].data['ca.crt'] | b64decode }}"
  no_log: true

- name: Resolve external Kafka bootstrap servers
  ansible.builtin.set_fact:
    amq_bootstrap_servers: >-
      {{
        kafka_external_bootstrap
        if (kafka_external_bootstrap | length > 0)
        else (kafka_cluster_name ~ '-kafka-bootstrap-' ~ kafka_namespace ~ '.apps.central.example.com:443')
      }}

- name: Retrieve Vault root token from Secret
  kubernetes.core.k8s_info:
    kind: Secret
    name: "{{ vault_secret_name }}"
    namespace: "{{ vault_namespace }}"
  register: vault_init_secret
  retries: 10
  delay: 10
  until: vault_init_secret.resources | length > 0
  no_log: true

- name: Set Vault root token fact
  ansible.builtin.set_fact:
    vault_root_token: "{{ vault_init_secret.resources[0].data.root_token | b64decode }}"
  no_log: true

- name: Write AMQ producer credentials to Vault KV
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/{{ vault_kv_path }}/data/{{ amq_producer_vault_key }}"
    method: POST
    validate_certs: false
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      data:
        bootstrap_servers: "{{ amq_bootstrap_servers }}"
        topic: "{{ kafka_topic }}"
        username: "{{ amq_producer_username }}"
        password: "{{ amq_producer_password }}"
        security_protocol: SASL_SSL
        sasl_mechanism: SCRAM-SHA-512
        ca_cert: "{{ amq_producer_ca }}"
    status_code: [200, 204]
  retries: 5
  delay: 10
  no_log: true

- name: Write AMQ consumer credentials to Vault KV
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/{{ vault_kv_path }}/data/{{ amq_consumer_vault_key }}"
    method: POST
    validate_certs: false
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      data:
        bootstrap_servers: "{{ amq_bootstrap_servers }}"
        topic: "{{ kafka_topic }}"
        username: "{{ amq_consumer_username }}"
        password: "{{ amq_consumer_password }}"
        security_protocol: SASL_SSL
        sasl_mechanism: SCRAM-SHA-512
        ca_cert: "{{ amq_producer_ca }}"
    status_code: [200, 204]
  retries: 5
  delay: 10
  no_log: true

- name: Confirm AMQ credentials written to Vault
  ansible.builtin.debug:
    msg: >-
      AMQ producer and consumer credentials written to Vault
      ({{ vault_kv_path }}/data/{{ amq_producer_vault_key }},
      {{ vault_kv_path }}/data/{{ amq_consumer_vault_key }})
