---
- name: Define operator DE and rulebook registry
  ansible.builtin.set_fact:
    eda_operators:
      - name: entity
        de_image: "{{ de_registry }}/de-entity:{{ de_tags['entity'] }}"
        rulebooks:
          - { name: "entity-create", file: "entity-create.yml" }
          - { name: "entity-delete", file: "entity-delete.yml" }
      - name: team
        de_image: "{{ de_registry }}/de-team:{{ de_tags['team'] }}"
        rulebooks:
          - { name: "team-create", file: "team-create.yml" }
          - { name: "team-delete", file: "team-delete.yml" }
      - name: assignment
        de_image: "{{ de_registry }}/de-assignment:{{ de_tags['assignment'] }}"
        rulebooks:
          - { name: "assignment-create", file: "assignment-create.yml" }
          - { name: "assignment-delete", file: "assignment-delete.yml" }
      - name: project
        de_image: "{{ de_registry }}/de-project:{{ de_tags['project'] }}"
        rulebooks:
          - { name: "project-create", file: "project-create.yml" }
          - { name: "project-delete", file: "project-delete.yml" }
      - name: platformopenshift
        de_image: "{{ de_registry }}/de-platformopenshift:{{ de_tags['platformopenshift'] }}"
        rulebooks:
          - { name: "platformopenshift-create", file: "platformopenshift-create.yml" }
          - { name: "platformopenshift-delete", file: "platformopenshift-delete.yml" }
      - name: cloudoso
        de_image: "{{ de_registry }}/de-cloudoso:{{ de_tags['cloudoso'] }}"
        rulebooks:
          - { name: "cloudoso-create", file: "cloudoso-create.yml" }
          - { name: "cloudoso-delete", file: "cloudoso-delete.yml" }
      - name: openstack-migration
        de_image: "{{ de_registry }}/de-openstack-migration:{{ de_tags['openstack-migration'] }}"
        rulebooks:
          - { name: "openstack-migration-create", file: "openstack-migration-create.yml" }
      - name: cloudaws
        de_image: "{{ de_registry }}/de-cloudaws:{{ de_tags['cloudaws'] }}"
        rulebooks:
          - { name: "cloudaws-create", file: "cloudaws-create.yml" }
          - { name: "cloudaws-delete", file: "cloudaws-delete.yml" }
      - name: persona
        de_image: "{{ de_registry }}/de-persona:{{ de_tags['persona'] }}"
        rulebooks:
          - { name: "persona-create", file: "persona-create.yml" }
          - { name: "persona-delete", file: "persona-delete.yml" }
      - name: plugin-rbac
        de_image: "{{ de_registry }}/de-plugin-rbac:{{ de_tags['plugin-rbac'] }}"
        rulebooks:
          - { name: "rbacconfig-create", file: "rbacconfig-create.yml" }
          - { name: "rbacconfig-delete", file: "rbacconfig-delete.yml" }
          - { name: "rbac-create", file: "rbac-create.yml" }
          - { name: "rbac-delete", file: "rbac-delete.yml" }
      - name: plugin-vault
        de_image: "{{ de_registry }}/de-plugin-vault:{{ de_tags['plugin-vault'] }}"
        rulebooks:
          - { name: "vault-create", file: "vault-create.yml" }
          - { name: "vault-delete", file: "vault-delete.yml" }
          - { name: "vaultkv-create", file: "vaultkv-create.yml" }
          - { name: "vaultkv-delete", file: "vaultkv-delete.yml" }
      - name: plugin-aap
        de_image: "{{ de_registry }}/de-plugin-aap:{{ de_tags['plugin-aap'] }}"
        rulebooks:
          - { name: "aapconfig-create", file: "aapconfig-create.yml" }
          - { name: "aapconfig-delete", file: "aapconfig-delete.yml" }
          - { name: "aaporg-create", file: "aaporg-create.yml" }
          - { name: "aaporg-delete", file: "aaporg-delete.yml" }
      - name: plugin-quay
        de_image: "{{ de_registry }}/de-plugin-quay:{{ de_tags['plugin-quay'] }}"
        rulebooks:
          - { name: "quayconfig-create", file: "quayconfig-create.yml" }
          - { name: "quayconfig-delete", file: "quayconfig-delete.yml" }
          - { name: "quayorg-create", file: "quayorg-create.yml" }
          - { name: "quayorg-delete", file: "quayorg-delete.yml" }

- name: Normalize Quay registry host for credential inputs
  ansible.builtin.set_fact:
    eda_quay_host: "{{ lookup('env', 'OCI_REGISTRY') | regex_replace('^https?://', '') | regex_replace('/.*$', '') }}"

- name: Create Container Registry credential for Quay
  ansible.eda.credential:
    controller_host: "{{ eda_controller_url }}"
    controller_username: "{{ eda_admin_username }}"
    controller_password: "{{ eda_admin_password }}"
    validate_certs: false
    name: "quay-registry-credential"
    credential_type_name: "Container Registry"
    organization_name: "{{ eda_organization }}"
    inputs:
      host: "{{ eda_quay_host }}"
      username: "{{ lookup('env', 'OCI_ROBOT_USERNAME') }}"
      password: "{{ lookup('env', 'OCI_ROBOT_PASSWORD') }}"
      verify_ssl: false
    state: present
  no_log: true
  register: eda_quay_credential_result

- name: Create AAP Controller credential for EDA
  ansible.eda.credential:
    controller_host: "{{ eda_controller_url }}"
    controller_username: "{{ eda_admin_username }}"
    controller_password: "{{ eda_admin_password }}"
    validate_certs: false
    name: "sovereign-aap-controller-credential"
    credential_type_name: "Red Hat Ansible Automation Platform"
    organization_name: "{{ eda_organization }}"
    inputs:
      host: "{{ lookup('env', 'AAP_CONTROLLER_URL') }}/api/controller/"
      oauth_token: "{{ lookup('env', 'AAP_RESOURCE_TOKEN') }}"
      verify_ssl: false
    state: present
  no_log: true
  when: lookup('env', 'AAP_RESOURCE_TOKEN') | length > 0

- name: Register Decision Environments
  ansible.eda.decision_environment:
    controller_host: "{{ eda_controller_url }}"
    controller_username: "{{ eda_admin_username }}"
    controller_password: "{{ eda_admin_password }}"
    validate_certs: false
    name: "de-{{ item.name }}"
    image_url: "{{ item.de_image }}"
    credential: "quay-registry-credential"
    organization_name: "{{ eda_organization }}"
    state: present
  loop: "{{ eda_operators }}"
  loop_control:
    label: "de-{{ item.name }}"
  no_log: true

- name: Create Event Stream credential
  ansible.eda.credential:
    controller_host: "{{ eda_controller_url }}"
    controller_username: "{{ eda_admin_username }}"
    controller_password: "{{ eda_admin_password }}"
    validate_certs: false
    name: "{{ event_stream_name }}-credential"
    credential_type_name: "Token Event Stream"
    organization_name: "{{ eda_organization }}"
    inputs:
      token: "{{ event_stream_token }}"
    state: present
  no_log: true

- name: Create Event Stream
  ansible.eda.event_stream:
    controller_host: "{{ eda_controller_url }}"
    controller_username: "{{ eda_admin_username }}"
    controller_password: "{{ eda_admin_password }}"
    validate_certs: false
    name: "{{ event_stream_name }}"
    credential_name: "{{ event_stream_name }}-credential"
    organization_name: "{{ eda_organization }}"
    state: present
  no_log: true

- name: Disable test_mode on Event Stream so events are delivered to activations
  ansible.builtin.uri:
    url: "{{ eda_controller_url }}/api/eda/v1/event-streams/?name={{ event_stream_name | urlencode }}"
    method: GET
    validate_certs: false
    url_username: "{{ eda_admin_username }}"
    url_password: "{{ eda_admin_password }}"
    force_basic_auth: true
    status_code: [200]
  register: event_stream_lookup

- name: Patch test_mode to false
  ansible.builtin.uri:
    url: "{{ eda_controller_url }}/api/eda/v1/event-streams/{{ event_stream_lookup.json.results[0].id }}/"
    method: PATCH
    validate_certs: false
    url_username: "{{ eda_admin_username }}"
    url_password: "{{ eda_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      test_mode: false
    status_code: [200]
  when: event_stream_lookup.json.results | length > 0 and event_stream_lookup.json.results[0].test_mode | default(false) | bool

- name: Delete existing EDA project if in failed import state
  ansible.builtin.uri:
    url: "{{ eda_controller_url }}/api/eda/v1/projects/?name=sovereign-eda-rulebooks"
    method: GET
    validate_certs: false
    url_username: "{{ eda_admin_username }}"
    url_password: "{{ eda_admin_password }}"
    force_basic_auth: true
    status_code: [200]
  register: existing_project
  no_log: false

- name: Remove failed project to allow recreation with credentials
  ansible.builtin.uri:
    url: "{{ eda_controller_url }}/api/eda/v1/projects/{{ existing_project.json.results[0].id }}/"
    method: DELETE
    validate_certs: false
    url_username: "{{ eda_admin_username }}"
    url_password: "{{ eda_admin_password }}"
    force_basic_auth: true
    status_code: [204]
  when:
    - existing_project.json.results | length > 0
    - existing_project.json.results[0].import_state in ['failed', 'pending']
  no_log: false

- name: Create EDA Project for sovereign rulebooks (authenticated URL for private repo)
  ansible.eda.project:
    controller_host: "{{ eda_controller_url }}"
    controller_username: "{{ eda_admin_username }}"
    controller_password: "{{ eda_admin_password }}"
    validate_certs: false
    name: "sovereign-eda-rulebooks"
    url: "{{ lookup('env', 'RULEBOOK_REPO_URL') | regex_replace('^https://', 'https://' + github_token + '@') }}"
    organization_name: "{{ eda_organization }}"
    state: present
  no_log: true
  register: eda_project_result

- name: Refresh EDA project record after create/update
  ansible.builtin.uri:
    url: "{{ eda_controller_url }}/api/eda/v1/projects/?name=sovereign-eda-rulebooks"
    method: GET
    validate_certs: false
    url_username: "{{ eda_admin_username }}"
    url_password: "{{ eda_admin_password }}"
    force_basic_auth: true
    status_code: [200]
  register: eda_project_current
  no_log: true

- name: Force sync EDA project to pick up latest rulebook changes
  ansible.builtin.uri:
    url: "{{ eda_controller_url }}/api/eda/v1/projects/{{ eda_project_current.json.results[0].id }}/sync/"
    method: POST
    validate_certs: false
    url_username: "{{ eda_admin_username }}"
    url_password: "{{ eda_admin_password }}"
    force_basic_auth: true
    status_code: [200, 201, 202]
    body_format: json
    body: {}
  when:
    - eda_project_current.json.results | length > 0
    - eda_project_current.json.results[0].import_state not in ['completed']
  register: sync_result
  ignore_errors: true
  no_log: true

- name: Wait for EDA project to be imported (up to 5 min)
  ansible.builtin.uri:
    url: "{{ eda_controller_url }}/api/eda/v1/projects/?name=sovereign-eda-rulebooks"
    method: GET
    validate_certs: false
    url_username: "{{ eda_admin_username }}"
    url_password: "{{ eda_admin_password }}"
    force_basic_auth: true
    status_code: [200]
  register: project_status
  retries: 30
  delay: 10
  until: >-
    project_status.json.results | length > 0
    and project_status.json.results[0].import_state == 'completed'
  no_log: true

- name: List managed rulebook activations before reconcile
  ansible.builtin.uri:
    url: "{{ eda_controller_url }}/api/eda/v1/activations/?page_size=200"
    method: GET
    validate_certs: false
    url_username: "{{ eda_admin_username }}"
    url_password: "{{ eda_admin_password }}"
    force_basic_auth: true
    status_code: [200]
  register: existing_activations
  no_log: true

- name: Build managed activation name list
  ansible.builtin.set_fact:
    managed_activation_names: >-
      {{
        eda_operators | subelements('rulebooks')
        | map('last')
        | map(attribute='name')
        | map('regex_replace', '^(.*)$', '\1-activation')
        | list
      }}

- name: Remove orphaned EDA activations no longer managed by sovereign
  ansible.builtin.uri:
    url: "{{ eda_controller_url }}/api/eda/v1/activations/{{ item.id }}/"
    method: DELETE
    validate_certs: false
    url_username: "{{ eda_admin_username }}"
    url_password: "{{ eda_admin_password }}"
    force_basic_auth: true
    status_code: [204, 404]
  loop: "{{ existing_activations.json.results | default([]) }}"
  when:
    - item.name.endswith('-activation')
    - item.name not in managed_activation_names
  no_log: true

- name: Disable managed activations before reconcile (EDA requires disabled state to update)
  ansible.builtin.uri:
    url: "{{ eda_controller_url }}/api/eda/v1/activations/{{ item.id }}/disable/"
    method: POST
    validate_certs: false
    url_username: "{{ eda_admin_username }}"
    url_password: "{{ eda_admin_password }}"
    force_basic_auth: true
    status_code: [204, 404, 400]
  loop: "{{ existing_activations.json.results | default([]) }}"
  when:
    - item.name in managed_activation_names
  no_log: true

- name: Wait for managed activations to reach disabled stopped state
  ansible.builtin.uri:
    url: "{{ eda_controller_url }}/api/eda/v1/activations/?name={{ item | urlencode }}"
    method: GET
    validate_certs: false
    url_username: "{{ eda_admin_username }}"
    url_password: "{{ eda_admin_password }}"
    force_basic_auth: true
    status_code: [200]
  loop: "{{ managed_activation_names }}"
  register: activation_ready
  until: >-
    activation_ready.json.results | length == 0
    or (
      not activation_ready.json.results[0].is_enabled
      and activation_ready.json.results[0].status == 'stopped'
    )
  retries: 20
  delay: 3
  no_log: true

- name: Create Rulebook Activations
  ansible.eda.rulebook_activation:
    controller_host: "{{ eda_controller_url }}"
    controller_username: "{{ eda_admin_username }}"
    controller_password: "{{ eda_admin_password }}"
    validate_certs: false
    name: "{{ item.1.name }}-activation"
    project_name: "sovereign-eda-rulebooks"
    rulebook_name: "{{ item.1.file }}"
    decision_environment_name: "de-{{ item.0.name }}"
    organization_name: "{{ eda_organization }}"
    restart_policy: "on-failure"
    event_streams:
      - event_stream: "{{ event_stream_name }}"
        source_index: 0
    eda_credentials:
      - sovereign-aap-controller-credential
    state: present
  loop: "{{ eda_operators | subelements('rulebooks') }}"
  loop_control:
    label: "{{ item.1.name }}-activation"
  register: rulebook_activation_results

- name: Report rulebook activation failures
  ansible.builtin.fail:
    msg: >-
      Rulebook activation {{ item.item.1.name }}-activation failed:
      {{ item.msg | default(item | to_nice_json) }}
  loop: "{{ rulebook_activation_results.results | default([]) }}"
  when: item.failed | default(false) | bool
  loop_control:
    label: "{{ item.item.1.name }}-activation"
