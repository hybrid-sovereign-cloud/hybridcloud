---
- name: "Check seal status of {{ pod_name }}"
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: "{{ pod_name }}"
    container: vault
    command: vault status -format=json
  register: pod_status_raw
  retries: 10
  delay: 10
  until: pod_status_raw.rc is defined
  ignore_errors: true

- name: "Parse seal status for {{ pod_name }}"
  ansible.builtin.set_fact:
    pod_sealed: "{{ (pod_status_raw.stdout | from_json).sealed | default(true) }}"
  when: pod_status_raw.stdout is defined and pod_status_raw.stdout | length > 0
  ignore_errors: true

- name: "Default sealed flag for {{ pod_name }}"
  ansible.builtin.set_fact:
    pod_sealed: true
  when: pod_sealed is not defined

- name: "Join raft cluster from {{ pod_name }}"
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: "{{ pod_name }}"
    container: vault
    command: >-
      vault operator raft join
      http://{{ vault_leader_pod }}.{{ vault_internal_svc_name }}.{{ vault_namespace }}.svc:8200
  when: pod_sealed | bool and pod_name != vault_leader_pod
  register: raft_join_result
  retries: 5
  delay: 5
  ignore_errors: true

- name: "Unseal {{ pod_name }} with threshold keys"
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: "{{ pod_name }}"
    container: vault
    command: "vault operator unseal {{ item }}"
  loop: "{{ vault_unseal_keys[:vault_key_threshold | int] }}"
  loop_control:
    label: "key-{{ ansible_loop.index }}"
    extended: true
  when: pod_sealed | bool
  register: unseal_result
  retries: 3
  delay: 5
  ignore_errors: true

- name: "Verify {{ pod_name }} is unsealed"
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: "{{ pod_name }}"
    container: vault
    command: vault status -format=json
  register: verify_status
  retries: 10
  delay: 5
  until: >-
    verify_status.stdout is defined and
    not (verify_status.stdout | from_json).sealed | default(true)
  when: pod_sealed | bool
