---
vault_addr: "http://vault-active.vault.svc:8200"
vault_namespace: "{{ lookup('env', 'VAULT_NAMESPACE') | default('vault', true) }}"
vault_secret_name: "vault-init-secrets"
vault_key_shares: 5
vault_key_threshold: 3
vault_internal_svc_name: "vault-internal"
vault_pod_label_selectors:
  - "app.kubernetes.io/name=vault"
  - "component=server"
