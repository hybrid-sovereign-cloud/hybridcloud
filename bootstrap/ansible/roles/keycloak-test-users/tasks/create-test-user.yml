---
- name: "Set token for {{ test_user.realm }}"
  ansible.builtin.set_fact:
    _kc_token: "{{ kc_central_token if test_user.keycloak_url_key == 'central' else kc_services_token }}"
    _kc_url: "{{ keycloak_central_url if test_user.keycloak_url_key == 'central' else keycloak_services_url }}"

- name: "Create test user {{ test_user.username }} in {{ test_user.realm }}"
  ansible.builtin.uri:
    url: "{{ _kc_url }}/admin/realms/{{ test_user.realm }}/users"
    method: POST
    headers:
      Authorization: "Bearer {{ _kc_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      username: "{{ test_user.username }}"
      email: "{{ test_user.email }}"
      firstName: "{{ test_user.firstName }}"
      lastName: "{{ test_user.lastName }}"
      enabled: true
      credentials:
        - type: password
          value: "SovereignTest@2026!"
          temporary: false
    validate_certs: false
    status_code: [201, 409]
  register: create_user_result

- name: "Get user ID for {{ test_user.username }}"
  ansible.builtin.uri:
    url: "{{ _kc_url }}/admin/realms/{{ test_user.realm }}/users?username={{ test_user.username }}&exact=true"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_token }}"
    validate_certs: false
    status_code: [200]
  register: user_lookup
  retries: 3
  delay: 3

- name: "Set user ID fact for {{ test_user.username }}"
  ansible.builtin.set_fact:
    _user_id: "{{ user_lookup.json[0].id }}"
  when: user_lookup.json | length > 0

- name: "Add {{ test_user.username }} to groups"
  include_tasks: add-user-to-group.yml
  loop: "{{ test_user.groups }}"
  loop_control:
    loop_var: group_name
  when: _user_id is defined
