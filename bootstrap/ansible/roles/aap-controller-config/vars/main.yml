    pull: missing
    credential: quay-robot-credential

controller_projects:
  - name: sovereign-eda-project
    organization: sovereign
    scm_type: git
    scm_url: "{{ lookup('env', 'EDA_REPO_URL') }}"
    credential: sovereign-github-credential
    scm_clean: true
    scm_delete_on_update: false
    scm_update_on_launch: true
    scm_branch: main
    wait: true

controller_inventories:
  - name: sovereign-localhost
    organization: sovereign

controller_hosts:
  - name: localhost
    inventory: sovereign-localhost
    variables:
      ansible_connection: local
      ansible_python_interpreter: "{{ '{{' }} ansible_playbook_python {{ '}}' }}"

controller_templates:
  - name: entity-provision
    organization: sovereign
    project: sovereign-eda-project
    playbook: rulebooks/entity-provision-playbook.yml
    inventory: sovereign-localhost
    execution_environment: de-entity
    ask_variables_on_launch: true
    credentials:
      - sovereign-vault-admin-credential
