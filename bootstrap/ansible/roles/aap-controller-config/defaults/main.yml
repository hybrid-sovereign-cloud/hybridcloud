---
# Connection variables — kept in defaults so they can be overridden by env lookups at runtime.
# All data variables (organizations, credentials, EEs, etc.) live in vars/main.yml to ensure
# they take precedence over the imported infra.aap_configuration collection's own defaults.
aap_hostname: "{{ lookup('env', 'AAP_CONTROLLER_URL') }}"
aap_username: "admin"
aap_password: "{{ lookup('env', 'AAP_ADMIN_PASSWORD') }}"
aap_validate_certs: false

_quay_registry: "{{ lookup('env', 'OCI_REGISTRY') | regex_replace('^https?://', '') | regex_replace('/.*$', '') }}/hybrid-sovereign"
_quay_registry_host: "{{ lookup('env', 'OCI_REGISTRY') | regex_replace('^https?://', '') | regex_replace('/.*$', '') }}"
_de_entity_tag: "0.1.7"
_de_team_tag: "0.1.2"
_de_assignment_tag: "0.1.5"
_de_project_tag: "0.1.0"
_de_platformopenshift_tag: "0.1.5"
_de_cloudoso_tag: "0.1.7"
_de_openstack_migration_tag: "0.1.0"
_de_cloudaws_tag: "0.1.4"
_de_persona_tag: "0.1.2"
_de_plugin_rbac_tag: "0.1.3"
_de_plugin_vault_tag: "0.1.2"
_de_plugin_aap_tag: "0.1.3"
_de_plugin_quay_tag: "0.1.2"
