---
- name: Create and test Keycloak users, then delete (leave groups)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    keycloak_central_url: "{{ lookup('env', 'KEYCLOAK_CENTRAL_URL') | default('https://rhbk-central.apps.central.example.com', true) }}"
    keycloak_services_url: "{{ lookup('env', 'KEYCLOAK_SERVICES_URL') | default('https://rhbk-services.apps.services.example.com', true) }}"
    keycloak_central_realm: "{{ lookup('env', 'KEYCLOAK_CENTRAL_REALM') | default('master', true) }}"
    keycloak_services_realm: "{{ lookup('env', 'KEYCLOAK_SERVICES_REALM') | default('sovereign-tenants', true) }}"
    vault_addr: "{{ lookup('env', 'VAULT_ADDR') | default('https://vault-central.apps.central.example.com', true) }}"
    vault_token: "{{ lookup('env', 'VAULT_TOKEN') | default('', true) }}"
    keycloak_central_vault_path: "{{ lookup('env', 'KEYCLOAK_CENTRAL_VAULT_PATH') | default('rhbk-central-admin', true) }}"
    keycloak_services_vault_path: "{{ lookup('env', 'KEYCLOAK_SERVICES_VAULT_PATH') | default('rhbk-services-admin', true) }}"

  pre_tasks:
    - name: Resolve Vault token from central cluster when not in environment
      ansible.builtin.command:
        cmd: >-
          oc get secret vault-init-secrets-copy -n vault-central
          --context={{ lookup('env', 'OCP_CENTRAL_CONTEXT') | default('default/api-central-lab-signal9-gg:6443/kube:admin', true) }}
          -o jsonpath={.data.root_token}
      register: _vault_token_b64
      changed_when: false
      when: vault_token | length == 0

    - name: Set Vault token fact
      ansible.builtin.set_fact:
        vault_token: "{{ _vault_token_b64.stdout | b64decode }}"
      no_log: true
      when: vault_token | length == 0

    - name: Read central Keycloak admin credentials from Vault
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/central/data/{{ keycloak_central_vault_path }}"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_token }}"
        validate_certs: false
        status_code: [200]
      register: kc_central_vault
      no_log: true

    - name: Set central admin credentials
      ansible.builtin.set_fact:
        keycloak_central_admin_password: "{{ kc_central_vault.json.data.data.password }}"
        keycloak_central_admin_user: "{{ kc_central_vault.json.data.data.username | default('admin') }}"
      no_log: true

    - name: Read services Keycloak admin credentials from Vault
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/central/data/{{ keycloak_services_vault_path }}"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_token }}"
        validate_certs: false
        status_code: [200]
      register: kc_services_vault
      no_log: true
      when: keycloak_services_url | length > 0

    - name: Set services admin credentials
      ansible.builtin.set_fact:
        keycloak_services_admin_password: "{{ kc_services_vault.json.data.data.password }}"
        keycloak_services_admin_user: "{{ kc_services_vault.json.data.data.username | default('admin') }}"
      no_log: true
      when: keycloak_services_url | length > 0

  roles:
    # Do NOT pass play-scope vars explicitly to the role — same-named role defaults
    # cause infinite Ansible self-referencing recursion. Play-scope vars
    # (keycloak_central_url, keycloak_central_realm, etc.) are accessible to role
    # tasks directly without explicit passing.
    - role: keycloak-test-users
