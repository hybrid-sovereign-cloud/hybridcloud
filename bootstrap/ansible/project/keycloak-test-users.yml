---
- name: Create and test Keycloak users, then delete (leave groups)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    keycloak_central_url: "{{ lookup('env', 'KEYCLOAK_CENTRAL_URL') }}"
    keycloak_services_url: "{{ lookup('env', 'KEYCLOAK_SERVICES_URL') | default('', true) }}"
    keycloak_central_realm: "{{ lookup('env', 'KEYCLOAK_CENTRAL_REALM') | default('sovereign-central', true) }}"
    keycloak_services_realm: "{{ lookup('env', 'KEYCLOAK_SERVICES_REALM') | default('sovereign-tenants', true) }}"
    keycloak_central_admin_secret_name: "{{ lookup('env', 'KEYCLOAK_CENTRAL_ADMIN_SECRET') | default('rhbk-central-admin', true) }}"
    keycloak_central_admin_secret_ns: "{{ lookup('env', 'KEYCLOAK_CENTRAL_ADMIN_SECRET_NS') | default('sovereign-cloud-jobs', true) }}"
    keycloak_services_admin_secret_name: "{{ lookup('env', 'KEYCLOAK_SERVICES_ADMIN_SECRET') | default('rhbk-services-admin', true) }}"
    keycloak_services_admin_secret_ns: "{{ lookup('env', 'KEYCLOAK_SERVICES_ADMIN_SECRET_NS') | default('sovereign-cloud-jobs', true) }}"

  pre_tasks:
    - name: Read central Keycloak admin secret
      kubernetes.core.k8s_info:
        kind: Secret
        name: "{{ keycloak_central_admin_secret_name }}"
        namespace: "{{ keycloak_central_admin_secret_ns }}"
      register: kc_central_secret
      retries: 10
      delay: 10
      until: kc_central_secret.resources | length > 0

    - name: Set central admin credentials
      ansible.builtin.set_fact:
        keycloak_central_admin_password: "{{ kc_central_secret.resources[0].data.password | b64decode }}"
        keycloak_central_admin_user: >-
          {{ kc_central_secret.resources[0].data.username | b64decode
             if kc_central_secret.resources[0].data.username is defined
             else 'admin' }}

    - name: Read services Keycloak admin secret
      kubernetes.core.k8s_info:
        kind: Secret
        name: "{{ keycloak_services_admin_secret_name }}"
        namespace: "{{ keycloak_services_admin_secret_ns }}"
      register: kc_services_secret
      when: keycloak_services_url | length > 0
      retries: 10
      delay: 10
      until: kc_services_secret.resources | length > 0

    - name: Set services admin credentials
      ansible.builtin.set_fact:
        keycloak_services_admin_password: "{{ kc_services_secret.resources[0].data.password | b64decode }}"
        keycloak_services_admin_user: >-
          {{ kc_services_secret.resources[0].data.username | b64decode
             if kc_services_secret.resources[0].data.username is defined
             else 'admin' }}
      when: keycloak_services_url | length > 0

  roles:
    # Do NOT pass play-scope vars explicitly to the role — same-named role defaults
    # cause infinite Ansible self-referencing recursion. Play-scope vars
    # (keycloak_central_url, keycloak_central_realm, etc.) are accessible to role
    # tasks directly without explicit passing.
    - role: keycloak-test-users
