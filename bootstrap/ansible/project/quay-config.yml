---
- name: Configure Quay registry admin and OIDC
  hosts: localhost
  gather_facts: false
  roles:
    - quay-config
  vars:
    quay_url: "{{ lookup('env', 'QUAY_URL') }}"
    quay_admin_user: "{{ lookup('env', 'QUAY_ADMIN_USER') | default('sovereign_admin') }}"
    vault_addr: "{{ lookup('env', 'VAULT_ADDR') }}"
    vault_namespace: "{{ lookup('env', 'VAULT_NAMESPACE') }}"
    vault_secret_path: "{{ lookup('env', 'VAULT_SECRET_PATH') }}"
    quay_namespace: "{{ 'central-quay' if 'central' in lookup('env', 'QUAY_URL') else 'services-quay' }}"
    keycloak_url: "{{ lookup('env', 'KEYCLOAK_URL') }}"
    keycloak_realm: "{{ lookup('env', 'KEYCLOAK_REALM') }}"
    keycloak_client_id: "{{ lookup('env', 'KEYCLOAK_CLIENT_ID') }}"
    keycloak_admin_secret: "{{ lookup('env', 'KEYCLOAK_ADMIN_SECRET') }}"
    keycloak_admin_secret_ns: "{{ lookup('env', 'KEYCLOAK_ADMIN_SECRET_NS') }}"
