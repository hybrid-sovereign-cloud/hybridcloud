---
- name: Configure OpenShift OAuth with Keycloak
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    keycloak_central_url: "{{ lookup('env', 'KEYCLOAK_CENTRAL_URL') | default('http://sovereign-keycloak-central-service.rhbk.svc:8080', true) }}"
    keycloak_services_url: "{{ lookup('env', 'KEYCLOAK_SERVICES_URL') }}"
    keycloak_admin_secret_name: "{{ lookup('env', 'KEYCLOAK_ADMIN_SECRET') | default('sovereign-keycloak-central-initial-admin', true) }}"
    keycloak_admin_secret_namespace: "{{ lookup('env', 'KEYCLOAK_ADMIN_SECRET_NS') | default('rhbk', true) }}"
    keycloak_services_admin_secret_name: "{{ lookup('env', 'KEYCLOAK_SERVICES_ADMIN_SECRET') | default('sovereign-keycloak-services-initial-admin', true) }}"
    keycloak_services_admin_secret_namespace: "{{ lookup('env', 'KEYCLOAK_SERVICES_ADMIN_SECRET_NS') | default('rhbk', true) }}"
    central_realm: "{{ lookup('env', 'REALM_NAME') | default('sovereign-central', true) }}"
    services_realm: "{{ lookup('env', 'SERVICES_REALM_NAME') | default('sovereign-central', true) }}"
    central_oauth_client_id: "openshift-central"
    services_oauth_client_id: "openshift-services"
    ocp_services_server: "{{ lookup('env', 'OCP_SERVICES_SERVER') }}"

  pre_tasks:
    - name: Fetch ArgoCD cluster secret for services cluster
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: openshift-gitops
        label_selectors:
          - "argocd.argoproj.io/secret-type=cluster"
      register: argo_cluster_secrets
      retries: 5
      delay: 5

    - name: Parse services cluster credentials
      ansible.builtin.set_fact:
        services_cluster_config: "{{ (argo_cluster_secrets.resources | first).data.config | b64decode | from_json }}"
      when: argo_cluster_secrets.resources | length > 0

    - name: Login to services cluster to obtain bearer token
      ansible.builtin.shell: |
        oc login "{{ ocp_services_server }}" \
          --username="{{ services_cluster_config.username }}" \
          --password="{{ services_cluster_config.password }}" \
          --insecure-skip-tls-verify=true --kubeconfig=/tmp/svc-kubeconfig >/dev/null 2>&1
        oc whoami --show-token --kubeconfig=/tmp/svc-kubeconfig
      register: svc_token_result
      retries: 5
      delay: 10
      until: svc_token_result.rc == 0
      when:
        - argo_cluster_secrets.resources | length > 0
        - (services_cluster_config.bearerToken | default('')) | length == 0

    - name: Set services cluster token
      ansible.builtin.set_fact:
        services_cluster_token: "{{ services_cluster_config.bearerToken if (services_cluster_config.bearerToken | default('')) | length > 0 else svc_token_result.stdout | trim }}"
      when: argo_cluster_secrets.resources | length > 0

    - name: Fetch central Keycloak admin credentials
      kubernetes.core.k8s_info:
        kind: Secret
        name: "{{ keycloak_admin_secret_name }}"
        namespace: "{{ keycloak_admin_secret_namespace }}"
      register: admin_secret
      retries: 30
      delay: 10
      until: admin_secret.resources | length > 0

    - name: Set central admin credentials
      ansible.builtin.set_fact:
        keycloak_admin_user: "{{ admin_secret.resources[0].data.username | b64decode }}"
        keycloak_admin_password: "{{ admin_secret.resources[0].data.password | b64decode }}"

    - name: Fetch services Keycloak admin credentials from services cluster
      kubernetes.core.k8s_info:
        kind: Secret
        name: "{{ keycloak_services_admin_secret_name }}"
        namespace: "{{ keycloak_services_admin_secret_namespace }}"
        host: "{{ ocp_services_server }}"
        api_key: "{{ services_cluster_token }}"
        validate_certs: false
      register: services_admin_secret
      retries: 30
      delay: 10
      until: services_admin_secret.resources is defined and services_admin_secret.resources | length > 0
      when: ocp_services_server | length > 0

    - name: Set services admin credentials
      ansible.builtin.set_fact:
        services_keycloak_admin_user: "{{ services_admin_secret.resources[0].data.username | b64decode }}"
        services_keycloak_admin_password: "{{ services_admin_secret.resources[0].data.password | b64decode }}"
      when: services_admin_secret.resources is defined and services_admin_secret.resources | length > 0

    - name: Wait for Keycloak central to be reachable
      ansible.builtin.uri:
        url: "{{ keycloak_central_url }}/realms/master"
        method: GET
        validate_certs: false
        status_code: [200]
      retries: 30
      delay: 10
      register: kc_health
      until: kc_health.status == 200

    - name: Authenticate to central Keycloak
      ansible.builtin.include_role:
        name: keycloak-auth
      vars:
        keycloak_url: "{{ keycloak_central_url }}"

    - name: Set central token
      ansible.builtin.set_fact:
        central_keycloak_token: "{{ keycloak_token }}"

    - name: Retrieve central client secrets
      ansible.builtin.include_role:
        name: keycloak-clients
      vars:
        keycloak_url: "{{ keycloak_central_url }}"
        keycloak_token: "{{ central_keycloak_token }}"
        keycloak_clients:
          - realm: "{{ central_realm }}"
            client_id: "{{ central_oauth_client_id }}"
            name: "OpenShift Central"
            redirect_uris: ["*"]

    - name: Save central secrets
      ansible.builtin.set_fact:
        central_client_secrets: "{{ keycloak_client_secrets }}"

    - name: Wait for services Keycloak to be reachable
      ansible.builtin.uri:
        url: "{{ keycloak_services_url }}/realms/master"
        method: GET
        validate_certs: false
        status_code: [200]
      retries: 30
      delay: 10
      register: kc_services_health
      until: kc_services_health.status == 200
      when: ocp_services_server | length > 0

    - name: Authenticate to services Keycloak
      ansible.builtin.include_role:
        name: keycloak-auth
      vars:
        keycloak_url: "{{ keycloak_services_url }}"
        keycloak_admin_user: "{{ services_keycloak_admin_user }}"
        keycloak_admin_password: "{{ services_keycloak_admin_password }}"
      when: ocp_services_server | length > 0

    - name: Set services token
      ansible.builtin.set_fact:
        services_keycloak_token: "{{ keycloak_token }}"
      when: ocp_services_server | length > 0

    - name: Retrieve services client secrets
      ansible.builtin.include_role:
        name: keycloak-clients
      vars:
        keycloak_url: "{{ keycloak_services_url }}"
        keycloak_token: "{{ services_keycloak_token }}"
        keycloak_clients:
          - realm: "{{ services_realm }}"
            client_id: "{{ services_oauth_client_id }}"
            name: "OpenShift Services"
            redirect_uris: ["*"]
      when: ocp_services_server | length > 0

    - name: Merge all secrets
      ansible.builtin.set_fact:
        keycloak_client_secrets: "{{ central_client_secrets | combine(keycloak_client_secrets | default({})) }}"

  roles:
    - keycloak-oauth
