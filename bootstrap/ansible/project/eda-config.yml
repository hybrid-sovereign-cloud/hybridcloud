---
- name: Configure EDA Decision Environments and Rulebook Activations
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    eda_controller_url: "{{ lookup('env', 'EDA_CONTROLLER_URL') }}"
    eda_organization: "Default"
    de_registry: "quay.example.com/hybrid-sovereign"
    event_stream_name: "sovereign-operator-events"
    # Per-image tags — aligned with available Quay tags
    de_tags:
      entity: "0.1.6"
      team: "0.1.0"
      assignment: "0.1.5"
      project: "0.1.0"
      platformopenshift: "0.1.7"
      cloudoso: "0.1.6"
      openstack-migration: "0.1.0"
      cloudaws: "0.1.5"
      persona: "0.1.2"
      plugin-rbac: "0.1.3"
      plugin-vault: "0.1.2"
      plugin-aap: "0.1.3"
      plugin-quay: "0.1.2"

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - eda_controller_url | length > 0
        fail_msg: "EDA_CONTROLLER_URL environment variable is required"

    - name: Set EDA admin credentials from environment (local iteration)
      ansible.builtin.set_fact:
        eda_admin_username: "admin"
        eda_admin_password: "{{ lookup('env', 'EDA_ADMIN_PASSWORD') }}"
      no_log: true
      when: lookup('env', 'EDA_ADMIN_PASSWORD') | length > 0

    - name: Read AAP gateway admin password for EDA API auth
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: aap
        name: sovereign-aap-admin-password
      register: eda_secret_raw
      no_log: true
      when: lookup('env', 'EDA_ADMIN_PASSWORD') | length == 0

    - name: Set EDA admin credentials from cluster secret
      ansible.builtin.set_fact:
        eda_admin_username: "admin"
        eda_admin_password: "{{ eda_secret_raw.resources[0].data.password | b64decode }}"
      no_log: true
      when: lookup('env', 'EDA_ADMIN_PASSWORD') | length == 0

    - name: Set event-stream token from environment (local iteration)
      ansible.builtin.set_fact:
        event_stream_token: "{{ lookup('env', 'EVENT_STREAM_TOKEN') }}"
      no_log: true
      when: lookup('env', 'EVENT_STREAM_TOKEN') | length > 0

    - name: Read event-stream token from Kubernetes secret
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: sovereign-cloud-jobs
        name: event-stream-token
      register: event_stream_secret_raw
      no_log: true
      when: lookup('env', 'EVENT_STREAM_TOKEN') | length == 0

    - name: Set event-stream token fact from cluster secret
      ansible.builtin.set_fact:
        event_stream_token: "{{ event_stream_secret_raw.resources[0].data.token | b64decode }}"
      no_log: true
      when: lookup('env', 'EVENT_STREAM_TOKEN') | length == 0

    - name: Set GitHub PAT for rulebook repo clone
      ansible.builtin.set_fact:
        github_token: "x-access-token:{{ lookup('env', 'GITHUB_TOKEN') }}"
      no_log: true
      when: lookup('env', 'GITHUB_TOKEN') | length > 0

    - name: Obtain AAP gateway OAuth token for EDA API
      ansible.builtin.uri:
        url: "{{ eda_controller_url }}/api/gateway/v1/tokens/"
        method: POST
        validate_certs: false
        url_username: "{{ eda_admin_username }}"
        url_password: "{{ eda_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          description: "sovereign-eda-config"
          scope: write
        status_code: [201]
      register: eda_gateway_token_resp
      no_log: true
      when: lookup('env', 'AAP_OAUTH_TOKEN') | length == 0

    - name: Set EDA gateway token from API response
      ansible.builtin.set_fact:
        eda_gateway_token: "{{ eda_gateway_token_resp.json.token }}"
      no_log: true
      when: lookup('env', 'AAP_OAUTH_TOKEN') | length == 0

    - name: Set EDA gateway token from environment
      ansible.builtin.set_fact:
        eda_gateway_token: "{{ lookup('env', 'AAP_OAUTH_TOKEN') }}"
      no_log: true
      when: lookup('env', 'AAP_OAUTH_TOKEN') | length > 0

  roles:
    - eda-config
