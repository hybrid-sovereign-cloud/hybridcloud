apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: assignments.hybridsovereign.redhat
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  group: hybridsovereign.redhat
  names:
    kind: Assignment
    listKind: AssignmentList
    plural: assignments
    singular: assignment
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: Assignment links a Team to one or more Projects and PlatformOpenshift clusters.
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: Desired assignment linking Team, Projects, and PlatformOpenshift resources
              type: object
              properties:
                team:
                  description: Name of the Team CR this assignment belongs to
                  type: string
                projects:
                  description: List of Project CR names assigned to this team
                  type: array
                  items:
                    type: string
                openshift:
                  description: Name of the PlatformOpenshift CR where the team is deployed (single cluster)
                  type: string
                toolRbac:
                  description: Controls access levels for team members on the spoke cluster (Layer 2 RBAC)
                  type: object
                  properties:
                    assignmentAdmin:
                      type: string
                      description: >-
                        Rbac CR name — group receives admin RoleBindings in all Assignment-created
                        namespaces (devops, project namespaces, istio) plus ArgoCD admin access.
                    assignmentDeveloper:
                      type: string
                      description: >-
                        Rbac CR name — group receives edit RoleBindings in all project namespaces.
                    assignmentViewer:
                      type: string
                      description: >-
                        Rbac CR name — group receives view RoleBindings in all Assignment-created
                        namespaces (devops, project namespaces, istio).
                    assignmentOps:
                      type: string
                      description: >-
                        Rbac CR name — group receives view in project namespaces, edit in devops
                        and istio namespaces, and ArgoCD admin access.
            status:
              description: Observed state populated by assignment-operator reconciliation
              type: object
              properties:
                name:
                  type: string
                namespace:
                  type: string
                entity:
                  type: string
                billingId:
                  type: string
                description:
                  type: string
                team:
                  type: string
                teamReady:
                  type: boolean
                projects:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      ready:
                        type: boolean
                openshift:
                  type: string
                  description: PlatformOpenshift CR name targeted by this assignment
                openshiftReady:
                  type: boolean
                ready:
                  type: boolean
                assignmentProvisioned:
                  type: boolean
                clusterName:
                  type: string
                acmPolicyName:
                  type: string
                  description: Name of the ACM Policy created on the central cluster for this Assignment.
                helperName:
                  type: string
                  description: "DEPRECATED: Legacy helper CR name (OSOHelper/AWSHelper type:assignment). Kept for backward compatibility."
                helperProvider:
                  type: string
                  description: "DEPRECATED: Legacy provider type. Kept for backward compatibility."
                status:
                  type: string
                deletionComplete:
                  type: boolean
                lastReconciledAt:
                  type: string
                  format: date-time
                message:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                edaJobs:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      jobId:
                        type: string
                      url:
                        type: string
                      timestamp:
                        type: string
                      status:
                        type: string
                        enum: [running, success, failed]
                    x-kubernetes-preserve-unknown-fields: true
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                    x-kubernetes-preserve-unknown-fields: true
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Team
          type: string
          jsonPath: .status.team
        - name: Cluster
          type: string
          jsonPath: .status.openshift
        - name: Entity
          type: string
          jsonPath: .status.entity
        - name: Provisioned
          type: boolean
          jsonPath: .status.assignmentProvisioned
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
