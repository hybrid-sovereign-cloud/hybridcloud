apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: uihealthcheckers.hybridsovereign.redhat
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  group: hybridsovereign.redhat
  names:
    kind: UIHealthChecker
    listKind: UIHealthCheckerList
    plural: uihealthcheckers
    singular: uihealthchecker
    shortNames:
      - uihc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: Declares a URL for admin UI browser health probes.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                url:
                  type: string
                  description: Absolute HTTPS URL the admin dashboard probes from the browser.
                displayName:
                  type: string
                description:
                  type: string
                group:
                  type: string
                  description: Logical group (central, services, quay, custom).
                expectedStatus:
                  type: integer
                  default: 200
                timeoutSeconds:
                  type: integer
                  default: 10
                  minimum: 1
                  maximum: 120
            status:
              type: object
              properties:
                url:
                  type: string
                group:
                  type: string
                status:
                  type: string
                message:
                  type: string
                ready:
                  type: boolean
                deletionComplete:
                  type: boolean
                lastReconciledAt:
                  type: string
                  format: date-time
                observedGeneration:
                  type: integer
                  format: int64
                edaJobs:
                  type: array
                  x-kubernetes-preserve-unknown-fields: true
                conditions:
                  type: array
                  x-kubernetes-preserve-unknown-fields: true

              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Group
          type: string
          jsonPath: .spec.group
        - name: URL
          type: string
          jsonPath: .spec.url
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
