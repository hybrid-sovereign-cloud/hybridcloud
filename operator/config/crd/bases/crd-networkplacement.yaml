apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: networkplacements.hybridsovereign.redhat
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  group: hybridsovereign.redhat
  names:
    kind: NetworkPlacement
    listKind: NetworkPlacementList
    plural: networkplacements
    singular: networkplacement
    shortNames:
      - nplace
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: Places a HybridNetwork onto a cloud backend.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                network:
                  type: string
                backend:
                  type: object
                  required: [kind, name]
                  properties:
                    kind:
                      type: string
                      enum: [CloudAWS, CloudOSO, PlatformOpenshift]
                    name:
                      type: string
                prefixes:
                  type: array
                  items:
                    type: string
                state:
                  type: string
                  enum: [present, absent]
                  default: present
            status:
              type: object
              properties:
                entity:
                  type: string
                networkId:
                  type: string
                targetBackend:
                  type: string
                vni:
                  type: integer
                vrfName:
                  type: string
                canonicalRt:
                  type: string
                backendRt:
                  type: string
                rtStrategy:
                  type: string
                domainAsn:
                  type: integer
                backendReady:
                  type: boolean
                prerequisiteReady:
                  type: boolean
                fabricApplied:
                  type: boolean
                backendApplied:
                  type: boolean
                validated:
                  type: boolean
                lastValidatedAt:
                  type: string
                  format: date-time
                realizedPrefixes:
                  type: array
                  items:
                    type: string
                microNvaName:
                  type: string
                cloudGatewayRef:
                  type: string
                transportLinkRef:
                  type: string
                status:
                  type: string
                message:
                  type: string
                ready:
                  type: boolean
                deletionComplete:
                  type: boolean
                lastReconciledAt:
                  type: string
                  format: date-time
                observedGeneration:
                  type: integer
                  format: int64
                edaJobs:
                  type: array
                  x-kubernetes-preserve-unknown-fields: true
                conditions:
                  type: array
                  x-kubernetes-preserve-unknown-fields: true

              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Network
          type: string
          jsonPath: .spec.network
        - name: Backend
          type: string
          jsonPath: .spec.backend.kind
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
