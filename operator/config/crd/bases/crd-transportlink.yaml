apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: transportlinks.hybridsovereign.redhat
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  group: hybridsovereign.redhat
  names:
    kind: TransportLink
    listKind: TransportLinkList
    plural: transportlinks
    singular: transportlink
    shortNames:
      - tlink
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: Transport tunnel between fabric and cloud gateway.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                enabled:
                  type: boolean
                  default: false
                fabricRef:
                  type: string
                cloudGatewayRef:
                  type: string
                tunnelType:
                  type: string
                  enum: [wireguard, ipsec, macsec, none]
                vaultConfigRef:
                  type: string
            status:
              type: object
              properties:
                tunnelUp:
                  type: boolean
                borderEndpoint:
                  type: string
                cloudEndpoint:
                  type: string
                lastHandshakeAt:
                  type: string
                  format: date-time
                status:
                  type: string
                message:
                  type: string
                ready:
                  type: boolean
                deletionComplete:
                  type: boolean
                lastReconciledAt:
                  type: string
                  format: date-time
                observedGeneration:
                  type: integer
                  format: int64
                edaJobs:
                  type: array
                  x-kubernetes-preserve-unknown-fields: true
                conditions:
                  type: array
                  x-kubernetes-preserve-unknown-fields: true

              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Fabric
          type: string
          jsonPath: .spec.fabricRef
        - name: Gateway
          type: string
          jsonPath: .spec.cloudGatewayRef
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
