apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openstackmigrations.hybridsovereign.redhat
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  group: hybridsovereign.redhat
  names:
    kind: OpenStackMigration
    listKind: OpenStackMigrationList
    plural: openstackmigrations
    singular: openstackmigration
    shortNames:
      - osm
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: >-
            OpenStackMigration requests migration of a VM from VMware (via MTV catalog
            or explicit plan) to a CloudOSO OpenStack project. EDA runs os-migrate
            playbooks after resolving credentials from Vault.
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: Migration request parameters
              type: object
              required:
                - vmName
                - cloudoso
              properties:
                source:
                  type: string
                  description: MTV Provider CR name (forklift.konveyor.io/v1beta1) for UI catalog selection
                providerNamespace:
                  type: string
                  description: Namespace of the MTV Provider CR
                  default: openshift-mtv
                vmName:
                  type: string
                  description: Virtual machine name to migrate
                cloudoso:
                  type: string
                  description: Target CloudOSO CR name in the same entity namespace
                plan:
                  description: Detailed os-migrate migration plan (Vault refs only — no secrets in spec)
                  type: object
                  properties:
                    source:
                      description: VMware source connection (credentials resolved from Vault)
                      type: object
                      properties:
                        vcenterHost:
                          type: string
                          description: vCenter FQDN or IP (overrides Vault host when set)
                        datacenter:
                          type: string
                          description: VMware datacenter name
                        credentialsSecret:
                          type: string
                          description: Vault KV path for VMware credentials (default vmware-credentials)
                          default: vmware-credentials
                    migrationMethod:
                      type: string
                      description: Data transfer method for os-migrate
                      enum: [nbdkit, virtv2v, cold, warm]
                      default: nbdkit
                    cbt:
                      type: boolean
                      description: Enable VMware changed-block-tracking warm migration
                      default: false
                    conversionHost:
                      description: Destination conversion host on CloudOSO
                      type: object
                      properties:
                        name:
                          type: string
                          description: OpenStack instance name for conversion host
                        address:
                          type: string
                          description: Existing conversion host IP (skip deploy when set)
                        deploy:
                          type: boolean
                          description: Deploy conversion host before migration
                          default: true
                        flavor:
                          type: string
                          description: OpenStack flavor for conversion host
                        network:
                          type: string
                          description: Neutron network for conversion host
                        externalNetwork:
                          type: string
                          description: External network for floating IP
                    targetProject:
                      type: string
                      description: Override OpenStack project name (defaults to CloudOSO project)
                    networkMapping:
                      type: array
                      description: VMware to OpenStack network map for os-migrate
                      items:
                        type: object
                        required:
                          - sourceNetwork
                          - targetNetwork
                        properties:
                          sourceNetwork:
                            type: string
                          targetNetwork:
                            type: string
                    flavorStrategy:
                      type: string
                      description: How to select target flavor
                      enum: [auto, existing, specify]
                      default: auto
            status:
              description: Observed migration state populated by operator and EDA
              type: object
              properties:
                name:
                  type: string
                namespace:
                  type: string
                entity:
                  type: string
                source:
                  type: string
                vmName:
                  type: string
                cloudoso:
                  type: string
                targetProject:
                  type: string
                migrationMethod:
                  type: string
                phase:
                  type: string
                  description: >-
                    Current migration phase (validating, deployingConversionHost,
                    exportingMetadata, convertingMetadata, importingWorkloads,
                    cutover, ready, failed)
                phases:
                  type: array
                  description: Phase history with timestamps
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      status:
                        type: string
                        enum: [pending, running, succeeded, failed]
                      startedAt:
                        type: string
                        format: date-time
                      completedAt:
                        type: string
                        format: date-time
                      message:
                        type: string
                    x-kubernetes-preserve-unknown-fields: true
                status:
                  type: string
                  description: Lifecycle status (reconciling, ready, failed)
                lastReconciledAt:
                  type: string
                  format: date-time
                message:
                  type: string
                ready:
                  type: boolean
                deletionComplete:
                  type: boolean
                observedGeneration:
                  type: integer
                  format: int64
                edaJobs:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      jobId:
                        type: string
                      url:
                        type: string
                      timestamp:
                        type: string
                      status:
                        type: string
                        enum: [running, success, failed]
                    x-kubernetes-preserve-unknown-fields: true
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                    x-kubernetes-preserve-unknown-fields: true
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Source
          type: string
          jsonPath: .spec.source
        - name: VM
          type: string
          jsonPath: .spec.vmName
        - name: CloudOSO
          type: string
          jsonPath: .spec.cloudoso
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Status
          type: string
          jsonPath: .status.status
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
