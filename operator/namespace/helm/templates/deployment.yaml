apiVersion: apps/v1
kind: Deployment
metadata:
  name: hybridsovereign-namespace-operator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "namespace-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: hybridsovereign-namespace-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hybridsovereign-namespace-operator
        hybridsovereign.redhat/entity: {{ .Values.entityName }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect
            - --leader-election-id=hybridsovereign-namespace-operator-{{ .Values.entityName }}
            - --health-probe-bind-address=:6789
          env:
            - name: WATCH_NAMESPACE
              value: {{ .Values.namespace | quote }}
            - name: ANSIBLE_GATHERING
              value: explicit
            {{- if .Values.amqKafka.enabled }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: amq-producer-credentials
                  key: bootstrap_servers
            - name: KAFKA_TOPIC
              valueFrom:
                secretKeyRef:
                  name: amq-producer-credentials
                  key: topic
            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: amq-producer-credentials
                  key: username
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: amq-producer-credentials
                  key: password
            - name: KAFKA_CA_CERT
              valueFrom:
                secretKeyRef:
                  name: amq-producer-credentials
                  key: ca.crt
            - name: KAFKA_SECURITY_PROTOCOL
              valueFrom:
                secretKeyRef:
                  name: amq-producer-credentials
                  key: security_protocol
            - name: KAFKA_SASL_MECHANISM
              valueFrom:
                secretKeyRef:
                  name: amq-producer-credentials
                  key: sasl_mechanism
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
