apiVersion: apps/v1
kind: Deployment
metadata:
  name: hybridsovereign-namespace-operator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "namespace-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: hybridsovereign-namespace-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hybridsovereign-namespace-operator
        hybridsovereign.redhat/entity: {{ .Values.entityName }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect
            - --leader-election-id=hybridsovereign-namespace-operator-{{ .Values.entityName }}
            - --health-probe-bind-address=:6789
            - --watched-namespaces={{ .Values.namespace }}
          env:
            - name: WATCH_NAMESPACE
              value: {{ .Values.namespace | quote }}
            - name: ANSIBLE_GATHERING
              value: explicit
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
