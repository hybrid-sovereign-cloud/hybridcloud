# Set by primary operator or ArgoCD per entity
namespace: entity-example
entityName: example

image:
  repository: /hybrid-sovereign/hybridsovereign-namespace-operator
  tag: "0.1.0"
  pullPolicy: Always

imagePullSecrets:
  - name: quay-pull-secret

serviceAccount:
  name: hybridsovereign-namespace-operator

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 10m
    memory: 256Mi

replicas: 1

amqKafka:
  enabled: true
  vaultPath: amq-producer
  secretStoreName: vault-backend
  secretStoreKind: ClusterSecretStore
