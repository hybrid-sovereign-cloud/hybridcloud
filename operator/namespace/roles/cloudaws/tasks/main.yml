---
- block:
    - name: Set CloudAWS CR facts
      ansible.builtin.set_fact:
        cloudaws_metadata: "{{ _hybridsovereign_redhat_cloudaws.metadata }}"
        cloudaws_spec: "{{ _hybridsovereign_redhat_cloudaws.spec | default({}) }}"
        cloudaws_generation: "{{ _hybridsovereign_redhat_cloudaws.metadata.generation | default(0) | int }}"
        cloudaws_observed_generation: "{{ _hybridsovereign_redhat_cloudaws.status.observedGeneration | default(0) | int }}"
        cloudaws_status: "{{ _hybridsovereign_redhat_cloudaws.status.status | default('') }}"
        cloudaws_ready: "{{ _hybridsovereign_redhat_cloudaws.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_cloudaws.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: CloudAWS
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        cloudaws_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        cloudaws_event_reason: "{{ 'CloudAWSReconcileRequested' if reconcile_now | bool else 'CloudAWSCreateRequested' }}"
        cloudaws_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (cloudaws_observed_generation >= cloudaws_generation)
            and (cloudaws_status == 'ready')
            and (cloudaws_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: cloudaws_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        cloudaws_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark CloudAWS as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: CloudAWS
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ cloudaws_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ cloudaws_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Emit CloudAWS create or reconcile event
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ ansible_operator_meta.namespace }}"
            generateName: "cloudaws-{{ ansible_operator_meta.name }}-create-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: CloudAWS
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_cloudaws.metadata.uid }}"
          reason: "{{ cloudaws_event_reason }}"
          note: "{{ cloudaws_spec | to_json }}"
          type: Normal
          action: "{{ cloudaws_event_action }}"
          reportingController: cloudaws-operator
          reportingInstance: cloudaws-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"

  rescue:
    - name: Mark CloudAWS as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: CloudAWS
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "CloudAWS {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
