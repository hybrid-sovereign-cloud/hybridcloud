---
- block:
    - name: Set Persona delete facts
      ansible.builtin.set_fact:
        persona_spec: "{{ _hybridsovereign_redhat_persona.spec | default({}) }}"

    - name: Get current timestamp
      ansible.builtin.set_fact:
        persona_delete_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark Persona as deleting
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Persona
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: deleting
          ready: false
          lastReconciledAt: "{{ persona_delete_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ persona_delete_time }}"
              reason: Deleting
              message: Awaiting EDA to complete teardown

    - name: Publish operator event to AMQ Streams
      ansible.builtin.include_role:
        name: _common
        tasks_from: publish_operator_event
      vars:
        operator_event_reason: "PersonaDeleteRequested"
        operator_event_action: "Delete"
        operator_event_note: "{{ persona_spec | to_json }}"
        operator_reporting_controller: persona-operator
        operator_event_regarding:
          apiVersion: hybridsovereign.redhat/v1alpha1
          kind: Persona
          name: "{{ ansible_operator_meta.name }}"
          namespace: "{{ ansible_operator_meta.namespace }}"
          uid: "{{ _hybridsovereign_redhat_persona.metadata.uid }}"


  rescue:
    - name: Log finalizer failure
      ansible.builtin.fail:
        msg: "Persona {{ ansible_operator_meta.name }} finalizer failed — {{ ansible_failed_result.msg | default('unknown error') }}"
