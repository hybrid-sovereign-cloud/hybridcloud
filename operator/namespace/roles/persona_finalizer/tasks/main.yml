---
- block:
    - name: Set Persona delete facts
      ansible.builtin.set_fact:
        persona_spec: "{{ _hybridsovereign_redhat_persona.spec | default({}) }}"

    - name: Get current timestamp
      ansible.builtin.set_fact:
        persona_delete_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark Persona as deleting
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Persona
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: deleting
          ready: false
          lastReconciledAt: "{{ persona_delete_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ persona_delete_time }}"
              reason: Deleting
              message: Awaiting EDA to complete teardown

    - name: Emit Persona delete event
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ ansible_operator_meta.namespace }}"
            generateName: "persona-{{ ansible_operator_meta.name }}-delete-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: Persona
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_persona.metadata.uid }}"
          reason: PersonaDeleteRequested
          note: "{{ persona_spec | to_json }}"
          type: Normal
          action: Delete
          reportingController: persona-operator
          reportingInstance: persona-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"

  rescue:
    - name: Log finalizer failure
      ansible.builtin.fail:
        msg: "Persona {{ ansible_operator_meta.name }} finalizer failed — {{ ansible_failed_result.msg | default('unknown error') }}"
