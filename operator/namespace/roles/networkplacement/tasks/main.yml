---
- block:
    - name: Set NetworkPlacement CR facts
      ansible.builtin.set_fact:
        networkplacement_spec: "{{ _hybridsovereign_redhat_networkplacement.spec | default({}) }}"
        networkplacement_generation: "{{ _hybridsovereign_redhat_networkplacement.metadata.generation | default(0) | int }}"
        networkplacement_observed_generation: "{{ _hybridsovereign_redhat_networkplacement.status.observedGeneration | default(0) | int }}"
        networkplacement_status: "{{ _hybridsovereign_redhat_networkplacement.status.status | default('') }}"
        networkplacement_ready: "{{ _hybridsovereign_redhat_networkplacement.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_networkplacement.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Read namespace for entity context
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ ansible_operator_meta.namespace }}"
      register: networkplacement_target_ns

    - name: Assert namespace is Entity-managed
      ansible.builtin.assert:
        that:
          - networkplacement_target_ns.resources | length > 0
          - networkplacement_target_ns.resources[0].metadata.labels is defined
          - networkplacement_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] is defined
        fail_msg: Namespace must include hybridsovereign.redhat/entity label.

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: NetworkPlacement
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        networkplacement_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        networkplacement_event_reason: "{{ 'NetworkPlacementReconcileRequested' if reconcile_now | bool else 'NetworkPlacementCreateRequested' }}"
        networkplacement_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (networkplacement_observed_generation >= networkplacement_generation)
            and (networkplacement_status == 'ready')
            and (networkplacement_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: networkplacement_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        networkplacement_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark NetworkPlacement as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: NetworkPlacement
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ networkplacement_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ networkplacement_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Publish operator event to AMQ Streams
      ansible.builtin.include_role:
        name: _common
        tasks_from: publish_operator_event
      vars:
        operator_event_reason: "{{ networkplacement_event_reason }}"
        operator_event_action: "{{ networkplacement_event_action }}"
        operator_event_note: "{{ networkplacement_spec | to_json }}"
        operator_reporting_controller: networkplacement-operator
        operator_event_regarding:
          apiVersion: hybridsovereign.redhat/v1alpha1
          kind: NetworkPlacement
          name: "{{ ansible_operator_meta.name }}"
          namespace: "{{ ansible_operator_meta.namespace }}"
          uid: "{{ _hybridsovereign_redhat_networkplacement.metadata.uid }}"

  rescue:
    - name: Mark NetworkPlacement as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: NetworkPlacement
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "NetworkPlacement {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
