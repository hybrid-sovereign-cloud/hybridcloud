---
- block:
    - name: Set Vault CR facts
      ansible.builtin.set_fact:
        vault_spec: "{{ _hybridsovereign_redhat_vault.spec | default({}) }}"
        vault_generation: "{{ _hybridsovereign_redhat_vault.metadata.generation | default(0) | int }}"
        vault_observed_generation: "{{ _hybridsovereign_redhat_vault.status.observedGeneration | default(0) | int }}"
        vault_status: "{{ _hybridsovereign_redhat_vault.status.status | default('') }}"
        vault_ready: "{{ _hybridsovereign_redhat_vault.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_vault.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Read entity Namespace
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ ansible_operator_meta.namespace }}"
      register: vault_target_ns

    - name: Assert namespace is Entity-managed
      ansible.builtin.assert:
        that:
          - vault_target_ns.resources | length > 0
          - vault_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] is defined
          - (vault_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] | length) > 0
        fail_msg: Namespace must have non-empty hybridsovereign.redhat/entity label

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Vault
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        vault_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        vault_event_reason: "{{ 'VaultReconcileRequested' if reconcile_now | bool else 'VaultCreateRequested' }}"
        vault_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (vault_observed_generation >= vault_generation)
            and (vault_status == 'ready')
            and (vault_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: vault_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        vault_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark Vault as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Vault
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ vault_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ vault_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Emit Vault create or reconcile event
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ ansible_operator_meta.namespace }}"
            generateName: "vault-{{ ansible_operator_meta.name }}-create-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: Vault
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_vault.metadata.uid }}"
          reason: "{{ vault_event_reason }}"
          note: "{{ vault_spec | to_json }}"
          type: Normal
          action: "{{ vault_event_action }}"
          reportingController: plugin-vault-operator
          reportingInstance: plugin-vault-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"

  rescue:
    - name: Mark Vault as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Vault
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "Vault {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
