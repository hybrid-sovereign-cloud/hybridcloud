---
- block:
    - name: Set Rbac CR facts
      ansible.builtin.set_fact:
        rbac_spec: "{{ _hybridsovereign_redhat_rbac.spec | default({}) }}"
        rbac_generation: "{{ _hybridsovereign_redhat_rbac.metadata.generation | default(0) | int }}"
        rbac_observed_generation: "{{ _hybridsovereign_redhat_rbac.status.observedGeneration | default(0) | int }}"
        rbac_status: "{{ _hybridsovereign_redhat_rbac.status.status | default('') }}"
        rbac_ready: "{{ _hybridsovereign_redhat_rbac.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_rbac.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Read entity Namespace for RBAC reconciliation
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ ansible_operator_meta.namespace }}"
      register: rbac_target_ns

    - name: Assert namespace is Entity-managed
      ansible.builtin.assert:
        that:
          - rbac_target_ns.resources | length > 0
          - rbac_target_ns.resources[0].metadata.labels is defined
          - rbac_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] is defined
          - (rbac_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] | length) > 0
        fail_msg: >-
          Namespace '{{ ansible_operator_meta.namespace }}' must include a non-empty
          label 'hybridsovereign.redhat/entity' referencing the owning Entity.

    - name: Read referenced RbacConfig from operator namespace
      kubernetes.core.k8s_info:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: RbacConfig
        name: "{{ rbac_spec.config }}"
        namespace: "{{ plugin_rbac_operator_namespace }}"
      register: rbac_cfg_lookup

    - name: Assert RbacConfig is ready before emitting event
      ansible.builtin.assert:
        that:
          - rbac_cfg_lookup.resources | length > 0
          - rbac_cfg_lookup.resources[0].status is defined
          - rbac_cfg_lookup.resources[0].status.ready | default(false) | bool
        fail_msg: >-
          RbacConfig '{{ rbac_spec.config }}' in namespace '{{ plugin_rbac_operator_namespace }}'
          must have status.ready=true before Rbac '{{ ansible_operator_meta.name }}' can reconcile.

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Rbac
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        rbac_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        rbac_event_reason: "{{ 'RbacReconcileRequested' if reconcile_now | bool else 'RbacCreateRequested' }}"
        rbac_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (rbac_observed_generation >= rbac_generation)
            and (rbac_status == 'ready')
            and (rbac_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: rbac_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        rbac_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark Rbac as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Rbac
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ rbac_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ rbac_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Emit Rbac create or reconcile event
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ ansible_operator_meta.namespace }}"
            generateName: "rbac-{{ ansible_operator_meta.name }}-create-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: Rbac
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_rbac.metadata.uid }}"
          reason: "{{ rbac_event_reason }}"
          note: "{{ rbac_spec | to_json }}"
          type: Normal
          action: "{{ rbac_event_action }}"
          reportingController: plugin-rbac-operator
          reportingInstance: plugin-rbac-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"

  rescue:
    - name: Mark Rbac as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Rbac
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "Rbac {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
