---
- block:
    - name: Set CloudOSO CR facts
      ansible.builtin.set_fact:
        cloudoso_metadata: "{{ _hybridsovereign_redhat_cloudoso.metadata }}"
        cloudoso_spec: "{{ _hybridsovereign_redhat_cloudoso.spec | default({}) }}"
        cloudoso_generation: "{{ _hybridsovereign_redhat_cloudoso.metadata.generation | default(0) | int }}"
        cloudoso_observed_generation: "{{ _hybridsovereign_redhat_cloudoso.status.observedGeneration | default(0) | int }}"
        cloudoso_status: "{{ _hybridsovereign_redhat_cloudoso.status.status | default('') }}"
        cloudoso_ready: "{{ _hybridsovereign_redhat_cloudoso.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_cloudoso.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: CloudOSO
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        cloudoso_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        cloudoso_event_reason: "{{ 'CloudOSOReconcileRequested' if reconcile_now | bool else 'CloudOSOCreateRequested' }}"
        cloudoso_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (cloudoso_observed_generation >= cloudoso_generation)
            and (cloudoso_status == 'ready')
            and (cloudoso_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: cloudoso_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        cloudoso_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark CloudOSO as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: CloudOSO
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ cloudoso_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ cloudoso_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Publish operator event to AMQ Streams
      ansible.builtin.include_role:
        name: _common
        tasks_from: publish_operator_event
      vars:
        operator_event_reason: "{{ cloudoso_event_reason }}"
        operator_event_action: "{{ cloudoso_event_action }}"
        operator_event_note: "{{ cloudoso_spec | to_json }}"
        operator_reporting_controller: cloudoso-operator
        operator_event_regarding:
          apiVersion: hybridsovereign.redhat/v1alpha1
          kind: CloudOSO
          name: "{{ ansible_operator_meta.name }}"
          namespace: "{{ ansible_operator_meta.namespace }}"
          uid: "{{ _hybridsovereign_redhat_cloudoso.metadata.uid }}"


  rescue:
    - name: Mark CloudOSO as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: CloudOSO
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "CloudOSO {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
