---
- block:
    - name: Set Team CR facts
      ansible.builtin.set_fact:
        team_spec: "{{ _hybridsovereign_redhat_team.spec | default({}) }}"
        team_generation: "{{ _hybridsovereign_redhat_team.metadata.generation | default(0) | int }}"
        team_observed_generation: "{{ _hybridsovereign_redhat_team.status.observedGeneration | default(0) | int }}"
        team_status: "{{ _hybridsovereign_redhat_team.status.status | default('') }}"
        team_ready: "{{ _hybridsovereign_redhat_team.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_team.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Read namespace for entity context
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ ansible_operator_meta.namespace }}"
      register: team_target_ns

    - name: Assert namespace is Entity-managed
      ansible.builtin.assert:
        that:
          - team_target_ns.resources | length > 0
          - team_target_ns.resources[0].metadata.labels is defined
          - team_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] is defined
          - (team_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] | length) > 0
        fail_msg: >-
          Namespace '{{ ansible_operator_meta.namespace }}' must include a non-empty
          label 'hybridsovereign.redhat/entity' referencing the owning Entity.

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Team
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        team_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        team_event_reason: "{{ 'TeamReconcileRequested' if reconcile_now | bool else 'TeamCreateRequested' }}"
        team_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (team_observed_generation >= team_generation)
            and (team_status == 'ready')
            and (team_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: team_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        team_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark Team as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Team
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ team_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ team_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Emit Team create or reconcile event
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ ansible_operator_meta.namespace }}"
            generateName: "team-{{ ansible_operator_meta.name }}-create-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: Team
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_team.metadata.uid }}"
          reason: "{{ team_event_reason }}"
          note: "{{ team_spec | to_json }}"
          type: Normal
          action: "{{ team_event_action }}"
          reportingController: team-operator
          reportingInstance: team-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"

  rescue:
    - name: Mark Team as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Team
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "Team {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
