---
- block:
    - name: Set Project CR facts
      ansible.builtin.set_fact:
        project_metadata: "{{ _hybridsovereign_redhat_project.metadata }}"
        project_spec: "{{ _hybridsovereign_redhat_project.spec | default({}) }}"
        project_generation: "{{ _hybridsovereign_redhat_project.metadata.generation | default(0) | int }}"
        project_observed_generation: "{{ _hybridsovereign_redhat_project.status.observedGeneration | default(0) | int }}"
        project_status: "{{ _hybridsovereign_redhat_project.status.status | default('') }}"
        project_ready: "{{ _hybridsovereign_redhat_project.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_project.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Project
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        project_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        project_event_reason: "{{ 'ProjectReconcileRequested' if reconcile_now | bool else 'ProjectCreateRequested' }}"
        project_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (project_observed_generation >= project_generation)
            and (project_status == 'ready')
            and (project_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: project_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        project_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark Project as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Project
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ project_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ project_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Publish operator event to AMQ Streams
      ansible.builtin.include_role:
        name: _common
        tasks_from: publish_operator_event
      vars:
        operator_event_reason: "{{ project_event_reason }}"
        operator_event_action: "{{ project_event_action }}"
        operator_event_note: "{{ project_spec | to_json }}"
        operator_reporting_controller: project-operator
        operator_event_regarding:
          apiVersion: hybridsovereign.redhat/v1alpha1
          kind: Project
          name: "{{ ansible_operator_meta.name }}"
          namespace: "{{ ansible_operator_meta.namespace }}"
          uid: "{{ _hybridsovereign_redhat_project.metadata.uid }}"


  rescue:
    - name: Mark Project as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Project
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "Project {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
