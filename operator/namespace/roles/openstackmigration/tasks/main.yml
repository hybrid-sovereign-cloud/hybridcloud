---
- block:
    - name: Set OpenStackMigration CR facts
      ansible.builtin.set_fact:
        migration_metadata: "{{ _hybridsovereign_redhat_openstackmigration.metadata }}"
        migration_spec: "{{ _hybridsovereign_redhat_openstackmigration.spec | default({}) }}"
        migration_generation: "{{ _hybridsovereign_redhat_openstackmigration.metadata.generation | default(0) | int }}"
        migration_observed_generation: "{{ _hybridsovereign_redhat_openstackmigration.status.observedGeneration | default(0) | int }}"
        migration_status: "{{ _hybridsovereign_redhat_openstackmigration.status.status | default('') }}"
        migration_ready: "{{ _hybridsovereign_redhat_openstackmigration.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_openstackmigration.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: OpenStackMigration
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        migration_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        migration_event_reason: "{{ 'OpenStackMigrationReconcileRequested' if reconcile_now | bool else 'OpenStackMigrationRequested' }}"
        migration_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (migration_observed_generation >= migration_generation)
            and (migration_status == 'ready')
            and (migration_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: migration_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        migration_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark OpenStackMigration as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: OpenStackMigration
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          source: "{{ migration_spec.source | default('') }}"
          vmName: "{{ migration_spec.vmName | default('') }}"
          cloudoso: "{{ migration_spec.cloudoso | default('') }}"
          lastReconciledAt: "{{ migration_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ migration_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to launch migration job

    - name: Emit OpenStackMigration event
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ ansible_operator_meta.namespace }}"
            generateName: "openstackmigration-{{ ansible_operator_meta.name }}-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: OpenStackMigration
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_openstackmigration.metadata.uid }}"
          reason: "{{ migration_event_reason }}"
          note: "{{ migration_spec | to_json }}"
          type: Normal
          action: "{{ migration_event_action }}"
          reportingController: openstackmigration-operator
          reportingInstance: openstackmigration-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"

  rescue:
    - name: Mark OpenStackMigration as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: OpenStackMigration
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise operator failure
      ansible.builtin.fail:
        msg: "OpenStackMigration {{ ansible_operator_meta.name }} reconciliation failed"
