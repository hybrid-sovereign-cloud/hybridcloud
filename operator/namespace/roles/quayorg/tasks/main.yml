---
- block:
    - name: Set QuayOrg CR facts
      ansible.builtin.set_fact:
        quayorg_spec: "{{ _hybridsovereign_redhat_quayorg.spec | default({}) }}"
        quayorg_generation: "{{ _hybridsovereign_redhat_quayorg.metadata.generation | default(0) | int }}"
        quayorg_observed_generation: "{{ _hybridsovereign_redhat_quayorg.status.observedGeneration | default(0) | int }}"
        quayorg_status: "{{ _hybridsovereign_redhat_quayorg.status.status | default('') }}"
        quayorg_ready: "{{ _hybridsovereign_redhat_quayorg.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_quayorg.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Read entity Namespace
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ ansible_operator_meta.namespace }}"
      register: quayorg_target_ns

    - name: Assert namespace has entity label
      ansible.builtin.assert:
        that:
          - quayorg_target_ns.resources | length > 0
          - quayorg_target_ns.resources[0].metadata.labels is defined
          - quayorg_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] is defined
          - (quayorg_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] | length) > 0
        fail_msg: >-
          Namespace '{{ ansible_operator_meta.namespace }}' must include a non-empty
          label 'hybridsovereign.redhat/entity' referencing the owning Entity.

    - name: Read parent QuayConfig CR
      kubernetes.core.k8s_info:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: QuayConfig
        name: "{{ quayorg_spec.quayConfig }}"
        namespace: sovereign-cloud-plugins
      register: _quay_config

    - name: Fail if QuayConfig not found
      ansible.builtin.fail:
        msg: "QuayConfig {{ quayorg_spec.quayConfig }} not found in sovereign-cloud-plugins"
      when: _quay_config.resources | length == 0

    - name: Fail if QuayConfig not ready
      ansible.builtin.fail:
        msg: "QuayConfig {{ quayorg_spec.quayConfig }} is not ready"
      when: not (_quay_config.resources[0].status.ready | default(false))

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: QuayOrg
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        quayorg_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        quayorg_event_reason: "{{ 'QuayOrgReconcileRequested' if reconcile_now | bool else 'QuayOrgCreateRequested' }}"
        quayorg_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (quayorg_observed_generation >= quayorg_generation)
            and (quayorg_status == 'ready')
            and (quayorg_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: quayorg_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        quayorg_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark QuayOrg as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: QuayOrg
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ quayorg_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ quayorg_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Emit QuayOrg create or reconcile event
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ ansible_operator_meta.namespace }}"
            generateName: "quayorg-{{ ansible_operator_meta.name }}-create-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: QuayOrg
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_quayorg.metadata.uid }}"
          reason: "{{ quayorg_event_reason }}"
          note: "{{ quayorg_spec | to_json }}"
          type: Normal
          action: "{{ quayorg_event_action }}"
          reportingController: plugin-quay-operator
          reportingInstance: plugin-quay-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"

  rescue:
    - name: Mark QuayOrg as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: QuayOrg
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "QuayOrg {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
