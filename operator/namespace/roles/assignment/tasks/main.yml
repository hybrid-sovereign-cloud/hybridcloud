---
- block:
    - name: Set Assignment CR facts
      ansible.builtin.set_fact:
        assignment_metadata: "{{ _hybridsovereign_redhat_assignment.metadata }}"
        assignment_spec: "{{ _hybridsovereign_redhat_assignment.spec | default({}) }}"
        assignment_generation: "{{ _hybridsovereign_redhat_assignment.metadata.generation | default(0) | int }}"
        assignment_observed_generation: "{{ _hybridsovereign_redhat_assignment.status.observedGeneration | default(0) | int }}"
        assignment_status: "{{ _hybridsovereign_redhat_assignment.status.status | default('') }}"
        assignment_ready: "{{ _hybridsovereign_redhat_assignment.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_assignment.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Assignment
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        assignment_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        assignment_event_reason: "{{ 'AssignmentReconcileRequested' if reconcile_now | bool else 'AssignmentCreateRequested' }}"
        assignment_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (assignment_observed_generation >= assignment_generation)
            and (assignment_status == 'ready')
            and (assignment_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: assignment_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        assignment_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark Assignment as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Assignment
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ assignment_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ assignment_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Publish operator event to AMQ Streams
      ansible.builtin.include_role:
        name: _common
        tasks_from: publish_operator_event
      vars:
        operator_event_reason: "{{ assignment_event_reason }}"
        operator_event_action: "{{ assignment_event_action }}"
        operator_event_note: "{{ assignment_spec | to_json }}"
        operator_reporting_controller: assignment-operator
        operator_event_regarding:
          apiVersion: hybridsovereign.redhat/v1alpha1
          kind: Assignment
          name: "{{ ansible_operator_meta.name }}"
          namespace: "{{ ansible_operator_meta.namespace }}"
          uid: "{{ _hybridsovereign_redhat_assignment.metadata.uid }}"


  rescue:
    - name: Set truncated failure message
      ansible.builtin.set_fact:
        assignment_failure_message: >-
          {{ (ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')))
             | string | truncate(500, True, '') }}

    - name: Mark Assignment as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Assignment
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ assignment_failure_message }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ assignment_failure_message }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "Assignment {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
