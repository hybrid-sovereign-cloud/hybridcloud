---
- name: Look up entity namespace lifecycle state
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ ansible_operator_meta.namespace }}"
  register: rbac_entity_ns_lookup

- name: Derive entity namespace lifecycle state
  ansible.builtin.set_fact:
    rbac_entity_ns_lifecycle_blocked: >-
      {{
        (rbac_entity_ns_lookup.resources | length == 0)
        or (rbac_entity_ns_lookup.resources[0].status.phase | default('') == 'Terminating')
      }}
    rbac_delete_event_namespace: >-
      {{
        plugin_rbac_operator_namespace
        if (
          (rbac_entity_ns_lookup.resources | length == 0)
          or (rbac_entity_ns_lookup.resources[0].status.phase | default('') == 'Terminating')
        )
        else ansible_operator_meta.namespace
      }}

- name: Build compact Rbac delete event note
  ansible.builtin.set_fact:
    rbac_delete_event_note: >-
      {{
        {
          'config': (_hybridsovereign_redhat_rbac.spec.config | default('')),
          'name': (_hybridsovereign_redhat_rbac.spec.name | default(''))
        } | to_json
      }}

- name: Release rbac during entity namespace cascade delete
  when: rbac_entity_ns_lifecycle_blocked | bool
  block:
    - name: Emit Rbac delete event from operator namespace during entity cascade
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ rbac_delete_event_namespace }}"
            generateName: "rbac-{{ ansible_operator_meta.name }}-delete-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: Rbac
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_rbac.metadata.uid }}"
          reason: RbacDeleteRequested
          note: "{{ rbac_delete_event_note }}"
          type: Normal
          action: Delete
          reportingController: plugin-rbac-operator
          reportingInstance: plugin-rbac-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"
      ignore_errors: true

    - name: Mark rbac deletionComplete for entity cascade delete
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Rbac
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: ready
          ready: false
          deletionComplete: true
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: Entity namespace terminating — rbac released for cascade delete
      ignore_errors: true

    - name: Exit cleanly after entity cascade delete
      ansible.builtin.meta: end_host

- block:
    - name: Get current timestamp
      ansible.builtin.set_fact:
        rbac_delete_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark Rbac as awaiting EDA delete
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Rbac
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          message: Awaiting EDA delete
          lastReconciledAt: "{{ rbac_delete_transition_time }}"

    - name: Emit Rbac delete event
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ rbac_delete_event_namespace }}"
            generateName: "rbac-{{ ansible_operator_meta.name }}-delete-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: Rbac
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_rbac.metadata.uid }}"
          reason: RbacDeleteRequested
          note: "{{ rbac_delete_event_note }}"
          type: Normal
          action: Delete
          reportingController: plugin-rbac-operator
          reportingInstance: plugin-rbac-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"

    - name: Exit cleanly when EDA completed deletion
      ansible.builtin.meta: end_host
      when: _hybridsovereign_redhat_rbac.status.deletionComplete | default(false) | bool

    - name: Block finalizer until EDA completes deletion
      ansible.builtin.fail:
        msg: Waiting for EDA to complete deletion

  rescue:
    - name: Mark Rbac delete as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Rbac
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Deletion failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal finalizer failure
      ansible.builtin.fail:
        msg: "Rbac {{ ansible_operator_meta.name }} deletion failed — see status.message for details"
