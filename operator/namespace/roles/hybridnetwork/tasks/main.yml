---
- block:
    - name: Set HybridNetwork CR facts
      ansible.builtin.set_fact:
        hybridnetwork_spec: "{{ _hybridsovereign_redhat_hybridnetwork.spec | default({}) }}"
        hybridnetwork_generation: "{{ _hybridsovereign_redhat_hybridnetwork.metadata.generation | default(0) | int }}"
        hybridnetwork_observed_generation: "{{ _hybridsovereign_redhat_hybridnetwork.status.observedGeneration | default(0) | int }}"
        hybridnetwork_status: "{{ _hybridsovereign_redhat_hybridnetwork.status.status | default('') }}"
        hybridnetwork_ready: "{{ _hybridsovereign_redhat_hybridnetwork.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_hybridnetwork.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Read namespace for entity context
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ ansible_operator_meta.namespace }}"
      register: hybridnetwork_target_ns

    - name: Assert namespace is Entity-managed
      ansible.builtin.assert:
        that:
          - hybridnetwork_target_ns.resources | length > 0
          - hybridnetwork_target_ns.resources[0].metadata.labels is defined
          - hybridnetwork_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] is defined
        fail_msg: Namespace must include hybridsovereign.redhat/entity label.

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: HybridNetwork
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        hybridnetwork_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        hybridnetwork_event_reason: "{{ 'HybridNetworkReconcileRequested' if reconcile_now | bool else 'HybridNetworkCreateRequested' }}"
        hybridnetwork_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (hybridnetwork_observed_generation >= hybridnetwork_generation)
            and (hybridnetwork_status == 'ready')
            and (hybridnetwork_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: hybridnetwork_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        hybridnetwork_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark HybridNetwork as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: HybridNetwork
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ hybridnetwork_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ hybridnetwork_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Publish operator event to AMQ Streams
      ansible.builtin.include_role:
        name: _common
        tasks_from: publish_operator_event
      vars:
        operator_event_reason: "{{ hybridnetwork_event_reason }}"
        operator_event_action: "{{ hybridnetwork_event_action }}"
        operator_event_note: "{{ hybridnetwork_spec | to_json }}"
        operator_reporting_controller: hybridnetwork-operator
        operator_event_regarding:
          apiVersion: hybridsovereign.redhat/v1alpha1
          kind: HybridNetwork
          name: "{{ ansible_operator_meta.name }}"
          namespace: "{{ ansible_operator_meta.namespace }}"
          uid: "{{ _hybridsovereign_redhat_hybridnetwork.metadata.uid }}"

  rescue:
    - name: Mark HybridNetwork as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: HybridNetwork
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "HybridNetwork {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
