---
# Creates a per-CR viewer Role+RoleBinding for each PlatformOpenshift CR.
# Groups are resolved from spec.clusterViewerRbac (list of Rbac CR names).

- name: Resolve clusterViewerRbac list
  ansible.builtin.set_fact:
    cluster_viewer_rbac_names: "{{ platform_spec.clusterViewerRbac | default([]) }}"

- name: Resolve viewer RBAC groups from Rbac CRs
  kubernetes.core.k8s_info:
    api_version: hybridsovereign.redhat/v1alpha1
    kind: Rbac
    name: "{{ item }}"
    namespace: "{{ ansible_operator_meta.namespace }}"
  register: _cluster_viewer_rbac_crs
  loop: "{{ cluster_viewer_rbac_names }}"
  when: cluster_viewer_rbac_names | length > 0

- name: Build cluster viewer group list
  ansible.builtin.set_fact:
    cluster_viewer_groups: >-
      {{ _cluster_viewer_rbac_crs.results
         | selectattr('resources', 'defined')
         | map(attribute='resources')
         | flatten
         | selectattr('status.group', 'defined')
         | map(attribute='status.group')
         | list }}
  when: cluster_viewer_rbac_names | length > 0

- name: Set empty viewer groups when no clusterViewerRbac defined
  ansible.builtin.set_fact:
    cluster_viewer_groups: []
  when: cluster_viewer_rbac_names | length == 0

- name: Create per-CR viewer Role for this PlatformOpenshift
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: "{{ ansible_operator_meta.name }}-viewer"
        namespace: "{{ ansible_operator_meta.namespace }}"
        labels:
          app.kubernetes.io/managed-by: platformopenshift-operator
          hybridsovereign.redhat/cr-name: "{{ ansible_operator_meta.name }}"
      rules:
        - apiGroups: ["hybridsovereign.redhat"]
          resources: ["platformopenshifts"]
          resourceNames: ["{{ ansible_operator_meta.name }}"]
          verbs: ["get", "list", "watch"]
  when: cluster_viewer_groups | length > 0

- name: Create per-CR viewer RoleBinding for this PlatformOpenshift
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "{{ ansible_operator_meta.name }}-viewer"
        namespace: "{{ ansible_operator_meta.namespace }}"
        labels:
          app.kubernetes.io/managed-by: platformopenshift-operator
          hybridsovereign.redhat/cr-name: "{{ ansible_operator_meta.name }}"
      subjects: >-
        {{ cluster_viewer_groups | map('regex_replace', '^(.*)$',
           '{"kind": "Group", "name": "\1", "apiGroup": "rbac.authorization.k8s.io"}')
           | map('from_json') | list }}
      roleRef:
        kind: Role
        name: "{{ ansible_operator_meta.name }}-viewer"
        apiGroup: rbac.authorization.k8s.io
  when: cluster_viewer_groups | length > 0
