---
- block:
    - name: Set PlatformOpenshift CR facts
      ansible.builtin.set_fact:
        platformopenshift_metadata: "{{ _hybridsovereign_redhat_platformopenshift.metadata }}"
        platformopenshift_spec: "{{ _hybridsovereign_redhat_platformopenshift.spec | default({}) }}"
        platformopenshift_generation: "{{ _hybridsovereign_redhat_platformopenshift.metadata.generation | default(0) | int }}"
        platformopenshift_observed_generation: "{{ _hybridsovereign_redhat_platformopenshift.status.observedGeneration | default(0) | int }}"
        platformopenshift_status: "{{ _hybridsovereign_redhat_platformopenshift.status.status | default('') }}"
        platformopenshift_ready: "{{ _hybridsovereign_redhat_platformopenshift.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_platformopenshift.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: PlatformOpenshift
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        platformopenshift_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        platformopenshift_event_reason: "{{ 'PlatformOpenshiftReconcileRequested' if reconcile_now | bool else 'PlatformOpenshiftCreateRequested' }}"
        platformopenshift_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (platformopenshift_observed_generation >= platformopenshift_generation)
            and (platformopenshift_status == 'ready')
            and (platformopenshift_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: platformopenshift_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        platformopenshift_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark PlatformOpenshift as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: PlatformOpenshift
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ platformopenshift_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ platformopenshift_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Emit PlatformOpenshift create or reconcile event
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ ansible_operator_meta.namespace }}"
            generateName: "platformopenshift-{{ ansible_operator_meta.name }}-create-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: PlatformOpenshift
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_platformopenshift.metadata.uid }}"
          reason: "{{ platformopenshift_event_reason }}"
          note: "{{ platformopenshift_spec | to_json }}"
          type: Normal
          action: "{{ platformopenshift_event_action }}"
          reportingController: platformopenshift-operator
          reportingInstance: platformopenshift-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"

  rescue:
    - name: Mark PlatformOpenshift as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: PlatformOpenshift
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "PlatformOpenshift {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
