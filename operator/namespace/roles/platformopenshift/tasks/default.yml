---
- name: Get current timestamp
  ansible.builtin.set_fact:
    event_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
    transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Publish reconciliation event to AMQ Streams
  ansible.builtin.include_role:
    name: _common
    tasks_from: publish_operator_event
  vars:
    operator_event_reason: Synced
    operator_event_action: Reconcile
    operator_event_note: >-
      PlatformOpenshift {{ ansible_operator_meta.name }} reconciled.
    operator_reporting_controller: platformopenshift-operator
    operator_event_regarding:
      apiVersion: hybridsovereign.redhat/v1alpha1
      kind: PlatformOpenshift
      name: "{{ ansible_operator_meta.name }}"
      namespace: "{{ ansible_operator_meta.namespace }}"
      uid: "{{ _hybridsovereign_redhat_platformopenshift.metadata.uid | default('') }}"
  ignore_errors: true

- name: Update PlatformOpenshift status
  operator_sdk.util.k8s_status:
    api_version: hybridsovereign.redhat/v1alpha1
    kind: PlatformOpenshift
    name: "{{ ansible_operator_meta.name }}"
    namespace: "{{ ansible_operator_meta.namespace }}"
    status:
      name: "{{ ansible_operator_meta.name }}"
      namespace: "{{ ansible_operator_meta.namespace }}"
      entity: "{{ resolved_entity }}"
      billingId: "{{ resolved_billing_id }}"
      description: "{{ resolved_description }}"
      platformType: "{{ platform_type | default('openstack') }}"
      ready: true
      conditions:
        - type: Available
          status: "True"
          lastTransitionTime: "{{ transition_time }}"
          reason: ReconcileSucceeded
          message: >-
            Namespace labels and annotations read for {{
            ansible_operator_meta.namespace }}
