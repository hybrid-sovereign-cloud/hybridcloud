---
# PlatformOpenshift type:aws handler
# Looks up the CloudAWS CR, extracts slug/domain info, then creates
# AWSHelper type:clusterbuild on the central cluster.

- name: Set AWS spec facts
  ansible.builtin.set_fact:
    aws_env_name: "{{ platform_spec.aws.environment }}"
    aws_region: "{{ platform_spec.aws.region | default('us-east-1') }}"
    aws_cluster_type: "{{ platform_spec.aws.clusterType | default('standalone') }}"
    aws_control_plane_count: "{{ platform_spec.aws.controlPlaneCount | default(3) }}"
    aws_worker_count: "{{ platform_spec.aws.workerCount | default(2) }}"
    aws_controller_flavor: "{{ platform_spec.aws.controllerFlavor | default('m5.xlarge') }}"
    aws_worker_flavor: "{{ platform_spec.aws.workerFlavor | default('m5.large') }}"

- name: Read CloudAWS CR
  kubernetes.core.k8s_info:
    api_version: hybridsovereign.redhat/v1alpha1
    kind: CloudAWS
    name: "{{ aws_env_name }}"
    namespace: "{{ ansible_operator_meta.namespace }}"
  register: cloudaws_cr

- name: Fail if CloudAWS not found
  ansible.builtin.assert:
    that:
      - cloudaws_cr.resources | length > 0
    fail_msg: >-
      CloudAWS '{{ aws_env_name }}' not found in namespace {{ ansible_operator_meta.namespace }}.

- name: Fail if CloudAWS not ready
  ansible.builtin.assert:
    that:
      - cloudaws_cr.resources[0].status.ready | default(false) | bool
    fail_msg: >-
      CloudAWS '{{ aws_env_name }}' is not ready yet. Wait for environment preparation.

- name: Extract CloudAWS details
  ansible.builtin.set_fact:
    aws_slug: "{{ cloudaws_cr.resources[0].status.slug }}"
    aws_domain: "{{ cloudaws_cr.resources[0].status.domain }}"
    aws_account: "{{ cloudaws_cr.resources[0].spec.account }}"
    aws_vault_path: "{{ cloudaws_cr.resources[0].spec.vaultPath }}"
    aws_base_domain: "{{ cloudaws_cr.resources[0].spec.baseDomain }}"

- name: Read central cluster SA secret
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ central_sa_secret_name }}"
    namespace: "{{ central_sa_secret_namespace }}"
  register: central_sa_secret

- name: Fail if central SA secret missing
  ansible.builtin.assert:
    that:
      - central_sa_secret.resources | length > 0
      - central_sa_secret.resources[0].data.token is defined
    fail_msg: >-
      Secret {{ central_sa_secret_name }} not found in {{ central_sa_secret_namespace }}.

- name: Decode central SA token and CA
  ansible.builtin.set_fact:
    central_token: "{{ central_sa_secret.resources[0].data.token | b64decode }}"
    central_ca: "{{ central_sa_secret.resources[0].data['ca.crt'] | b64decode }}"

- name: Write central CA to temp file
  ansible.builtin.copy:
    content: "{{ central_ca }}"
    dest: /tmp/central-ca.crt
    mode: '0644'

- name: Build AWSHelper clusterbuild name
  ansible.builtin.set_fact:
    awshelper_cb_name: "{{ ansible_operator_meta.name }}"

- name: Build AWSHelper clusterbuild body (string fields)
  ansible.builtin.set_fact:
    _cb_body_base:
      apiVersion: helper.hybridsovereign.redhat/v1alpha1
      kind: AWSHelper
      metadata:
        name: "{{ awshelper_cb_name }}"
        namespace: sovereign-cloud-helpers
      spec:
        type: clusterbuild
        clusterbuild:
          account: "{{ aws_account }}"
          vaultPath: "{{ aws_vault_path }}"
          baseDomain: "{{ aws_base_domain }}"
          slug: "{{ aws_slug }}"
          type: "{{ aws_cluster_type }}"
          region: "{{ aws_region }}"
          controllerFlavor: "{{ aws_controller_flavor }}"
          workerFlavor: "{{ aws_worker_flavor }}"

- name: Merge integer fields into body
  ansible.builtin.set_fact:
    _cb_body: >-
      {{ _cb_body_base | combine(
        {'spec': {'clusterbuild': {
          'controlPlaneCount': aws_control_plane_count | int,
          'workerCount': aws_worker_count | int
        }}}, recursive=True) }}

- name: Create AWSHelper type:clusterbuild in central cluster
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/helper.hybridsovereign.redhat/v1alpha1/namespaces/sovereign-cloud-helpers/awshelpers"
    method: POST
    headers:
      Authorization: "Bearer {{ central_token }}"
      Content-Type: application/json
    body_format: json
    body: "{{ _cb_body }}"
    validate_certs: true
    ca_path: /tmp/central-ca.crt
    status_code: [200, 201, 409]
  register: awshelper_cb_result

- name: Poll AWSHelper clusterbuild status
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/helper.hybridsovereign.redhat/v1alpha1/namespaces/sovereign-cloud-helpers/awshelpers/{{ awshelper_cb_name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ central_token }}"
    validate_certs: true
    ca_path: /tmp/central-ca.crt
    status_code: [200]
  register: awshelper_cb_status
  retries: 30
  delay: 10
  until: >-
    awshelper_cb_status.status == 200 and
    awshelper_cb_status.json.status is defined and
    (awshelper_cb_status.json.status.ready | default(false) | bool)

- name: Extract AWSHelper clusterbuild details
  ansible.builtin.set_fact:
    cb_app_name: "{{ awshelper_cb_status.json.status.appName | default('') }}"
    cb_api_url: "{{ awshelper_cb_status.json.status.apiURL | default('') }}"
    cb_apps_url: "{{ awshelper_cb_status.json.status.appsURL | default('') }}"
    cb_base_domain: "{{ awshelper_cb_status.json.status.baseDomain | default('') }}"
    cb_console_url: "{{ awshelper_cb_status.json.status.consoleURL | default('') }}"
    cb_admin_password_vault: "{{ awshelper_cb_status.json.status.adminPasswordVaultPath | default('') }}"
    cb_kubeconfig_vault: "{{ awshelper_cb_status.json.status.kubeconfigVaultPath | default('') }}"
    cb_cluster_version: "{{ awshelper_cb_status.json.status.clusterVersion | default('') }}"
    cb_power_state: "{{ awshelper_cb_status.json.status.powerState | default('Unknown') }}"
    cb_cluster_health: "{{ awshelper_cb_status.json.status.clusterHealth | default('Unknown') }}"
    cb_provision_status: "{{ awshelper_cb_status.json.status.provisionStatus | default('Unknown') }}"
    cb_acm_available: "{{ (awshelper_cb_status.json.status.acmAvailable | default('') | string | trim) in ['True', 'true', true] }}"
    cb_cluster_installed: "{{ awshelper_cb_status.json.status.clusterInstalled | default(false) }}"
    cb_secrets_vault_path: "{{ awshelper_cb_status.json.status.secretsVaultPath | default('') }}"

- name: Get reconciliation timestamp
  ansible.builtin.set_fact:
    event_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
    transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Publish reconciliation event to AMQ Streams
  ansible.builtin.include_role:
    name: _common
    tasks_from: publish_operator_event
  vars:
    operator_event_reason: ClusterBuildCreated
    operator_event_action: Reconcile
    operator_event_note: >-
      PlatformOpenshift {{ ansible_operator_meta.name }} AWS cluster build triggered.
      App: {{ cb_app_name }}, Domain: {{ cb_base_domain }}
    operator_reporting_controller: platformopenshift-operator
    operator_event_regarding:
      apiVersion: hybridsovereign.redhat/v1alpha1
      kind: PlatformOpenshift
      name: "{{ ansible_operator_meta.name }}"
      namespace: "{{ ansible_operator_meta.namespace }}"
      uid: "{{ _hybridsovereign_redhat_platformopenshift.metadata.uid | default('') }}"
  ignore_errors: true

- name: Update PlatformOpenshift status
  operator_sdk.util.k8s_status:
    api_version: hybridsovereign.redhat/v1alpha1
    kind: PlatformOpenshift
    name: "{{ ansible_operator_meta.name }}"
    namespace: "{{ ansible_operator_meta.namespace }}"
    status:
      name: "{{ ansible_operator_meta.name }}"
      namespace: "{{ ansible_operator_meta.namespace }}"
      entity: "{{ resolved_entity }}"
      billingId: "{{ resolved_billing_id }}"
      description: "{{ resolved_description }}"
      platformType: aws
      slug: "{{ aws_slug }}"
      domain: "{{ aws_domain }}"
      apiURL: "{{ cb_api_url }}"
      appsURL: "{{ cb_apps_url }}"
      consoleURL: "{{ cb_console_url | default('') }}"
      adminPasswordVaultPath: "{{ cb_admin_password_vault | default('') }}"
      kubeconfigVaultPath: "{{ cb_kubeconfig_vault | default('') }}"
      secretsVaultPath: "{{ cb_secrets_vault_path | default('') }}"
      clusterVersion: "{{ cb_cluster_version | default('') }}"
      powerState: "{{ cb_power_state | default('Unknown') }}"
      clusterHealth: "{{ cb_cluster_health | default('Unknown') }}"
      provisionStatus: "{{ cb_provision_status | default('Unknown') }}"
      acmAvailable: "{{ cb_acm_available | bool }}"
      clusterInstalled: "{{ cb_cluster_installed | default(false) | bool }}"
      awsHelperName: "{{ awshelper_cb_name }}"
      awsRegion: "{{ aws_region }}"
      ready: true
      conditions:
        - type: Available
          status: "True"
          lastTransitionTime: "{{ transition_time }}"
          reason: ClusterBuildProvisioned
          message: >-
            AWS OCP cluster build '{{ cb_app_name }}' provisioned.
            API: {{ cb_api_url }}

- name: Configure Keycloak OIDC client and ACM OAuth policy for this cluster
  ansible.builtin.include_tasks: keycloak_oidc.yml
  vars:
    cluster_name: "{{ ansible_operator_meta.name }}"
    cluster_console_url: "{{ cb_console_url | default('') }}"
    cluster_api_url: "{{ cb_api_url | default('') }}"
    cluster_apps_url: "{{ cb_apps_url | default('') }}"
    cluster_namespace: "{{ ansible_operator_meta.namespace }}"
  when: cb_cluster_installed | default(false) | bool

- name: Update PlatformOpenshift status with OIDC info
  operator_sdk.util.k8s_status:
    api_version: hybridsovereign.redhat/v1alpha1
    kind: PlatformOpenshift
    name: "{{ ansible_operator_meta.name }}"
    namespace: "{{ ansible_operator_meta.namespace }}"
    status:
      oidcConfigured: "{{ oidc_configured | default(false) | bool }}"
      oidcClientId: "{{ oidc_client_id | default('') }}"
  when: cb_cluster_installed | default(false) | bool
