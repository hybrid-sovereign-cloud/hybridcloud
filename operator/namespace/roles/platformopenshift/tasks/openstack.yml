---
# PlatformOpenshift type:openstack handler
# Looks up the CloudOSO CR, extracts slug/domain/VIP info, then creates
# OSOHelper type:clusterbuild on the central cluster.

- name: Set OpenStack spec facts
  ansible.builtin.set_fact:
    oso_env_name: "{{ platform_spec.openstack.environment }}"
    oso_control_plane_count: "{{ platform_spec.openstack.controlPlaneCount | default(3) }}"
    oso_worker_count: "{{ platform_spec.openstack.workerCount | default(3) }}"
    oso_control_plane_flavor: "{{ platform_spec.openstack.controlPlaneFlavor | default('b1.xlarge') }}"
    oso_worker_flavor: "{{ platform_spec.openstack.workerFlavor | default('b1.large') }}"
    oso_external_network: "{{ platform_spec.openstack.externalNetwork | default('ext-net') }}"

- name: Read CloudOSO CR
  kubernetes.core.k8s_info:
    api_version: hybridsovereign.redhat/v1alpha1
    kind: CloudOSO
    name: "{{ oso_env_name }}"
    namespace: "{{ ansible_operator_meta.namespace }}"
  register: cloudoso_cr

- name: Fail if CloudOSO not found
  ansible.builtin.assert:
    that:
      - cloudoso_cr.resources | length > 0
    fail_msg: >-
      CloudOSO '{{ oso_env_name }}' not found in namespace {{ ansible_operator_meta.namespace }}.

- name: Fail if CloudOSO not ready
  ansible.builtin.assert:
    that:
      - cloudoso_cr.resources[0].status.ready | default(false) | bool
    fail_msg: >-
      CloudOSO '{{ oso_env_name }}' is not ready yet. Wait for environment preparation.

- name: Extract CloudOSO details
  ansible.builtin.set_fact:
    oso_slug: "{{ cloudoso_cr.resources[0].status.slug }}"
    oso_domain: "{{ cloudoso_cr.resources[0].status.domain }}"
    oso_vault_path: "{{ cloudoso_cr.resources[0].spec.vaultPath }}"
    oso_base_domain: "{{ cloudoso_cr.resources[0].spec.baseDomain }}"
    oso_project_domain: "{{ cloudoso_cr.resources[0].spec.projectDomain | default('Default') }}"
    oso_route53_vault_path: "{{ cloudoso_cr.resources[0].spec.route53VaultPath | default('oso/accounts/route53-openstack') }}"
    oso_api_vip: "{{ cloudoso_cr.resources[0].status.apiVIP | default('') }}"
    oso_ingress_vip: "{{ cloudoso_cr.resources[0].status.ingressVIP | default('') }}"

- name: Read central cluster SA secret (OSOHelper)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ oso_central_sa_secret_name }}"
    namespace: "{{ central_sa_secret_namespace }}"
  register: oso_central_sa_secret

- name: Fail if central SA secret missing
  ansible.builtin.assert:
    that:
      - oso_central_sa_secret.resources | length > 0
      - oso_central_sa_secret.resources[0].data.token is defined
    fail_msg: >-
      Secret {{ oso_central_sa_secret_name }} not found in {{ central_sa_secret_namespace }}.

- name: Decode central SA token and CA
  ansible.builtin.set_fact:
    central_token: "{{ oso_central_sa_secret.resources[0].data.token | b64decode }}"
    central_ca: "{{ oso_central_sa_secret.resources[0].data['ca.crt'] | b64decode }}"

- name: Write central CA to temp file
  ansible.builtin.copy:
    content: "{{ central_ca }}"
    dest: /tmp/central-ca.crt
    mode: '0644'

- name: Build OSOHelper clusterbuild name
  ansible.builtin.set_fact:
    osohelper_cb_name: "{{ ansible_operator_meta.name }}"

- name: Build OSOHelper clusterbuild body (string fields)
  ansible.builtin.set_fact:
    _cb_body_base:
      apiVersion: helper.hybridsovereign.redhat/v1alpha1
      kind: OSOHelper
      metadata:
        name: "{{ osohelper_cb_name }}"
        namespace: sovereign-cloud-helpers
      spec:
        type: clusterbuild
        clusterbuild:
          vaultPath: "{{ oso_vault_path }}"
          baseDomain: "{{ oso_base_domain }}"
          slug: "{{ oso_slug }}"
          externalNetwork: "{{ oso_external_network }}"
          controlPlaneFlavor: "{{ oso_control_plane_flavor }}"
          workerFlavor: "{{ oso_worker_flavor }}"
          apiVIP: "{{ oso_api_vip }}"
          ingressVIP: "{{ oso_ingress_vip }}"
          route53VaultPath: "{{ oso_route53_vault_path }}"
          projectDomain: "{{ oso_project_domain }}"
          providerCredsVaultPath: "oso/projects/{{ oso_env_name }}/clouds-config"

- name: Merge integer fields into body
  ansible.builtin.set_fact:
    _cb_body: >-
      {{ _cb_body_base | combine(
        {'spec': {'clusterbuild': {
          'controlPlaneCount': oso_control_plane_count | int,
          'workerCount': oso_worker_count | int
        }}}, recursive=True) }}

- name: Create OSOHelper type:clusterbuild in central cluster
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/helper.hybridsovereign.redhat/v1alpha1/namespaces/sovereign-cloud-helpers/osohelpers"
    method: POST
    headers:
      Authorization: "Bearer {{ central_token }}"
      Content-Type: application/json
    body_format: json
    body: "{{ _cb_body }}"
    validate_certs: true
    ca_path: /tmp/central-ca.crt
    status_code: [200, 201, 409]
  register: osohelper_cb_result

- name: Poll OSOHelper clusterbuild status
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/helper.hybridsovereign.redhat/v1alpha1/namespaces/sovereign-cloud-helpers/osohelpers/{{ osohelper_cb_name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ central_token }}"
    validate_certs: true
    ca_path: /tmp/central-ca.crt
    status_code: [200]
  register: osohelper_cb_status
  retries: 30
  delay: 10
  until: >-
    osohelper_cb_status.status == 200 and
    osohelper_cb_status.json.status is defined and
    (osohelper_cb_status.json.status.ready | default(false) | bool)

- name: Extract OSOHelper clusterbuild details
  ansible.builtin.set_fact:
    cb_app_name: "{{ osohelper_cb_status.json.status.appName | default('') }}"
    cb_api_url: "{{ osohelper_cb_status.json.status.apiURL | default('') }}"
    cb_apps_url: "{{ osohelper_cb_status.json.status.appsURL | default('') }}"
    cb_base_domain: "{{ osohelper_cb_status.json.status.baseDomain | default('') }}"
    cb_console_url: "{{ osohelper_cb_status.json.status.consoleURL | default('') }}"
    cb_admin_password_vault: "{{ osohelper_cb_status.json.status.adminPasswordVaultPath | default('') }}"
    cb_kubeconfig_vault: "{{ osohelper_cb_status.json.status.kubeconfigVaultPath | default('') }}"
    cb_cluster_version: "{{ osohelper_cb_status.json.status.clusterVersion | default('') }}"
    cb_power_state: "{{ osohelper_cb_status.json.status.powerState | default('Unknown') }}"
    cb_cluster_health: "{{ osohelper_cb_status.json.status.clusterHealth | default('Unknown') }}"
    cb_provision_status: "{{ osohelper_cb_status.json.status.provisionStatus | default('Unknown') }}"
    cb_acm_available: "{{ osohelper_cb_status.json.status.acmAvailable | default('Unknown') }}"
    cb_cluster_installed: "{{ osohelper_cb_status.json.status.clusterInstalled | default(false) }}"
    cb_secrets_vault_path: "{{ osohelper_cb_status.json.status.secretsVaultPath | default('') }}"

- name: Get reconciliation timestamp
  ansible.builtin.set_fact:
    event_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
    transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Publish reconciliation event to AMQ Streams
  ansible.builtin.include_role:
    name: _common
    tasks_from: publish_operator_event
  vars:
    operator_event_reason: ClusterBuildCreated
    operator_event_action: Reconcile
    operator_event_note: >-
      PlatformOpenshift {{ ansible_operator_meta.name }} OpenStack cluster build triggered.
      App: {{ cb_app_name }}, Domain: {{ cb_base_domain }}
    operator_reporting_controller: platformopenshift-operator
    operator_event_regarding:
      apiVersion: hybridsovereign.redhat/v1alpha1
      kind: PlatformOpenshift
      name: "{{ ansible_operator_meta.name }}"
      namespace: "{{ ansible_operator_meta.namespace }}"
      uid: "{{ _hybridsovereign_redhat_platformopenshift.metadata.uid | default('') }}"
  ignore_errors: true

- name: Update PlatformOpenshift status
  operator_sdk.util.k8s_status:
    api_version: hybridsovereign.redhat/v1alpha1
    kind: PlatformOpenshift
    name: "{{ ansible_operator_meta.name }}"
    namespace: "{{ ansible_operator_meta.namespace }}"
    status:
      name: "{{ ansible_operator_meta.name }}"
      namespace: "{{ ansible_operator_meta.namespace }}"
      entity: "{{ resolved_entity }}"
      billingId: "{{ resolved_billing_id }}"
      description: "{{ resolved_description }}"
      platformType: openstack
      slug: "{{ oso_slug }}"
      domain: "{{ oso_domain }}"
      apiURL: "{{ cb_api_url }}"
      appsURL: "{{ cb_apps_url }}"
      consoleURL: "{{ cb_console_url | default('') }}"
      adminPasswordVaultPath: "{{ cb_admin_password_vault | default('') }}"
      kubeconfigVaultPath: "{{ cb_kubeconfig_vault | default('') }}"
      secretsVaultPath: "{{ cb_secrets_vault_path | default('') }}"
      clusterVersion: "{{ cb_cluster_version | default('') }}"
      powerState: "{{ cb_power_state | default('Unknown') }}"
      clusterHealth: "{{ cb_cluster_health | default('Unknown') }}"
      provisionStatus: "{{ cb_provision_status | default('Unknown') }}"
      acmAvailable: "{{ cb_acm_available | default('Unknown') }}"
      clusterInstalled: "{{ cb_cluster_installed | default(false) | bool }}"
      ready: true
      conditions:
        - type: Available
          status: "True"
          lastTransitionTime: "{{ transition_time }}"
          reason: ClusterBuildProvisioned
          message: >-
            OpenStack OCP cluster build '{{ cb_app_name }}' provisioned.
            API: {{ cb_api_url }}

- name: Configure Keycloak OIDC client and ACM OAuth policy for this cluster
  ansible.builtin.include_tasks: keycloak_oidc.yml
  vars:
    cluster_name: "{{ ansible_operator_meta.name }}"
    cluster_console_url: "{{ cb_console_url | default('') }}"
    cluster_api_url: "{{ cb_api_url | default('') }}"
    cluster_apps_url: "{{ cb_apps_url | default('') }}"
    cluster_namespace: "{{ ansible_operator_meta.namespace }}"
  when: cb_cluster_installed | default(false) | bool

- name: Update PlatformOpenshift status with OIDC info
  operator_sdk.util.k8s_status:
    api_version: hybridsovereign.redhat/v1alpha1
    kind: PlatformOpenshift
    name: "{{ ansible_operator_meta.name }}"
    namespace: "{{ ansible_operator_meta.namespace }}"
    status:
      oidcConfigured: "{{ oidc_configured | default(false) | bool }}"
      oidcClientId: "{{ oidc_client_id | default('') }}"
  when: cb_cluster_installed | default(false) | bool
