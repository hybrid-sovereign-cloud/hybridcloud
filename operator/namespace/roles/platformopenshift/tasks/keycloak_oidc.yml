---
# Configure Keycloak OIDC client for a newly provisioned OpenShift cluster
# and push the OAuth configuration via ACM ConfigurationPolicy to the spoke.
#
# Inputs (must be set by caller):
#   cluster_name       - PlatformOpenshift CR name (e.g. ocp-ses4)
#   cluster_console_url - https://console-openshift-console.apps.<slug>.<domain>
#   cluster_api_url     - https://api.<slug>.<domain>:6443
#   cluster_apps_url    - https://apps.<slug>.<domain>
#   cluster_namespace   - CR namespace (e.g. entity-acme-corp)
#   central_token       - Bearer token for central cluster API
#
# Reads:
#   KEYCLOAK_INTERNAL_URL env var (defaults to http://rhbk-services-service.rhbk.svc:8080)
#   KEYCLOAK_REALM env var (defaults to sovereign-tenants)
#   keycloak_admin_secret_name from defaults

- name: Skip OIDC setup if console URL not yet available
  ansible.builtin.set_fact:
    skip_oidc_setup: "{{ cluster_console_url | default('') | length == 0 }}"

- name: Log OIDC setup skip reason
  ansible.builtin.debug:
    msg: "Skipping Keycloak OIDC setup - cluster console URL not yet available"
  when: skip_oidc_setup | bool

- name: Read services cluster ingress CA bundle for OIDC trust
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    name: default-ingress-cert
    namespace: openshift-config-managed
  register: _ingress_ca_cm
  when: not (skip_oidc_setup | bool)

- name: Set ingress CA bundle fact
  ansible.builtin.set_fact:
    keycloak_ingress_ca: "{{ _ingress_ca_cm.resources[0].data['ca-bundle.crt'] | default('') }}"
  when:
    - not (skip_oidc_setup | bool)
    - _ingress_ca_cm.resources | default([]) | length > 0

- name: Set empty CA if configmap not found
  ansible.builtin.set_fact:
    keycloak_ingress_ca: ""
  when:
    - not (skip_oidc_setup | bool)
    - _ingress_ca_cm.resources | default([]) | length == 0

- name: Read Keycloak admin secret
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ keycloak_admin_secret_name }}"
    namespace: "{{ platformopenshift_operator_namespace }}"
  register: _kc_admin_secret
  when: not (skip_oidc_setup | bool)
  no_log: true

- name: Fail if Keycloak admin secret not found
  ansible.builtin.fail:
    msg: "Keycloak admin secret {{ keycloak_admin_secret_name }} not found in {{ platformopenshift_operator_namespace }}"
  when:
    - not (skip_oidc_setup | bool)
    - _kc_admin_secret.resources | default([]) | length == 0

- name: Decode Keycloak admin credentials
  ansible.builtin.set_fact:
    kc_admin_user: "{{ _kc_admin_secret.resources[0].data.username | b64decode }}"
    kc_admin_pass: "{{ _kc_admin_secret.resources[0].data.password | b64decode }}"
  when: not (skip_oidc_setup | bool)
  no_log: true

- name: Get Keycloak admin token
  ansible.builtin.uri:
    url: "{{ keycloak_internal_url }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: password
      client_id: admin-cli
      username: "{{ kc_admin_user }}"
      password: "{{ kc_admin_pass }}"
    validate_certs: false
    status_code: [200]
  register: _kc_token
  when: not (skip_oidc_setup | bool)
  no_log: true
  retries: 3
  delay: 5

- name: Set OIDC client ID for this cluster
  ansible.builtin.set_fact:
    ocp_oidc_client_id: "{{ cluster_name }}-keycloak-oidc"
  when: not (skip_oidc_setup | bool)

- name: Check if OIDC client already exists
  ansible.builtin.uri:
    url: "{{ keycloak_internal_url }}/admin/realms/{{ keycloak_realm }}/clients?clientId={{ ocp_oidc_client_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_token.json.access_token }}"
    validate_certs: false
    status_code: [200]
  register: _kc_existing_client
  when: not (skip_oidc_setup | bool)

- name: Create OIDC client in Keycloak for OpenShift cluster
  ansible.builtin.uri:
    url: "{{ keycloak_internal_url }}/admin/realms/{{ keycloak_realm }}/clients"
    method: POST
    headers:
      Authorization: "Bearer {{ _kc_token.json.access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      clientId: "{{ ocp_oidc_client_id }}"
      name: "OpenShift SSO - {{ cluster_name }}"
      protocol: openid-connect
      publicClient: false
      directAccessGrantsEnabled: false
      standardFlowEnabled: true
      serviceAccountsEnabled: false
      rootUrl: "{{ cluster_console_url | regex_replace('/+$', '') }}"
      redirectUris:
        - "{{ cluster_console_url | regex_replace('/+$', '') }}/*"
        - "https://oauth-openshift.apps.{{ cluster_name }}.*/*"
      webOrigins:
        - "{{ cluster_apps_url | regex_replace('/+$', '') }}"
      attributes:
        "access.token.lifespan": "28800"
        "groups.claim.enabled": "true"
    validate_certs: false
    status_code: [201, 409]
  when:
    - not (skip_oidc_setup | bool)
    - _kc_existing_client.json | length == 0

- name: Get OIDC client UUID
  ansible.builtin.uri:
    url: "{{ keycloak_internal_url }}/admin/realms/{{ keycloak_realm }}/clients?clientId={{ ocp_oidc_client_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_token.json.access_token }}"
    validate_certs: false
    status_code: [200]
  register: _kc_client_info
  when: not (skip_oidc_setup | bool)

- name: Get OIDC client secret
  ansible.builtin.uri:
    url: "{{ keycloak_internal_url }}/admin/realms/{{ keycloak_realm }}/clients/{{ _kc_client_info.json[0].id }}/client-secret"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_token.json.access_token }}"
    validate_certs: false
    status_code: [200]
  register: _kc_client_secret
  when: not (skip_oidc_setup | bool)
  no_log: true

- name: Add groups mapper to OIDC client (if not present)
  ansible.builtin.uri:
    url: "{{ keycloak_internal_url }}/admin/realms/{{ keycloak_realm }}/clients/{{ _kc_client_info.json[0].id }}/protocol-mappers/models"
    method: POST
    headers:
      Authorization: "Bearer {{ _kc_token.json.access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      name: groups
      protocol: openid-connect
      protocolMapper: oidc-group-membership-mapper
      config:
        "full.path": "false"
        "id.token.claim": "true"
        "access.token.claim": "true"
        "userinfo.token.claim": "true"
        "claim.name": "groups"
    validate_certs: false
    status_code: [201, 409]
  when: not (skip_oidc_setup | bool)
  ignore_errors: true

- name: Encode OIDC client secret as base64
  ansible.builtin.set_fact:
    ocp_oidc_client_secret_b64: "{{ _kc_client_secret.json.value | b64encode }}"
    ocp_oidc_client_secret: "{{ _kc_client_secret.json.value }}"
  when: not (skip_oidc_setup | bool)
  no_log: true

- name: Build ACM Policy for OpenShift OAuth configuration
  ansible.builtin.set_fact:
    acm_oidc_policy:
      apiVersion: policy.open-cluster-management.io/v1
      kind: Policy
      metadata:
        name: "{{ cluster_name }}-keycloak-oidc"
        namespace: openshift-gitops
        annotations:
          policy.open-cluster-management.io/standards: "OIDC SSO"
          policy.open-cluster-management.io/categories: "Authentication"
          policy.open-cluster-management.io/controls: "OpenID Connect"
      spec:
        disabled: false
        remediationAction: enforce
        policy-templates:
          - objectDefinition:
              apiVersion: policy.open-cluster-management.io/v1
              kind: ConfigurationPolicy
              metadata:
                name: "{{ cluster_name }}-oidc-client-secret"
              spec:
                remediationAction: enforce
                severity: high
                object-templates:
                  - complianceType: musthave
                    objectDefinition:
                      apiVersion: v1
                      kind: Secret
                      metadata:
                        name: openid-client-secret-keycloak
                        namespace: openshift-config
                      type: Opaque
                      data:
                        clientSecret: "{{ ocp_oidc_client_secret_b64 }}"
          - objectDefinition:
              apiVersion: policy.open-cluster-management.io/v1
              kind: ConfigurationPolicy
              metadata:
                name: "{{ cluster_name }}-oidc-ca"
              spec:
                remediationAction: enforce
                severity: high
                object-templates:
                  - complianceType: musthave
                    objectDefinition:
                      apiVersion: v1
                      kind: ConfigMap
                      metadata:
                        name: openid-ca-keycloak
                        namespace: openshift-config
                      data:
                        ca.crt: "{{ keycloak_ingress_ca }}"
          - objectDefinition:
              apiVersion: policy.open-cluster-management.io/v1
              kind: ConfigurationPolicy
              metadata:
                name: "{{ cluster_name }}-oauth"
              spec:
                remediationAction: enforce
                severity: high
                object-templates:
                  - complianceType: musthave
                    objectDefinition:
                      apiVersion: config.openshift.io/v1
                      kind: OAuth
                      metadata:
                        name: cluster
                      spec:
                        identityProviders:
                          - name: keycloak-sso
                            mappingMethod: claim
                            type: OpenID
                            openID:
                              clientID: "{{ ocp_oidc_client_id }}"
                              clientSecret:
                                name: openid-client-secret-keycloak
                              ca:
                                name: openid-ca-keycloak
                              extraScopes:
                                - profile
                                - email
                              claims:
                                preferredUsername:
                                  - preferred_username
                                name:
                                  - name
                                email:
                                  - email
                                groups:
                                  - groups
                              issuer: "{{ keycloak_external_url }}/realms/{{ keycloak_realm }}"
  when: not (skip_oidc_setup | bool)

- name: Build ACM Placement for this cluster
  ansible.builtin.set_fact:
    acm_oidc_placement:
      apiVersion: cluster.open-cluster-management.io/v1beta1
      kind: Placement
      metadata:
        name: "{{ cluster_name }}-keycloak-oidc-placement"
        namespace: openshift-gitops
      spec:
        predicates:
          - requiredClusterSelector:
              labelSelector:
                matchLabels:
                  name: "{{ cluster_name }}"
  when: not (skip_oidc_setup | bool)

- name: Build ACM PlacementBinding for this cluster
  ansible.builtin.set_fact:
    acm_oidc_binding:
      apiVersion: policy.open-cluster-management.io/v1
      kind: PlacementBinding
      metadata:
        name: "{{ cluster_name }}-keycloak-oidc-binding"
        namespace: openshift-gitops
      placementRef:
        name: "{{ cluster_name }}-keycloak-oidc-placement"
        kind: Placement
        apiGroup: cluster.open-cluster-management.io
      subjects:
        - name: "{{ cluster_name }}-keycloak-oidc"
          kind: Policy
          apiGroup: policy.open-cluster-management.io
  when: not (skip_oidc_setup | bool)

- name: Check if ACM Policy already exists
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/openshift-gitops/policies/{{ cluster_name }}-keycloak-oidc"
    method: GET
    headers:
      Authorization: "Bearer {{ central_token }}"
    validate_certs: true
    ca_path: /tmp/central-ca.crt
    status_code: [200, 404]
  when: not (skip_oidc_setup | bool)
  register: _acm_policy_exists

- name: Create ACM Policy on central cluster (first time)
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/openshift-gitops/policies"
    method: POST
    headers:
      Authorization: "Bearer {{ central_token }}"
      Content-Type: application/json
    body_format: json
    body: "{{ acm_oidc_policy }}"
    validate_certs: true
    ca_path: /tmp/central-ca.crt
    status_code: [200, 201]
  when:
    - not (skip_oidc_setup | bool)
    - _acm_policy_exists.status == 404
  register: _acm_policy_result

- name: Update ACM Policy on central cluster (idempotent patch)
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/openshift-gitops/policies/{{ cluster_name }}-keycloak-oidc"
    method: PATCH
    headers:
      Authorization: "Bearer {{ central_token }}"
      Content-Type: application/merge-patch+json
    body_format: json
    body:
      spec: "{{ acm_oidc_policy.spec }}"
    validate_certs: true
    ca_path: /tmp/central-ca.crt
    status_code: [200]
  when:
    - not (skip_oidc_setup | bool)
    - _acm_policy_exists.status == 200

- name: Create ACM Placement on central cluster
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/cluster.open-cluster-management.io/v1beta1/namespaces/openshift-gitops/placements"
    method: POST
    headers:
      Authorization: "Bearer {{ central_token }}"
      Content-Type: application/json
    body_format: json
    body: "{{ acm_oidc_placement }}"
    validate_certs: true
    ca_path: /tmp/central-ca.crt
    status_code: [200, 201, 409]
  when: not (skip_oidc_setup | bool)

- name: Create ACM PlacementBinding on central cluster
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/openshift-gitops/placementbindings"
    method: POST
    headers:
      Authorization: "Bearer {{ central_token }}"
      Content-Type: application/json
    body_format: json
    body: "{{ acm_oidc_binding }}"
    validate_certs: true
    ca_path: /tmp/central-ca.crt
    status_code: [200, 201, 409]
  when: not (skip_oidc_setup | bool)

- name: Set OIDC configured fact
  ansible.builtin.set_fact:
    oidc_configured: "{{ not (skip_oidc_setup | bool) }}"
    oidc_client_id: "{{ ocp_oidc_client_id | default('') }}"

- name: Push cluster RBAC ClusterRoleBindings via ACM
  ansible.builtin.include_tasks: cluster_rbac.yml
