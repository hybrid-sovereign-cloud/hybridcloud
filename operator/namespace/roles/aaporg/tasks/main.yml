---
- block:
    - name: Set AAPOrg CR facts
      ansible.builtin.set_fact:
        aaporg_spec: "{{ _hybridsovereign_redhat_aaporg.spec | default({}) }}"
        aaporg_generation: "{{ _hybridsovereign_redhat_aaporg.metadata.generation | default(0) | int }}"
        aaporg_observed_generation: "{{ _hybridsovereign_redhat_aaporg.status.observedGeneration | default(0) | int }}"
        aaporg_status: "{{ _hybridsovereign_redhat_aaporg.status.status | default('') }}"
        aaporg_ready: "{{ _hybridsovereign_redhat_aaporg.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_aaporg.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Read entity Namespace
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ ansible_operator_meta.namespace }}"
      register: aaporg_target_ns

    - name: Assert namespace has entity label
      ansible.builtin.assert:
        that:
          - aaporg_target_ns.resources | length > 0
          - aaporg_target_ns.resources[0].metadata.labels is defined
          - aaporg_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] is defined
          - (aaporg_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] | length) > 0
        fail_msg: >-
          Namespace '{{ ansible_operator_meta.namespace }}' must include a non-empty
          label 'hybridsovereign.redhat/entity' referencing the owning Entity.

    - name: Read parent AAPConfig CR
      kubernetes.core.k8s_info:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: AAPConfig
        name: "{{ aaporg_spec.aapConfig }}"
        namespace: sovereign-cloud-plugins
      register: _aap_config

    - name: Fail if AAPConfig not found
      ansible.builtin.fail:
        msg: "AAPConfig {{ aaporg_spec.aapConfig }} not found in sovereign-cloud-plugins"
      when: _aap_config.resources | length == 0

    - name: Fail if AAPConfig not ready
      ansible.builtin.fail:
        msg: "AAPConfig {{ aaporg_spec.aapConfig }} is not ready"
      when: not (_aap_config.resources[0].status.ready | default(false))

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: AAPOrg
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        aaporg_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        aaporg_event_reason: "{{ 'AAPOrgReconcileRequested' if reconcile_now | bool else 'AAPOrgCreateRequested' }}"
        aaporg_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (aaporg_observed_generation >= aaporg_generation)
            and (aaporg_status == 'ready')
            and (aaporg_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: aaporg_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        aaporg_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark AAPOrg as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: AAPOrg
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ aaporg_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ aaporg_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Emit AAPOrg create or reconcile event
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ ansible_operator_meta.namespace }}"
            generateName: "aaporg-{{ ansible_operator_meta.name }}-create-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: AAPOrg
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_aaporg.metadata.uid }}"
          reason: "{{ aaporg_event_reason }}"
          note: "{{ aaporg_spec | to_json }}"
          type: Normal
          action: "{{ aaporg_event_action }}"
          reportingController: plugin-aap-operator
          reportingInstance: plugin-aap-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"

  rescue:
    - name: Mark AAPOrg as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: AAPOrg
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "AAPOrg {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
