---
- block:
    - name: Set VaultKV CR facts
      ansible.builtin.set_fact:
        vaultkv_spec: "{{ _hybridsovereign_redhat_vaultkv.spec | default({}) }}"
        vaultkv_generation: "{{ _hybridsovereign_redhat_vaultkv.metadata.generation | default(0) | int }}"
        vaultkv_observed_generation: "{{ _hybridsovereign_redhat_vaultkv.status.observedGeneration | default(0) | int }}"
        vaultkv_status: "{{ _hybridsovereign_redhat_vaultkv.status.status | default('') }}"
        vaultkv_ready: "{{ _hybridsovereign_redhat_vaultkv.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_vaultkv.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Read entity Namespace
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ ansible_operator_meta.namespace }}"
      register: vaultkv_target_ns

    - name: Assert namespace has entity label
      ansible.builtin.assert:
        that:
          - vaultkv_target_ns.resources | length > 0
          - vaultkv_target_ns.resources[0].metadata.labels is defined
          - vaultkv_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] is defined
          - (vaultkv_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] | length) > 0
        fail_msg: >-
          Namespace '{{ ansible_operator_meta.namespace }}' must include a non-empty
          label 'hybridsovereign.redhat/entity' referencing the owning Entity.

    - name: Read referenced Vault CR
      kubernetes.core.k8s_info:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Vault
        name: "{{ vaultkv_spec.vault }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
      register: parent_vault

    - name: Assert parent Vault is ready
      ansible.builtin.assert:
        that:
          - parent_vault.resources | length > 0
          - parent_vault.resources[0].status.ready | default(false) | bool
        fail_msg: "Referenced Vault '{{ vaultkv_spec.vault }}' is not ready"

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: VaultKV
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        vaultkv_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        vaultkv_event_reason: "{{ 'VaultKVReconcileRequested' if reconcile_now | bool else 'VaultKVCreateRequested' }}"
        vaultkv_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (vaultkv_observed_generation >= vaultkv_generation)
            and (vaultkv_status == 'ready')
            and (vaultkv_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: vaultkv_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        vaultkv_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark VaultKV as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: VaultKV
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ vaultkv_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ vaultkv_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Emit VaultKV create or reconcile event
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ ansible_operator_meta.namespace }}"
            generateName: "vaultkv-{{ ansible_operator_meta.name }}-create-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: VaultKV
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_vaultkv.metadata.uid }}"
          reason: "{{ vaultkv_event_reason }}"
          note: "{{ vaultkv_spec | to_json }}"
          type: Normal
          action: "{{ vaultkv_event_action }}"
          reportingController: plugin-vault-operator
          reportingInstance: plugin-vault-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"

  rescue:
    - name: Mark VaultKV as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: VaultKV
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "VaultKV {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
