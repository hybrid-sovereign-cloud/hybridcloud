---
- block:
    - name: Set Persona CR facts
      ansible.builtin.set_fact:
        persona_metadata: "{{ _hybridsovereign_redhat_persona.metadata }}"
        persona_spec: "{{ _hybridsovereign_redhat_persona.spec | default({}) }}"
        persona_generation: "{{ _hybridsovereign_redhat_persona.metadata.generation | default(0) | int }}"
        persona_observed_generation: "{{ _hybridsovereign_redhat_persona.status.observedGeneration | default(0) | int }}"
        persona_status: "{{ _hybridsovereign_redhat_persona.status.status | default('') }}"
        persona_ready: "{{ _hybridsovereign_redhat_persona.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_persona.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Validate Persona spec prerequisites
      ansible.builtin.assert:
        that:
          - persona_spec.rbac is defined
          - persona_spec.rbac | length > 0
          - persona_spec.type is defined
          - persona_spec.type | length > 0
        fail_msg: Persona spec requires non-empty rbac and type fields.

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Persona
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        persona_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        persona_event_reason: "{{ 'PersonaReconcileRequested' if reconcile_now | bool else 'PersonaCreateRequested' }}"
        persona_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (persona_observed_generation >= persona_generation)
            and (persona_status == 'ready')
            and (persona_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: persona_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        persona_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark Persona as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Persona
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          observedGeneration: "{{ persona_generation | int }}"
          lastReconciledAt: "{{ persona_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ persona_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Emit Persona create or reconcile event
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ ansible_operator_meta.namespace }}"
            generateName: "persona-{{ ansible_operator_meta.name }}-create-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: Persona
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_persona.metadata.uid }}"
          reason: "{{ persona_event_reason }}"
          note: "{{ persona_spec | to_json }}"
          type: Normal
          action: "{{ persona_event_action }}"
          reportingController: persona-operator
          reportingInstance: persona-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"

  rescue:
    - name: Mark Persona as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Persona
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "Persona {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
