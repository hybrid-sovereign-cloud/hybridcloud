---
- name: Skip AMQ publish when disabled
  ansible.builtin.meta: end_host
  when: not (amq_kafka_enabled | default(true) | bool)

- name: Publish operator event to AMQ Streams Kafka topic
  ansible.builtin.command:
    argv:
      - python3
      # Absolute path — role_path is unreliable when _common is pulled in via include_role/tasks_from
      - /opt/ansible/roles/_common/files/amq_publish.py
  # Keep stdout visible enough for failure triage; credentials stay in env (no_log)

  environment:
    AMQ_EVENT_PAYLOAD: "{{ amq_event_payload | to_json }}"
    KAFKA_BOOTSTRAP_SERVERS: "{{ lookup('env', 'KAFKA_BOOTSTRAP_SERVERS') | default('', true) }}"
    KAFKA_TOPIC: "{{ lookup('env', 'KAFKA_TOPIC') | default('hybridsovereign-events', true) }}"
    KAFKA_USERNAME: "{{ lookup('env', 'KAFKA_USERNAME') | default('', true) }}"
    KAFKA_PASSWORD: "{{ lookup('env', 'KAFKA_PASSWORD') | default('', true) }}"
    KAFKA_CA_CERT: "{{ lookup('env', 'KAFKA_CA_CERT') | default('', true) }}"
    KAFKA_SECURITY_PROTOCOL: "{{ lookup('env', 'KAFKA_SECURITY_PROTOCOL') | default('SASL_SSL', true) }}"
    KAFKA_SASL_MECHANISM: "{{ lookup('env', 'KAFKA_SASL_MECHANISM') | default('SCRAM-SHA-512', true) }}"
  register: amq_publish_result
  changed_when: true
  failed_when: false
  no_log: true

- name: Log AMQ publish failure
  ansible.builtin.debug:
    msg: "AMQ publish failed (non-fatal): {{ amq_publish_result.stderr | default(amq_publish_result.msg | default('unknown')) }}"
  when: amq_publish_result.rc | default(0) != 0
