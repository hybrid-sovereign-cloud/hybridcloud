apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hybridsovereign-primary-operator
  labels:
    {{- include "primary-operator.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups: ["hybridsovereign.redhat"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces", "events", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Shared by entity-scoped namespace operators (bound per-entity SA).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hybridsovereign-namespace-operator
  labels:
    {{- include "primary-operator.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # Namespace operators must read plugin configs from sovereign-cloud-plugins
  # (RbacConfig / AAPConfig / QuayConfig) while reconciling entity-scoped CRs.
  - apiGroups: ["hybridsovereign.redhat"]
    resources: ["rbacconfigs", "aapconfigs", "quayconfigs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hybridsovereign-primary-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hybridsovereign-primary-operator
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Values.namespace }}
