                 acmAvailable:
                   type: boolean
                   description: "ACM ManagedCluster availability"
                 acmJoined:
                   type: boolean
                   description: "ACM ManagedCluster joined status"
                 clusterInstalled:
                   type: boolean
                   description: "Whether the cluster installation is complete"
                 oidcConfigured:
                   type: boolean
                   description: "Whether Keycloak OIDC client has been created and ACM policy pushed"
                 oidcClientId:
                   type: string
                   description: "Keycloak OIDC client ID for this cluster"
                 awsHelperName:
                   type: string
                 awsRegion:
                   type: string
                 status:
