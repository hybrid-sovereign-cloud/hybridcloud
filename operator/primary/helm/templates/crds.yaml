 apiVersion: apiextensions.k8s.io/v1
 kind: CustomResourceDefinition
 metadata:
   name: aapconfigs.hybridsovereign.redhat
   labels:
   annotations:
     argocd.argoproj.io/sync-wave: "1"
 spec:
   group: hybridsovereign.redhat
   names:
     kind: AAPConfig
     listKind: AAPConfigList
     plural: aapconfigs
     singular: aapconfig
     shortNames:
       - aapcfg
   scope: Namespaced
   versions:
     - name: v1alpha1
       served: true
       storage: true
       subresources:
         status: {}
       additionalPrinterColumns:
         - name: AAP URL
           type: string
           jsonPath: .status.aapControllerUrl
         - name: Auth Method
           type: string
           jsonPath: .status.authMethodType
         - name: Ready
           type: boolean
           jsonPath: .status.ready
         - name: Age
           type: date
           jsonPath: .metadata.creationTimestamp
       schema:
         openAPIV3Schema:
           description: >-
             AAPConfig configures a connection to an Ansible Automation Platform
             controller and installs a dedicated OIDC authentication method.
             Must only be created in the sovereign-cloud-plugins namespace.
           type: object
           properties:
             spec:
               type: object
               required:
                 - secret
                 - rbacConfig
               properties:
                 secret:
                   type: string
                   description: >-
                     Name of a Secret in sovereign-cloud-plugins containing AAP
                     controller credentials (host, username, password).
                 rbacConfig:
                   type: string
                   description: >-
                     Name of an RbacConfig in sovereign-cloud-plugins to use for
                     OIDC authentication method configuration.
             status:
               type: object
               properties:
                 ready:
                   type: boolean
                 aapControllerUrl:
                   type: string
                   description: External URL of the AAP controller.
                 authMethodType:
                   type: string
                   description: Type of auth method configured (e.g., oidc).
                 authMethodId:
                   type: string
                   description: ID of the configured authenticator in AAP.
                 keycloakClientId:
                   type: string
                   description: OIDC client registered in Keycloak.
                 realm:
                   type: string
                   description: Keycloak realm used for OIDC.
                 entity:
                   type: string
                   description: Entity this config belongs to.
                 status:
                   type: string
                 deletionComplete:
                   type: boolean
                 lastReconciledAt:
                   type: string
                   format: date-time
                 observedGeneration:
                   type: integer
                   format: int64
                 message:
                   type: string
                   description: Human-readable status message.
                 edaJobs:
                   type: array
                   items:
                     type: object
                     properties:
                       name:
                         type: string
                       url:
                         type: string
                       status:
                         type: string
                       timestamp:
                         type: string
                     x-kubernetes-preserve-unknown-fields: true
                 conditions:
                   type: array
                   items:
                     type: object
                     properties:
                       type:
                         type: string
                       status:
                         type: string
                       lastTransitionTime:
                         type: string
                         format: date-time
                       reason:
                         type: string
                       message:
                         type: string
               x-kubernetes-preserve-unknown-fields: true
---
 apiVersion: apiextensions.k8s.io/v1
 kind: CustomResourceDefinition
 metadata:
   name: aaporgs.hybridsovereign.redhat
   labels:
   annotations:
     argocd.argoproj.io/sync-wave: "1"
 spec:
   group: hybridsovereign.redhat
   names:
     kind: AAPOrg
     listKind: AAPOrgList
     plural: aaporgs
     singular: aaporg
     shortNames:
       - aaporg
   scope: Namespaced
   versions:
     - name: v1alpha1
       served: true
       storage: true
       subresources:
         status: {}
       additionalPrinterColumns:
         - name: AAP Config
           type: string
           jsonPath: .spec.aapConfig
         - name: Org ID
           type: string
           jsonPath: .status.orgId
         - name: Status
           type: string
           jsonPath: .status.status
         - name: Last-Reconciled
           type: string
           jsonPath: .status.lastReconciledAt
         - name: Ready
           type: boolean
           jsonPath: .status.ready
         - name: Age
           type: date
           jsonPath: .metadata.creationTimestamp
       schema:
         openAPIV3Schema:
           description: >-
             AAPOrg creates an organization in AAP and configures OIDC group
             mappings for admin and job-executor roles.
           type: object
           properties:
             spec:
               type: object
               required:
                 - aapConfig
               properties:
                 aapConfig:
                   type: string
                   description: >-
                     Name of the AAPConfig in sovereign-cloud-plugins that provides
                     AAP connection and auth configuration.
                 aapAdminRbac:
                   type: array
                   items:
                     type: string
                   description: >-
                     Array of Rbac CR names whose Keycloak groups receive AAP
                     organization admin role.
                 aapJobExecutorRbac:
                   type: array
                   items:
                     type: string
                   description: >-
                     Array of Rbac CR names whose Keycloak groups receive AAP
                     job executor (execute) role.
                 aapViewerRbac:
                   type: array
                   items:
                     type: string
                   description: >-
                     Array of Rbac CR names whose Keycloak groups receive AAP
                     read-only access (view jobs, inventories, templates).
             status:
               type: object
               properties:
                 status:
                   type: string
                   description: Lifecycle status (reconciling, ready, failed)
                 lastReconciledAt:
                   type: string
                   format: date-time
                   description: Timestamp of the last reconciliation attempt
                 message:
                   type: string
                   description: Human-readable status message (set on failure)
                 ready:
                   type: boolean
                 deletionComplete:
                   type: boolean
                 observedGeneration:
                   type: integer
                   format: int64
                 edaJobs:
                   type: array
                   items:
                     type: object
                     properties:
                       name:
                         type: string
                       url:
                         type: string
                       status:
                         type: string
                       timestamp:
                         type: string
                     x-kubernetes-preserve-unknown-fields: true
                 conditions:
                   type: array
                   items:
                     type: object
                     properties:
                       type:
                         type: string
                       status:
                         type: string
                       lastTransitionTime:
                         type: string
                         format: date-time
                       reason:
                         type: string
                       message:
                         type: string
                 orgId:
                   type: string
                   description: AAP organization ID (controller-side).
                 orgName:
                   type: string
                   description: AAP organization name.
                 aapControllerUrl:
                   type: string
                   description: External AAP controller URL.
                 loginUrl:
                   type: string
                   description: OIDC login URL for accessing this org.
                 adminGroups:
                   type: array
                   items:
                     type: string
                   description: Keycloak groups mapped as org admins.
                 executorGroups:
                   type: array
                   items:
                     type: string
                   description: Keycloak groups mapped as job executors.
                 viewerGroups:
                   type: array
                   items:
                     type: string
                   description: Keycloak groups mapped as read-only viewers.
                 authMethodId:
                   type: string
                   description: Reference to the AAP authenticator.
                 teamMappings:
                   type: string
                   description: JSON summary of team/role mappings.
                 entity:
                   type: string
                   description: Entity this org belongs to.
                 message:
                   type: string
                   description: Human-readable status message.
               x-kubernetes-preserve-unknown-fields: true
---
 apiVersion: apiextensions.k8s.io/v1
 kind: CustomResourceDefinition
 metadata:
   name: assignments.hybridsovereign.redhat
   annotations:
     argocd.argoproj.io/sync-wave: "1"
 spec:
   group: hybridsovereign.redhat
   names:
     kind: Assignment
     listKind: AssignmentList
     plural: assignments
     singular: assignment
   scope: Namespaced
   versions:
     - name: v1alpha1
       served: true
       storage: true
       schema:
         openAPIV3Schema:
           description: Assignment links a Team to one or more Projects and PlatformOpenshift clusters.
           type: object
           required:
             - spec
           properties:
             apiVersion:
               type: string
             kind:
               type: string
             metadata:
               type: object
             spec:
               description: Desired assignment linking Team, Projects, and PlatformOpenshift resources
               type: object
               properties:
                 team:
                   description: Name of the Team CR this assignment belongs to
                   type: string
                 projects:
                   description: List of Project CR names assigned to this team
                   type: array
                   items:
                     type: string
                 openshift:
                   description: Name of the PlatformOpenshift CR where the team is deployed (single cluster)
                   type: string
                 toolRbac:
                   description: Controls access levels for team members on the spoke cluster (Layer 2 RBAC)
                   type: object
                   properties:
                     assignmentAdmin:
                       type: string
                       description: >-
                         Rbac CR name — group receives admin RoleBindings in all Assignment-created
                         namespaces (devops, project namespaces, istio) plus ArgoCD admin access.
                     assignmentDeveloper:
                       type: string
                       description: >-
                         Rbac CR name — group receives edit RoleBindings in all project namespaces.
                     assignmentViewer:
                       type: string
                       description: >-
                         Rbac CR name — group receives view RoleBindings in all Assignment-created
                         namespaces (devops, project namespaces, istio).
                     assignmentOps:
                       type: string
                       description: >-
                         Rbac CR name — group receives view in project namespaces, edit in devops
                         and istio namespaces, and ArgoCD admin access.
             status:
               description: Observed state populated by assignment-operator reconciliation
               type: object
               properties:
                 name:
                   type: string
                 namespace:
                   type: string
                 entity:
                   type: string
                 billingId:
                   type: string
                 description:
                   type: string
                 team:
                   type: string
                 teamReady:
                   type: boolean
                 projects:
                   type: array
                   items:
                     type: object
                     properties:
                       name:
                         type: string
                       ready:
                         type: boolean
                 openshift:
                   type: string
                   description: PlatformOpenshift CR name targeted by this assignment
                 openshiftReady:
                   type: boolean
                 ready:
                   type: boolean
                 assignmentProvisioned:
                   type: boolean
                 clusterName:
                   type: string
                 acmPolicyName:
                   type: string
                   description: Name of the ACM Policy created on the central cluster for this Assignment.
                 helperName:
                   type: string
                   description: "DEPRECATED: Legacy helper CR name (OSOHelper/AWSHelper type:assignment). Kept for backward compatibility."
                 helperProvider:
                   type: string
                   description: "DEPRECATED: Legacy provider type. Kept for backward compatibility."
                 status:
                   type: string
                 deletionComplete:
                   type: boolean
                 lastReconciledAt:
                   type: string
                   format: date-time
                 message:
                   type: string
                 observedGeneration:
                   type: integer
                   format: int64
                 edaJobs:
                   type: array
                   items:
                     type: object
                     properties:
                       name:
                         type: string
                       jobId:
                         type: string
                       url:
                         type: string
                       timestamp:
                         type: string
                       status:
                         type: string
                         enum: [running, success, failed]
                     x-kubernetes-preserve-unknown-fields: true
                 conditions:
                   type: array
                   items:
                     type: object
                     properties:
                       type:
                         type: string
                       status:
                         type: string
                       lastTransitionTime:
                         type: string
                         format: date-time
                       reason:
                         type: string
                       message:
                         type: string
                     x-kubernetes-preserve-unknown-fields: true
               x-kubernetes-preserve-unknown-fields: true
       subresources:
         status: {}
       additionalPrinterColumns:
         - name: Team
           type: string
           jsonPath: .status.team
         - name: Cluster
           type: string
           jsonPath: .status.openshift
         - name: Entity
           type: string
           jsonPath: .status.entity
         - name: Provisioned
           type: boolean
           jsonPath: .status.assignmentProvisioned
         - name: Ready
           type: boolean
           jsonPath: .status.ready
         - name: Age
           type: date
           jsonPath: .metadata.creationTimestamp
---
 apiVersion: apiextensions.k8s.io/v1
 kind: CustomResourceDefinition
 metadata:
   name: cloudawss.hybridsovereign.redhat
   annotations:
     argocd.argoproj.io/sync-wave: "1"
 spec:
   group: hybridsovereign.redhat
   names:
     kind: CloudAWS
     listKind: CloudAWSList
     plural: cloudawss
     singular: cloudaws
     shortNames:
       - caws
   scope: Namespaced
   versions:
     - name: v1alpha1
       served: true
       storage: true
       schema:
         openAPIV3Schema:
           description: >-
             CloudAWS provisions an AWS environment (Route53 subdomain, slug)
             by creating a helper AWSHelper CR on the central cluster.
           type: object
           required:
             - spec
           properties:
             apiVersion:
               type: string
             kind:
               type: string
             metadata:
               type: object
             spec:
               type: object
               required: [account, vaultPath, baseDomain]
               properties:
                 account:
                   type: string
                   description: "AWS account ID"
                 vaultPath:
                   type: string
                   description: "Vault KV path for AWS credentials (central cluster)"
                 baseDomain:
                   type: string
                   description: "Parent DNS domain (e.g. sandbox5530.opentlc.com)"
                 landingzone:
                   type: string
                   description: Landing Zone template name
                   default: default
             status:
               type: object
               properties:
                 name:
                   type: string
                 namespace:
                   type: string
                 entity:
                   type: string
                 awsHelperName:
                   type: string
                   description: "Name of the AWSHelper CR created in central cluster"
                 awsHelperCreated:
                   type: boolean
                 centralApiServer:
                   type: string
                 slug:
                   type: string
                   description: "5-character subdomain slug from AWSHelper"
                 domain:
                   type: string
                   description: "Full domain: <slug>.<baseDomain>"
                 route53ZoneId:
                   type: string
                   description: "Route53 hosted zone ID"
                 awsAccountId:
                   type: string
                 awsRegion:
                   type: string
                 status:
                   type: string
                   description: Lifecycle status (reconciling, ready, failed)
                 lastReconciledAt:
                   type: string
                   format: date-time
                   description: Timestamp of the last reconciliation attempt
                 message:
                   type: string
                   description: Human-readable status message (set on failure)
                 ready:
                   type: boolean
                 observedGeneration:
                   type: integer
                   format: int64
                 edaJobs:
                   type: array
                   items:
                     type: object
                     properties:
                       name:
                         type: string
                       jobId:
                         type: string
                       url:
                         type: string
                       timestamp:
                         type: string
                       status:
                         type: string
                         enum: [running, success, failed]
                     x-kubernetes-preserve-unknown-fields: true
                 conditions:
                   type: array
                   items:
                     type: object
                     properties:
                       type:
                         type: string
                       status:
                         type: string
                       lastTransitionTime:
                         type: string
                         format: date-time
                       reason:
                         type: string
                       message:
                         type: string
               x-kubernetes-preserve-unknown-fields: true
       subresources:
         status: {}
       additionalPrinterColumns:
         - name: Entity
           type: string
           jsonPath: .status.entity
         - name: Slug
           type: string
           jsonPath: .status.slug
         - name: Domain
           type: string
           jsonPath: .status.domain
         - name: Status
           type: string
           jsonPath: .status.status
         - name: Last-Reconciled
           type: string
           jsonPath: .status.lastReconciledAt
         - name: Ready
           type: boolean
           jsonPath: .status.ready
         - name: Age
           type: date
           jsonPath: .metadata.creationTimestamp
---
 apiVersion: apiextensions.k8s.io/v1
 kind: CustomResourceDefinition
 metadata:
   name: cloudosos.hybridsovereign.redhat
   annotations:
     argocd.argoproj.io/sync-wave: "1"
 spec:
   group: hybridsovereign.redhat
   names:
     kind: CloudOSO
     listKind: CloudOSOList
     plural: cloudosos
     singular: cloudoso
   scope: Namespaced
   versions:
     - name: v1alpha1
       served: true
       storage: true
       schema:
         openAPIV3Schema:
           description: >-
             CloudOSO declares OpenStack/Routed53 environment prerequisites and
             creates an OSOHelper (type environmentprep) on the central cluster
             while exposing observed helper outputs and Namespace entity metadata on status.
           type: object
           required:
             - spec
           properties:
             apiVersion:
               type: string
             kind:
               type: string
             metadata:
               type: object
             spec:
               description: >-
                 Desired helper inputs forwarded to OSOHelper spec.environmentprep
                 on the central cluster.
               type: object
               properties:
                 project:
                   type: string
                   description: OpenStack project name hint (required)
                 vaultPath:
                   type: string
                   description: Vault path for OpenStack admin credentials (e.g. oso/accounts/shc_admin)
                 baseDomain:
                   type: string
                   description: Base DNS domain (e.g. lab.example.com)
                 projectDomain:
                   type: string
                   description: "Keystone domain name (default: shc_domain)"
                   default: shc_domain
                 externalNetwork:
                   type: string
                   description: External Neutron network
                   default: ext-net
                 route53VaultPath:
                   type: string
                   description: Vault path for Route53 credentials (e.g. oso/accounts/route53-openstack)
                 landingzone:
                   type: string
                   description: Landing Zone template name
                   default: default
                 designateZoneId:
                   type: string
                   description: Designate zone UUID for shc.example.com environments
                   default: "895a1406-9ad2-4372-80f9-4e23fe1fd9ef"
                 designateProjectId:
                   type: string
                   description: OpenStack project ID owning the Designate zone
                   default: "4cdae8e2b49c4f1fa4b4a69be8ea43e7"
                 enableVRF:
                   type: boolean
                   description: Enable VRF networking for this environment (passed to provisioning; no effect until implemented)
                   default: false
                 vrfId:
                   type: string
                   description: VRF identifier when enableVRF is true
             status:
               description: Observed OSOHelper outputs, Namespace labels/annotations, and readiness.
               type: object
               properties:
                 name:
                   type: string
                 namespace:
                   type: string
                 entity:
                   type: string
                 slug:
                   type: string
                 domain:
                   type: string
                 route53ZoneId:
                   type: string
                 apiVIP:
                   type: string
                 ingressVIP:
                   type: string
                 externalNetwork:
                   type: string
                 billingId:
                   type: string
                 description:
                   type: string
                 osoHelperName:
                   type: string
                   description: Name of the OSOHelper CR created in central cluster
                 osoHelperCreated:
                   type: boolean
                   description: Whether the OSOHelper CR was created successfully
                 centralApiServer:
                   type: string
                   description: Central cluster API server URL
                 projectName:
                   type: string
                   description: OpenStack project name created by OSOHelper
                 projectId:
                   type: string
                   description: OpenStack project ID returned by OSOHelper
                 domainId:
                   type: string
                   description: OpenStack domain ID from OSOHelper
                 domainName:
                   type: string
                   description: OpenStack domain name from OSOHelper
                 status:
                   type: string
                   description: Lifecycle status (reconciling, ready, failed)
                 lastReconciledAt:
                   type: string
                   format: date-time
                   description: Timestamp of the last reconciliation attempt
                 message:
                   type: string
                   description: Human-readable status message (set on failure)
                 ready:
                   type: boolean
                 deletionComplete:
                   type: boolean
                 observedGeneration:
                   type: integer
                   format: int64
                 edaJobs:
                   type: array
                   items:
                     type: object
                     properties:
                       name:
                         type: string
                       jobId:
                         type: string
                       url:
                         type: string
                       timestamp:
                         type: string
                       status:
                         type: string
                         enum: [running, success, failed]
                     x-kubernetes-preserve-unknown-fields: true
                 conditions:
                   type: array
                   items:
                     type: object
                     properties:
                       type:
                         type: string
                       status:
                         type: string
                       lastTransitionTime:
                         type: string
                         format: date-time
                       reason:
                         type: string
                       message:
                         type: string
               x-kubernetes-preserve-unknown-fields: true
       subresources:
         status: {}
       additionalPrinterColumns:
         - name: Name
           type: string
           jsonPath: .metadata.name
         - name: Entity
           type: string
           jsonPath: .status.entity
         - name: Slug
           type: string
           jsonPath: .status.slug
         - name: Domain
           type: string
           jsonPath: .status.domain
         - name: Project
           type: string
           jsonPath: .status.projectName
         - name: Status
           type: string
           jsonPath: .status.status
         - name: Last-Reconciled
           type: string
           jsonPath: .status.lastReconciledAt
         - name: Ready
           type: boolean
           jsonPath: .status.ready
         - name: Age
           type: date
           jsonPath: .metadata.creationTimestamp
---
 apiVersion: apiextensions.k8s.io/v1
 kind: CustomResourceDefinition
 metadata:
   name: entities.hybridsovereign.redhat
   annotations:
     argocd.argoproj.io/sync-wave: "1"
 spec:
   group: hybridsovereign.redhat
   names:
     kind: Entity
     listKind: EntityList
     plural: entities
     singular: entity
     shortNames:
       - ent
   scope: Namespaced
   versions:
     - name: v1alpha1
       served: true
       storage: true
       schema:
         openAPIV3Schema:
           description: >-
             Entity represents a tenant namespace in the Hybrid Sovereign Cloud platform.
           type: object
           required:
             - spec
           properties:
             apiVersion:
               type: string
             kind:
               type: string
             metadata:
               type: object
             spec:
               description: Desired state of the Entity
               type: object
               required:
                 - description
                 - billingID
               properties:
                 description:
                   description: Multi-line description of the entity
                   type: string
                 billingID:
                   description: Billing identifier (also applied as a namespace label)
                   type: string
                   pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]{0,62}$"
                 websiteLink:
                   description: URL to the entity's external website
                   type: string
                 namespaceRbac:
                   description: Maps each named RBAC role to a list of Rbac CR names (14-role matrix)
                   type: object
                   properties:
                     entityAdmin:
                       description: Full admin over all CRs in the entity namespace
                       type: array
                       items:
                         type: string
                     auditor:
                       description: Read-all access across all CR types
                       type: array
                       items:
                         type: string
                     BobsTeam:
                       description: Read-all access across all CR types (same as auditor)
                       type: array
                       items:
                         type: string
                     cloudOSOAdmin:
                       description: Create/edit/delete CloudOSO CRs; view Rbac CRs
                       type: array
                       items:
                         type: string
                     cloudOSOView:
                       description: View CloudOSO CRs and Rbac CRs
                       type: array
                       items:
                         type: string
                     cloudAWSAdmin:
                       description: Create/edit/delete CloudAWS CRs; view Rbac CRs
                       type: array
                       items:
                         type: string
                     cloudAWSView:
                       description: View CloudAWS CRs and Rbac CRs
                       type: array
                       items:
                         type: string
                     platformOpenshiftAdmin:
                       description: Create/edit/delete PlatformOpenshift CRs; view Rbac CRs
                       type: array
                       items:
                         type: string
                     platformOpenshiftView:
                       description: View PlatformOpenshift CRs and Rbac CRs
                       type: array
                       items:
                         type: string
                     teamAdmin:
                       description: Create/edit/delete Team CRs; view Assignment and Rbac CRs
                       type: array
                       items:
                         type: string
                     teamView:
                       description: View Team, Assignment, and Rbac CRs
                       type: array
                       items:
                         type: string
                     projectAdmin:
                       description: Create/edit/delete Project CRs; view Assignment and Rbac CRs
                       type: array
                       items:
                         type: string
                     projectView:
                       description: View Project, Assignment, and Rbac CRs
                       type: array
                       items:
                         type: string
                     assignmentAdmin:
                       description: Create/edit/delete Assignment CRs; view Rbac CRs
                       type: array
                       items:
                         type: string
                     identityAdmin:
                       description: Create and view Rbac CRs
                       type: array
                       items:
                         type: string
             status:
               description: Observed state set by the operator after reconciliation
               type: object
               properties:
                 entity:
                   type: string
                 description:
                   type: string
                 openshiftConsoleURL:
                   type: string
                 billingID:
                   type: string
                 websiteLink:
                   type: string
                 status:
                   type: string
                 ready:
                   type: boolean
                 deletionComplete:
                   type: boolean
                 lastReconciledAt:
                   type: string
                   format: date-time
                 message:
                   type: string
                 observedGeneration:
                   type: integer
                   format: int64
                 edaJobs:
                   type: array
                   items:
                     type: object
                     properties:
                       name:
                         type: string
                       jobId:
                         type: string
                       url:
                         type: string
                       timestamp:
                         type: string
                       status:
                         type: string
                         enum: [running, success, failed]
                     x-kubernetes-preserve-unknown-fields: true
                 conditions:
                   type: array
                   items:
                     type: object
                     properties:
                       type:
                         type: string
                       status:
                         type: string
                       lastTransitionTime:
                         type: string
                         format: date-time
                       reason:
                         type: string
                       message:
                         type: string
               x-kubernetes-preserve-unknown-fields: true
