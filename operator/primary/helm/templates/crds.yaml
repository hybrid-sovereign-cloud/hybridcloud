                   properties:
                     environment:
                       type: string
                       description: "CloudAWS CR name providing the AWS environment"
                     region:
                       type: string
                       description: "AWS region (default: us-east-1)"
                       default: us-east-1
                     clusterType:
                       type: string
                       description: "Cluster topology type"
                       default: standalone
                       enum: [standalone, ha]
                     controlPlaneCount:
                       type: integer
                       description: "Control plane node count"
                       default: 3
                     workerCount:
                       type: integer
                       description: "Worker node count"
                       default: 2
                     controllerFlavor:
