                       type: array
                       items:
                         type: string
                     clusterViewerRbac:
                       description: Rbac CR names with read-only cluster access
                       type: array
                       items:
                         type: string
                 clusterViewerRbac:
                   description: >-
                     Rbac CR names whose Keycloak groups get read-only access to THIS PlatformOpenshift CR
