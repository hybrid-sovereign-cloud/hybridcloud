apiVersion: apps/v1
kind: Deployment
metadata:
  name: hybridsovereign-primary-operator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "primary-operator.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "primary-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "primary-operator.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect
            - --leader-election-id=hybridsovereign-primary-operator
            - --health-probe-bind-address=:6789
          env:
            - name: WATCH_NAMESPACE
              value: "{{ .Values.namespace }},{{ .Values.pluginsNamespace }}"
            - name: ANSIBLE_GATHERING
              value: explicit
            - name: NAMESPACE_OPERATOR_IMAGE
              value: "{{ .Values.namespaceOperator.image.repository }}:{{ .Values.namespaceOperator.image.tag }}"
            {{- if .Values.amqKafka.enabled }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: amq-producer-credentials
                  key: bootstrap_servers
            - name: KAFKA_TOPIC
              valueFrom:
                secretKeyRef:
                  name: amq-producer-credentials
                  key: topic
            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: amq-producer-credentials
                  key: username
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: amq-producer-credentials
                  key: password
            - name: KAFKA_CA_CERT
              valueFrom:
                secretKeyRef:
                  name: amq-producer-credentials
                  key: ca.crt
            - name: KAFKA_SECURITY_PROTOCOL
              valueFrom:
                secretKeyRef:
                  name: amq-producer-credentials
                  key: security_protocol
            - name: KAFKA_SASL_MECHANISM
              valueFrom:
                secretKeyRef:
                  name: amq-producer-credentials
                  key: sasl_mechanism
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6789
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6789
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      terminationGracePeriodSeconds: 10
