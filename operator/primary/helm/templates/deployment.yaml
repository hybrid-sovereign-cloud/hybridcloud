apiVersion: apps/v1
kind: Deployment
metadata:
  name: hybridsovereign-primary-operator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "primary-operator.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "primary-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "primary-operator.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect
            - --leader-election-id=hybridsovereign-primary-operator
            - --health-probe-bind-address=:6789
          env:
            - name: WATCH_NAMESPACE
              value: "{{ .Values.namespace }},{{ .Values.pluginsNamespace }}"
            - name: ANSIBLE_GATHERING
              value: explicit
            - name: NAMESPACE_OPERATOR_IMAGE
              value: "{{ .Values.namespaceOperator.image.repository }}:{{ .Values.namespaceOperator.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6789
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6789
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      terminationGracePeriodSeconds: 10
