---
- block:
    - name: Set AAPConfig CR facts
      ansible.builtin.set_fact:
        aapconfig_spec: "{{ _hybridsovereign_redhat_aapconfig.spec | default({}) }}"
        aapconfig_generation: "{{ _hybridsovereign_redhat_aapconfig.metadata.generation | default(0) | int }}"
        aapconfig_observed_generation: "{{ _hybridsovereign_redhat_aapconfig.status.observedGeneration | default(0) | int }}"
        aapconfig_status: "{{ _hybridsovereign_redhat_aapconfig.status.status | default('') }}"
        aapconfig_ready: "{{ _hybridsovereign_redhat_aapconfig.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_aapconfig.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Validate AAPConfig spec prerequisites
      ansible.builtin.assert:
        that:
          - aapconfig_spec.secret is defined
          - aapconfig_spec.secret | length > 0
          - aapconfig_spec.rbacConfig is defined
          - aapconfig_spec.rbacConfig | length > 0
        fail_msg: AAPConfig spec requires non-empty secret and rbacConfig.

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: AAPConfig
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        aapconfig_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        aapconfig_event_reason: "{{ 'AAPConfigReconcileRequested' if reconcile_now | bool else 'AAPConfigCreateRequested' }}"
        aapconfig_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (aapconfig_observed_generation >= aapconfig_generation)
            and (aapconfig_status == 'ready')
            and (aapconfig_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: aapconfig_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        aapconfig_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark AAPConfig as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: AAPConfig
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ aapconfig_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ aapconfig_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Emit AAPConfig create or reconcile event
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ ansible_operator_meta.namespace }}"
            generateName: "aapconfig-{{ ansible_operator_meta.name }}-create-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: AAPConfig
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_aapconfig.metadata.uid }}"
          reason: "{{ aapconfig_event_reason }}"
          note: "{{ aapconfig_spec | to_json }}"
          type: Normal
          action: "{{ aapconfig_event_action }}"
          reportingController: plugin-aap-operator
          reportingInstance: plugin-aap-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"

  rescue:
    - name: Mark AAPConfig as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: AAPConfig
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "AAPConfig {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
