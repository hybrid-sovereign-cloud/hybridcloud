---
# Generates per-role K8s Roles and RoleBindings in the entity namespace
# based on spec.namespaceRbac and the entity_named_roles matrix (vars/main.yml).
#
# Performance design — scale: 10,000+ Rbac CRs/entity, 40+ entities:
#   - Role creation uses a single loop with when guards (no sequential includes)
#   - Rbac CR lookups use synchronous loop (k8s_info lacks async support)
#   - Proxy cache ensures repeated lookups of same CR are fast in-memory reads
#   - Subjects list is built from cached lookup results — one pass, no re-queries
#
# Roles are idempotent: re-running produces no change if spec is unchanged.

- name: Extract namespaceRbac spec
  ansible.builtin.set_fact:
    ns_rbac: "{{ entity_spec.namespaceRbac | default({}) }}"

# ─── Phase 1: Create all K8s Roles in parallel ────────────────────────────────
# Roles with crud_resources get full CRUD verbs; roles with read_resources get
# read-only verbs. A role may have both (e.g. teamAdmin: CRUD teams + read assignments).

- name: Build combined rules list for each named role
  ansible.builtin.set_fact:
    _role_rules: >-
      {{
        (
          ([{'apiGroups': ['hybridsovereign.redhat'],
             'resources': item.crud_resources,
             'verbs': ['get','list','watch','create','update','patch','delete']}]
           if item.crud_resources | length > 0 else [])
          +
          ([{'apiGroups': ['hybridsovereign.redhat'],
             'resources': item.crud_resources | map('regex_replace', '$', '/status') | list,
             'verbs': ['get','list','watch']}]
           if item.crud_resources | length > 0 else [])
          +
          ([{'apiGroups': ['hybridsovereign.redhat'],
             'resources': item.read_resources,
             'verbs': ['get','list','watch']}]
           if item.read_resources | length > 0 else [])
          +
          ([{'apiGroups': ['hybridsovereign.redhat'],
             'resources': item.read_resources | map('regex_replace', '$', '/status') | list,
             'verbs': ['get','list','watch']}]
           if item.read_resources | length > 0 else [])
        )
      }}
  loop: "{{ entity_named_roles }}"
  loop_control:
    label: "{{ item.role_name }}"
  when: ns_rbac[item.spec_key] is defined
  register: _role_rules_results

- name: Cache role rules by role_name
  ansible.builtin.set_fact:
    _role_rules_map: >-
      {{
        dict(
          _role_rules_results.results
          | selectattr('skipped', 'undefined')
          | selectattr('ansible_facts._role_rules', 'defined')
          | map(attribute='item')
          | map(attribute='role_name')
          | zip(
              _role_rules_results.results
              | selectattr('skipped', 'undefined')
              | selectattr('ansible_facts._role_rules', 'defined')
              | map(attribute='ansible_facts._role_rules')
            )
        )
      }}

- name: Create K8s Role for each present namespaceRbac entry
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: "{{ item.role_name }}"
        namespace: "{{ entity_namespace }}"
        labels:
          app.kubernetes.io/managed-by: entity-operator
          hybridsovereign.redhat/entity: "{{ ansible_operator_meta.name }}"
      rules: "{{ _role_rules_map[item.role_name] }}"
  loop: "{{ entity_named_roles }}"
  loop_control:
    label: "{{ item.role_name }}"
  when:
    - ns_rbac[item.spec_key] is defined
    - _role_rules_map[item.role_name] is defined

# ─── Phase 2: Resolve Rbac CR group paths ─────────────────────────────────────
# Each role key in ns_rbac holds a list of Rbac CR names to resolve.
# k8s_info does not support async; use synchronous loop (cached by proxy).

- name: Flatten all Rbac CR names needed across all roles
  ansible.builtin.set_fact:
    _all_rbac_names: >-
      {{
        entity_named_roles
        | selectattr('spec_key', 'in', ns_rbac.keys() | list)
        | map(attribute='spec_key')
        | map('extract', ns_rbac)
        | flatten
        | unique
        | list
      }}

- name: Lookup Rbac CRs for group path resolution
  kubernetes.core.k8s_info:
    api_version: hybridsovereign.redhat/v1alpha1
    kind: Rbac
    name: "{{ item }}"
    namespace: "{{ entity_namespace }}"
  loop: "{{ _all_rbac_names }}"
  loop_control:
    label: "{{ item }}"
  register: _rbac_lookup_results
  when: _all_rbac_names | length > 0

- name: Build name→group_path cache from lookup results
  ansible.builtin.set_fact:
    _rbac_group_cache: >-
      {{
        dict(
          _rbac_lookup_results.results
          | default([])
          | selectattr('skipped', 'undefined')
          | selectattr('resources', 'defined')
          | selectattr('resources', 'ne', [])
          | map(attribute='item')
          | zip(
              _rbac_lookup_results.results
              | default([])
              | selectattr('skipped', 'undefined')
              | selectattr('resources', 'defined')
              | selectattr('resources', 'ne', [])
              | map(attribute='resources')
              | map('first')
              | map(attribute='status.group')
              | map('default', '')
              | map('regex_replace', '^(.+)$', '/\1')
            )
        )
      }}

# ─── Phase 3: Create RoleBindings from cached group paths ────────────────────

- name: Build subjects and create RoleBinding for each named role
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "{{ item.role_name }}"
        namespace: "{{ entity_namespace }}"
        labels:
          app.kubernetes.io/managed-by: entity-operator
          hybridsovereign.redhat/entity: "{{ ansible_operator_meta.name }}"
      subjects: >-
        {{
          ns_rbac[item.spec_key]
          | default([])
          | map('extract', _rbac_group_cache)
          | select('ne', None)
          | select('ne', '')
          | list
          | map('regex_replace', '^(.+)$', '{"name":"\1","kind":"Group","apiGroup":"rbac.authorization.k8s.io"}')
          | map('from_json')
          | list
        }}
      roleRef:
        kind: Role
        name: "{{ item.role_name }}"
        apiGroup: rbac.authorization.k8s.io
  loop: "{{ entity_named_roles }}"
  loop_control:
    label: "{{ item.role_name }}"
  when:
    - ns_rbac[item.spec_key] is defined
    - (ns_rbac[item.spec_key] | default([]) | length) > 0
