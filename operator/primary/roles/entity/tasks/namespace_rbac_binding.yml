---
# Helper: resolve a list of Rbac CR names to Keycloak group paths
# and create/update a K8s RoleBinding.
#
# Expected vars:
#   rbac_role_name:   Name of the Role to bind (e.g. cloudosos-creator)
#   rbac_role_kind:   creator | viewer (for label)
#   rbac_names_list:  List of Rbac CR names to resolve
#   extra_groups:     List of already-resolved group paths to include (e.g. entityAdmin)

- name: "Lookup Rbac CRs for {{ rbac_role_name }}"
  kubernetes.core.k8s_info:
    api_version: hybridsovereign.redhat/v1alpha1
    kind: Rbac
    name: "{{ item }}"
    namespace: "{{ entity_namespace }}"
  loop: "{{ rbac_names_list }}"
  register: rbac_cr_results_binding

- name: "Build resolved group paths for {{ rbac_role_name }}"
  ansible.builtin.set_fact:
    resolved_groups: >-
      {{
        (
          rbac_cr_results_binding.results
          | default([])
          | selectattr('resources', 'defined')
          | map(attribute='resources')
          | flatten
          | selectattr('status.group', 'defined')
          | map(attribute='status.group')
          | map('regex_replace', '^(.+)$', '/\1')
          | list
        ) + (extra_groups | default([]))
        | unique
      }}

- name: "Build subjects list for {{ rbac_role_name }}"
  ansible.builtin.set_fact:
    role_binding_subjects: >-
      {{
        resolved_groups
        | map('community.general.dict_kv', 'name')
        | map('combine', {'kind': 'Group', 'apiGroup': 'rbac.authorization.k8s.io'})
        | list
      }}

- name: "Create/update RoleBinding {{ rbac_role_name }}"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "{{ rbac_role_name }}"
        namespace: "{{ entity_namespace }}"
        labels:
          app.kubernetes.io/managed-by: entity-operator
          hybridsovereign.redhat/entity: "{{ ansible_operator_meta.name }}"
          hybridsovereign.redhat/rbac-kind: "{{ rbac_role_kind }}"
      subjects: "{{ role_binding_subjects }}"
      roleRef:
        kind: Role
        name: "{{ rbac_role_name }}"
        apiGroup: rbac.authorization.k8s.io
  when: role_binding_subjects | length > 0
