---
- block:
    - name: Set Entity CR facts
      ansible.builtin.set_fact:
        entity_metadata: "{{ _hybridsovereign_redhat_entity.metadata }}"
        entity_spec: "{{ _hybridsovereign_redhat_entity.spec | default({}) }}"
        entity_generation: "{{ _hybridsovereign_redhat_entity.metadata.generation | default(0) | int }}"
        entity_observed_generation: "{{ _hybridsovereign_redhat_entity.status.observedGeneration | default(0) | int }}"
        entity_status: "{{ _hybridsovereign_redhat_entity.status.status | default('') }}"
        entity_ready: "{{ _hybridsovereign_redhat_entity.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_entity.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Validate Entity spec prerequisites
      ansible.builtin.assert:
        that:
          - entity_spec.description is defined
          - entity_spec.description | length > 0
          - entity_spec.billingID is defined
          - entity_spec.billingID | length > 0
        fail_msg: Entity spec requires non-empty description and billingID.

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Entity
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        entity_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        entity_event_reason: "{{ 'EntityReconcileRequested' if reconcile_now | bool else 'EntityCreateRequested' }}"
        entity_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (entity_observed_generation >= entity_generation)
            and (entity_status == 'ready')
            and (entity_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: entity_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        entity_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark Entity as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Entity
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ entity_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ entity_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Build compact Entity event note (K8s Event note field max 1024 chars)
      ansible.builtin.set_fact:
        entity_event_note: >-
          {{
            {
              'billingID': entity_spec.billingID | default(''),
              'description': (entity_spec.description | default('')) | truncate(400, True, '…'),
              'websiteLink': entity_spec.websiteLink | default('')
            } | to_json
          }}

    - name: Publish operator event to AMQ Streams
      ansible.builtin.include_role:
        name: _common
        tasks_from: publish_operator_event
      vars:
        operator_event_reason: "{{ entity_event_reason }}"
        operator_event_action: "{{ entity_event_action }}"
        operator_event_note: "{{ entity_event_note }}"
        operator_reporting_controller: entity-operator
        operator_event_regarding:
          apiVersion: hybridsovereign.redhat/v1alpha1
          kind: Entity
          name: "{{ ansible_operator_meta.name }}"
          namespace: "{{ ansible_operator_meta.namespace }}"
          uid: "{{ _hybridsovereign_redhat_entity.metadata.uid }}"


    - name: Deploy per-entity namespace operator
      ansible.builtin.include_tasks: deploy_namespace_operator.yml

  rescue:
    - name: Mark Entity as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Entity
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "Entity {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
