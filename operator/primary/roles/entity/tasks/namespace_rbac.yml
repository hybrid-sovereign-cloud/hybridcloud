---
# Generates per-CR-type K8s Roles and RoleBindings in the entity namespace
# based on spec.namespaceRbac (Layer 1 RBAC).
#
# For each resource type, two Roles are created:
#   <resource>-creator  → get/list/watch/create/update/patch/delete
#   <resource>-viewer   → get/list/watch
#
# entityAdmin groups are always prepended to every creator RoleBinding.

- name: Extract namespaceRbac spec
  ansible.builtin.set_fact:
    ns_rbac: "{{ entity_spec.namespaceRbac | default({}) }}"
    entity_admin_rbac_names: "{{ entity_spec.namespaceRbac.entityAdmin | default([]) }}"

- name: Resolve entityAdmin Rbac CR group paths
  ansible.builtin.set_fact:
    entity_admin_groups: []

- name: Lookup entityAdmin Rbac CRs
  kubernetes.core.k8s_info:
    api_version: hybridsovereign.redhat/v1alpha1
    kind: Rbac
    name: "{{ item }}"
    namespace: "{{ entity_namespace }}"
  loop: "{{ entity_admin_rbac_names }}"
  register: entity_admin_rbac_lookups
  when: entity_admin_rbac_names | length > 0

- name: Build entityAdmin group paths list
  ansible.builtin.set_fact:
    entity_admin_groups: >-
      {{
        entity_admin_rbac_lookups.results
        | default([])
        | selectattr('resources', 'defined')
        | map(attribute='resources')
        | flatten
        | selectattr('status.group', 'defined')
        | map(attribute='status.group')
        | map('regex_replace', '^(.+)$', '/\1')
        | list
      }}
  when: entity_admin_rbac_names | length > 0

# ─── Per resource-type RBAC generation ───────────────────────────────────────
# We iterate over each CR type supported in namespaceRbac.
- name: Set resource type definitions
  ansible.builtin.set_fact:
    ns_rbac_resource_types:
      - key: cloudOSO
        resource: cloudosos
      - key: cloudAWS
        resource: cloudawss
      - key: platformOpenshift
        resource: platformopenshifts
      - key: vaultKV
        resource: vaultkvs
      - key: vault
        resource: vaults
      - key: quayOrg
        resource: quayorgs
      - key: aapOrg
        resource: aaporgs
      - key: project
        resource: projects
      - key: team
        resource: teams
      - key: assignment
        resource: assignments

- name: Generate creator Role for each resource type
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: "{{ item.resource }}-creator"
        namespace: "{{ entity_namespace }}"
        labels:
          app.kubernetes.io/managed-by: entity-operator
          hybridsovereign.redhat/entity: "{{ ansible_operator_meta.name }}"
      rules:
        - apiGroups: [hybridsovereign.redhat]
          resources: ["{{ item.resource }}"]
          verbs: [get, list, watch, create, update, patch, delete]
        - apiGroups: [hybridsovereign.redhat]
          resources: ["{{ item.resource }}/status"]
          verbs: [get, list, watch]
  loop: "{{ ns_rbac_resource_types }}"
  when: (ns_rbac[item.key] is defined) or (entity_admin_groups | length > 0)

- name: Generate viewer Role for each resource type
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: "{{ item.resource }}-viewer"
        namespace: "{{ entity_namespace }}"
        labels:
          app.kubernetes.io/managed-by: entity-operator
          hybridsovereign.redhat/entity: "{{ ansible_operator_meta.name }}"
      rules:
        - apiGroups: [hybridsovereign.redhat]
          resources: ["{{ item.resource }}", "{{ item.resource }}/status"]
          verbs: [get, list, watch]
  loop: "{{ ns_rbac_resource_types }}"
  when: ns_rbac[item.key] is defined

# ─── Creator RoleBindings ─────────────────────────────────────────────────────
- name: Resolve creator Rbac group paths for each resource type
  ansible.builtin.include_tasks: namespace_rbac_binding.yml
  vars:
    rbac_role_name: "{{ item.resource }}-creator"
    rbac_role_kind: creator
    rbac_names_list: "{{ ns_rbac[item.key].creators | default([]) }}"
    extra_groups: "{{ entity_admin_groups }}"
  loop: "{{ ns_rbac_resource_types }}"
  when: ns_rbac[item.key] is defined or (entity_admin_groups | length > 0 and ns_rbac[item.key] is defined)

# ─── Viewer RoleBindings ──────────────────────────────────────────────────────
- name: Resolve viewer Rbac group paths for each resource type
  ansible.builtin.include_tasks: namespace_rbac_binding.yml
  vars:
    rbac_role_name: "{{ item.resource }}-viewer"
    rbac_role_kind: viewer
    rbac_names_list: "{{ ns_rbac[item.key].viewers | default([]) }}"
    extra_groups: []
  loop: "{{ ns_rbac_resource_types }}"
  when: ns_rbac[item.key].viewers is defined and (ns_rbac[item.key].viewers | length > 0)
