---
- name: Derive entity tenant namespace name
  ansible.builtin.set_fact:
    entity_tenant_namespace: "entity-{{ ansible_operator_meta.name }}"

- name: Ensure entity tenant namespace exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ entity_tenant_namespace }}"
        labels:
          hybridsovereign.redhat/entity: "{{ ansible_operator_meta.name }}"
          app.kubernetes.io/managed-by: hybridsovereign-primary-operator
          app.kubernetes.io/part-of: hybridsovereign

- name: Deploy namespace operator ServiceAccount
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: hybridsovereign-namespace-operator
        namespace: "{{ entity_tenant_namespace }}"
        labels:
          app.kubernetes.io/name: hybridsovereign-namespace-operator
          app.kubernetes.io/managed-by: hybridsovereign-primary-operator

- name: Deploy namespace operator Role
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: hybridsovereign-namespace-operator
        namespace: "{{ entity_tenant_namespace }}"
      rules:
        - apiGroups: ["hybridsovereign.redhat"]
          resources: ["*"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        - apiGroups: [""]
          resources: ["events", "secrets", "configmaps"]
          verbs: ["get", "list", "watch", "create", "update", "patch"]
        - apiGroups: ["coordination.k8s.io"]
          resources: ["leases"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- name: Deploy namespace operator RoleBinding
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: hybridsovereign-namespace-operator
        namespace: "{{ entity_tenant_namespace }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: Role
        name: hybridsovereign-namespace-operator
      subjects:
        - kind: ServiceAccount
          name: hybridsovereign-namespace-operator
          namespace: "{{ entity_tenant_namespace }}"

# Namespaces are cluster-scoped; Role cannot grant get. Shared ClusterRole is
# created by the primary-operator chart; bind each entity SA to it.
- name: Deploy namespace operator ClusterRoleBinding for namespace get
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "hybridsovereign-namespace-operator-{{ ansible_operator_meta.name }}"
        labels:
          app.kubernetes.io/name: hybridsovereign-namespace-operator
          hybridsovereign.redhat/entity: "{{ ansible_operator_meta.name }}"
          app.kubernetes.io/managed-by: hybridsovereign-primary-operator
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: hybridsovereign-namespace-operator
      subjects:
        - kind: ServiceAccount
          name: hybridsovereign-namespace-operator
          namespace: "{{ entity_tenant_namespace }}"

- name: Ensure Quay pull secret exists in entity tenant namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: quay-pull-secret
        namespace: "{{ entity_tenant_namespace }}"
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ lookup('kubernetes.core.k8s', kind='Secret', namespace='sovereign-cloud', resource_name='quay-pull-secret').data['.dockerconfigjson'] }}"

# Copy AMQ producer credentials from sovereign-cloud (same Vault-backed secret
# the primary operator uses) so namespace operators can publish Kafka events.
- name: Ensure AMQ producer credentials exist in entity tenant namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: amq-producer-credentials
        namespace: "{{ entity_tenant_namespace }}"
        labels:
          app.kubernetes.io/name: hybridsovereign-namespace-operator
          app.kubernetes.io/managed-by: hybridsovereign-primary-operator
      type: Opaque
      data: "{{ lookup('kubernetes.core.k8s', kind='Secret', namespace='sovereign-cloud', resource_name='amq-producer-credentials').data }}"

- name: Deploy namespace operator Deployment
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hybridsovereign-namespace-operator
        namespace: "{{ entity_tenant_namespace }}"
        labels:
          app.kubernetes.io/name: hybridsovereign-namespace-operator
          hybridsovereign.redhat/entity: "{{ ansible_operator_meta.name }}"
      spec:
        replicas: 1
        selector:
          matchLabels:
            app.kubernetes.io/name: hybridsovereign-namespace-operator
        template:
          metadata:
            labels:
              app.kubernetes.io/name: hybridsovereign-namespace-operator
          spec:
            serviceAccountName: hybridsovereign-namespace-operator
            imagePullSecrets:
              - name: quay-pull-secret
            securityContext:
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: manager
                image: "{{ lookup('env', 'NAMESPACE_OPERATOR_IMAGE') | default('quay.example.com/hybrid-sovereign/hybridsovereign-namespace-operator:0.1.0', true) }}"
                imagePullPolicy: Always
                args:
                  - --leader-elect
                  - --leader-election-id=hybridsovereign-namespace-operator-{{ ansible_operator_meta.name }}
                  - --health-probe-bind-address=:6789
                env:
                  - name: WATCH_NAMESPACE
                    value: "{{ entity_tenant_namespace }}"
                  - name: ANSIBLE_GATHERING
                    value: explicit
                  - name: KAFKA_BOOTSTRAP_SERVERS
                    valueFrom:
                      secretKeyRef:
                        name: amq-producer-credentials
                        key: bootstrap_servers
                  - name: KAFKA_TOPIC
                    valueFrom:
                      secretKeyRef:
                        name: amq-producer-credentials
                        key: topic
                  - name: KAFKA_USERNAME
                    valueFrom:
                      secretKeyRef:
                        name: amq-producer-credentials
                        key: username
                  - name: KAFKA_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: amq-producer-credentials
                        key: password
                  - name: KAFKA_CA_CERT
                    valueFrom:
                      secretKeyRef:
                        name: amq-producer-credentials
                        key: ca.crt
                  - name: KAFKA_SECURITY_PROTOCOL
                    valueFrom:
                      secretKeyRef:
                        name: amq-producer-credentials
                        key: security_protocol
                  - name: KAFKA_SASL_MECHANISM
                    valueFrom:
                      secretKeyRef:
                        name: amq-producer-credentials
                        key: sasl_mechanism
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: [ALL]
                resources:
                  requests:
                    cpu: 200m
                    memory: 1Gi
                  limits:
                    cpu: "2"
                    memory: 4Gi
