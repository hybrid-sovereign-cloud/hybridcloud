---
- block:
    - name: Get current timestamp
      ansible.builtin.set_fact:
        aapconfig_delete_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark AAPConfig as awaiting EDA delete
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: AAPConfig
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          message: Awaiting EDA delete
          lastReconciledAt: "{{ aapconfig_delete_transition_time }}"

    - name: Emit AAPConfig delete event
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: events.k8s.io/v1
          kind: Event
          metadata:
            namespace: "{{ ansible_operator_meta.namespace }}"
            generateName: "aapconfig-{{ ansible_operator_meta.name }}-delete-"
          regarding:
            apiVersion: hybridsovereign.redhat/v1alpha1
            kind: AAPConfig
            name: "{{ ansible_operator_meta.name }}"
            namespace: "{{ ansible_operator_meta.namespace }}"
            uid: "{{ _hybridsovereign_redhat_aapconfig.metadata.uid }}"
          reason: AAPConfigDeleteRequested
          note: "{{ _hybridsovereign_redhat_aapconfig.spec | to_json }}"
          type: Normal
          action: Delete
          reportingController: plugin-aap-operator
          reportingInstance: plugin-aap-operator
          eventTime: "{{ now(utc=true).isoformat() }}Z"

    - name: Exit cleanly when EDA completed deletion
      ansible.builtin.meta: end_host
      when: _hybridsovereign_redhat_aapconfig.status.deletionComplete | default(false) | bool

    - name: Block finalizer until EDA completes deletion
      ansible.builtin.fail:
        msg: Waiting for EDA to complete deletion

  rescue:
    - name: Mark AAPConfig delete as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: AAPConfig
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Deletion failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal finalizer failure
      ansible.builtin.fail:
        msg: "AAPConfig {{ ansible_operator_meta.name }} deletion failed — see status.message for details"
