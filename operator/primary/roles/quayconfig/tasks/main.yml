---
- block:
    - name: Set QuayConfig CR facts
      ansible.builtin.set_fact:
        quayconfig_spec: "{{ _hybridsovereign_redhat_quayconfig.spec | default({}) }}"
        quayconfig_generation: "{{ _hybridsovereign_redhat_quayconfig.metadata.generation | default(0) | int }}"
        quayconfig_observed_generation: "{{ _hybridsovereign_redhat_quayconfig.status.observedGeneration | default(0) | int }}"
        quayconfig_status: "{{ _hybridsovereign_redhat_quayconfig.status.status | default('') }}"
        quayconfig_ready: "{{ _hybridsovereign_redhat_quayconfig.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_quayconfig.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Validate QuayConfig spec prerequisites
      ansible.builtin.assert:
        that:
          - quayconfig_spec.secret is defined
          - quayconfig_spec.secret | length > 0
          - quayconfig_spec.rbacConfig is defined
          - quayconfig_spec.rbacConfig | length > 0
        fail_msg: QuayConfig spec requires non-empty secret and rbacConfig.

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: QuayConfig
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        quayconfig_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        quayconfig_event_reason: "{{ 'QuayConfigReconcileRequested' if reconcile_now | bool else 'QuayConfigCreateRequested' }}"
        quayconfig_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (quayconfig_observed_generation >= quayconfig_generation)
            and (quayconfig_status == 'ready')
            and (quayconfig_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: quayconfig_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        quayconfig_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark QuayConfig as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: QuayConfig
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ quayconfig_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ quayconfig_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Publish operator event to AMQ Streams
      ansible.builtin.include_role:
        name: _common
        tasks_from: publish_operator_event
      vars:
        operator_event_reason: "{{ quayconfig_event_reason }}"
        operator_event_action: "{{ quayconfig_event_action }}"
        operator_event_note: "{{ quayconfig_spec | to_json }}"
        operator_reporting_controller: plugin-quay-operator
        operator_event_regarding:
          apiVersion: hybridsovereign.redhat/v1alpha1
          kind: QuayConfig
          name: "{{ ansible_operator_meta.name }}"
          namespace: "{{ ansible_operator_meta.namespace }}"
          uid: "{{ _hybridsovereign_redhat_quayconfig.metadata.uid }}"


  rescue:
    - name: Mark QuayConfig as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: QuayConfig
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "QuayConfig {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
