---
- block:
    - name: Get current timestamp
      ansible.builtin.set_fact:
        entity_delete_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark Entity as awaiting EDA delete
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Entity
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          message: Awaiting EDA delete
          lastReconciledAt: "{{ entity_delete_transition_time }}"

    - name: Build compact Entity delete event note (K8s Event note field max 1024 chars)
      ansible.builtin.set_fact:
        entity_delete_event_note: >-
          {{
            {
              'billingID': (_hybridsovereign_redhat_entity.spec.billingID | default('')),
              'description': (_hybridsovereign_redhat_entity.spec.description | default('')) | truncate(400, True, '…'),
              'websiteLink': (_hybridsovereign_redhat_entity.spec.websiteLink | default(''))
            } | to_json
          }}

    - name: Publish operator event to AMQ Streams
      ansible.builtin.include_role:
        name: _common
        tasks_from: publish_operator_event
      vars:
        operator_event_reason: "EntityDeleteRequested"
        operator_event_action: "Delete"
        operator_event_note: "{{ entity_delete_event_note }}"
        operator_reporting_controller: entity-operator
        operator_event_regarding:
          apiVersion: hybridsovereign.redhat/v1alpha1
          kind: Entity
          name: "{{ ansible_operator_meta.name }}"
          namespace: "{{ ansible_operator_meta.namespace }}"
          uid: "{{ _hybridsovereign_redhat_entity.metadata.uid }}"


  rescue:
    - name: Mark Entity delete as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Entity
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Deletion failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal finalizer failure
      ansible.builtin.fail:
        msg: "Entity {{ ansible_operator_meta.name }} deletion failed — see status.message for details"

- name: Exit cleanly when EDA completed deletion
  ansible.builtin.meta: end_host
  when: _hybridsovereign_redhat_entity.status.deletionComplete | default(false) | bool

- name: Derive entity tenant namespace for teardown
  ansible.builtin.set_fact:
    entity_tenant_namespace: "entity-{{ ansible_operator_meta.name }}"

- name: Remove namespace operator Deployment
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: Deployment
    name: hybridsovereign-namespace-operator
    namespace: "{{ entity_tenant_namespace }}"
  ignore_errors: true

- name: Remove namespace operator ClusterRoleBinding
  kubernetes.core.k8s:
    state: absent
    api_version: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    name: "hybridsovereign-namespace-operator-{{ ansible_operator_meta.name }}"
  ignore_errors: true

- name: Remove namespace operator RoleBinding
  kubernetes.core.k8s:
    state: absent
    api_version: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    name: hybridsovereign-namespace-operator
    namespace: "{{ entity_tenant_namespace }}"
  ignore_errors: true

- name: Remove namespace operator Role
  kubernetes.core.k8s:
    state: absent
    api_version: rbac.authorization.k8s.io/v1
    kind: Role
    name: hybridsovereign-namespace-operator
    namespace: "{{ entity_tenant_namespace }}"
  ignore_errors: true

- name: Remove AMQ producer credentials from entity tenant namespace
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    name: amq-producer-credentials
    namespace: "{{ entity_tenant_namespace }}"
  ignore_errors: true

- name: Remove namespace operator ServiceAccount
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: ServiceAccount
    name: hybridsovereign-namespace-operator
    namespace: "{{ entity_tenant_namespace }}"
  ignore_errors: true

- name: Remove entity tenant namespace
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: "{{ entity_tenant_namespace }}"
  ignore_errors: true

- name: Block finalizer until EDA completes deletion
  ansible.builtin.fail:
    msg: Waiting for EDA to complete deletion
