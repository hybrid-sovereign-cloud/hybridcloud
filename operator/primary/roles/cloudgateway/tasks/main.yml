---
- block:
    - name: Set CloudGateway CR facts
      ansible.builtin.set_fact:
        cloudgateway_spec: "{{ _hybridsovereign_redhat_cloudgateway.spec | default({}) }}"
        cloudgateway_generation: "{{ _hybridsovereign_redhat_cloudgateway.metadata.generation | default(0) | int }}"
        cloudgateway_observed_generation: "{{ _hybridsovereign_redhat_cloudgateway.status.observedGeneration | default(0) | int }}"
        cloudgateway_status: "{{ _hybridsovereign_redhat_cloudgateway.status.status | default('') }}"
        cloudgateway_ready: "{{ _hybridsovereign_redhat_cloudgateway.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_cloudgateway.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: CloudGateway
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        cloudgateway_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        cloudgateway_event_reason: "{{ 'CloudGatewayReconcileRequested' if reconcile_now | bool else 'CloudGatewayCreateRequested' }}"
        cloudgateway_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (cloudgateway_observed_generation >= cloudgateway_generation)
            and (cloudgateway_status == 'ready')
            and (cloudgateway_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: cloudgateway_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        cloudgateway_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark CloudGateway as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: CloudGateway
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ cloudgateway_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ cloudgateway_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Publish operator event to AMQ Streams
      ansible.builtin.include_role:
        name: _common
        tasks_from: publish_operator_event
      vars:
        operator_event_reason: "{{ cloudgateway_event_reason }}"
        operator_event_action: "{{ cloudgateway_event_action }}"
        operator_event_note: "{{ cloudgateway_spec | to_json }}"
        operator_reporting_controller: cloudgateway-operator
        operator_event_regarding:
          apiVersion: hybridsovereign.redhat/v1alpha1
          kind: CloudGateway
          name: "{{ ansible_operator_meta.name }}"
          namespace: "{{ ansible_operator_meta.namespace }}"
          uid: "{{ _hybridsovereign_redhat_cloudgateway.metadata.uid }}"

  rescue:
    - name: Mark CloudGateway as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: CloudGateway
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "CloudGateway {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
