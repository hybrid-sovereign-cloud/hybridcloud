---
# No infrastructure teardown — clear finalizer after marking deletionComplete.
- block:
    - name: Get current timestamp
      ansible.builtin.set_fact:
        uihealthchecker_delete_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
        uihealthchecker_marked_delete: false

    - name: Exit cleanly when deletion already complete
      ansible.builtin.meta: end_host
      when: _hybridsovereign_redhat_uihealthchecker.status.deletionComplete | default(false) | bool

    - name: Mark UIHealthChecker deletion complete (URL registry only)
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: UIHealthChecker
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: ready
          ready: true
          deletionComplete: true
          message: No infra teardown required for UIHealthChecker
          lastReconciledAt: "{{ uihealthchecker_delete_transition_time }}"

    - name: Remember intentional requeue
      ansible.builtin.set_fact:
        uihealthchecker_marked_delete: true

    - name: Requeue so finalizer can clear after deletionComplete
      ansible.builtin.fail:
        msg: Requeue after marking UIHealthChecker deletionComplete

  rescue:
    - name: Re-raise intentional requeue after deletionComplete
      ansible.builtin.fail:
        msg: Requeue after marking UIHealthChecker deletionComplete
      when: uihealthchecker_marked_delete | default(false) | bool

    - name: Mark UIHealthChecker delete as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: UIHealthChecker
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Deletion failed')) }}"
      ignore_errors: true
      when: not (uihealthchecker_marked_delete | default(false) | bool)

    - name: Re-raise when delete did not complete
      ansible.builtin.fail:
        msg: "UIHealthChecker {{ ansible_operator_meta.name }} deletion failed — see status.message for details"
      when: not (uihealthchecker_marked_delete | default(false) | bool)
