---
- block:
    - name: Get current timestamp
      ansible.builtin.set_fact:
        rbac_config_delete_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark RbacConfig as awaiting EDA delete
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: RbacConfig
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          message: Awaiting EDA delete
          lastReconciledAt: "{{ rbac_config_delete_transition_time }}"

    - name: Publish operator event to AMQ Streams
      ansible.builtin.include_role:
        name: _common
        tasks_from: publish_operator_event
      vars:
        operator_event_reason: "RbacConfigDeleteRequested"
        operator_event_action: "Delete"
        operator_event_note: "{{ _hybridsovereign_redhat_rbacconfig.spec | to_json }}"
        operator_reporting_controller: plugin-rbac-operator
        operator_event_regarding:
          apiVersion: hybridsovereign.redhat/v1alpha1
          kind: RbacConfig
          name: "{{ ansible_operator_meta.name }}"
          namespace: "{{ ansible_operator_meta.namespace }}"
          uid: "{{ _hybridsovereign_redhat_rbacconfig.metadata.uid }}"


    - name: Exit cleanly when EDA completed deletion
      ansible.builtin.meta: end_host
      when: _hybridsovereign_redhat_rbacconfig.status.deletionComplete | default(false) | bool

    - name: Block finalizer until EDA completes deletion
      ansible.builtin.fail:
        msg: Waiting for EDA to complete deletion

  rescue:
    - name: Mark RbacConfig delete as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: RbacConfig
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Deletion failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal finalizer failure
      ansible.builtin.fail:
        msg: "RbacConfig {{ ansible_operator_meta.name }} deletion failed — see status.message for details"
