---
- block:
    - name: Set RbacConfig CR facts
      ansible.builtin.set_fact:
        rbac_config_spec: "{{ _hybridsovereign_redhat_rbacconfig.spec | default({}) }}"
        rbac_config_generation: "{{ _hybridsovereign_redhat_rbacconfig.metadata.generation | default(0) | int }}"
        rbac_config_observed_generation: "{{ _hybridsovereign_redhat_rbacconfig.status.observedGeneration | default(0) | int }}"
        rbac_config_status: "{{ _hybridsovereign_redhat_rbacconfig.status.status | default('') }}"
        rbac_config_ready: "{{ _hybridsovereign_redhat_rbacconfig.status.ready | default(false) | bool }}"
        reconcile_now: >-
          {{
            (_hybridsovereign_redhat_rbacconfig.metadata.annotations | default({}))
            .get('ansible.sdk.operatorframework.io/reconcileNow', '') | string == 'true'
          }}

    - name: Assert RbacConfig is in required operator namespace
      ansible.builtin.assert:
        that:
          - ansible_operator_meta.namespace == plugin_rbac_operator_namespace
        fail_msg: >-
          RbacConfig must be created in namespace '{{ plugin_rbac_operator_namespace }}'
          (current namespace is '{{ ansible_operator_meta.namespace }}').

    - name: Require Keycloak backend type
      ansible.builtin.assert:
        that:
          - rbac_config_spec.type == 'keycloak'
        fail_msg: >-
          spec.type must be 'keycloak' (received '{{ rbac_config_spec.type | default('missing') }}').

    - name: Clear reconcileNow annotation when forced reconcile
      kubernetes.core.k8s:
        state: patched
        api_version: hybridsovereign.redhat/v1alpha1
        kind: RbacConfig
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        definition:
          metadata:
            annotations:
              ansible.sdk.operatorframework.io/reconcileNow: null
      when: reconcile_now | bool

    - name: Set event action and reason
      ansible.builtin.set_fact:
        rbac_config_event_action: "{{ 'Reconcile' if reconcile_now | bool else 'Create' }}"
        rbac_config_event_reason: "{{ 'RbacConfigReconcileRequested' if reconcile_now | bool else 'RbacConfigCreateRequested' }}"
        rbac_config_skip_reconcile: >-
          {{
            (not (reconcile_now | bool))
            and (rbac_config_observed_generation >= rbac_config_generation)
            and (rbac_config_status == 'ready')
            and (rbac_config_ready | bool)
          }}

    - name: Skip when already processed
      ansible.builtin.meta: end_host
      when: rbac_config_skip_reconcile | bool

    - name: Get current timestamp
      ansible.builtin.set_fact:
        rbac_config_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark RbacConfig as reconciling
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: RbacConfig
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: reconciling
          ready: false
          lastReconciledAt: "{{ rbac_config_status_transition_time }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ rbac_config_status_transition_time }}"
              reason: AwaitingEDA
              message: Awaiting EDA to complete provisioning

    - name: Publish operator event to AMQ Streams
      ansible.builtin.include_role:
        name: _common
        tasks_from: publish_operator_event
      vars:
        operator_event_reason: "{{ rbac_config_event_reason }}"
        operator_event_action: "{{ rbac_config_event_action }}"
        operator_event_note: "{{ rbac_config_spec | to_json }}"
        operator_reporting_controller: plugin-rbac-operator
        operator_event_regarding:
          apiVersion: hybridsovereign.redhat/v1alpha1
          kind: RbacConfig
          name: "{{ ansible_operator_meta.name }}"
          namespace: "{{ ansible_operator_meta.namespace }}"
          uid: "{{ _hybridsovereign_redhat_rbacconfig.metadata.uid }}"


  rescue:
    - name: Mark RbacConfig as failed
      operator_sdk.util.k8s_status:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: RbacConfig
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        status:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: OperatorFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('Reconciliation failed')) }}"
      ignore_errors: true

    - name: Re-raise to signal operator failure
      ansible.builtin.fail:
        msg: "RbacConfig {{ ansible_operator_meta.name }} reconciliation failed — see status.message for details"
