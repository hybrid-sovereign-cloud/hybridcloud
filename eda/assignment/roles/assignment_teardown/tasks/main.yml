---
- block:
    - name: Parse event payload
      ansible.builtin.set_fact:
        assignment_cr_name: "{{ event_payload.regarding.name }}"
        assignment_cr_namespace: "{{ event_payload.regarding.namespace }}"
        assignment_operator_namespace: sovereign-cloud
        acm_central_sa_secret_name: assignment-acm-creator-sa
        acm_policy_namespace: sovereign-cloud-helpers
        central_api_server: "{{ lookup('env', 'CENTRAL_API_SERVER') }}"

    - name: Resolve services cluster API connection from Vault
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/resolve_services_cluster_connection.yml"

    - name: Read Assignment CR status from services cluster
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Assignment
        name: "{{ assignment_cr_name }}"
        namespace: "{{ assignment_cr_namespace }}"
      register: assignment_cr_lookup

    - name: Derive ACM policy name from Assignment CR name (unique per cluster)
      ansible.builtin.set_fact:
        delete_acm_policy_name: "{{ assignment_cr_name | lower | regex_replace('[^a-z0-9-]', '-') | regex_replace('-+$', '') }}"
        delete_acm_policy_name_legacy: >-
          {{ (assignment_cr_lookup.resources[0].status | default({})).acmPolicyName | default('') }}
      when: assignment_cr_lookup.resources | length > 0

    - name: Default ACM policy name when CR unavailable
      ansible.builtin.set_fact:
        delete_acm_policy_name: "{{ assignment_cr_name | lower | regex_replace('[^a-z0-9-]', '-') | regex_replace('-+$', '') }}"
        delete_acm_policy_name_legacy: ""
      when: assignment_cr_lookup.resources | length == 0

    - name: Skip ACM teardown if Assignment was never provisioned
      when: delete_acm_policy_name | length == 0
      block:
        - name: Get current timestamp for status
          ansible.builtin.set_fact:
            assignment_delete_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

        - name: Mark Assignment deletion complete without ACM cleanup
          ansible.builtin.include_tasks: "{{ role_path }}/../../common/tasks/patch_cr_status.yml"
          vars:
            cr_api_version: hybridsovereign.redhat/v1alpha1
            cr_plural: assignments
            cr_name: "{{ assignment_cr_name }}"
            cr_namespace: "{{ assignment_cr_namespace }}"
            cr_status_body:
              status: ready
              ready: false
              deletionComplete: true
              lastReconciledAt: "{{ assignment_delete_transition_time }}"
              message: Assignment {{ assignment_cr_name }} deleted by EDA (no ACM policy)

    - name: Teardown ACM resources when provisioned
      when: delete_acm_policy_name | length > 0
      block:
        - name: Read ACM creator SA secret from services cluster
          kubernetes.core.k8s_info:
            host: "{{ services_api_host }}"
            api_key: "{{ services_bearer_token }}"
            validate_certs: false
            api_version: v1
            kind: Secret
            name: "{{ acm_central_sa_secret_name }}"
            namespace: "{{ assignment_operator_namespace }}"
          register: acm_sa_secret
          no_log: true

        - name: Assert ACM creator SA secret available for delete
          ansible.builtin.assert:
            that:
              - acm_sa_secret.resources | default([]) | length > 0
            fail_msg: >-
              Cannot delete ACM Policy '{{ delete_acm_policy_name }}': ACM creator SA secret
              '{{ acm_central_sa_secret_name }}' not found.

        - name: Decode ACM central SA credentials for delete
          ansible.builtin.set_fact:
            acm_central_token: "{{ acm_sa_secret.resources[0].data.token | b64decode }}"
            acm_central_ca: "{{ acm_sa_secret.resources[0].data['ca.crt'] | b64decode }}"
          no_log: true

        - name: Write ACM central CA to temp file for delete
          ansible.builtin.copy:
            content: "{{ acm_central_ca }}"
            dest: /tmp/assignment-delete-central-ca.crt
            mode: '0600'
          no_log: true

        - name: Fetch current ACM Policy to get resourceVersion
          ansible.builtin.uri:
            url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/{{ acm_policy_namespace }}/policies/{{ delete_acm_policy_name }}"
            method: GET
            headers:
              Authorization: "Bearer {{ acm_central_token }}"
            validate_certs: false
            timeout: 120
            status_code: [200, 404]
          register: acm_policy_fetch
          no_log: true

        - name: Patch ACM Policy — set all ConfigurationPolicy templates to mustnothave
          ansible.builtin.uri:
            url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/{{ acm_policy_namespace }}/policies/{{ delete_acm_policy_name }}"
            method: PUT
            headers:
              Authorization: "Bearer {{ acm_central_token }}"
              Content-Type: application/json
            body_format: json
            body: >-
              {%- set policy = acm_policy_fetch.json -%}
              {%- set templates = [] -%}
              {%- for pt in (policy.spec['policy-templates'] | default([])) -%}
                {%- set cfg = pt.objectDefinition -%}
                {%- set obj_templates = [] -%}
                {%- for ot in (cfg.spec['object-templates'] | default([])) -%}
                  {%- set _ = obj_templates.append(ot | combine({'complianceType': 'mustnothave'})) -%}
                {%- endfor -%}
                {%- set new_cfg = cfg | combine({'spec': cfg.spec | combine({'object-templates': obj_templates})}) -%}
                {%- set _ = templates.append({'objectDefinition': new_cfg}) -%}
              {%- endfor -%}
              {{ policy | combine({'spec': policy.spec | combine({'policy-templates': templates})}) }}
            validate_certs: false
            timeout: 120
            status_code: [200]
          no_log: true
          ignore_errors: true
          when: acm_policy_fetch.status == 200

        - name: Wait for ACM to enforce mustnothave on spoke cluster
          ansible.builtin.pause:
            seconds: 60
            prompt: "Waiting for ACM to remove spoke resources via mustnothave enforcement..."
          when: acm_policy_fetch.status == 200

        - name: Delete ACM PlacementBinding from central
          ansible.builtin.uri:
            url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/{{ acm_policy_namespace }}/placementbindings/binding-{{ delete_acm_policy_name }}"
            method: DELETE
            headers:
              Authorization: "Bearer {{ acm_central_token }}"
            validate_certs: false
            timeout: 120
            status_code: [200, 202, 404]
          no_log: true
          ignore_errors: true
          when: acm_policy_fetch.status == 200

        - name: Delete ACM Placement from central
          ansible.builtin.uri:
            url: "{{ central_api_server }}/apis/cluster.open-cluster-management.io/v1beta1/namespaces/{{ acm_policy_namespace }}/placements/placement-{{ delete_acm_policy_name }}"
            method: DELETE
            headers:
              Authorization: "Bearer {{ acm_central_token }}"
            validate_certs: false
            timeout: 120
            status_code: [200, 202, 404]
          no_log: true
          ignore_errors: true
          when: acm_policy_fetch.status == 200

        - name: Delete ACM Policy from central
          ansible.builtin.uri:
            url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/{{ acm_policy_namespace }}/policies/{{ delete_acm_policy_name }}"
            method: DELETE
            headers:
              Authorization: "Bearer {{ acm_central_token }}"
            validate_certs: false
            timeout: 120
            status_code: [200, 202, 404]
          no_log: true
          ignore_errors: true
          when: acm_policy_fetch.status == 200

        - name: Cleanup temp CA file
          ansible.builtin.file:
            path: /tmp/assignment-delete-central-ca.crt
            state: absent
          ignore_errors: true

        - name: Get current timestamp for status
          ansible.builtin.set_fact:
            assignment_delete_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

        - name: Mark Assignment deletion complete on services cluster
          ansible.builtin.include_tasks: "{{ role_path }}/../../common/tasks/patch_cr_status.yml"
          vars:
            cr_api_version: hybridsovereign.redhat/v1alpha1
            cr_plural: assignments
            cr_name: "{{ assignment_cr_name }}"
            cr_namespace: "{{ assignment_cr_namespace }}"
            cr_status_body:
              status: ready
              ready: false
              deletionComplete: true
              lastReconciledAt: "{{ assignment_delete_transition_time }}"
              message: Assignment {{ assignment_cr_name }} deleted by EDA

  rescue:
    - name: Mark Assignment delete as failed on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: assignments
        cr_name: "{{ assignment_cr_name }}"
        cr_namespace: "{{ assignment_cr_namespace }}"
        cr_status_body:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA teardown failed')) }}"
      ignore_errors: true
      when: services_api_host is defined and services_bearer_token is defined

    - name: Re-raise teardown failure
      ansible.builtin.fail:
        msg: "Assignment {{ assignment_cr_name | default('unknown') }} EDA teardown failed"
