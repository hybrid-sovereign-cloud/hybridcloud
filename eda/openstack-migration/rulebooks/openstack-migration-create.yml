---
- name: OpenStackMigration Create Rulebook
  hosts: all
  sources:
    - ansible.eda.event_stream:
        event_stream_name: sovereign-operator-events
  rules:
    - name: Handle OpenStackMigration Request
      condition: >-
        event.payload.reason in ["OpenStackMigrationRequested", "OpenStackMigrationReconcileRequested"]
        and event.payload.regarding.kind == "OpenStackMigration"
      action:
        run_job_template:
          name: openstack-migration-provision
          organization: sovereign
          job_args:
            extra_vars:
              event_payload: "{{ event.payload }}"
