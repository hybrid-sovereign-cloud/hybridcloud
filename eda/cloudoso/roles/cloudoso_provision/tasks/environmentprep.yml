---
- name: Set environmentprep spec facts
  ansible.builtin.set_fact:
    ep_project: "{{ entity_name }}_{{ cloudoso_cr_name }}"
    ep_vault_path: "{{ oso_spec.vaultPath | default('oso/accounts/shc_admin') }}"
    ep_base_domain: "{{ oso_spec.baseDomain | default('{{ lookup('env', 'LAB_DOMAIN') }}') }}"
    ep_project_domain: "{{ oso_spec.projectDomain | default(default_project_domain) }}"
    ep_entity_name: "{{ entity_name }}"
    ep_route53_vault_path: "{{ oso_spec.route53VaultPath | default('oso/accounts/route53-openstack') }}"
    ep_external_network: "{{ oso_spec.externalNetwork | default(default_external_network) }}"
    ep_region_name: "{{ oso_spec.regionName | default(default_region_name) }}"
    ep_landingzone: "{{ oso_spec.landingzone | default('default') }}"
    ep_enable_vrf: "{{ oso_spec.enableVRF | default(false) | bool }}"
    ep_vrf_id: "{{ oso_spec.vrfId | default('') }}"
    use_designate_dns: "{{ (oso_spec.baseDomain | default('{{ lookup('env', 'LAB_DOMAIN') }}')) == '{{ lookup('env', 'BASE_DOMAIN') }}' }}"
    ep_parent_zone_id: >-
      {{ oso_spec.designateZoneId | default('')
         if ((oso_spec.baseDomain | default('{{ lookup('env', 'LAB_DOMAIN') }}')) == '{{ lookup('env', 'BASE_DOMAIN') }}')
         else '' }}

- name: Create temporary ExternalSecret for OpenStack admin credentials
  kubernetes.core.k8s:
    host: "{{ central_api_host }}"
    api_key: "{{ central_bearer_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: "eda-cloudoso-{{ cloudoso_cr_name }}-openstack-creds"
        namespace: "{{ eda_central_work_namespace }}"
        labels:
          app.kubernetes.io/managed-by: eda-cloudoso
          cloudoso: "{{ cloudoso_cr_name }}"
      spec:
        refreshInterval: 1m
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: "eda-cloudoso-{{ cloudoso_cr_name }}-openstack-creds"
          creationPolicy: Owner
        data:
          - secretKey: clouds.yaml
            remoteRef:
              key: "{{ ep_vault_path }}"
              property: clouds.yaml

- name: Wait for OpenStack admin credentials
  kubernetes.core.k8s_info:
    host: "{{ central_api_host }}"
    api_key: "{{ central_bearer_token }}"
    validate_certs: false
    api_version: v1
    kind: Secret
    name: "eda-cloudoso-{{ cloudoso_cr_name }}-openstack-creds"
    namespace: "{{ eda_central_work_namespace }}"
  register: openstack_admin_secret
  until: >-
    openstack_admin_secret.resources | length > 0 and
    openstack_admin_secret.resources[0].data is defined and
    openstack_admin_secret.resources[0].data['clouds.yaml'] is defined
  retries: 30
  delay: 10

- name: Write OpenStack clouds.yaml to temp path
  ansible.builtin.copy:
    content: "{{ openstack_admin_secret.resources[0].data['clouds.yaml'] | b64decode }}"
    dest: "/tmp/eda-cloudoso-{{ cloudoso_cr_name }}-clouds.yaml"
    mode: '0600'
  no_log: true

- name: Set clouds.yaml path for OpenStack operations
  ansible.builtin.set_fact:
    clouds_yaml_path: "/tmp/eda-cloudoso-{{ cloudoso_cr_name }}-clouds.yaml"

- name: Generate deterministic slug from CR name
  ansible.builtin.set_fact:
    ep_slug: "{{ (cloudoso_cr_name | hash('sha256'))[:5] }}"

- name: Derive domain names
  ansible.builtin.set_fact:
    ep_cluster_domain: >-
      {{ (cloudoso_cr_name ~ '.{{ lookup('env', 'BASE_DOMAIN') }}')
         if (use_designate_dns | default(false) | bool)
         else (ep_slug ~ '.' ~ ep_base_domain) }}

- name: Create OpenStack project
  openstack.cloud.project:
    cloud: "{{ clouds_yaml_cloud }}"
    name: "{{ ep_project }}"
    description: "Sovereign Cloud project for {{ ep_entity_name | default(cloudoso_cr_name) }}"
    state: present
  environment:
    OS_CLIENT_CONFIG_FILE: "{{ clouds_yaml_path }}"
  register: os_project

- name: Assign admin role to shc_admin on new project
  openstack.cloud.role_assignment:
    cloud: "{{ clouds_yaml_cloud }}"
    user: "{{ openstack_admin_user }}"
    role: admin
    project: "{{ ep_project }}"
    state: present
  environment:
    OS_CLIENT_CONFIG_FILE: "{{ clouds_yaml_path }}"

- name: Find or create floating IPs (idempotent via description tags)
  ansible.builtin.shell: |
    python3 -c "
    import openstack, json, sys, yaml, os
    cfg_path = os.environ.get('OS_CLIENT_CONFIG_FILE', '/etc/openstack/clouds.yaml')
    with open(cfg_path) as f:
        cfg = yaml.safe_load(f)
    cloud_cfg = cfg['clouds']['{{ clouds_yaml_cloud }}']
    auth = dict(cloud_cfg['auth'])
    auth['project_name'] = '{{ ep_project }}'
    auth['project_domain_name'] = '{{ ep_project_domain }}'
    conn = openstack.connect(auth=auth, region_name=cloud_cfg.get('region_name','regionOne'), identity_api_version='3')
    net = conn.network.find_network('{{ ep_external_network }}')
    if net is None:
        print('Network {{ ep_external_network }} not found', file=sys.stderr)
        sys.exit(1)

    cr_name = '{{ cloudoso_cr_name }}'
    api_tag = f'sovereign-{cr_name}-api'
    ingress_tag = f'sovereign-{cr_name}-ingress'

    def find_or_create_fip(conn, net_id, description):
        existing = list(conn.network.ips(description=description))
        if existing:
            return {'id': existing[0].id, 'ip': existing[0].floating_ip_address, 'created': False}
        fip = conn.network.create_ip(floating_network_id=net_id, description=description)
        return {'id': fip.id, 'ip': fip.floating_ip_address, 'created': True}

    api_result = find_or_create_fip(conn, net.id, api_tag)
    ingress_result = find_or_create_fip(conn, net.id, ingress_tag)
    print(json.dumps({'api': api_result, 'ingress': ingress_result}))
    "
  environment:
    OS_CLIENT_CONFIG_FILE: "{{ clouds_yaml_path }}"
  register: fip_result_raw
  changed_when: (fip_result_raw.stdout | from_json).api.created or (fip_result_raw.stdout | from_json).ingress.created

- name: Set VIP facts
  ansible.builtin.set_fact:
    ep_api_vip: "{{ (fip_result_raw.stdout | from_json).api.ip }}"
    ep_ingress_vip: "{{ (fip_result_raw.stdout | from_json).ingress.ip }}"
    ep_api_fip_id: "{{ (fip_result_raw.stdout | from_json).api.id }}"
    ep_ingress_fip_id: "{{ (fip_result_raw.stdout | from_json).ingress.id }}"

- name: Create temporary ExternalSecret for Route53 credentials
  when: not (use_designate_dns | default(false) | bool)
  kubernetes.core.k8s:
    host: "{{ central_api_host }}"
    api_key: "{{ central_bearer_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: "eda-cloudoso-{{ cloudoso_cr_name }}-route53-creds"
        namespace: "{{ eda_central_work_namespace }}"
        labels:
          app.kubernetes.io/managed-by: eda-cloudoso
          cloudoso: "{{ cloudoso_cr_name }}"
      spec:
        refreshInterval: 1m
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: "eda-cloudoso-{{ cloudoso_cr_name }}-route53-creds"
          creationPolicy: Owner
        data:
          - secretKey: AWS_ACCESS_KEY_ID
            remoteRef:
              key: "{{ ep_route53_vault_path }}"
              property: access-key
          - secretKey: AWS_SECRET_ACCESS_KEY
            remoteRef:
              key: "{{ ep_route53_vault_path }}"
              property: secret-access-key

- name: Wait for Route53 credentials
  when: not (use_designate_dns | default(false) | bool)
  kubernetes.core.k8s_info:
    host: "{{ central_api_host }}"
    api_key: "{{ central_bearer_token }}"
    validate_certs: false
    api_version: v1
    kind: Secret
    name: "eda-cloudoso-{{ cloudoso_cr_name }}-route53-creds"
    namespace: "{{ eda_central_work_namespace }}"
  register: route53_creds_secret
  until: >-
    route53_creds_secret.resources | length > 0 and
    route53_creds_secret.resources[0].data is defined
  retries: 30
  delay: 10

- name: Decode Route53 credentials
  when: not (use_designate_dns | default(false) | bool)
  ansible.builtin.set_fact:
    r53_access_key_id: "{{ route53_creds_secret.resources[0].data.AWS_ACCESS_KEY_ID | b64decode }}"
    r53_secret_access_key: "{{ route53_creds_secret.resources[0].data.AWS_SECRET_ACCESS_KEY | b64decode }}"
  no_log: true

- name: List existing Route53 hosted zones
  when: not (use_designate_dns | default(false) | bool)
  amazon.aws.route53_info:
    query: hosted_zone
  register: r53_zones
  environment:
    AWS_ACCESS_KEY_ID: "{{ r53_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ r53_secret_access_key }}"
    AWS_DEFAULT_REGION: "us-east-1"

- name: Set Route53 facts
  when: not (use_designate_dns | default(false) | bool)
  ansible.builtin.set_fact:
    ep_parent_zone_name: "{{ ep_base_domain }}."
    r53_existing_zones: "{{ r53_zones.hosted_zones | map(attribute='name') | list }}"

- name: Find parent hosted zone ID
  when: not (use_designate_dns | default(false) | bool)
  ansible.builtin.set_fact:
    ep_parent_zone_id: >-
      {{ (r53_zones.hosted_zones
          | selectattr('name', 'equalto', ep_parent_zone_name)
          | map(attribute='id')
          | first
          | default(''))
         | regex_replace('^/hostedzone/', '') }}

- name: Fail if parent zone not found
  ansible.builtin.fail:
    msg: "Parent Route53 zone '{{ ep_base_domain }}' not found"
  when:
    - not (use_designate_dns | default(false) | bool)
    - ep_parent_zone_id == ''

- name: Use parent zone for DNS records
  when: not (use_designate_dns | default(false) | bool)
  ansible.builtin.set_fact:
    ep_subdomain_zone_id: "{{ ep_parent_zone_id }}"

- name: Read Vault root token
  kubernetes.core.k8s_info:
    host: "{{ central_api_host }}"
    api_key: "{{ central_bearer_token }}"
    validate_certs: false
    api_version: v1
    kind: Secret
    name: "{{ vault_init_secret_name }}"
    namespace: "{{ vault_init_secret_namespace }}"
  register: vault_init_secret_info_ep

- name: Set Vault root token
  ansible.builtin.set_fact:
    vault_root_token_ep: "{{ vault_init_secret_info_ep.resources[0].data.root_token | b64decode }}"
  no_log: true

- name: Check existing credential in Vault
  ansible.builtin.uri:
    url: "{{ vault_init_addr }}/v1/central/data/oso/projects/{{ cloudoso_cr_name }}/clouds-config"
    method: GET
    headers:
      X-Vault-Token: "{{ vault_root_token_ep }}"
    status_code: [200, 404]
    validate_certs: false
  register: vault_creds_check
  no_log: true

- name: Set existing credential fact
  ansible.builtin.set_fact:
    existing_cred_in_vault: "{{ vault_creds_check.status == 200 and (vault_creds_check.json.data.data['clouds.yaml'] | default('')) | length > 0 }}"

- name: Validate existing credential against OpenStack
  ansible.builtin.shell: |
    python3 -c "
    import openstack, json, sys, yaml, os
    cfg_path = os.environ.get('OS_CLIENT_CONFIG_FILE', '/etc/openstack/clouds.yaml')
    with open(cfg_path) as f:
        cfg = yaml.safe_load(f)
    cloud_cfg = cfg['clouds']['{{ clouds_yaml_cloud }}']
    auth = dict(cloud_cfg['auth'])
    auth['project_name'] = '{{ ep_project }}'
    auth['project_domain_name'] = '{{ ep_project_domain }}'
    conn = openstack.connect(auth=auth, region_name=cloud_cfg.get('region_name','regionOne'), identity_api_version='3')
    cred_name = 'sovereign-{{ ep_project }}'
    existing = list(conn.identity.application_credentials(user=conn.current_user_id, name=cred_name))
    if existing:
        print(json.dumps({'exists': True, 'id': existing[0].id}))
    else:
        print(json.dumps({'exists': False}))
    "
  environment:
    OS_CLIENT_CONFIG_FILE: "{{ clouds_yaml_path }}"
  register: cred_check_raw
  changed_when: false
  no_log: true

- name: Parse credential check
  ansible.builtin.set_fact:
    cred_check: "{{ cred_check_raw.stdout | from_json }}"
  no_log: true

- name: Create application credential via openstacksdk (only if not exists)
  ansible.builtin.shell: |
    python3 -c "
    import openstack, json, sys, yaml, os
    cfg_path = os.environ.get('OS_CLIENT_CONFIG_FILE', '/etc/openstack/clouds.yaml')
    with open(cfg_path) as f:
        cfg = yaml.safe_load(f)
    cloud_cfg = cfg['clouds']['{{ clouds_yaml_cloud }}']
    auth = dict(cloud_cfg['auth'])
    auth['project_name'] = '{{ ep_project }}'
    auth['project_domain_name'] = '{{ ep_project_domain }}'
    conn = openstack.connect(auth=auth, region_name=cloud_cfg.get('region_name','regionOne'), identity_api_version='3')
    cred_name = 'sovereign-{{ ep_project }}'
    existing = list(conn.identity.application_credentials(user=conn.current_user_id, name=cred_name))
    for old in existing:
        conn.identity.delete_application_credential(conn.current_user_id, old.id)
    c = conn.identity.create_application_credential(
        user=conn.current_user_id,
        name=cred_name,
        description='Auto-generated by CloudOSO EDA for project {{ ep_project }}')
    print(json.dumps({'id': c.id, 'secret': c.secret, 'auth_url': auth.get('auth_url','')}))
    "
  environment:
    OS_CLIENT_CONFIG_FILE: "{{ clouds_yaml_path }}"
  register: app_cred_raw
  changed_when: true
  no_log: true
  when: not (existing_cred_in_vault | bool and cred_check.exists | bool)

- name: Parse application credential result (new credential)
  ansible.builtin.set_fact:
    app_cred_data: "{{ app_cred_raw.stdout | from_json }}"
  no_log: true
  when: app_cred_raw is not skipped

- name: Set credential as unchanged (existing credential reused)
  ansible.builtin.set_fact:
    app_cred_unchanged: true
  when: app_cred_raw is skipped

- name: Reuse Vault root token
  ansible.builtin.set_fact:
    vault_root_token: "{{ vault_root_token_ep }}"
  no_log: true

- name: Build per-project clouds.yaml content
  ansible.builtin.set_fact:
    project_clouds_yaml: |
      clouds:
        openstack:
          auth:
            auth_url: "{{ app_cred_data.auth_url | default('https://identity.atuin.{{ lookup('env', 'BASE_DOMAIN') }}') }}"
            application_credential_id: "{{ app_cred_data.id }}"
            application_credential_secret: "{{ app_cred_data.secret }}"
          region_name: "{{ ep_region_name }}"
          interface: "public"
          identity_api_version: 3
          auth_type: "v3applicationcredential"
  no_log: true
  when: app_cred_unchanged is not defined

- name: Write per-project clouds.yaml to Vault
  ansible.builtin.uri:
    url: "{{ vault_init_addr }}/v1/central/data/oso/projects/{{ cloudoso_cr_name }}/clouds-config"
    method: POST
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      data:
        clouds.yaml: "{{ project_clouds_yaml }}"
    status_code: [200, 204]
    validate_certs: false
  no_log: true
  when: app_cred_unchanged is not defined

- name: Set Designate DNS zone id when not using Route53
  when: use_designate_dns | default(false) | bool
  ansible.builtin.set_fact:
    ep_parent_zone_id: "{{ oso_spec.designateZoneId | default('') }}"

- name: Set CloudOSO environmentprep output facts
  ansible.builtin.set_fact:
    oso_project_name: "{{ os_project.project.name | default(ep_project) }}"
    oso_project_id: "{{ os_project.project.id | default('') }}"
    oso_domain_id: "{{ os_project.project.domain_id | default('') }}"
    oso_domain_name: "{{ os_project.project.domain_name | default(ep_project_domain) }}"
    oso_slug: "{{ ep_slug }}"
    oso_dns_domain: "{{ ep_cluster_domain }}"
    oso_route53_zone_id: "{{ ep_parent_zone_id | default('') }}"
    oso_api_vip: "{{ ep_api_vip }}"
    oso_ingress_vip: "{{ ep_ingress_vip }}"
    oso_external_network: "{{ ep_external_network }}"
