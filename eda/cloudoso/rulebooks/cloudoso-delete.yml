---
- name: CloudOSO Delete Rulebook
  hosts: all
  sources:
    - ansible.eda.event_stream:
        event_stream_name: sovereign-operator-events
  rules:
    - name: Handle CloudOSO Delete
      condition: event.payload.reason == "CloudOSODeleteRequested" and event.payload.regarding.kind == "CloudOSO"
      action:
        run_playbook:
          name: cloudoso-teardown-playbook.yml
          extra_vars:
            event_payload: "{{ event.payload }}"
