---
version: 3
images:
  base_image:
    name: "registry.redhat.io/ansible-automation-platform-25/de-supported-rhel9:latest"
dependencies:
  galaxy:
    collections:
      - name: kubernetes.core
        version: ">=3.0.0"
      - name: openstack.cloud
        version: ">=2.5.0"
      - name: amazon.aws
        version: ">=8.0.0"
  python:
    - kubernetes>=28.1.0
    - requests>=2.31.0
    - openstacksdk>=2.0.0
    - boto3>=1.34.0
    - PyYAML>=6.0.0
  system:
    - pkg-config
    - systemd-devel [compile platform:rpm]
options:
  package_manager_path: /usr/bin/microdnf
