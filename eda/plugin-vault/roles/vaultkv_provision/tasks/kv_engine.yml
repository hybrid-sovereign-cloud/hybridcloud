- name: Create admin policy
  ansible.builtin.uri:
    url: "{{ vault_url }}/v1/sys/policies/acl/{{ kv_path }}-admin"
    method: PUT
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      policy: |
        path "{{ kv_path }}/*" {
          capabilities = ["create", "read", "update", "delete", "list"]
        }
        path "{{ kv_path }}/metadata/*" {
          capabilities = ["list", "read", "delete"]
        }
    validate_certs: false
    status_code: [200, 204]

- name: Create reader policy
  ansible.builtin.uri:
    url: "{{ vault_url }}/v1/sys/policies/acl/{{ kv_path }}-reader"
    method: PUT
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      policy: |
        path "{{ kv_path }}/data/*" {
          capabilities = ["read", "list"]
        }
        path "{{ kv_path }}/metadata/*" {
          capabilities = ["list", "read"]
        }
    validate_certs: false
    status_code: [200, 204]

- name: Create ops policy
  ansible.builtin.uri:
    url: "{{ vault_url }}/v1/sys/policies/acl/{{ kv_path }}-ops"
    method: PUT
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      policy: |
        path "{{ kv_path }}/data/*" {
          capabilities = ["create", "read", "update", "delete", "list"]
        }
        path "{{ kv_path }}/metadata/*" {
          capabilities = ["delete", "list", "read"]
        }
    validate_certs: false
    status_code: [200, 204]

- name: Create developer policy
