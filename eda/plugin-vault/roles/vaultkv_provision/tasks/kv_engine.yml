      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      policy: |
        path "{{ kv_path }}/data/*" {
          capabilities = ["create", "read", "list"]
        }
        path "{{ kv_path }}/metadata/*" {
          capabilities = ["read", "list"]
        }
    validate_certs: false
    status_code: [200, 204]

- name: Create external group for admin RBAC groups
  loop: "{{ admin_group_paths }}"
  ansible.builtin.uri:
    url: "{{ vault_url }}/v1/identity/group"
    method: PUT
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      name: "{{ item }}-admin"
      type: external
      policies: ["{{ kv_path }}-admin"]
    validate_certs: false
    status_code: [200, 204]

- name: Create external group for reader RBAC groups
  loop: "{{ reader_group_paths }}"
  ansible.builtin.uri:
    url: "{{ vault_url }}/v1/identity/group"
    method: PUT
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      name: "{{ item }}-reader"
      type: external
      policies: ["{{ kv_path }}-reader"]
    validate_certs: false
    status_code: [200, 204]

- name: Create external group for ops RBAC groups
  loop: "{{ ops_group_paths }}"
  ansible.builtin.uri:
