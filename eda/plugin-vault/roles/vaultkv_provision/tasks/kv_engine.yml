    body_format: json
    body:
      name: "{{ item }}-developer"
      type: external
      policies: ["{{ kv_path }}-developer"]
    validate_certs: false
    status_code: [200, 204]

- name: Get OIDC auth accessor
  ansible.builtin.uri:
    url: "{{ vault_url }}/v1/sys/auth"
    method: GET
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    validate_certs: false
    status_code: [200]
  register: auth_methods

- name: Record OIDC accessor
  ansible.builtin.set_fact:
    oidc_accessor: "{{ auth_methods.json['oidc/'].accessor }}"
  when: "'oidc/' in auth_methods.json"

- name: Create group alias for admin groups
  loop: "{{ admin_group_paths }}"
  when: oidc_accessor is defined
  ansible.builtin.uri:
    url: "{{ vault_url }}/v1/identity/group-alias"
    method: PUT
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      name: "/{{ item }}"
      mount_accessor: "{{ oidc_accessor }}"
      canonical_id: ""
    validate_certs: false
    status_code: [200, 204, 400]
  ignore_errors: true

- name: Create group alias for reader groups
  loop: "{{ reader_group_paths }}"
  when: oidc_accessor is defined
  ansible.builtin.uri:
    url: "{{ vault_url }}/v1/identity/group-alias"
