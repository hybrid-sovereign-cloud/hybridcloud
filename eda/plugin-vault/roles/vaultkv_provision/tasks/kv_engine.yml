---
- name: Enable KV v2 secrets engine
  ansible.builtin.uri:
    url: "{{ vault_url }}/v1/sys/mounts/{{ kv_path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      type: kv
      options:
        version: "2"
    validate_certs: false
    status_code: [200, 204, 400]

- name: Resolve admin Rbac groups from Keycloak
  when: vaultkv_spec.vaultAdminRbac is defined and vaultkv_spec.vaultAdminRbac | length > 0
  block:
    - name: Read admin Rbac CRs
      kubernetes.core.k8s_info:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Rbac
        name: "{{ item }}"
        namespace: "{{ vaultkv_cr_namespace }}"
      register: admin_rbac_crs
      loop: "{{ vaultkv_spec.vaultAdminRbac }}"

    - name: Build admin group paths
      ansible.builtin.set_fact:
        admin_group_paths: >-
          {{
            admin_rbac_crs.results
            | selectattr('resources', 'defined')
            | map(attribute='resources')
            | flatten
            | selectattr('status.group', 'defined')
            | map(attribute='status.group')
            | list
          }}

- name: Default admin groups to empty
  when: vaultkv_spec.vaultAdminRbac is not defined or vaultkv_spec.vaultAdminRbac | length == 0
  ansible.builtin.set_fact:
    admin_group_paths: []

- name: Resolve reader Rbac groups
  when: vaultkv_spec.vaultReaderRbac is defined and vaultkv_spec.vaultReaderRbac | length > 0
