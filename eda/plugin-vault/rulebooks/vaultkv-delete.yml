---
- name: VaultKV Delete Rulebook
  hosts: all
  sources:
    - ansible.eda.event_stream:
        event_stream_name: sovereign-operator-events
  rules:
    - name: Handle VaultKV Delete
      condition: event.payload.reason == "VaultKVDeleteRequested" and event.payload.regarding.kind == "VaultKV"
      action:
        run_playbook:
          name: vaultkv-teardown-playbook.yml
          extra_vars:
            event_payload: "{{ event.payload }}"
