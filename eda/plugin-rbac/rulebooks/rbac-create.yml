---
- name: Rbac Create Rulebook
  hosts: all
  sources:
    - ansible.eda.event_stream:
        event_stream_name: sovereign-operator-events
  rules:
    - name: Handle Rbac Create
      condition: event.payload.reason in ["RbacCreateRequested", "RbacReconcileRequested"] and event.payload.regarding.kind == "Rbac"
      action:
        run_playbook:
          name: rbac-provision-playbook.yml
          extra_vars:
            event_payload: "{{ event.payload }}"
