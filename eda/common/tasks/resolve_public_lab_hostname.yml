---
# Resolve a lab.example.com hostname via public DNS (Google DNS-over-HTTPS).
# Cluster CoreDNS forwards lab.example.com to internal servers that return stale dual A records.
# Required var: resolve_hostname (bare FQDN).

- name: Skip public DNS lookup when hostname is already an IP
  ansible.builtin.set_fact:
    resolve_public_ip: "{{ resolve_hostname }}"
  when: resolve_hostname is match('^[0-9.]+$')

- name: Resolve {{ resolve_hostname }} via public DNS (DNS-over-HTTPS)
  ansible.builtin.uri:
    url: "https://dns.google/resolve?name={{ resolve_hostname | urlencode }}&type=A"
    return_content: true
    validate_certs: true
    status_code: [200]
  register: _resolve_public_doh
  changed_when: false
  when: resolve_public_ip is not defined

- name: Record first public DNS A record for {{ resolve_hostname }}
  ansible.builtin.set_fact:
    resolve_public_ip: >-
      {{
        (_resolve_public_doh.json.Answer | default([]))
        | selectattr('type', 'equalto', 1)
        | map(attribute='data')
        | select('match', '^[0-9.]+$')
        | first
      }}
  when:
    - resolve_public_ip is not defined
    - _resolve_public_doh is defined
    - _resolve_public_doh.json.Answer | default([]) | length > 0

- name: Fall back to known public ingress IP
  ansible.builtin.set_fact:
    resolve_public_ip: "{{ lookup('env', 'LAB_PUBLIC_INGRESS_IP') | default('75.8.222.17', true) }}"
  when: resolve_public_ip is not defined

- name: Fail when public DNS lookup returned no A record
  ansible.builtin.fail:
    msg: "Public DNS lookup failed for {{ resolve_hostname }}"
  when: resolve_public_ip is not defined
