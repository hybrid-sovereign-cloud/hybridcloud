---
# Rewrite services_api_host to the public DNS IP (avoids stale cluster DNS A records).
- name: Parse services API hostname from URL
  ansible.builtin.set_fact:
    _services_api_hostname: >-
      {{
        services_api_host
        | regex_replace('^https?://', '')
        | regex_replace('/.*$', '')
        | regex_replace(':.*$', '')
      }}

- name: Resolve services API hostname to reachable cluster API IP
  ansible.builtin.include_tasks: resolve_lab_ingress_ip.yml
  vars:
    resolve_hostname: "{{ _services_api_hostname }}"
  when: _services_api_hostname is not match('^[0-9.]+$')

- name: Rewrite services API URL to public DNS IP
  ansible.builtin.set_fact:
    services_api_host: >-
      {{
        ('https' if services_api_host is match('^https') else 'http')
        ~ '://' ~ resolve_public_ip ~ ':6443'
      }}
  when: resolve_public_ip is defined

- name: Override services API host from SERVICES_API_FORCE_IP env
  ansible.builtin.set_fact:
    services_api_host: >-
      {{
        ('https' if services_api_host is match('^https') else 'http')
        ~ '://' ~ lookup('env', 'SERVICES_API_FORCE_IP') ~ ':6443'
      }}
  when: lookup('env', 'SERVICES_API_FORCE_IP') | length > 0
