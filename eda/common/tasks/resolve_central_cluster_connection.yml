---
# Load central_api_host + central_bearer_token from Vault (openshift-central-kubeadmin).

- name: Read central cluster kubeadmin credentials from Vault
  ansible.builtin.include_tasks: vault_kv_read.yml
  vars:
    vault_kv_path: openshift-central-kubeadmin

- name: Validate kubeadmin password is plaintext (not bcrypt hash from kube secret)
  ansible.builtin.assert:
    that:
      - not (vault_kv_data.password is search('^\$2[aby]\$'))
    fail_msg: >-
      openshift-central-kubeadmin password in Vault looks like a bcrypt hash.
      Re-seed Vault with the plaintext kubeadmin password (OCP_CENTRAL_KUBEADMIN_PASSWORD).

- name: Set central API host from Vault
  ansible.builtin.set_fact:
    central_api_host_raw: "{{ vault_kv_data.api_host }}"
  no_log: true

- name: Parse central API hostname
  ansible.builtin.set_fact:
    _central_api_hostname: >-
      {{
        central_api_host_raw
        | regex_replace('^https?://', '')
        | regex_replace('/.*$', '')
        | regex_replace(':.*$', '')
      }}

- name: Resolve central API hostname to reachable cluster API IP
  ansible.builtin.include_tasks: resolve_lab_ingress_ip.yml
  vars:
    resolve_hostname: "{{ _central_api_hostname }}"

- name: Build central API URL with reachable cluster API IP
  ansible.builtin.set_fact:
    central_api_host: "https://{{ resolve_public_ip }}:6443"

- name: Obtain central cluster API bearer token via kubeadmin OAuth
  ansible.builtin.include_tasks: obtain_openshift_access_token.yml
  vars:
    ocp_api_host: "{{ vault_kv_data.api_host }}"
    ocp_username: "{{ vault_kv_data.username }}"
    ocp_password: "{{ vault_kv_data.password }}"

- name: Record central bearer token from kubeadmin login
  ansible.builtin.set_fact:
    central_bearer_token: "{{ openshift_access_token }}"
  no_log: true
