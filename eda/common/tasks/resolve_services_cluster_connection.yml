---
# Load services_api_host + services_bearer_token from Vault (openshift-services-kubeadmin).

- name: Read services cluster kubeadmin credentials from Vault
  ansible.builtin.include_tasks: vault_kv_read.yml
  vars:
    vault_kv_path: openshift-services-kubeadmin

- name: Validate kubeadmin password is plaintext (not bcrypt hash from kube secret)
  ansible.builtin.assert:
    that:
      - not (vault_kv_data.password is search('^\$2[aby]\$'))
    fail_msg: >-
      openshift-services-kubeadmin password in Vault looks like a bcrypt hash.
      Re-seed Vault with the plaintext kubeadmin password (OCP_SERVICES_KUBEADMIN_PASSWORD).

- name: Set services API host from Vault
  ansible.builtin.set_fact:
    services_api_host: "{{ vault_kv_data.api_host }}"
  no_log: true

- name: Obtain services cluster API bearer token via kubeadmin OAuth
  ansible.builtin.include_tasks: obtain_openshift_access_token.yml
  vars:
    ocp_api_host: "{{ vault_kv_data.api_host }}"
    ocp_username: "{{ vault_kv_data.username }}"
    ocp_password: "{{ vault_kv_data.password }}"

- name: Record services bearer token from kubeadmin login
  ansible.builtin.set_fact:
    services_bearer_token: "{{ openshift_access_token }}"
  no_log: true
