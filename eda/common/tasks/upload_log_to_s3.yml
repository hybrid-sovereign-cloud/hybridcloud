---
# Upload EDA job log to NooBaa S3 and set eda_s3_log_url fact.
# Required vars:
#   cr_name, cr_namespace, cr_kind  - identify the CR
#   cr_status_body                  - the status dict (used for log content)
#   s3_access_key, s3_secret_key    - NooBaa S3 credentials
#   s3_bucket                       - S3 bucket name (eda-job-logs)
#   s3_endpoint                     - S3 external endpoint URL
# Optional:
#   eda_log_extra                   - extra dict to include in log (e.g. error message)
#
# Sets fact: eda_s3_log_url (empty string if upload fails)

- name: "Write S3 log upload script for {{ cr_kind }}/{{ cr_name }}"
  ansible.builtin.copy:
    dest: /tmp/upload_eda_log.py
    mode: "0755"
    content: |
      import json, boto3, sys, datetime, os, traceback
      from botocore.client import Config
      from botocore.exceptions import ClientError
      try:
          access_key  = os.environ["S3_ACCESS_KEY"]
          secret_key  = os.environ["S3_SECRET_KEY"]
          bucket      = os.environ["S3_BUCKET"]
          endpoint    = os.environ["S3_ENDPOINT"].rstrip("/")
          cr_name     = os.environ["CR_NAME"]
          cr_ns       = os.environ["CR_NAMESPACE"]
          cr_kind     = os.environ["CR_KIND"]
          cr_action   = os.environ.get("CR_ACTION", "provision")
          status_body = json.loads(os.environ.get("CR_STATUS_BODY", "{}"))
          log_extra   = json.loads(os.environ.get("LOG_EXTRA", "{}"))

          now = datetime.datetime.now(datetime.UTC)
          ts  = now.strftime("%Y%m%dT%H%M%SZ")

          log_obj = {
              "timestamp": now.isoformat(),
              "cr_kind": cr_kind,
              "cr_name": cr_name,
              "cr_namespace": cr_ns,
              "action": cr_action,
              "status": status_body,
          }
          if log_extra:
              log_obj["extra"] = log_extra

          log_body = json.dumps(log_obj, indent=2, default=str)
          key = f"{cr_kind}/{cr_ns}/{cr_name}/{ts}.json"

          s3 = boto3.client(
              "s3",
              endpoint_url=endpoint,
              aws_access_key_id=access_key,
              aws_secret_access_key=secret_key,
              config=Config(signature_version="s3v4"),
              verify=False,
          )

          # Try to set public-read ACL (NooBaa supports this)
          try:
              s3.put_bucket_acl(Bucket=bucket, ACL="public-read")
          except ClientError:
              pass  # already set or not supported; continue

          s3.put_object(
              Bucket=bucket,
              Key=key,
              Body=log_body.encode("utf-8"),
              ContentType="application/json",
              ACL="public-read",
          )

          url = f"{endpoint}/{bucket}/{key}"
          print(url)
          sys.exit(0)
      except Exception as e:
          print(f"WARN: S3 log upload failed: {e}", file=sys.stderr)
          traceback.print_exc(file=sys.stderr)
          # Non-fatal: print empty url so caller can fall back to EDA URL
          print("")
          sys.exit(0)

- name: "Upload job log to S3 for {{ cr_kind }}/{{ cr_name }}"
  ansible.builtin.command: python3 /tmp/upload_eda_log.py
  environment:
    S3_ACCESS_KEY: "{{ s3_access_key | default('') }}"
    S3_SECRET_KEY: "{{ s3_secret_key | default('') }}"
    S3_BUCKET: "{{ s3_bucket | default('eda-job-logs') }}"
    S3_ENDPOINT: "{{ s3_endpoint | default('https://s3-openshift-storage.apps.services.{{ lookup('env', 'LAB_DOMAIN') }}') }}"
    CR_NAME: "{{ cr_name }}"
    CR_NAMESPACE: "{{ cr_namespace }}"
    CR_KIND: "{{ cr_kind }}"
    CR_ACTION: "{{ cr_status_body.status | default('provision') }}"
    CR_STATUS_BODY: "{{ cr_status_body | to_json }}"
    LOG_EXTRA: "{{ eda_log_extra | default({}) | to_json }}"
  register: _s3_upload_result
  changed_when: false
  ignore_errors: true

- name: "Set eda_s3_log_url fact"
  ansible.builtin.set_fact:
    eda_s3_log_url: "{{ (_s3_upload_result.stdout | default('')) | trim }}"
