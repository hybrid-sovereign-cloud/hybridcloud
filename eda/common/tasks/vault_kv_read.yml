---
# Read a secret from Vault KV v2 using the admin token injected on the EE job.
# Required var: vault_kv_path. Sets: vault_kv_data (dict of secret fields).
# Uses env VAULT_ADDR (default in-cluster) and VAULT_TOKEN.

- name: Validate Vault admin token is available on the job
  ansible.builtin.assert:
    that:
      - lookup('env', 'VAULT_TOKEN') | length > 0
    fail_msg: >-
      VAULT_TOKEN is not set. Attach sovereign-vault-admin-credential to the job template.

- name: Read {{ vault_kv_path }} from Vault KV
  ansible.builtin.uri:
    url: >-
      {{ lookup('env', 'VAULT_ADDR') | default('http://vault-active.central-vault.svc:8200', true) }}/v1/{{ vault_kv_mount | default('central') }}/data/{{ vault_kv_path }}
    method: GET
    headers:
      X-Vault-Token: "{{ lookup('env', 'VAULT_TOKEN') }}"
    validate_certs: false
    status_code: [200]
  register: _vault_kv_read
  no_log: true

- name: Expose Vault KV secret fields
  ansible.builtin.set_fact:
    vault_kv_data: "{{ _vault_kv_read.json.data.data }}"
  no_log: true
