---
- name: "Write status patch script for {{ cr_plural }}/{{ cr_name }}"
  ansible.builtin.copy:
    dest: /tmp/patch_status.py
    mode: "0755"
    content: |
      import json, requests, urllib3, sys, datetime, os, traceback
      urllib3.disable_warnings()
      try:
          api_host = os.environ["CR_API_HOST"]
          token = os.environ["CR_TOKEN"]
          cr_api = os.environ["CR_API_VERSION"]
          cr_ns = os.environ["CR_NAMESPACE"]
          cr_plural = os.environ["CR_PLURAL"]
          cr_name = os.environ["CR_NAME"]
          url = f"{api_host}/apis/{cr_api}/namespaces/{cr_ns}/{cr_plural}/{cr_name}/status"

          eda_host = os.environ.get("EDA_HOST") or "https://sovereign-aap-aap.apps.central.lab.example.com"
          activation_id = os.environ.get("EDA_ACTIVATION_ID", "")
          activation_name = os.environ.get("EDA_ACTIVATION_NAME", "")
          cr_action = os.environ.get("CR_ACTION", "reconcile")
          cr_kind = cr_plural.rstrip("s")
          now = datetime.datetime.now(datetime.UTC).strftime("%Y-%m-%dT%H:%M:%SZ")

          tower_job_id = os.environ.get("TOWER_JOB_ID", "").strip()
          tower_url = (os.environ.get("TOWER_URL") or os.environ.get("AWX_URL") or "").rstrip("/")

          job_status_map = {"ready": "success", "success": "success", "failed": "failed",
                            "reconciling": "running"}
          job_status = job_status_map.get(cr_action, "running")

          job_name = activation_name or f"{cr_kind}-{cr_action}"

          if tower_job_id and tower_url:
              job_url = f"{tower_url}/execution/jobs/playbook/{tower_job_id}/output"
              job_id = tower_job_id
          elif activation_id and str(activation_id) not in ("", "manual"):
              job_url = f"{eda_host}/#/rulebook-activations/{activation_id}"
              job_id = activation_id
          else:
              job_url = f"{eda_host}/#/rulebook-activations"
              job_id = job_name

          job_entry = {
              "name": job_name,
              "jobId": job_id,
              "url": job_url,
              "timestamp": now,
              "status": job_status,
          }
          all_jobs = [job_entry]

          status_body = json.loads(os.environ["CR_STATUS_BODY"])
          if "observedGeneration" in status_body:
              status_body["observedGeneration"] = int(status_body["observedGeneration"])
          if "conditions" in status_body and isinstance(status_body["conditions"], list):
              for cond in status_body["conditions"]:
                  if isinstance(cond, dict) and "status" in cond and not isinstance(cond["status"], str):
                      cond["status"] = str(cond["status"])
          status_body["edaJobs"] = all_jobs
          body = json.dumps({"status": status_body})

          resp = requests.patch(url, data=body,
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/merge-patch+json"},
              verify=False, timeout=30)

          try:
              result = resp.json()
          except Exception:
              result = resp.text[:500]

          if isinstance(result, dict):
              s = result.get("status")
              if isinstance(s, dict):
                  status_ready = s.get("ready", False)
                  status_text = s.get("status", "MISSING")
              else:
                  status_ready = False
                  status_text = str(s)
          else:
              status_ready = False
              status_text = str(result)[:100]

          ignore_not_found = os.environ.get("PATCH_IGNORE_NOT_FOUND", "").lower() in ("1", "true", "yes")
          out = {"http": resp.status_code, "ready": status_ready, "status": status_text, "edaJobs": len(all_jobs)}
          if resp.status_code not in (200, 201):
              if ignore_not_found and resp.status_code == 404:
                  out["skipped"] = "cr_not_found"
                  print(json.dumps(out))
                  sys.exit(0)
              err_msg = result.get("message", "") if isinstance(result, dict) else str(result)[:200]
              print(json.dumps(out))
              print(f"API error ({resp.status_code}): {err_msg}", file=sys.stderr)
              sys.exit(1)
          print(json.dumps(out))
      except Exception as e:
          print(f"EXCEPTION: {e}", file=sys.stderr)
          traceback.print_exc(file=sys.stderr)
          sys.exit(1)

- name: "Patch {{ cr_plural }}/{{ cr_name }} status subresource (with edaJobs)"
  ansible.builtin.command: python3 /tmp/patch_status.py
  environment:
    CR_API_HOST: "{{ services_api_host | trim }}"
    CR_TOKEN: "{{ services_bearer_token | trim }}"
    CR_API_VERSION: "{{ cr_api_version }}"
    CR_NAMESPACE: "{{ cr_namespace }}"
    CR_PLURAL: "{{ cr_plural }}"
    CR_NAME: "{{ cr_name }}"
    CR_STATUS_BODY: "{{ cr_status_body | to_json }}"
    CR_ACTION: "{{ cr_status_body.status | default('reconcile') }}"
    EDA_ACTIVATION_ID: "{{ ansible_eda['rulebook_activation_id'] | default('') if ansible_eda is defined else '' }}"
    EDA_ACTIVATION_NAME: "{{ cr_plural | regex_replace('s$', '') }}-{{ cr_status_body.status | default('provision') }}"
    EDA_HOST: "{{ eda_dashboard_host | default('https://sovereign-aap-aap.apps.central.lab.example.com') }}"
    TOWER_JOB_ID: "{{ tower_job_id | default(awx_job_id | default('')) | string }}"
    TOWER_URL: "https://sovereign-aap-aap.apps.central.lab.example.com"
    PATCH_IGNORE_NOT_FOUND: "{{ patch_ignore_not_found | default(false) | bool | ternary('1', '0') }}"
  register: _patch_cr_status_result
  changed_when: true
  no_log: false

- name: "Log status patch result for {{ cr_plural }}/{{ cr_name }}"
  ansible.builtin.debug:
    msg: "stdout={{ _patch_cr_status_result.stdout | default('') }} stderr={{ _patch_cr_status_result.stderr | default('') }}"
