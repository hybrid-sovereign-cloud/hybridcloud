---
- name: AAPOrg Delete Rulebook
  hosts: all
  sources:
    - ansible.eda.event_stream:
        event_stream_name: sovereign-operator-events
  rules:
    - name: Handle AAPOrg Delete
      condition: event.payload.reason == "AAPOrgDeleteRequested" and event.payload.regarding.kind == "AAPOrg"
      action:
        run_playbook:
          name: aaporg-teardown-playbook.yml
          extra_vars:
            event_payload: "{{ event.payload }}"
