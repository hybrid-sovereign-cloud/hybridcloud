---
- name: CloudAWS Delete Rulebook
  hosts: all
  sources:
    - ansible.eda.event_stream:
        event_stream_name: sovereign-operator-events
  rules:
    - name: Handle CloudAWS Delete
      condition: event.payload.reason == "CloudAWSDeleteRequested" and event.payload.regarding.kind == "CloudAWS"
      action:
        run_playbook:
          name: cloudaws-teardown-playbook.yml
          extra_vars:
            event_payload: "{{ event.payload }}"
