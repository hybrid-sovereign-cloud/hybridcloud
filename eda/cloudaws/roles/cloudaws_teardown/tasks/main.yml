---
- block:
    - name: Parse event payload
      ansible.builtin.set_fact:
        cloudaws_cr_name: "{{ event_payload.regarding.name }}"
        cloudaws_cr_namespace: "{{ event_payload.regarding.namespace }}"
        eda_central_work_namespace: sovereign-cloud-jobs
        cloudaws_operator_namespace: sovereign-cloud
        default_aws_region: us-east-1

    - name: Resolve services cluster API connection from Vault
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/resolve_services_cluster_connection.yml"

    - name: Read CloudAWS CR from services cluster
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: CloudAWS
        name: "{{ cloudaws_cr_name }}"
        namespace: "{{ cloudaws_cr_namespace }}"
      register: cloudaws_cr_lookup

    - name: Set CloudAWS teardown facts
      ansible.builtin.set_fact:
        cloudaws_spec: "{{ cloudaws_cr_lookup.resources[0].spec | default({}) }}"
        cloudaws_entity_for_status: "{{ cloudaws_cr_lookup.resources[0].status.entity | default('') }}"
        cloudaws_slug: "{{ cloudaws_cr_lookup.resources[0].status.slug | default('') }}"
        cloudaws_domain: "{{ cloudaws_cr_lookup.resources[0].status.domain | default('') }}"
        ep_vault_path: "{{ cloudaws_cr_lookup.resources[0].spec.vaultPath | default('aws/accounts/shc_admin') }}"
        ep_base_domain: "{{ cloudaws_cr_lookup.resources[0].spec.baseDomain | default('sandbox5530.opentlc.com') }}"
        ep_account: "{{ cloudaws_cr_lookup.resources[0].spec.account | default('') }}"
      when: cloudaws_cr_lookup.resources | length > 0

    - name: Set CloudAWS teardown fallback facts
      ansible.builtin.set_fact:
        cloudaws_spec: {}
        cloudaws_entity_for_status: ""
        cloudaws_slug: ""
        cloudaws_domain: ""
        ep_vault_path: aws/accounts/shc_admin
        ep_base_domain: sandbox5530.opentlc.com
        ep_account: ""
      when: cloudaws_cr_lookup.resources | length == 0

    - name: Tear down Route53 slug zone
      ansible.builtin.include_tasks: delete_route53.yml
      when: cloudaws_domain | length > 0

    - name: Get deletion reconcile timestamp
      ansible.builtin.set_fact:
        cloudaws_delete_status_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark CloudAWS deletion complete on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: cloudawss
        cr_name: "{{ cloudaws_cr_name }}"
        cr_namespace: "{{ cloudaws_cr_namespace }}"
        cr_status_body:
          status: ready
          ready: false
          deletionComplete: true
          lastReconciledAt: "{{ cloudaws_delete_status_time }}"
          name: "{{ cloudaws_cr_name }}"
          namespace: "{{ cloudaws_cr_namespace }}"
          entity: "{{ cloudaws_entity_for_status }}"
          slug: "{{ cloudaws_slug }}"
          message: CloudAWS {{ cloudaws_cr_name }} teardown complete

  rescue:
    - name: Mark CloudAWS delete as failed on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: cloudawss
        cr_name: "{{ cloudaws_cr_name }}"
        cr_namespace: "{{ cloudaws_cr_namespace }}"
        cr_status_body:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA teardown failed')) }}"
      ignore_errors: true
      when: services_api_host is defined and services_bearer_token is defined

    - name: Re-raise teardown failure
      ansible.builtin.fail:
        msg: "CloudAWS {{ cloudaws_cr_name | default('unknown') }} EDA teardown failed"
