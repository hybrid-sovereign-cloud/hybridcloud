---
- block:
    - name: Parse event payload
      ansible.builtin.set_fact:
        cloudaws_cr_name: "{{ event_payload.regarding.name }}"
        cloudaws_cr_namespace: "{{ event_payload.regarding.namespace }}"
        cloudaws_spec: "{{ event_payload.note | from_json }}"
        ansible_operator_meta:
          name: "{{ event_payload.regarding.name }}"
          namespace: "{{ event_payload.regarding.namespace }}"

    - name: Resolve services cluster API connection from Vault
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/resolve_services_cluster_connection.yml"

    - name: Announce AAP job started in CR status
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: cloudawss
        cr_name: "{{ cloudaws_cr_name }}"
        cr_namespace: "{{ cloudaws_cr_namespace }}"
        cr_status_body:
          status: reconciling
          ready: false
          message: "AAP job started"
      when: lookup('env', 'TOWER_JOB_ID') | length > 0

    - name: Read CloudAWS CR from services cluster
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: CloudAWS
        name: "{{ cloudaws_cr_name }}"
        namespace: "{{ cloudaws_cr_namespace }}"
      register: cloudaws_cr_lookup

    - name: Fail if CloudAWS CR is missing
      ansible.builtin.fail:
        msg: CloudAWS CR {{ cloudaws_cr_name }} not found
      when: cloudaws_cr_lookup.resources | length == 0

    - name: Read Namespace labels
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: v1
        kind: Namespace
        name: "{{ cloudaws_cr_namespace }}"
      register: cloudaws_ns_lookup

    - name: Extract entity and spec from CloudAWS CR
      ansible.builtin.set_fact:
        entity_name: "{{ cloudaws_ns_lookup.resources[0].metadata.labels['hybridsovereign.redhat/entity'] | default('') }}"
        cloudaws_generation: "{{ cloudaws_cr_lookup.resources[0].metadata.generation | default(0) | int }}"
        cloudaws_spec: "{{ cloudaws_cr_lookup.resources[0].spec | default({}) }}"
        aws_account: "{{ cloudaws_cr_lookup.resources[0].spec.account }}"
        aws_vault_path: "{{ cloudaws_cr_lookup.resources[0].spec.vaultPath }}"
        aws_base_domain: "{{ cloudaws_cr_lookup.resources[0].spec.baseDomain }}"
        ep_existing_slug: "{{ cloudaws_cr_lookup.resources[0].status.slug | default('') }}"
      when: cloudaws_ns_lookup.resources | length > 0

    - name: Fail if entity label is missing
      ansible.builtin.assert:
        that:
          - entity_name is defined
          - entity_name | length > 0
        fail_msg: >-
          Namespace {{ cloudaws_cr_namespace }} is missing label
          hybridsovereign.redhat/entity. Cannot provision CloudAWS.

    - name: Include AWS environment preparation tasks
      ansible.builtin.include_tasks: aws_environmentprep.yml

    - name: Get reconciliation timestamp
      ansible.builtin.set_fact:
        cloudaws_status_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Update CloudAWS status as ready on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: cloudawss
        cr_name: "{{ cloudaws_cr_name }}"
        cr_namespace: "{{ cloudaws_cr_namespace }}"
        cr_status_body:
          status: ready
          ready: true
          observedGeneration: "{{ cloudaws_generation }}"
          lastReconciledAt: "{{ cloudaws_status_time }}"
          name: "{{ cloudaws_cr_name }}"
          namespace: "{{ cloudaws_cr_namespace }}"
          entity: "{{ entity_name }}"
          slug: "{{ ep_slug }}"
          domain: "{{ ep_domain }}"
          route53ZoneId: "{{ ep_subdomain_zone_id }}"
          awsAccountId: "{{ aws_account_id }}"
          awsRegion: "{{ ep_region }}"
          conditions:
            - type: Ready
              status: "True"
              lastTransitionTime: "{{ cloudaws_status_time }}"
              reason: EDASucceeded
              message: >-
                AWS environment prepared. Domain: {{ ep_domain }},
                Route53 Zone: {{ ep_subdomain_zone_id }}

  rescue:
    - name: Mark CloudAWS as failed on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: cloudawss
        cr_name: "{{ cloudaws_cr_name }}"
        cr_namespace: "{{ cloudaws_cr_namespace }}"
        cr_status_body:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA provisioning failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: EDAFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA provisioning failed')) }}"
      ignore_errors: true
      when: services_api_host is defined and services_bearer_token is defined

    - name: Re-raise provisioning failure
      ansible.builtin.fail:
        msg: "CloudAWS {{ cloudaws_cr_name | default('unknown') }} EDA provisioning failed"
