---
entity_named_roles:
  - spec_key: entityAdmin
    role_name: entity-admin
    crud_resources:
      - cloudosos
      - cloudawss
      - platformopenshifts
      - vaultkvs
      - vaults
      - quayorgs
      - aaporgs
      - projects
      - teams
      - assignments
      - rbacs
    read_resources: []

  - spec_key: auditor
    role_name: auditor
    crud_resources: []
    read_resources:
      - cloudosos
      - cloudawss
      - platformopenshifts
      - vaultkvs
      - vaults
      - quayorgs
      - aaporgs
      - projects
      - teams
      - assignments
      - rbacs

  - spec_key: BobsTeam
    role_name: bobs-team
    crud_resources: []
    read_resources:
      - cloudosos
      - cloudawss
      - platformopenshifts
      - vaultkvs
      - vaults
      - quayorgs
      - aaporgs
      - projects
      - teams
      - assignments
      - rbacs

  - spec_key: cloudOSOAdmin
    role_name: cloudoso-admin
    crud_resources: [cloudosos]
    read_resources: [rbacs]

  - spec_key: cloudOSOView
    role_name: cloudoso-view
    crud_resources: []
    read_resources: [cloudosos, rbacs]

  - spec_key: cloudAWSAdmin
    role_name: cloudaws-admin
    crud_resources: [cloudawss]
    read_resources: [rbacs]

  - spec_key: cloudAWSView
    role_name: cloudaws-view
    crud_resources: []
    read_resources: [cloudawss, rbacs]

  - spec_key: platformOpenshiftAdmin
    role_name: platformopenshift-admin
    crud_resources: [platformopenshifts]
    read_resources: [cloudosos, cloudawss, rbacs]

  - spec_key: platformOpenshiftView
    role_name: platformopenshift-view
    crud_resources: []
    read_resources: [platformopenshifts, rbacs]

  - spec_key: teamAdmin
    role_name: team-admin
    crud_resources: [teams]
    read_resources: [assignments, rbacs]

  - spec_key: teamView
    role_name: team-view
    crud_resources: []
    read_resources: [teams, assignments, rbacs]

  - spec_key: projectAdmin
    role_name: project-admin
    crud_resources: [projects]
    read_resources: [assignments, rbacs]

  - spec_key: projectView
    role_name: project-view
    crud_resources: []
    read_resources: [projects, assignments, rbacs]

  - spec_key: assignmentAdmin
    role_name: assignment-admin
    crud_resources: [assignments]
    read_resources: [projects, teams, rbacs]

  - spec_key: identityAdmin
    role_name: identity-admin
    crud_resources: [rbacs]
    read_resources: []
