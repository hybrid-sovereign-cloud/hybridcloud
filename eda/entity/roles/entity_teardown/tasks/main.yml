---
- block:
    - name: Parse event payload
      ansible.builtin.set_fact:
        entity_cr_name: "{{ event_payload.regarding.name }}"
        entity_cr_namespace: "{{ event_payload.regarding.namespace }}"
        entity_namespace: "entity-{{ event_payload.regarding.name }}"

    - name: Resolve services cluster API connection from Vault
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/resolve_services_cluster_connection.yml"

    - name: Look up Entity CR on services cluster
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Entity
        name: "{{ entity_cr_name }}"
        namespace: "{{ entity_cr_namespace }}"
      register: entity_cr_lookup

    - name: Delete entity namespace on services cluster
      kubernetes.core.k8s:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ entity_namespace }}"

    - name: Get current timestamp for status
      ansible.builtin.set_fact:
        entity_delete_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark Entity deletion complete on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: entities
        cr_name: "{{ entity_cr_name }}"
        cr_namespace: "{{ entity_cr_namespace }}"
        patch_ignore_not_found: true
        cr_status_body:
          status: ready
          ready: false
          deletionComplete: true
          lastReconciledAt: "{{ entity_delete_transition_time }}"
          message: Entity {{ entity_cr_name }} deleted by EDA
      when: entity_cr_lookup.resources | length > 0

    - name: Entity CR already removed — idempotent teardown success
      ansible.builtin.debug:
        msg: >-
          Entity {{ entity_cr_name }} CR no longer exists; namespace
          {{ entity_namespace }} cleanup complete (idempotent)
      when: entity_cr_lookup.resources | length == 0

  rescue:
    - name: Mark Entity delete as failed on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: entities
        cr_name: "{{ entity_cr_name }}"
        cr_namespace: "{{ entity_cr_namespace }}"
        patch_ignore_not_found: true
        cr_status_body:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA deletion failed')) }}"
      ignore_errors: true
      when:
        - services_api_host is defined
        - services_bearer_token is defined
        - entity_cr_lookup is defined
        - entity_cr_lookup.resources | length > 0

    - name: Treat missing Entity CR as idempotent teardown success
      ansible.builtin.set_fact:
        entity_teardown_idempotent: true
      when:
        - entity_cr_lookup is defined
        - entity_cr_lookup.resources | length == 0

    - name: Treat 404 status patch as idempotent teardown success
      ansible.builtin.set_fact:
        entity_teardown_idempotent: true
      when:
        - ansible_failed_result.stderr is defined
        - "'404' in ansible_failed_result.stderr"
        - "'not found' in ansible_failed_result.stderr"

    - name: Re-raise teardown failure
      ansible.builtin.fail:
        msg: "Entity {{ entity_cr_name | default('unknown') }} EDA teardown failed"
      when: not (entity_teardown_idempotent | default(false))
