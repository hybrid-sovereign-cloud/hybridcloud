---
- name: Persona Delete Automation
  hosts: all
  sources:
    - ansible.eda.generic:
        payload:
          - persona_delete

  rules:
    - name: Handle Persona Delete
      condition: event.body.payload.reason == "PersonaDeleteRequested" and event.body.payload.regarding.kind == "Persona"
      action:
        run_playbook:
          name: playbooks/persona-teardown-playbook.yml
          extra_vars:
            event_payload: "{{ event.body.payload }}"
          set_facts: true
