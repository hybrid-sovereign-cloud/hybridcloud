---
- name: CloudOSO Delete Rulebook
  hosts: all
  sources:
    - ansible.eda.kafka:
        host: kafka.apps.central.example.com
        port: "443"
        topic: hybridsovereign-events
        group_id: eda-cloudoso-delete
        security_protocol: SASL_SSL
        sasl_mechanism: SCRAM-SHA-512
        sasl_plain_username: "{{ KAFKA_USERNAME }}"
        sasl_plain_password: "{{ KAFKA_PASSWORD }}"
        check_hostname: false
        verify_mode: CERT_NONE
  rules:
    - name: Handle CloudOSO Delete
      condition: event.body.payload.reason in ["CloudOSODeleteRequestedDeleteRequested"] and event.body.payload.regarding.kind == "CloudOSODeleteRequested"
      action:
        run_job_template:
          name: cloudoso-teardown
          organization: sovereign
          job_args:
            extra_vars:
              event_payload: "{{ event.body.payload }}"
