---
- name: Rbac Create Rulebook
  hosts: all
  sources:
    - ansible.eda.kafka:
        host: kafka.apps.central.example.com
        port: "443"
        topic: hybridsovereign-events
        group_id: eda-rbac-create
        security_protocol: SASL_SSL
        sasl_mechanism: SCRAM-SHA-512
        sasl_plain_username: "{{ KAFKA_USERNAME }}"
        sasl_plain_password: "{{ KAFKA_PASSWORD }}"
        check_hostname: false
        verify_mode: CERT_NONE
  rules:
    - name: Handle Rbac Create
      condition: event.body.payload.reason in ["RbacCreateRequested", "RbacReconcileRequested"] and event.body.payload.regarding.kind == "Rbac"
      action:
        run_job_template:
          name: rbac-provision
          organization: sovereign
          job_args:
            extra_vars:
              event_payload: "{{ event.body.payload }}"
