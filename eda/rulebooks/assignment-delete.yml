---
- name: Assignment Delete Rulebook
  hosts: all
  sources:
    - ansible.eda.kafka:
        host: {{ KAFKA_BOOTSTRAP_HOST }}
        port: "443"
        topic: hybridsovereign-events
        group_id: eda-assignment-delete
        security_protocol: SASL_SSL
        sasl_mechanism: SCRAM-SHA-512
        sasl_plain_username: "{{ KAFKA_USERNAME }}"
        sasl_plain_password: "{{ KAFKA_PASSWORD }}"
        check_hostname: false
        verify_mode: CERT_NONE
  rules:
    - name: Handle Assignment Delete
      condition: event.body.payload.reason in ["AssignmentDeleteRequestedDeleteRequested"] and event.body.payload.regarding.kind == "AssignmentDeleteRequested"
      action:
        run_job_template:
          name: assignment-teardown
          organization: sovereign
          job_args:
            extra_vars:
              event_payload: "{{ event.body.payload }}"
