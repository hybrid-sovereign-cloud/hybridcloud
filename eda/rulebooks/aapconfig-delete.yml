- name: AAPConfig Delete Rulebook
  hosts: all
  sources:
  - ansible.eda.event_stream:
      event_stream_name: sovereign-operator-events
  rules:
  - name: Handle AAPConfig Delete
    condition: event.payload.reason | default(event.message.reason | default('')) == "AAPConfigDeleteRequested" and event.payload.regarding.kind | default(event.message.regarding.kind | default(''))
      == "AAPConfig"
    action:
      run_job_template:
        name: aapconfig-teardown
        organization: sovereign
        job_args:
          extra_vars:
            event_payload: '{{ event.payload }}'
