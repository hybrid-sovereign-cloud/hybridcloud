---
# Load long-lived central cluster SA token from Vault (aap-central-cluster-sa).
# Sets: central_api_host, central_bearer_token

- name: Read central cluster SA credentials from Vault
  ansible.builtin.include_tasks: vault_kv_read.yml
  vars:
    vault_kv_path: aap-central-cluster-sa

- name: Set central cluster API connection facts from Vault SA
  ansible.builtin.set_fact:
    central_api_host: "{{ vault_kv_data.host | default(vault_kv_data.api_server | default(vault_kv_data.api_host)) }}"
    central_bearer_token: "{{ vault_kv_data.bearer_token | default(vault_kv_data.token) }}"
  no_log: true

- name: Validate central cluster SA credentials are present
  ansible.builtin.assert:
    that:
      - central_api_host is defined
      - central_api_host | length > 0
      - central_bearer_token is defined
      - central_bearer_token | length > 0
    fail_msg: >-
      aap-central-cluster-sa in Vault is missing host/bearer_token (or token/api_server aliases).
      Re-run the push-aap-central-cluster-sa job or use resolve_central_cluster_connection.yml.
