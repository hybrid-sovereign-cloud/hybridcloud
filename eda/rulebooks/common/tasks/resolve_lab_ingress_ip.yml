---
# Pick a reachable IP for lab.example.com hostnames (stale dual A records on cluster DNS).
# Public DNS (75.8.222.17) is valid for central apps HTTPS only — not for API :6443 or services apps.
# Required var: resolve_hostname (bare FQDN or IP). Sets: resolve_public_ip (reachable IP).

- name: Use hostname when already an IP address
  ansible.builtin.set_fact:
    resolve_public_ip: "{{ resolve_hostname }}"
  when: resolve_hostname is match('^[0-9.]+$')

- name: Map API hostname to known-good cluster API IP
  ansible.builtin.set_fact:
    resolve_public_ip: >-
      {{
        {
          'api.central.lab.example.com': lookup('env', 'LAB_CENTRAL_API_IP') | default('172.18.104.173', true),
          'api.services.lab.example.com': lookup('env', 'LAB_SERVICES_API_IP') | default('172.18.104.191', true),
        }[resolve_hostname]
      }}
  when:
    - resolve_public_ip is not defined
    - resolve_hostname in ['api.central.lab.example.com', 'api.services.lab.example.com']

- name: Map services apps hostname to known-good ingress IP
  ansible.builtin.set_fact:
    resolve_public_ip: "{{ lookup('env', 'LAB_SERVICES_APPS_INGRESS_IP') | default('172.18.104.192', true) }}"
  when:
    - resolve_public_ip is not defined
    - resolve_hostname is search('\\.apps\\.services\\.lab\\.signal9\\.gg$')

- name: Map central apps hostname to reachable ingress IP
  ansible.builtin.set_fact:
    resolve_public_ip: "{{ lookup('env', 'LAB_CENTRAL_APPS_INGRESS_IP') | default('172.18.104.109', true) }}"
  when:
    - resolve_public_ip is not defined
    - resolve_hostname is search('\\.apps\\.central\\.lab\\.signal9\\.gg$')

- name: Resolve remaining hostnames via public DNS (DNS-over-HTTPS)
  ansible.builtin.include_tasks: resolve_public_lab_hostname.yml
  when: resolve_public_ip is not defined
