---
- name: Create temporary ExternalSecret for OpenStack admin credentials (designate)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: "eda-cloudoso-teardown-{{ cloudoso_cr_name }}-designate"
        namespace: "{{ eda_central_work_namespace }}"
      spec:
        refreshInterval: 1m
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: "eda-cloudoso-teardown-{{ cloudoso_cr_name }}-designate"
          creationPolicy: Owner
        data:
          - secretKey: clouds.yaml
            remoteRef:
              key: "{{ ep_vault_path }}"
              property: clouds.yaml

- name: Wait for OpenStack credentials (designate teardown)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "eda-cloudoso-teardown-{{ cloudoso_cr_name }}-designate"
    namespace: "{{ eda_central_work_namespace }}"
  register: designate_secret
  until: designate_secret.resources | length > 0
  retries: 20
  delay: 5
  ignore_errors: true

- name: Write clouds.yaml for designate teardown
  when: designate_secret.resources | default([]) | length > 0
  ansible.builtin.copy:
    content: "{{ designate_secret.resources[0].data['clouds.yaml'] | b64decode }}"
    dest: "/tmp/eda-cloudoso-teardown-{{ cloudoso_cr_name }}-designate.yaml"
    mode: '0600'
  no_log: true

- name: Remove Designate wildcard records for environment
  when: designate_secret.resources | default([]) | length > 0
  ansible.builtin.shell: |
    python3 -c "
    import openstack, yaml, os
    cfg_path = os.environ.get('OS_CLIENT_CONFIG_FILE')
    with open(cfg_path) as f:
        cfg = yaml.safe_load(f)
    cloud_cfg = cfg['clouds']['{{ clouds_yaml_cloud }}']
    auth = dict(cloud_cfg['auth'])
    auth['project_name'] = '{{ ep_project }}'
    auth['project_domain_name'] = '{{ ep_project_domain }}'
    conn = openstack.connect(auth=auth, region_name=cloud_cfg.get('region_name','regionOne'), identity_api_version='3')
    zone_name = '{{ oso_spec.designateZoneName | default("{{ lookup('env', 'BASE_DOMAIN') }}.") }}'
    zone = conn.dns.find_zone(zone_name)
    if not zone:
        raise SystemExit(0)
    prefix = '{{ cloudoso_cr_name }}.'
    for rs in conn.dns.recordsets(zone):
        if rs.name.startswith(prefix) or rs.name == prefix:
            try:
                conn.dns.delete_recordset(zone, rs)
            except Exception:
                pass
    "
  environment:
    OS_CLIENT_CONFIG_FILE: "/tmp/eda-cloudoso-teardown-{{ cloudoso_cr_name }}-designate.yaml"
  failed_when: false
  changed_when: false
  no_log: true

- name: Remove temporary designate credentials secret
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    name: "eda-cloudoso-teardown-{{ cloudoso_cr_name }}-designate"
    namespace: "{{ eda_central_work_namespace }}"
  ignore_errors: true
