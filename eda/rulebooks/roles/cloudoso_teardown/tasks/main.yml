---
- block:
    - name: Parse event payload
      ansible.builtin.set_fact:
        cloudoso_cr_name: "{{ event_payload.regarding.name }}"
        cloudoso_cr_namespace: "{{ event_payload.regarding.namespace }}"
        eda_central_work_namespace: sovereign-cloud-jobs
        clouds_yaml_cloud: openstack
        default_project_domain: shc_domain

    - name: Resolve services cluster API connection from Vault
      ansible.builtin.include_tasks: "{{ role_path }}/../../common/tasks/resolve_services_cluster_connection.yml"

    - name: Read CloudOSO CR from services cluster
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: CloudOSO
        name: "{{ cloudoso_cr_name }}"
        namespace: "{{ cloudoso_cr_namespace }}"
      register: cloudoso_cr_lookup

    - name: Read namespace for entity name
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: v1
        kind: Namespace
        name: "{{ cloudoso_cr_namespace }}"
      register: ns_info

    - name: Set CloudOSO teardown facts
      ansible.builtin.set_fact:
        oso_spec: "{{ cloudoso_cr_lookup.resources[0].spec | default({}) }}"
        cloudoso_entity_for_status: "{{ cloudoso_cr_lookup.resources[0].status.entity | default('') }}"
        oso_slug: "{{ cloudoso_cr_lookup.resources[0].status.slug | default('') }}"
        oso_domain: "{{ cloudoso_cr_lookup.resources[0].status.domain | default('') }}"
        entity_name: >-
          {{ (ns_info.resources | default([]) | first | default({})).metadata.labels['hybridsovereign.redhat/entity']
             | default(cloudoso_cr_namespace | regex_replace('^entity-', '')) }}
      when: cloudoso_cr_lookup.resources | length > 0

    - name: Set CloudOSO teardown derived facts
      ansible.builtin.set_fact:
        ep_project: "{{ entity_name }}_{{ cloudoso_cr_name }}"
        ep_base_domain: "{{ oso_spec.baseDomain | default('{{ lookup('env', 'LAB_DOMAIN') }}') }}"
        ep_route53_vault_path: "{{ oso_spec.route53VaultPath | default('oso/accounts/route53-openstack') }}"
        ep_vault_path: "{{ oso_spec.vaultPath | default('oso/accounts/shc_admin') }}"
        ep_project_domain: "{{ oso_spec.projectDomain | default(default_project_domain) }}"
        ep_external_network: "{{ oso_spec.externalNetwork | default('ext-net') }}"
      when: cloudoso_cr_lookup.resources | length > 0

    - name: Set CloudOSO teardown fallback facts
      ansible.builtin.set_fact:
        oso_spec: {}
        cloudoso_entity_for_status: ""
        oso_slug: ""
        oso_domain: ""
        entity_name: "{{ cloudoso_cr_namespace | regex_replace('^entity-', '') }}"
        ep_project: "{{ (cloudoso_cr_namespace | regex_replace('^entity-', '')) }}_{{ cloudoso_cr_name }}"
        ep_base_domain: {{ lookup('env', 'LAB_DOMAIN') }}
        ep_route53_vault_path: oso/accounts/route53-openstack
        ep_vault_path: oso/accounts/shc_admin
        ep_project_domain: shc_domain
        ep_external_network: ext-net
      when: cloudoso_cr_lookup.resources | length == 0

    - name: Tear down OpenStack project and floating IPs
      ansible.builtin.include_tasks: delete_openstack.yml

    - name: Tear down Route53 slug records
      ansible.builtin.include_tasks: delete_route53.yml
      when: oso_domain | length > 0 and oso_spec.baseDomain | default('{{ lookup('env', 'BASE_DOMAIN') }}') != '{{ lookup('env', 'BASE_DOMAIN') }}'

    - name: Tear down Designate DNS records
      ansible.builtin.include_tasks: delete_designate.yml
      when: oso_spec.baseDomain | default('') == '{{ lookup('env', 'BASE_DOMAIN') }}'

    - name: Get deletion reconcile timestamp
      ansible.builtin.set_fact:
        cloudoso_delete_status_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark CloudOSO deletion complete on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: cloudosos
        cr_name: "{{ cloudoso_cr_name }}"
        cr_namespace: "{{ cloudoso_cr_namespace }}"
        cr_status_body:
          status: ready
          ready: false
          deletionComplete: true
          lastReconciledAt: "{{ cloudoso_delete_status_time }}"
          name: "{{ cloudoso_cr_name }}"
          namespace: "{{ cloudoso_cr_namespace }}"
          entity: "{{ cloudoso_entity_for_status }}"
          message: CloudOSO {{ cloudoso_cr_name }} teardown complete

  rescue:
    - name: Mark CloudOSO delete as failed on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: cloudosos
        cr_name: "{{ cloudoso_cr_name }}"
        cr_namespace: "{{ cloudoso_cr_namespace }}"
        cr_status_body:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA teardown failed')) }}"
      ignore_errors: true
      when: services_api_host is defined and services_bearer_token is defined

    - name: Re-raise teardown failure
      ansible.builtin.fail:
        msg: "CloudOSO {{ cloudoso_cr_name | default('unknown') }} EDA teardown failed"
