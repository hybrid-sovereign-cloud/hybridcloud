---
- name: Create temporary ExternalSecret for OpenStack admin credentials
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: "eda-cloudoso-teardown-{{ cloudoso_cr_name }}-os-creds"
        namespace: "{{ eda_central_work_namespace }}"
      spec:
        refreshInterval: 1m
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: "eda-cloudoso-teardown-{{ cloudoso_cr_name }}-os-creds"
          creationPolicy: Owner
        data:
          - secretKey: clouds.yaml
            remoteRef:
              key: "{{ ep_vault_path }}"
              property: clouds.yaml

- name: Wait for OpenStack admin credentials
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "eda-cloudoso-teardown-{{ cloudoso_cr_name }}-os-creds"
    namespace: "{{ eda_central_work_namespace }}"
  register: os_admin_secret
  until: os_admin_secret.resources | length > 0
  retries: 20
  delay: 5
  ignore_errors: true

- name: Write clouds.yaml for teardown
  when: os_admin_secret.resources | default([]) | length > 0
  ansible.builtin.copy:
    content: "{{ os_admin_secret.resources[0].data['clouds.yaml'] | b64decode }}"
    dest: "/tmp/eda-cloudoso-teardown-{{ cloudoso_cr_name }}-clouds.yaml"
    mode: '0600'
  no_log: true

- name: Release floating IPs and delete OpenStack project
  when: os_admin_secret.resources | default([]) | length > 0
  ansible.builtin.shell: |
    python3 -c "
    import openstack, yaml, os, sys
    cfg_path = os.environ.get('OS_CLIENT_CONFIG_FILE')
    with open(cfg_path) as f:
        cfg = yaml.safe_load(f)
    cloud_cfg = cfg['clouds']['{{ clouds_yaml_cloud }}']
    auth = dict(cloud_cfg['auth'])
    auth['project_name'] = '{{ ep_project }}'
    auth['project_domain_name'] = '{{ ep_project_domain }}'
    conn = openstack.connect(auth=auth, region_name=cloud_cfg.get('region_name','regionOne'), identity_api_version='3')
    cr = '{{ cloudoso_cr_name }}'
    for tag in [f'sovereign-{cr}-api', f'sovereign-{cr}-ingress']:
        for ip in conn.network.ips(description=tag):
            try:
                conn.network.delete_ip(ip)
            except Exception:
                pass
    try:
        proj = conn.identity.find_project('{{ ep_project }}')
        if proj:
            conn.identity.delete_project(proj)
    except Exception as e:
        print(f'project delete: {e}', file=sys.stderr)
    "
  environment:
    OS_CLIENT_CONFIG_FILE: "/tmp/eda-cloudoso-teardown-{{ cloudoso_cr_name }}-clouds.yaml"
  register: os_delete_result
  failed_when: false
  changed_when: false
  no_log: true

- name: Remove temporary OpenStack credentials secret
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    name: "eda-cloudoso-teardown-{{ cloudoso_cr_name }}-os-creds"
    namespace: "{{ eda_central_work_namespace }}"
  ignore_errors: true
