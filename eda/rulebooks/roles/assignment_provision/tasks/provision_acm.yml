---
# Provision assignment via ACM Policy/Placement on central cluster.
# Uses the assignment-acm-creator SA token (least-privilege: ACM Policy/Placement CRUD only).

- name: Read ACM creator SA secret
  kubernetes.core.k8s_info:
    host: "{{ services_api_host }}"
    api_key: "{{ services_bearer_token }}"
    validate_certs: false
    api_version: v1
    kind: Secret
    name: "{{ acm_central_sa_secret_name }}"
    namespace: "{{ assignment_operator_namespace }}"
  register: acm_sa_secret
  no_log: true

- name: Assert ACM creator SA secret exists
  ansible.builtin.assert:
    that:
      - acm_sa_secret.resources | default([]) | length > 0
      - acm_sa_secret.resources[0].data.token is defined
    fail_msg: >-
      ACM creator SA secret '{{ acm_central_sa_secret_name }}' not found in
      '{{ assignment_operator_namespace }}'. Ensure assignment-central-rbac chart is deployed
      and ExternalSecret is Synced.

- name: Decode ACM central SA credentials
  ansible.builtin.set_fact:
    acm_central_token: "{{ acm_sa_secret.resources[0].data.token | b64decode }}"
    acm_central_ca: "{{ acm_sa_secret.resources[0].data['ca.crt'] | b64decode }}"
  no_log: true

- name: Write ACM central CA to temp file
  ansible.builtin.copy:
    content: "{{ acm_central_ca }}"
    dest: /tmp/assignment-acm-central-ca.crt
    mode: '0600'
  no_log: true

- name: Normalise entity and team to lowercase-hyphen
  ansible.builtin.set_fact:
    acm_entity: "{{ assignment_entity | lower | regex_replace('[^a-z0-9-]', '-') }}"
    acm_team: "{{ assignment_team | lower | regex_replace('[^a-z0-9-]', '-') }}"

- name: Build ACM Policy name from Assignment CR (unique per cluster + team)
  ansible.builtin.set_fact:
    acm_policy_name: "{{ assignment_cr_name | lower | regex_replace('[^a-z0-9-]', '-') | regex_replace('-+$', '') }}"

- name: Resolve spoke cluster name for Placement
  ansible.builtin.set_fact:
    acm_spoke_cluster_name: "{{ openshift_cluster_name | default(assignment_openshift) | default('') }}"

- name: Fail when spoke cluster name is missing
  ansible.builtin.fail:
    msg: >-
      Cannot build ACM Placement for Assignment {{ assignment_cr_name }}:
      PlatformOpenshift cluster name is empty.
  when: acm_spoke_cluster_name | length == 0

- name: Resolve toolRbac Rbac CR groups
  ansible.builtin.include_tasks: resolve_rbac_groups.yml

- name: Clean up any previous chart extraction
  ansible.builtin.file:
    path: /tmp/sovereign-assignment-chart/sovereign-assignment
    state: absent

- name: Pull sovereign-assignment chart for local templating
  ansible.builtin.command:
    cmd: >-
      helm pull
      oci://quay.example.com/hybrid-sovereign/sovereign-assignment
      --version {{ sovereign_assignment_chart_version }}
      --untar
      --destination /tmp/sovereign-assignment-chart/

- name: Build helm projects arguments
  ansible.builtin.set_fact:
    helm_projects_args: >-
      {%- set args = [] -%}
      {%- for p in assignment_projects -%}
        {%- set _ = args.append('--set projects[' + loop.index0 | string + ']=' + p) -%}
      {%- endfor -%}
      {{ args | join(' ') }}

- name: Render sovereign-assignment chart templates
  ansible.builtin.shell:
    cmd: >-
      helm template sovereign-assignment
      /tmp/sovereign-assignment-chart/sovereign-assignment
      --set entity={{ acm_entity | quote }}
      --set team={{ acm_team | quote }}
      --set features.istio={{ team_features_istio | bool | lower }}
      --set features.gitops={{ team_features_argo | bool | lower }}
      --set toolRbac.assignmentAdminGroup={{ resolved_admin_group | default('') | quote }}
      --set toolRbac.assignmentDeveloperGroup={{ resolved_developer_group | default('') | quote }}
      --set toolRbac.assignmentViewerGroup={{ resolved_viewer_group | default('') | quote }}
      --set toolRbac.assignmentOpsGroup={{ resolved_ops_group | default('') | quote }}
      {{ helm_projects_args }}
  register: helm_render_result

- name: Build ACM ConfigurationPolicy object-templates from rendered manifests
  ansible.builtin.set_fact:
    acm_object_templates: >-
      {%- set templates = [] -%}
      {%- set docs = helm_render_result.stdout | from_yaml_all | list -%}
      {%- for doc in docs -%}
        {%- if doc is not none and doc.kind is defined -%}
          {%- set _ = templates.append({'complianceType': 'musthave', 'objectDefinition': doc}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ templates }}

- name: Assert rendered chart produced ACM object templates
  ansible.builtin.assert:
    that:
      - acm_object_templates | length > 0
    fail_msg: >-
      sovereign-assignment chart rendered zero object templates for
      Assignment {{ assignment_cr_name }} (entity={{ acm_entity }}, team={{ acm_team }}).

- name: Build ACM Policy body
  ansible.builtin.set_fact:
    acm_policy_body:
      apiVersion: policy.open-cluster-management.io/v1
      kind: Policy
      metadata:
        name: "{{ acm_policy_name }}"
        namespace: "{{ acm_policy_namespace }}"
        annotations:
          policy.open-cluster-management.io/standards: Hybrid Sovereign Cloud
          policy.open-cluster-management.io/categories: Assignment
          policy.open-cluster-management.io/controls: Team Environment
      spec:
        remediationAction: enforce
        disabled: false
        policy-templates:
          - objectDefinition:
              apiVersion: policy.open-cluster-management.io/v1
              kind: ConfigurationPolicy
              metadata:
                name: "{{ acm_policy_name }}-resources"
              spec:
                remediationAction: enforce
                severity: low
                evaluationInterval:
                  compliant: 10m
                  noncompliant: 45s
                object-templates: "{{ acm_object_templates }}"

- name: Build ACM Placement body
  ansible.builtin.set_fact:
    acm_placement_body:
      apiVersion: cluster.open-cluster-management.io/v1beta1
      kind: Placement
      metadata:
        name: "placement-{{ acm_policy_name }}"
        namespace: "{{ acm_policy_namespace }}"
      spec:
        predicates:
          - requiredClusterSelector:
              labelSelector:
                matchLabels:
                  name: "{{ acm_spoke_cluster_name }}"

- name: Build ACM PlacementBinding body
  ansible.builtin.set_fact:
    acm_placementbinding_body:
      apiVersion: policy.open-cluster-management.io/v1
      kind: PlacementBinding
      metadata:
        name: "binding-{{ acm_policy_name }}"
        namespace: "{{ acm_policy_namespace }}"
      placementRef:
        name: "placement-{{ acm_policy_name }}"
        kind: Placement
        apiGroup: cluster.open-cluster-management.io
      subjects:
        - name: "{{ acm_policy_name }}"
          kind: Policy
          apiGroup: policy.open-cluster-management.io

- name: Apply ACM Policy to central cluster
  ansible.builtin.include_tasks: apply_acm_resource.yml
  vars:
    acm_resource_url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/{{ acm_policy_namespace }}/policies/{{ acm_policy_name }}"
    acm_resource_body: "{{ acm_policy_body }}"
    acm_resource_name: "Policy {{ acm_policy_name }}"

- name: Apply ACM Placement to central cluster
  ansible.builtin.include_tasks: apply_acm_resource.yml
  vars:
    acm_resource_url: "{{ central_api_server }}/apis/cluster.open-cluster-management.io/v1beta1/namespaces/{{ acm_policy_namespace }}/placements/placement-{{ acm_policy_name }}"
    acm_resource_body: "{{ acm_placement_body }}"
    acm_resource_name: "Placement placement-{{ acm_policy_name }}"

- name: Apply ACM PlacementBinding to central cluster
  ansible.builtin.include_tasks: apply_acm_resource.yml
  vars:
    acm_resource_url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/{{ acm_policy_namespace }}/placementbindings/binding-{{ acm_policy_name }}"
    acm_resource_body: "{{ acm_placementbinding_body }}"
    acm_resource_name: "PlacementBinding binding-{{ acm_policy_name }}"

- name: Set provisioned status facts
  ansible.builtin.set_fact:
    assignment_acm_policy_name: "{{ acm_policy_name }}"
    assignment_provisioned: true

- name: Wait for ACM Policy to report compliance on target spoke
  ansible.builtin.uri:
    url: >-
      {{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/{{ acm_policy_namespace }}/policies/{{ acm_policy_name }}
    method: GET
    headers:
      Authorization: "Bearer {{ acm_central_token }}"
    validate_certs: false
    timeout: 120
    status_code: [200]
  register: acm_policy_status
  until: >-
    acm_policy_status.status == 200 and
    (
      acm_policy_status.json.status.compliant | default('') == 'Compliant' or
      (
        acm_policy_status.json.status.status | default([]) |
        selectattr('clustername', 'equalto', acm_spoke_cluster_name) |
        map(attribute='compliant') | list | first | default('') == 'Compliant'
      )
    )
  retries: 24
  delay: 10
  no_log: true

- name: Cleanup temp CA file
  ansible.builtin.file:
    path: /tmp/assignment-acm-central-ca.crt
    state: absent
  ignore_errors: true

- name: Cleanup temp chart directory
  ansible.builtin.file:
    path: /tmp/sovereign-assignment-chart/
    state: absent
  ignore_errors: true
