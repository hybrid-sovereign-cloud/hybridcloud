---
- block:
    - name: Parse event payload
      ansible.builtin.set_fact:
        assignment_cr_name: "{{ event_payload.regarding.name }}"
        assignment_cr_namespace: "{{ event_payload.regarding.namespace }}"
        assignment_spec: "{{ event_payload.note | from_json }}"
        ansible_operator_meta:
          name: "{{ event_payload.regarding.name }}"
          namespace: "{{ event_payload.regarding.namespace }}"

    - name: Resolve services cluster API connection from Vault
      ansible.builtin.include_tasks: "{{ role_path }}/../../common/tasks/resolve_services_cluster_connection.yml"

    - name: Read Assignment CR from services cluster
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Assignment
        name: "{{ assignment_cr_name }}"
        namespace: "{{ assignment_cr_namespace }}"
      register: assignment_cr_lookup

    - name: Fail if Assignment CR is missing on services cluster
      ansible.builtin.fail:
        msg: Assignment CR {{ assignment_cr_name }} not found in {{ assignment_cr_namespace }}
      when: assignment_cr_lookup.resources | length == 0

    - name: Resolve spec values
      ansible.builtin.set_fact:
        assignment_team: "{{ assignment_spec.team | default('') }}"
        assignment_projects: "{{ assignment_spec.projects | default([]) }}"
        assignment_openshift: "{{ assignment_spec.openshift | default('') }}"
        assignment_generation: "{{ assignment_cr_lookup.resources[0].metadata.generation | default(0) | int }}"

    - name: Read entity Namespace
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: v1
        kind: Namespace
        name: "{{ assignment_cr_namespace }}"
      register: assignment_target_ns

    - name: Extract namespace metadata
      ansible.builtin.set_fact:
        assignment_entity: "{{ assignment_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] | default('') }}"
        assignment_billing_id: "{{ assignment_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/billing-id'] | default('') }}"
        assignment_description: "{{ (assignment_target_ns.resources[0].metadata.annotations | default({}))['hybridsovereign.redhat/description'] | default('') }}"

    - name: Look up referenced Team CR
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Team
        name: "{{ assignment_team }}"
        namespace: "{{ assignment_cr_namespace }}"
      register: team_lookup
      when: assignment_team | length > 0

    - name: Determine Team readiness
      ansible.builtin.set_fact:
        team_is_ready: "{{ (team_lookup.resources | default([]) | length > 0) and (team_lookup.resources[0].status.ready | default(false) | bool) }}"
        team_features_istio: "{{ (team_lookup.resources | default([{}]) | first).spec.features.istio | default(false) | bool }}"
        team_features_argo: "{{ (team_lookup.resources | default([{}]) | first).spec.features.argo | default(false) | bool }}"
      when: assignment_team | length > 0

    - name: Default Team readiness when no team specified
      ansible.builtin.set_fact:
        team_is_ready: false
        team_features_istio: false
        team_features_argo: false
      when: assignment_team | length == 0

    - name: Look up referenced Project CRs
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Project
        name: "{{ item }}"
        namespace: "{{ assignment_cr_namespace }}"
      register: project_lookups
      loop: "{{ assignment_projects }}"

    - name: Build project readiness list
      ansible.builtin.set_fact:
        projects_ready_list: []

    - name: Compute project readiness
      ansible.builtin.set_fact:
        projects_ready_list: "{{ projects_ready_list + [{'name': item, 'ready': ((project_lookups.results | default([]) | selectattr('item', 'equalto', item) | list | first).resources | default([]) | length > 0) and (((project_lookups.results | default([]) | selectattr('item', 'equalto', item) | list | first).resources | default([{}]) | first).status.ready | default(false) | bool)}] }}"
      loop: "{{ assignment_projects }}"

    - name: Look up referenced PlatformOpenshift CR
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: PlatformOpenshift
        name: "{{ assignment_openshift }}"
        namespace: "{{ assignment_cr_namespace }}"
      register: openshift_lookup
      when: assignment_openshift | length > 0

    - name: Determine PlatformOpenshift readiness and provider type
      ansible.builtin.set_fact:
        openshift_is_ready: "{{ (openshift_lookup.resources | default([]) | length > 0) and (openshift_lookup.resources[0].status.ready | default(false) | bool) }}"
        openshift_provider_type: "{{ (openshift_lookup.resources | default([{}]) | first).spec.type | default('') }}"
        openshift_cluster_name: "{{ (openshift_lookup.resources | default([{}]) | first).status.name | default('') }}"
      when: assignment_openshift | length > 0

    - name: Default PlatformOpenshift readiness when not specified
      ansible.builtin.set_fact:
        openshift_is_ready: false
        openshift_provider_type: ""
        openshift_cluster_name: ""
      when: assignment_openshift | length == 0

    - name: Determine overall readiness
      ansible.builtin.set_fact:
        all_projects_ready: "{{ (projects_ready_list | length == 0) or (projects_ready_list | map(attribute='ready') | list | min | bool) }}"
        assignment_ready: "{{ (team_is_ready | bool) and (openshift_is_ready | bool) }}"
        assignment_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Provision via ACM Policy on central cluster
      ansible.builtin.include_tasks: provision_acm.yml
      when: assignment_ready | bool

    - name: Update Assignment status on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: assignments
        cr_name: "{{ assignment_cr_name }}"
        cr_namespace: "{{ assignment_cr_namespace }}"
        cr_status_body:
          status: "{{ 'ready' if (assignment_ready | bool) else 'reconciling' }}"
          ready: "{{ assignment_ready | bool }}"
          observedGeneration: "{{ assignment_generation }}"
          lastReconciledAt: "{{ assignment_status_transition_time }}"
          name: "{{ assignment_cr_name }}"
          namespace: "{{ assignment_cr_namespace }}"
          entity: "{{ assignment_entity }}"
          billingId: "{{ assignment_billing_id }}"
          description: "{{ assignment_description }}"
          team: "{{ assignment_team }}"
          teamReady: "{{ team_is_ready | bool }}"
          projects: "{{ projects_ready_list }}"
          openshift: "{{ assignment_openshift }}"
          openshiftReady: "{{ openshift_is_ready | bool }}"
          clusterName: "{{ openshift_cluster_name }}"
          assignmentProvisioned: "{{ assignment_provisioned | default(false) | bool }}"
          acmPolicyName: "{{ assignment_acm_policy_name | default('') }}"
          helperName: ""
          helperProvider: ""
          conditions:
            - type: Ready
              status: "{{ 'True' if (assignment_ready | bool) else 'False' }}"
              lastTransitionTime: "{{ assignment_status_transition_time }}"
              reason: "{{ 'EDASucceeded' if (assignment_ready | bool) else 'LinkedNotReady' }}"
              message: >-
                Team={{ assignment_team }}(ready={{ team_is_ready }}),
                Projects={{ assignment_projects | length }},
                Openshift={{ assignment_openshift }}(ready={{ openshift_is_ready }})
          message: >-
            Team={{ assignment_team }}(ready={{ team_is_ready }}),
            Projects={{ assignment_projects | length }},
            Openshift={{ assignment_openshift }}(ready={{ openshift_is_ready }})

  rescue:
    - name: Mark Assignment as failed on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: assignments
        cr_name: "{{ assignment_cr_name }}"
        cr_namespace: "{{ assignment_cr_namespace }}"
        cr_status_body:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA provisioning failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: EDAFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA provisioning failed')) }}"
      ignore_errors: true
      when: services_api_host is defined and services_bearer_token is defined

    - name: Re-raise provisioning failure
      ansible.builtin.fail:
        msg: "Assignment {{ assignment_cr_name | default('unknown') }} EDA provisioning failed"
