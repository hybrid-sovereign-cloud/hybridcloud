---
- name: Set environmentprep spec facts
  ansible.builtin.set_fact:
    ep_spec: "{{ cloudaws_spec }}"
    ep_vault_path: "{{ aws_vault_path }}"
    ep_base_domain: "{{ aws_base_domain }}"
    ep_account: "{{ aws_account }}"
    ep_entity_name: "{{ entity_name | default('') }}"
    ep_landingzone: "{{ cloudaws_spec.landingzone | default('default') }}"

- name: Generate slug from CR name
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import hashlib, sys
        name = sys.argv[1]
        digest = hashlib.sha256(name.encode()).hexdigest()
        slug = ''.join(c for c in digest if c.isalnum())[:5].lower()
        print(slug)
      - "{{ cloudaws_cr_name }}"
  register: _slug_result
  changed_when: false
  when: ep_existing_slug == ''

- name: Set slug fact
  ansible.builtin.set_fact:
    ep_slug: "{{ ep_existing_slug if ep_existing_slug != '' else _slug_result.stdout | trim }}"

- name: Validate slug
  ansible.builtin.assert:
    that:
      - ep_slug | length == 5
    fail_msg: "Generated slug must be 5 characters. Got: '{{ ep_slug }}'"

- name: Derive domain facts
  ansible.builtin.set_fact:
    ep_domain: "{{ ep_slug }}.{{ ep_base_domain }}"
    ep_region: "{{ ep_spec.region | default(default_aws_region) }}"

- name: Create temporary ExternalSecret for AWS credentials
  kubernetes.core.k8s:
    host: "{{ services_api_host }}"
    api_key: "{{ services_bearer_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: "eda-cloudaws-{{ cloudaws_cr_name }}-aws-creds"
        namespace: "{{ cloudaws_operator_namespace }}"
        labels:
          app.kubernetes.io/managed-by: eda-cloudaws
          cloudaws: "{{ cloudaws_cr_name }}"
      spec:
        refreshInterval: 1m
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: "eda-cloudaws-{{ cloudaws_cr_name }}-aws-creds"
          creationPolicy: Owner
        data:
          - secretKey: AWS_ACCESS_KEY_ID
            remoteRef:
              key: "{{ ep_vault_path }}"
              property: AWS_ACCESS_KEY_ID
          - secretKey: AWS_SECRET_ACCESS_KEY
            remoteRef:
              key: "{{ ep_vault_path }}"
              property: AWS_SECRET_ACCESS_KEY
          - secretKey: ACCOUNT_ID
            remoteRef:
              key: "{{ ep_vault_path }}"
              property: ACCOUNT_ID

- name: Wait for AWS credentials secret to sync
  kubernetes.core.k8s_info:
    host: "{{ services_api_host }}"
    api_key: "{{ services_bearer_token }}"
    validate_certs: false
    api_version: v1
    kind: Secret
    name: "eda-cloudaws-{{ cloudaws_cr_name }}-aws-creds"
    namespace: "{{ cloudaws_operator_namespace }}"
  register: aws_creds_secret
  until: >-
    aws_creds_secret.resources | length > 0 and
    aws_creds_secret.resources[0].data is defined
  retries: 30
  delay: 10

- name: Decode AWS credentials
  ansible.builtin.set_fact:
    aws_access_key_id: "{{ aws_creds_secret.resources[0].data.AWS_ACCESS_KEY_ID | b64decode }}"
    aws_secret_access_key: "{{ aws_creds_secret.resources[0].data.AWS_SECRET_ACCESS_KEY | b64decode }}"
    aws_account_id: "{{ aws_creds_secret.resources[0].data.ACCOUNT_ID | b64decode }}"
  no_log: true

- name: Validate AWS credentials via STS
  amazon.aws.aws_caller_info:
  register: sts_info
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ ep_region }}"
  no_log: true

- name: Confirm AWS account ID matches spec
  ansible.builtin.assert:
    that:
      - sts_info.account == ep_account
    fail_msg: >-
      AWS credentials account ({{ sts_info.account }}) does not match
      spec.account ({{ ep_account }})

- name: List existing Route53 hosted zones
  amazon.aws.route53_info:
    query: hosted_zone
  register: r53_zones
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ ep_region }}"

- name: Set Route53 facts
  ansible.builtin.set_fact:
    ep_parent_zone_name: "{{ ep_base_domain }}."
    ep_subdomain_zone_name: "{{ ep_domain }}."
    r53_existing_zones: "{{ r53_zones.hosted_zones | map(attribute='name') | list }}"

- name: Find parent hosted zone ID
  ansible.builtin.set_fact:
    ep_parent_zone_id: >-
      {{ (r53_zones.hosted_zones
          | selectattr('name', 'equalto', ep_parent_zone_name)
          | map(attribute='id')
          | first
          | default(''))
         | regex_replace('^/hostedzone/', '') }}

- name: Fail if parent zone not found
  ansible.builtin.fail:
    msg: "Parent Route53 zone '{{ ep_base_domain }}' not found in AWS account {{ ep_account }}"
  when: ep_parent_zone_id == ''

- name: Check if subdomain zone already exists
  ansible.builtin.set_fact:
    ep_subdomain_zone_exists: "{{ ep_subdomain_zone_name in r53_existing_zones }}"

- name: Create Route53 subdomain zone {{ ep_domain }}
  amazon.aws.route53_zone:
    zone: "{{ ep_domain }}"
    state: present
    comment: "Sovereign Cloud environment {{ cloudaws_cr_name }} (entity: {{ ep_entity_name }})"
  register: r53_subdomain_zone
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ ep_region }}"
  when: not ep_subdomain_zone_exists

- name: Re-list zones after creation
  amazon.aws.route53_info:
    query: hosted_zone
  register: r53_zones_after
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ ep_region }}"

- name: Set subdomain zone ID
  ansible.builtin.set_fact:
    ep_subdomain_zone_id: >-
      {{ (r53_zones_after.hosted_zones
          | selectattr('name', 'equalto', ep_subdomain_zone_name)
          | map(attribute='id')
          | first
          | default(''))
         | regex_replace('^/hostedzone/', '') }}

- name: Fail if subdomain zone not found
  ansible.builtin.fail:
    msg: "Subdomain Route53 zone '{{ ep_domain }}' could not be found"
  when: ep_subdomain_zone_id == ''

- name: Get NS records for subdomain zone
  amazon.aws.route53_info:
    query: record_sets
    hosted_zone_id: "{{ ep_subdomain_zone_id }}"
    type: NS
    start_record_name: "{{ ep_domain }}"
    max_items: 1
  register: r53_subdomain_ns
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ ep_region }}"

- name: Set subdomain NS values
  ansible.builtin.set_fact:
    ep_subdomain_ns_values: >-
      {{ r53_subdomain_ns.resource_record_sets
         | selectattr('type', 'equalto', 'NS')
         | map(attribute='resource_records')
         | first
         | map(attribute='value')
         | list }}

- name: Create NS delegation in parent zone {{ ep_base_domain }}
  amazon.aws.route53:
    state: present
    zone: "{{ ep_base_domain }}"
    record: "{{ ep_domain }}"
    type: NS
    ttl: 300
    value: "{{ ep_subdomain_ns_values }}"
    overwrite: true
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ ep_region }}"
