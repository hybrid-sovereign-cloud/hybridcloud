---
# Push Keycloak-group ClusterRoleBindings to the provisioned cluster via ACM ConfigurationPolicy.
#
# Inputs (from caller / keycloak_oidc.yml):
#   cluster_name         - CR name (e.g. ocp-ses4)
#   cluster_namespace    - CR namespace (entity namespace)
#   central_api_server   - Central cluster API URL
#   central_token        - Bearer token for central cluster

- name: Read PlatformOpenshift CR for toolRbac spec
  kubernetes.core.k8s_info:
    host: "{{ services_api_host }}"
    api_key: "{{ services_bearer_token }}"
    validate_certs: false
    api_version: hybridsovereign.redhat/v1alpha1
    kind: PlatformOpenshift
    name: "{{ cluster_name }}"
    namespace: "{{ cluster_namespace }}"
  register: _plat_cr

- name: Set toolRbac spec fact
  ansible.builtin.set_fact:
    tool_rbac_spec: "{{ _plat_cr.resources[0].spec.toolRbac | default({}) }}"

# ─── Resolve each RBAC tier to Keycloak group paths ─────────────────────────
- name: Resolve clusterAdminRbac groups
  kubernetes.core.k8s_info:
    host: "{{ services_api_host }}"
    api_key: "{{ services_bearer_token }}"
    validate_certs: false
    api_version: hybridsovereign.redhat/v1alpha1
    kind: Rbac
    name: "{{ item }}"
    namespace: "{{ cluster_namespace }}"
  loop: "{{ tool_rbac_spec.clusterAdminRbac | default([]) }}"
  register: _cluster_admin_rbacs

- name: Build clusterAdmin group paths
  ansible.builtin.set_fact:
    cluster_admin_groups: >-
      {{
        _cluster_admin_rbacs.results
        | default([])
        | selectattr('resources', 'defined')
        | map(attribute='resources')
        | flatten
        | selectattr('status.group', 'defined')
        | map(attribute='status.group')
        | list
      }}

- name: Resolve clusterOperatorRbac groups
  kubernetes.core.k8s_info:
    host: "{{ services_api_host }}"
    api_key: "{{ services_bearer_token }}"
    validate_certs: false
    api_version: hybridsovereign.redhat/v1alpha1
    kind: Rbac
    name: "{{ item }}"
    namespace: "{{ cluster_namespace }}"
  loop: "{{ tool_rbac_spec.clusterOperatorRbac | default([]) }}"
  register: _cluster_operator_rbacs

- name: Build clusterOperator group paths
  ansible.builtin.set_fact:
    cluster_operator_groups: >-
      {{
        _cluster_operator_rbacs.results
        | default([])
        | selectattr('resources', 'defined')
        | map(attribute='resources')
        | flatten
        | selectattr('status.group', 'defined')
        | map(attribute='status.group')
        | list
      }}

- name: Resolve clusterDeveloperRbac groups
  kubernetes.core.k8s_info:
    host: "{{ services_api_host }}"
    api_key: "{{ services_bearer_token }}"
    validate_certs: false
    api_version: hybridsovereign.redhat/v1alpha1
    kind: Rbac
    name: "{{ item }}"
    namespace: "{{ cluster_namespace }}"
  loop: "{{ tool_rbac_spec.clusterDeveloperRbac | default([]) }}"
  register: _cluster_developer_rbacs

- name: Build clusterDeveloper group paths
  ansible.builtin.set_fact:
    cluster_developer_groups: >-
      {{
        _cluster_developer_rbacs.results
        | default([])
        | selectattr('resources', 'defined')
        | map(attribute='resources')
        | flatten
        | selectattr('status.group', 'defined')
        | map(attribute='status.group')
        | list
      }}

- name: Resolve clusterViewerRbac groups
  kubernetes.core.k8s_info:
    host: "{{ services_api_host }}"
    api_key: "{{ services_bearer_token }}"
    validate_certs: false
    api_version: hybridsovereign.redhat/v1alpha1
    kind: Rbac
    name: "{{ item }}"
    namespace: "{{ cluster_namespace }}"
  loop: "{{ tool_rbac_spec.clusterViewerRbac | default([]) }}"
  register: _cluster_viewer_rbacs

- name: Build clusterViewer group paths
  ansible.builtin.set_fact:
    cluster_viewer_groups: >-
      {{
        _cluster_viewer_rbacs.results
        | default([])
        | selectattr('resources', 'defined')
        | map(attribute='resources')
        | flatten
        | selectattr('status.group', 'defined')
        | map(attribute='status.group')
        | list
      }}

# ─── Build group subjects for each tier ──────────────────────────────────────
# Strip any leading slash and parent-group prefix so the group name matches
# what Keycloak puts in the 'groups' claim (full.path=false → leaf name only).
# e.g. "acme-corp/acme-ses10-cluster-admins" → "acme-ses10-cluster-admins"
- name: Build admin subjects
  ansible.builtin.set_fact:
    admin_subjects: >-
      {{ cluster_admin_groups | default([])
         | map('regex_replace', '^.*/', '')
         | map('regex_replace', '^(.*)$', '{"kind":"Group","name":"\1","apiGroup":"rbac.authorization.k8s.io"}')
         | map('from_json') | list }}

- name: Build operator subjects
  ansible.builtin.set_fact:
    operator_subjects: >-
      {{ cluster_operator_groups | default([])
         | map('regex_replace', '^.*/', '')
         | map('regex_replace', '^(.*)$', '{"kind":"Group","name":"\1","apiGroup":"rbac.authorization.k8s.io"}')
         | map('from_json') | list }}

- name: Build developer subjects
  ansible.builtin.set_fact:
    developer_subjects: >-
      {{ cluster_developer_groups | default([])
         | map('regex_replace', '^.*/', '')
         | map('regex_replace', '^(.*)$', '{"kind":"Group","name":"\1","apiGroup":"rbac.authorization.k8s.io"}')
         | map('from_json') | list }}

- name: Build viewer subjects
  ansible.builtin.set_fact:
    viewer_subjects: >-
      {{ cluster_viewer_groups | default([])
         | map('regex_replace', '^.*/', '')
         | map('regex_replace', '^(.*)$', '{"kind":"Group","name":"\1","apiGroup":"rbac.authorization.k8s.io"}')
         | map('from_json') | list }}

# ─── Build object-templates list for ConfigurationPolicy ─────────────────────
- name: Assemble RBAC object templates
  ansible.builtin.set_fact:
    rbac_object_templates: >-
      {{
        (
          [{
            'complianceType': 'musthave',
            'objectDefinition': {
              'apiVersion': 'rbac.authorization.k8s.io/v1',
              'kind': 'ClusterRoleBinding',
              'metadata': {'name': cluster_name + '-cluster-admin'},
              'subjects': admin_subjects,
              'roleRef': {'kind': 'ClusterRole', 'name': 'cluster-admin', 'apiGroup': 'rbac.authorization.k8s.io'}
            }
          }] if admin_subjects | default([]) | length > 0 else []
        ) + (
          [{
            'complianceType': 'musthave',
            'objectDefinition': {
              'apiVersion': 'rbac.authorization.k8s.io/v1',
              'kind': 'ClusterRoleBinding',
              'metadata': {'name': cluster_name + '-cluster-operator'},
              'subjects': operator_subjects,
              'roleRef': {'kind': 'ClusterRole', 'name': 'self-provisioner', 'apiGroup': 'rbac.authorization.k8s.io'}
            }
          }] if operator_subjects | default([]) | length > 0 else []
        ) + (
          [{
            'complianceType': 'musthave',
            'objectDefinition': {
              'apiVersion': 'rbac.authorization.k8s.io/v1',
              'kind': 'ClusterRoleBinding',
              'metadata': {'name': cluster_name + '-cluster-developer'},
              'subjects': developer_subjects,
              'roleRef': {'kind': 'ClusterRole', 'name': 'edit', 'apiGroup': 'rbac.authorization.k8s.io'}
            }
          }] if developer_subjects | default([]) | length > 0 else []
        ) + (
          [{
            'complianceType': 'musthave',
            'objectDefinition': {
              'apiVersion': 'rbac.authorization.k8s.io/v1',
              'kind': 'ClusterRoleBinding',
              'metadata': {'name': cluster_name + '-cluster-viewer'},
              'subjects': viewer_subjects,
              'roleRef': {'kind': 'ClusterRole', 'name': 'view', 'apiGroup': 'rbac.authorization.k8s.io'}
            }
          }] if viewer_subjects | default([]) | length > 0 else []
        )
      }}

# ─── Idempotent create-or-update for RBAC Policy ─────────────────────────────
- name: Check if cluster RBAC Policy already exists
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/openshift-gitops/policies/{{ cluster_name }}-cluster-rbac"
    method: GET
    headers:
      Authorization: "Bearer {{ central_token }}"
    validate_certs: false
    status_code: [200, 404]
  when:
    - rbac_object_templates | default([]) | length > 0
  register: _rbac_policy_check

- name: Create cluster RBAC Policy (first time)
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/openshift-gitops/policies"
    method: POST
    headers:
      Authorization: "Bearer {{ central_token }}"
      Content-Type: application/json
    body_format: json
    body:
      apiVersion: policy.open-cluster-management.io/v1
      kind: Policy
      metadata:
        name: "{{ cluster_name }}-cluster-rbac"
        namespace: openshift-gitops
        annotations:
          policy.open-cluster-management.io/standards: "RBAC"
          policy.open-cluster-management.io/categories: "Access Control"
          policy.open-cluster-management.io/controls: "ClusterRoleBinding"
      spec:
        disabled: false
        remediationAction: enforce
        policy-templates:
          - objectDefinition:
              apiVersion: policy.open-cluster-management.io/v1
              kind: ConfigurationPolicy
              metadata:
                name: "{{ cluster_name }}-cluster-rbac"
              spec:
                remediationAction: enforce
                severity: high
                object-templates: "{{ rbac_object_templates }}"
    validate_certs: false
    status_code: [200, 201]
  when:
    - rbac_object_templates | default([]) | length > 0
    - _rbac_policy_check.status == 404

- name: Update cluster RBAC Policy (idempotent PATCH)
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/openshift-gitops/policies/{{ cluster_name }}-cluster-rbac"
    method: PATCH
    headers:
      Authorization: "Bearer {{ central_token }}"
      Content-Type: application/merge-patch+json
    body_format: json
    body:
      spec:
        disabled: false
        remediationAction: enforce
        policy-templates:
          - objectDefinition:
              apiVersion: policy.open-cluster-management.io/v1
              kind: ConfigurationPolicy
              metadata:
                name: "{{ cluster_name }}-cluster-rbac"
              spec:
                remediationAction: enforce
                severity: high
                object-templates: "{{ rbac_object_templates }}"
    validate_certs: false
    status_code: [200]
  when:
    - rbac_object_templates | default([]) | length > 0
    - _rbac_policy_check.status == 200

# ─── Idempotent create-or-skip for Placement (selector is immutable, skip if exists) ─
- name: Check if cluster RBAC Placement already exists
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/cluster.open-cluster-management.io/v1beta1/namespaces/openshift-gitops/placements/{{ cluster_name }}-cluster-rbac-placement"
    method: GET
    headers:
      Authorization: "Bearer {{ central_token }}"
    validate_certs: false
    status_code: [200, 404]
  when:
    - rbac_object_templates | default([]) | length > 0
  register: _rbac_placement_check

- name: Create ACM Placement for cluster RBAC policy
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/cluster.open-cluster-management.io/v1beta1/namespaces/openshift-gitops/placements"
    method: POST
    headers:
      Authorization: "Bearer {{ central_token }}"
      Content-Type: application/json
    body_format: json
    body:
      apiVersion: cluster.open-cluster-management.io/v1beta1
      kind: Placement
      metadata:
        name: "{{ cluster_name }}-cluster-rbac-placement"
        namespace: openshift-gitops
      spec:
        predicates:
          - requiredClusterSelector:
              labelSelector:
                matchLabels:
                  name: "{{ cluster_name }}"
    validate_certs: false
    status_code: [200, 201]
  when:
    - rbac_object_templates | default([]) | length > 0
    - _rbac_placement_check.status == 404

# ─── Idempotent create-or-skip for PlacementBinding ──────────────────────────
- name: Check if cluster RBAC PlacementBinding already exists
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/openshift-gitops/placementbindings/{{ cluster_name }}-cluster-rbac-binding"
    method: GET
    headers:
      Authorization: "Bearer {{ central_token }}"
    validate_certs: false
    status_code: [200, 404]
  when:
    - rbac_object_templates | default([]) | length > 0
  register: _rbac_binding_check

- name: Create ACM PlacementBinding for cluster RBAC policy
  ansible.builtin.uri:
    url: "{{ central_api_server }}/apis/policy.open-cluster-management.io/v1/namespaces/openshift-gitops/placementbindings"
    method: POST
    headers:
      Authorization: "Bearer {{ central_token }}"
      Content-Type: application/json
    body_format: json
    body:
      apiVersion: policy.open-cluster-management.io/v1
      kind: PlacementBinding
      metadata:
        name: "{{ cluster_name }}-cluster-rbac-binding"
        namespace: openshift-gitops
      placementRef:
        name: "{{ cluster_name }}-cluster-rbac-placement"
        kind: Placement
        apiGroup: cluster.open-cluster-management.io
      subjects:
        - name: "{{ cluster_name }}-cluster-rbac"
          kind: Policy
          apiGroup: policy.open-cluster-management.io
    validate_certs: false
    status_code: [200, 201]
  when:
    - rbac_object_templates | default([]) | length > 0
    - _rbac_binding_check.status == 404
