---
- name: Read central cluster credentials from Vault when not already resolved
  ansible.builtin.uri:
    url: "{{ vault_init_addr }}/v1/central/data/aap-central-cluster-sa"
    method: GET
    headers:
      X-Vault-Token: "{{ vault_root_token | default(lookup('env', 'VAULT_TOKEN'), true) }}"
    status_code: [200]
    validate_certs: false
  register: central_cluster_creds
  no_log: true
  when: central_api_host is not defined or central_bearer_token is not defined

- name: Set central cluster connection facts from Vault lookup
  ansible.builtin.set_fact:
    central_api_host: "{{ central_cluster_creds.json.data.data.host }}"
    central_bearer_token: "{{ central_cluster_creds.json.data.data.bearer_token }}"
  no_log: true
  when: central_api_host is not defined or central_bearer_token is not defined

- name: Write kubeconfig for Helm against central cluster
  ansible.builtin.copy:
    content: |
      apiVersion: v1
      kind: Config
      clusters:
      - cluster:
          insecure-skip-tls-verify: true
          server: "{{ central_api_host }}"
        name: central-cluster
      contexts:
      - context:
          cluster: central-cluster
          user: central-user
        name: central-context
      current-context: central-context
      users:
      - name: central-user
        user:
          token: "{{ central_bearer_token }}"
    dest: "/tmp/{{ cb_app_name }}-kubeconfig"
    mode: '0600'
  changed_when: false
  no_log: true
