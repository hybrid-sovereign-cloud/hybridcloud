---
- name: Validate slug is 5 characters (Route53 environments)
  ansible.builtin.assert:
    that:
      - cb_slug | length == 5
    fail_msg: "CloudOSO slug must be exactly 5 characters. Got: '{{ cb_slug }}'"
  when: not (use_designate_dns | default(false) | bool)

- name: Derive cluster identifiers
  ansible.builtin.set_fact:
    cb_app_name: "{{ ansible_operator_meta.name }}"
    cb_cluster_name: "{{ ansible_operator_meta.name }}"
    cb_cluster_domain: >-
      {{ (oso_env_name ~ '.shc.example.com')
         if (use_designate_dns | default(false) | bool)
         else (cb_slug ~ '.' ~ cb_base_domain) }}
    cb_image_set: "{{ platform_spec.openstack.ocpImageSet | default(default_ocp_image_set) }}"
    cb_controller_flavor: "{{ oso_control_plane_flavor }}"
    cb_worker_flavor: "{{ oso_worker_flavor }}"
    cb_control_plane_count: "{{ oso_control_plane_count }}"
    cb_worker_count: "{{ oso_worker_count }}"
    cb_pull_secret_vault: "{{ platform_spec.openstack.pullSecretVaultPath | default(default_pull_secret_vault_path) }}"
    cb_ssh_key_vault: "{{ platform_spec.openstack.sshKeyVaultPath | default(default_ssh_key_vault_path) }}"
    cb_provider_creds_vault: "oso/projects/{{ oso_env_name }}/clouds-config"
    cb_install_config_vault: "oso/projects/{{ oso_env_name }}/install-config"
    cb_trust_bundle: "{{ platform_spec.openstack.trustBundle | default('') }}"
    cb_glance_image: "{{ platform_spec.openstack.glanceImageOverride | default(default_glance_image_override) }}"

- name: Clean up failed or stale Hive cluster build before reprovisioning
  ansible.builtin.include_tasks: cleanup_stale_clusterbuild.yml

- name: Create temporary ExternalSecret for Route53 credentials
  when: not (use_designate_dns | default(false) | bool)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: "eda-platformopenshift-{{ cb_cluster_name }}-route53-creds"
        namespace: "{{ eda_central_work_namespace }}"
        labels:
          app.kubernetes.io/managed-by: eda-platformopenshift
          platformopenshift: "{{ cb_cluster_name }}"
      spec:
        refreshInterval: 1m
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: "eda-platformopenshift-{{ cb_cluster_name }}-route53-creds"
          creationPolicy: Owner
        data:
          - secretKey: AWS_ACCESS_KEY_ID
            remoteRef:
              key: "{{ cb_route53_vault_path }}"
              property: access-key
          - secretKey: AWS_SECRET_ACCESS_KEY
            remoteRef:
              key: "{{ cb_route53_vault_path }}"
              property: secret-access-key

- name: Wait for Route53 credentials
  when: not (use_designate_dns | default(false) | bool)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "eda-platformopenshift-{{ cb_cluster_name }}-route53-creds"
    namespace: "{{ eda_central_work_namespace }}"
  register: route53_creds_secret
  until: >-
    route53_creds_secret.resources | length > 0 and
    route53_creds_secret.resources[0].data is defined
  retries: 30
  delay: 10

- name: Decode Route53 credentials
  when: not (use_designate_dns | default(false) | bool)
  ansible.builtin.set_fact:
    r53_access_key_id: "{{ route53_creds_secret.resources[0].data.AWS_ACCESS_KEY_ID | b64decode }}"
    r53_secret_access_key: "{{ route53_creds_secret.resources[0].data.AWS_SECRET_ACCESS_KEY | b64decode }}"
  no_log: true

- name: Create Route53 A record for API endpoint
  when: not (use_designate_dns | default(false) | bool)
  amazon.aws.route53:
    state: present
    zone: "{{ cb_base_domain }}"
    record: "api.{{ cb_cluster_name }}.{{ cb_slug }}.{{ cb_base_domain }}"
    type: A
    ttl: 300
    value:
      - "{{ cb_api_vip }}"
    overwrite: true
  environment:
    AWS_ACCESS_KEY_ID: "{{ r53_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ r53_secret_access_key }}"
    AWS_DEFAULT_REGION: "us-east-1"

- name: Create Route53 A record for Apps wildcard
  when: not (use_designate_dns | default(false) | bool)
  amazon.aws.route53:
    state: present
    zone: "{{ cb_base_domain }}"
    record: "*.apps.{{ cb_cluster_name }}.{{ cb_slug }}.{{ cb_base_domain }}"
    type: A
    ttl: 300
    value:
      - "{{ cb_ingress_vip }}"
    overwrite: true
  environment:
    AWS_ACCESS_KEY_ID: "{{ r53_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ r53_secret_access_key }}"
    AWS_DEFAULT_REGION: "us-east-1"

- name: Create Designate DNS records for internet-facing cluster
  ansible.builtin.include_tasks: designate_dns.yml
  when: use_designate_dns | default(false) | bool

- name: Create temporary ExternalSecret for OCP pull secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: "eda-platformopenshift-{{ cb_cluster_name }}-pull-secret"
        namespace: "{{ eda_central_work_namespace }}"
        labels:
          app.kubernetes.io/managed-by: eda-platformopenshift
          platformopenshift: "{{ cb_cluster_name }}"
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: "eda-platformopenshift-{{ cb_cluster_name }}-pull-secret"
          creationPolicy: Owner
        data:
          - secretKey: pull_secret
            remoteRef:
              key: "{{ cb_pull_secret_vault }}"
              property: pull_secret

- name: Create temporary ExternalSecret for SSH key
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: "eda-platformopenshift-{{ cb_cluster_name }}-ssh-key"
        namespace: "{{ eda_central_work_namespace }}"
        labels:
          app.kubernetes.io/managed-by: eda-platformopenshift
          platformopenshift: "{{ cb_cluster_name }}"
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: "eda-platformopenshift-{{ cb_cluster_name }}-ssh-key"
          creationPolicy: Owner
        data:
          - secretKey: ssh_public_key
            remoteRef:
              key: "{{ cb_ssh_key_vault }}"
              property: ssh_public_key
          - secretKey: ssh_private_key
            remoteRef:
              key: "{{ cb_ssh_key_vault }}"
              property: ssh_private_key

- name: Wait for pull secret and SSH key
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ item }}"
    namespace: "{{ eda_central_work_namespace }}"
  register: shared_secrets
  until: >-
    shared_secrets.resources | length > 0 and
    shared_secrets.resources[0].data is defined
  retries: 30
  delay: 10
  loop:
    - "eda-platformopenshift-{{ cb_cluster_name }}-pull-secret"
    - "eda-platformopenshift-{{ cb_cluster_name }}-ssh-key"

- name: Decode pull secret and SSH key
  ansible.builtin.set_fact:
    cb_pull_secret_raw: "{{ (shared_secrets.results[0].resources[0].data.pull_secret | b64decode) }}"
    cb_ssh_public_key: "{{ (shared_secrets.results[1].resources[0].data.ssh_public_key | b64decode) }}"
    cb_ssh_private_key: "{{ (shared_secrets.results[1].resources[0].data.ssh_private_key | b64decode) }}"
  no_log: true

- name: Normalize pull secret to valid JSON
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import sys, ast, json
        raw = sys.stdin.read().strip()
        try:
            parsed = json.loads(raw)
            print(json.dumps(parsed, separators=(',', ':')))
        except (json.JSONDecodeError, ValueError):
            try:
                parsed = ast.literal_eval(raw)
                print(json.dumps(parsed, separators=(',', ':')))
            except Exception:
                print(raw)
    stdin: "{{ cb_pull_secret_raw }}"
  register: _pull_secret_json_result
  no_log: true
  changed_when: false

- name: Set normalized pull secret JSON
  ansible.builtin.set_fact:
    cb_pull_secret_json: "{{ _pull_secret_json_result.stdout | trim }}"
  no_log: true

- name: Read Vault root token
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ vault_init_secret_name }}"
    namespace: "{{ vault_init_secret_namespace }}"
  register: vault_init_secret_info

- name: Set Vault root token
  ansible.builtin.set_fact:
    vault_root_token: "{{ vault_init_secret_info.resources[0].data.root_token | b64decode }}"
  no_log: true

- name: Build and write install-config to Vault via Python
  ansible.builtin.shell: |
    python3 << 'PYEOF'
    import json, requests, urllib3, yaml
    urllib3.disable_warnings()

    pull_secret_raw = {{ cb_pull_secret_json | to_json }}
    if isinstance(pull_secret_raw, dict):
        pull_secret_str = json.dumps(pull_secret_raw, separators=(',', ':'))
    else:
        pull_secret_str = str(pull_secret_raw)

    config = {
        'apiVersion': 'v1',
        'metadata': {'name': '{{ cb_cluster_name }}'},
        'baseDomain': '{{ cb_cluster_domain }}',
        'publish': 'External',
        'controlPlane': {
            'name': 'master',
            'replicas': {{ cb_control_plane_count }},
            'platform': {'openstack': {'type': '{{ cb_controller_flavor }}'}}
        },
        'compute': [{
            'name': 'worker',
            'replicas': {{ cb_worker_count }},
            'platform': {'openstack': {'type': '{{ cb_worker_flavor }}'}}
        }],
        'networking': {
            'networkType': 'OVNKubernetes',
            'clusterNetwork': [{'cidr': '10.128.0.0/14', 'hostPrefix': 23}],
            'machineNetwork': [{'cidr': '10.0.0.0/16'}],
            'serviceNetwork': ['172.30.0.0/16']
        },
        'platform': {
            'openstack': {
                'cloud': 'openstack',
                'externalNetwork': '{{ cb_external_network }}',
                'apiFloatingIP': '{{ cb_api_vip }}',
                'ingressFloatingIP': '{{ cb_ingress_vip }}',
                'computeFlavor': '{{ cb_controller_flavor }}',
                'clusterOSImage': '{{ cb_glance_image }}',
                'externalDNS': []
            }
        },
        'pullSecret': pull_secret_str,
        'sshKey': '{{ cb_ssh_public_key }}'
    }

    trust_bundle = '''{{ cb_trust_bundle | default('') }}'''.strip()
    if trust_bundle:
        config['additionalTrustBundle'] = trust_bundle

    yaml_content = yaml.dump(config, default_flow_style=False, width=4096)

    resp = requests.post(
        '{{ vault_init_addr }}/v1/central/data/{{ cb_install_config_vault }}',
        headers={'X-Vault-Token': '{{ vault_root_token }}'},
        json={'data': {'install-config.yaml': yaml_content}},
        verify=False
    )
    resp.raise_for_status()
    print(f"Wrote install-config to Vault: {resp.status_code}")
    PYEOF
  no_log: true
  changed_when: true

- name: Render build-values YAML to tempfile
  ansible.builtin.copy:
    content: "{{ lookup('template', 'build-values.yaml.j2') }}"
    dest: "/tmp/{{ cb_app_name }}-build-values.yaml"
    mode: '0600'
  changed_when: false

- name: Write central cluster kubeconfig for Helm
  ansible.builtin.include_tasks: write_central_helm_kubeconfig.yml

- name: Check existing Helm release
  ansible.builtin.command:
    argv:
      - helm
      - status
      - "{{ cb_app_name }}"
      - --namespace
      - "{{ cb_cluster_name }}"
      - --output
      - json
      - --kubeconfig
      - "/tmp/{{ cb_app_name }}-kubeconfig"
  register: helm_release_status
  failed_when: false
  changed_when: false

- name: Set helm release exists flag
  ansible.builtin.set_fact:
    cb_helm_release_exists: "{{ helm_release_status.rc == 0 }}"

- name: Set helm release failed flag
  ansible.builtin.set_fact:
    cb_helm_release_failed: >-
      {{ cb_helm_release_exists | bool and
         (helm_release_status.stdout | from_json).info.status | default('') == 'failed' }}
  when: cb_helm_release_exists | bool

- name: Set helm release failed flag (when release does not exist)
  ansible.builtin.set_fact:
    cb_helm_release_failed: false
  when: not (cb_helm_release_exists | bool)

- name: Get current Helm values for idempotency check
  ansible.builtin.command:
    argv:
      - helm
      - get
      - values
      - "{{ cb_app_name }}"
      - --namespace
      - "{{ cb_cluster_name }}"
      - --output
      - yaml
      - --kubeconfig
      - "/tmp/{{ cb_app_name }}-kubeconfig"
  register: helm_current_values
  failed_when: false
  changed_when: false
  when: cb_helm_release_exists | bool

- name: Determine if Helm upgrade is needed
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import sys, yaml
        new = yaml.safe_load(open('/tmp/{{ cb_app_name }}-build-values.yaml').read()) or {}
        cur_raw = """{{ helm_current_values.stdout | default('null') }}"""
        cur = yaml.safe_load(cur_raw) or {}
        print("true" if new != cur else "false")
  register: values_diff_result
  changed_when: false
  when: cb_helm_release_exists | bool

- name: Set values changed flag
  ansible.builtin.set_fact:
    cb_values_changed: >-
      {{ not (cb_helm_release_exists | bool) or
         (cb_helm_release_failed | bool) or
         (values_diff_result.stdout | default('true') | trim == 'true') }}

- name: Deploy mce-cluster-build chart
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - "{{ cb_app_name }}"
      - "oci://quay.example.com/hybrid-sovereign/mce-cluster-build"
      - --version
      - "{{ mce_cluster_build_chart_version }}"
      - --install
      - --namespace
      - "{{ cb_cluster_name }}"
      - --create-namespace
      - --values
      - "/tmp/{{ cb_app_name }}-build-values.yaml"
      - --history-max
      - "2"
      - --wait
      - --timeout
      - "10m"
      - --kubeconfig
      - "/tmp/{{ cb_app_name }}-kubeconfig"
  register: helm_deploy_result
  when: cb_values_changed | bool
  changed_when: "'has been upgraded' in helm_deploy_result.stdout or 'Installing it now' in helm_deploy_result.stdout"

- name: Clean up temp values file
  ansible.builtin.file:
    path: "/tmp/{{ cb_app_name }}-build-values.yaml"
    state: absent
  changed_when: false

- name: Monitor cluster deployment and push secrets
  ansible.builtin.include_tasks: openstack_clusterbuild_monitor.yml
