---
- name: List existing Route53 hosted zones
  amazon.aws.route53_info:
    query: hosted_zone
  register: r53_zones
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ cb_region }}"

- name: Set Route53 facts
  ansible.builtin.set_fact:
    cb_subdomain: "{{ cb_cluster_domain }}"
    cb_parent_zone_name: "{{ aws_base_domain }}."
    cb_install_zone_name: "{{ cb_install_base_domain }}."
    cb_subdomain_zone_name: "{{ cb_cluster_domain }}."
    r53_existing_zones: "{{ r53_zones.hosted_zones | map(attribute='name') | list }}"

- name: Find root baseDomain hosted zone ID
  ansible.builtin.set_fact:
    cb_parent_zone_id: >-
      {{ (r53_zones.hosted_zones
          | selectattr('name', 'equalto', cb_parent_zone_name)
          | map(attribute='id')
          | first
          | default(''))
         | regex_replace('^/hostedzone/', '') }}

- name: Fail if parent zone not found
  ansible.builtin.fail:
    msg: "Parent Route53 zone '{{ aws_base_domain }}' not found in AWS account {{ aws_account }}"
  when: cb_parent_zone_id == ''

- name: Find install base zone ID
  ansible.builtin.set_fact:
    cb_install_zone_id: >-
      {{ (r53_zones.hosted_zones
          | selectattr('name', 'equalto', cb_install_zone_name)
          | map(attribute='id')
          | first
          | default(''))
         | regex_replace('^/hostedzone/', '') }}

- name: Check if subdomain zone already exists
  ansible.builtin.set_fact:
    cb_subdomain_zone_exists: "{{ cb_subdomain_zone_name in r53_existing_zones }}"

- name: Create Route53 subdomain zone {{ cb_cluster_domain }}
  amazon.aws.route53_zone:
    zone: "{{ cb_cluster_domain }}"
    state: present
    comment: "OCP cluster build zone for {{ cb_app_name }}"
  register: r53_subdomain_zone
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ cb_region }}"
  when: not cb_subdomain_zone_exists

- name: Get existing subdomain zone details
  amazon.aws.route53_info:
    query: hosted_zone
  register: r53_zones_after
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ cb_region }}"

- name: Set subdomain zone ID
  ansible.builtin.set_fact:
    cb_subdomain_zone_id: >-
      {{ (r53_zones_after.hosted_zones
          | selectattr('name', 'equalto', cb_subdomain_zone_name)
          | map(attribute='id')
          | first
          | default(''))
         | regex_replace('^/hostedzone/', '') }}

- name: Fail if subdomain zone not found after creation
  ansible.builtin.fail:
    msg: "Subdomain Route53 zone '{{ cb_cluster_domain }}' could not be found after creation"
  when: cb_subdomain_zone_id == ''

- name: List all record sets in cluster subdomain zone
  amazon.aws.route53_info:
    query: record_sets
    hosted_zone_id: "{{ cb_subdomain_zone_id }}"
  register: r53_existing_child_records
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ cb_region }}"

- name: List all record sets in install base zone
  amazon.aws.route53_info:
    query: record_sets
    hosted_zone_id: "{{ cb_install_zone_id }}"
  register: r53_existing_parent_records
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ cb_region }}"
  when: cb_install_zone_id != ''

- name: Set stale A record facts (child zone)
  ansible.builtin.set_fact:
    cb_stale_a_records_child: >-
      {{ r53_existing_child_records.resource_record_sets
         | selectattr('type', 'equalto', 'A')
         | list }}

- name: Set stale A record facts (install zone)
  ansible.builtin.set_fact:
    cb_stale_a_records_parent: >-
      {{ (r53_existing_parent_records.resource_record_sets | default([]))
         | selectattr('type', 'equalto', 'A')
         | selectattr('name', 'search', cb_cluster_name + '\.')
         | list }}

- name: Delete stale A records from child subdomain zone
  amazon.aws.route53:
    state: absent
    zone: "{{ cb_cluster_domain }}"
    hosted_zone_id: "{{ cb_subdomain_zone_id }}"
    record: "{{ item.name | regex_replace('\\.$', '') }}"
    type: A
    alias: "{{ item.alias_target is defined }}"
    alias_hosted_zone_id: "{{ item.alias_target.hosted_zone_id | default(omit) }}"
    alias_dns_name: "{{ item.alias_target.dns_name | default(omit) }}"
    value: "{{ (item.resource_records | default([])) | map(attribute='value') | list or omit }}"
    ttl: "{{ item.ttl | default(omit) }}"
  loop: "{{ cb_stale_a_records_child }}"
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ cb_region }}"
  when: cb_stale_a_records_child | length > 0
  ignore_errors: true

- name: Delete stale A records from install zone
  amazon.aws.route53:
    state: absent
    zone: "{{ cb_install_base_domain }}"
    hosted_zone_id: "{{ cb_install_zone_id }}"
    record: "{{ item.name | regex_replace('\\.$', '') }}"
    type: A
    alias: "{{ item.alias_target is defined }}"
    alias_hosted_zone_id: "{{ item.alias_target.hosted_zone_id | default(omit) }}"
    alias_dns_name: "{{ item.alias_target.dns_name | default(omit) }}"
    value: "{{ (item.resource_records | default([])) | map(attribute='value') | list or omit }}"
    ttl: "{{ item.ttl | default(omit) }}"
  loop: "{{ cb_stale_a_records_parent }}"
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ cb_region }}"
  when: cb_stale_a_records_parent | length > 0 and cb_install_zone_id != ''
  ignore_errors: true

- name: Get NS records for subdomain zone
  amazon.aws.route53_info:
    query: record_sets
    hosted_zone_id: "{{ cb_subdomain_zone_id }}"
    type: NS
    start_record_name: "{{ cb_cluster_domain }}"
    max_items: 1
  register: r53_subdomain_ns
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ cb_region }}"

- name: Set subdomain NS values
  ansible.builtin.set_fact:
    cb_subdomain_ns_values: >-
      {{ r53_subdomain_ns.resource_record_sets
         | selectattr('type', 'equalto', 'NS')
         | map(attribute='resource_records')
         | first
         | map(attribute='value')
         | list }}

- name: Remove NS delegation for cluster subdomain from root baseDomain zone
  amazon.aws.route53:
    state: absent
    zone: "{{ aws_base_domain }}"
    hosted_zone_id: "{{ cb_parent_zone_id }}"
    record: "{{ cb_cluster_domain }}"
    type: NS
    value: "{{ cb_subdomain_ns_values }}"
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ cb_region }}"
  ignore_errors: true

- name: Remove NS delegation for cluster subdomain from install base zone
  amazon.aws.route53:
    state: absent
    zone: "{{ cb_install_base_domain }}"
    hosted_zone_id: "{{ cb_install_zone_id }}"
    record: "{{ cb_cluster_domain }}"
    type: NS
    value: "{{ cb_subdomain_ns_values }}"
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ cb_region }}"
  when: cb_install_zone_id != ''
  ignore_errors: true
