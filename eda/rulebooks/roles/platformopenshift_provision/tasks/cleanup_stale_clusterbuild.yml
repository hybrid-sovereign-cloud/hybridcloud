---
- name: Set Vault root token from job credential
  ansible.builtin.set_fact:
    vault_root_token: "{{ lookup('env', 'VAULT_TOKEN') }}"
  no_log: true

- name: Write central cluster kubeconfig for Helm
  ansible.builtin.include_tasks: write_central_helm_kubeconfig.yml

- name: Check existing ClusterDeployment on central
  kubernetes.core.k8s_info:
    host: "{{ central_api_host }}"
    api_key: "{{ central_bearer_token }}"
    validate_certs: false
    api_version: hive.openshift.io/v1
    kind: ClusterDeployment
    name: "{{ cb_cluster_name }}"
    namespace: "{{ cb_cluster_name }}"
  register: existing_cd

- name: Derive ClusterDeployment provision condition
  ansible.builtin.set_fact:
    cb_cd_provisioned: >-
      {{ (existing_cd.resources | default([]) | length > 0) and
         ((existing_cd.resources[0].status.conditions | default([]) |
           selectattr('type', 'equalto', 'Provisioned') |
           map(attribute='status') | list | first | default('')) == 'True') }}
    cb_cd_provision_reason: >-
      {{ (existing_cd.resources[0].status.conditions | default([])
          | selectattr('type', 'equalto', 'Provisioned')
          | map(attribute='reason') | list | first | default(''))
         if (existing_cd.resources | default([]) | length > 0) else '' }}
    cb_cd_provision_status: >-
      {{ (existing_cd.resources[0].status.provisionStatus | default(''))
         if (existing_cd.resources | default([]) | length > 0) else '' }}

- name: Check existing Helm release
  ansible.builtin.command:
    argv:
      - helm
      - status
      - "{{ cb_app_name }}"
      - --namespace
      - "{{ cb_cluster_name }}"
      - --output
      - json
      - --kubeconfig
      - "/tmp/{{ cb_app_name }}-kubeconfig"
  register: cleanup_helm_status
  failed_when: false
  changed_when: false

- name: Set Helm release failed flag for cleanup
  ansible.builtin.set_fact:
    cb_cleanup_helm_failed: >-
      {{ cleanup_helm_status.rc == 0 and
         (cleanup_helm_status.stdout | from_json).info.status | default('') == 'failed' }}

- name: Set stale cluster build cleanup flag
  ansible.builtin.set_fact:
    cb_cleanup_stale_clusterbuild: >-
      {{ (cleanup_helm_status.rc == 0 and (existing_cd.resources | default([]) | length == 0)) or
         (cb_cleanup_helm_failed | bool) or
         (cb_cd_provision_status | default('') == 'Deprovisioning') or
         ((existing_cd.resources | default([]) | length > 0) and
          not (cb_cd_provisioned | bool) and
          cb_cd_provision_reason in ['ProvisionFailed', 'RequirementsNotMet', 'InitializationFailed', 'ProvisionStopped']) }}

- name: Remove stale Hive/Helm cluster build before fresh install
  when: cb_cleanup_stale_clusterbuild | bool
  block:
    - name: Delete ManagedCluster for clean ACM re-import
      kubernetes.core.k8s:
        host: "{{ central_api_host }}"
        api_key: "{{ central_bearer_token }}"
        validate_certs: false
        state: absent
        api_version: cluster.open-cluster-management.io/v1
        kind: ManagedCluster
        name: "{{ cb_cluster_name }}"
      ignore_errors: true

    - name: Wait for ManagedCluster deletion
      kubernetes.core.k8s_info:
        host: "{{ central_api_host }}"
        api_key: "{{ central_bearer_token }}"
        validate_certs: false
        api_version: cluster.open-cluster-management.io/v1
        kind: ManagedCluster
        name: "{{ cb_cluster_name }}"
      register: cleanup_mc_wait
      until: cleanup_mc_wait.resources | length == 0
      retries: 60
      delay: 10
      ignore_errors: true

    - name: Ensure Hive deprovision credentials exist before CD removal
      ansible.builtin.include_tasks: ensure_deprovision_secrets.yml
      when: existing_cd.resources | default([]) | length > 0

    - name: Delete ClusterDeployment to trigger Hive deprovision
      kubernetes.core.k8s:
        host: "{{ central_api_host }}"
        api_key: "{{ central_bearer_token }}"
        validate_certs: false
        state: absent
        api_version: hive.openshift.io/v1
        kind: ClusterDeployment
        name: "{{ cb_cluster_name }}"
        namespace: "{{ cb_cluster_name }}"
      when: existing_cd.resources | default([]) | length > 0
      ignore_errors: true

    - name: Wait for ClusterDeployment deletion
      kubernetes.core.k8s_info:
        host: "{{ central_api_host }}"
        api_key: "{{ central_bearer_token }}"
        validate_certs: false
        api_version: hive.openshift.io/v1
        kind: ClusterDeployment
        name: "{{ cb_cluster_name }}"
        namespace: "{{ cb_cluster_name }}"
      register: cleanup_cd_wait
      until: cleanup_cd_wait.resources | length == 0
      retries: 120
      delay: 15
      ignore_errors: true

    - name: Wait for Hive uninstall job to finish
      kubernetes.core.k8s_info:
        host: "{{ central_api_host }}"
        api_key: "{{ central_bearer_token }}"
        validate_certs: false
        api_version: batch/v1
        kind: Job
        namespace: "{{ cb_cluster_name }}"
        label_selectors:
          - hive.openshift.io/cluster-deployment-name={{ cb_cluster_name }}
      register: cleanup_uninstall_jobs
      until: >-
        cleanup_uninstall_jobs.resources | default([]) | length == 0 or
        (
          cleanup_uninstall_jobs.resources | default([]) | length > 0 and
          (
            cleanup_uninstall_jobs.resources |
            selectattr('status.succeeded', 'defined') |
            selectattr('status.succeeded', 'equalto', 1) |
            list | length > 0
          )
        )
      retries: 120
      delay: 15
      ignore_errors: true

    - name: Uninstall mce-cluster-build Helm release after Hive deprovision
      ansible.builtin.command:
        argv:
          - helm
          - uninstall
          - "{{ cb_app_name }}"
          - --namespace
          - "{{ cb_cluster_name }}"
          - --no-hooks
          - --kubeconfig
          - "/tmp/{{ cb_app_name }}-kubeconfig"
      register: cleanup_helm_uninstall
      failed_when: false
      changed_when: cleanup_helm_uninstall.rc == 0
      when: cleanup_helm_status.rc == 0

    - name: Wait for cluster namespace to finish terminating
      kubernetes.core.k8s_info:
        host: "{{ central_api_host }}"
        api_key: "{{ central_bearer_token }}"
        validate_certs: false
        api_version: v1
        kind: Namespace
        name: "{{ cb_cluster_name }}"
      register: cleanup_ns_wait
      until: cleanup_ns_wait.resources | length == 0
      retries: 60
      delay: 10
      ignore_errors: true
