---
- block:
    - name: Parse event payload
      ansible.builtin.set_fact:
        platformopenshift_cr_name: "{{ event_payload.regarding.name }}"
        platformopenshift_cr_namespace: "{{ event_payload.regarding.namespace }}"
        platform_spec: "{{ event_payload.note | from_json }}"
        ansible_operator_meta:
          name: "{{ event_payload.regarding.name }}"
          namespace: "{{ event_payload.regarding.namespace }}"

    - name: Resolve services cluster API connection from Vault
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/resolve_services_cluster_connection.yml"

    - name: Resolve central cluster API connection from Vault SA
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/resolve_central_cluster_sa_from_vault.yml"

    - name: Announce AAP job started in CR status
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: platformopenshifts
        cr_name: "{{ platformopenshift_cr_name }}"
        cr_namespace: "{{ platformopenshift_cr_namespace }}"
        cr_status_body:
          status: reconciling
          ready: false
          message: "AAP job started"
      when: lookup('env', 'TOWER_JOB_ID') | length > 0

    - name: Read PlatformOpenshift CR from services cluster
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: PlatformOpenshift
        name: "{{ platformopenshift_cr_name }}"
        namespace: "{{ platformopenshift_cr_namespace }}"
      register: platformopenshift_cr

    - name: Fail if PlatformOpenshift CR is missing
      ansible.builtin.fail:
        msg: PlatformOpenshift CR {{ platformopenshift_cr_name }} not found
      when: platformopenshift_cr.resources | length == 0

    - name: Read namespace metadata for CR namespace
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: v1
        kind: Namespace
        name: "{{ platformopenshift_cr_namespace }}"
      register: ns_info

    - name: Fail if namespace metadata is unavailable
      ansible.builtin.fail:
        msg: Namespace {{ platformopenshift_cr_namespace }} not found
      when: ns_info.resources | length == 0

    - name: Derive label and annotation facts from namespace
      ansible.builtin.set_fact:
        ns_labels: "{{ (ns_info.resources | default([{}]))[0].metadata.labels | default({}) }}"
        ns_annotations: "{{ (ns_info.resources | default([{}]))[0].metadata.annotations | default({}) }}"
        platformopenshift_generation: "{{ platformopenshift_cr.resources[0].metadata.generation | default(0) | int }}"

    - name: Resolve entity label
      ansible.builtin.set_fact:
        resolved_entity: >-
          {{ ns_labels.get('hybridsovereign.redhat/entity')
          | default(ns_labels.get('entity'))
          | default('') }}

    - name: Resolve billing identifier label
      ansible.builtin.set_fact:
        resolved_billing_id: >-
          {{ ns_labels.get('hybridsovereign.redhat/billing-id')
          | default(ns_labels.get('billing-id'))
          | default('') }}

    - name: Resolve description annotation
      ansible.builtin.set_fact:
        resolved_description: >-
          {{ ns_annotations.get('hybridsovereign.redhat/description')
          | default(ns_annotations.get('description'))
          | default('') }}

    - name: Set platform type from CR
      ansible.builtin.set_fact:
        platform_type: "{{ platformopenshift_cr.resources[0].spec.type | default('') }}"
        platform_spec: "{{ platformopenshift_cr.resources[0].spec }}"

    - name: Dispatch to AWS handler
      ansible.builtin.include_tasks: aws.yml
      when: platform_type == "aws"

    - name: Dispatch to OpenStack handler
      ansible.builtin.include_tasks: openstack.yml
      when: platform_type == "openstack"

    - name: Handle default (namespace metadata) reconciliation
      ansible.builtin.include_tasks: default.yml
      when: platform_type == ""

    - name: Create per-CR cluster viewer RBAC bindings
      ansible.builtin.include_tasks: cluster_viewer_rbac.yml

  rescue:
    - name: Mark PlatformOpenshift as failed on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: platformopenshifts
        cr_name: "{{ platformopenshift_cr_name }}"
        cr_namespace: "{{ platformopenshift_cr_namespace }}"
        cr_status_body:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA provisioning failed')) }}"
      ignore_errors: true
      when: services_api_host is defined and services_bearer_token is defined

    - name: Re-raise provisioning failure
      ansible.builtin.fail:
        msg: "PlatformOpenshift {{ platformopenshift_cr_name | default('unknown') }} EDA provisioning failed"
