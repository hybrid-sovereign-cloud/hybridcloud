---
- name: Create temporary ExternalSecret for AWS credentials
  kubernetes.core.k8s:
    host: "{{ services_api_host }}"
    api_key: "{{ services_bearer_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: "eda-cloudaws-teardown-{{ cloudaws_cr_name }}-aws-creds"
        namespace: "{{ cloudaws_operator_namespace }}"
      spec:
        refreshInterval: 1m
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: "eda-cloudaws-teardown-{{ cloudaws_cr_name }}-aws-creds"
          creationPolicy: Owner
        data:
          - secretKey: AWS_ACCESS_KEY_ID
            remoteRef:
              key: "{{ ep_vault_path }}"
              property: AWS_ACCESS_KEY_ID
          - secretKey: AWS_SECRET_ACCESS_KEY
            remoteRef:
              key: "{{ ep_vault_path }}"
              property: AWS_SECRET_ACCESS_KEY

- name: Wait for AWS credentials secret
  kubernetes.core.k8s_info:
    host: "{{ services_api_host }}"
    api_key: "{{ services_bearer_token }}"
    validate_certs: false
    api_version: v1
    kind: Secret
    name: "eda-cloudaws-teardown-{{ cloudaws_cr_name }}-aws-creds"
    namespace: "{{ cloudaws_operator_namespace }}"
  register: aws_creds_secret
  until: aws_creds_secret.resources | length > 0
  retries: 20
  delay: 5
  ignore_errors: true

- name: Decode AWS credentials
  when: aws_creds_secret.resources | default([]) | length > 0
  ansible.builtin.set_fact:
    aws_access_key_id: "{{ aws_creds_secret.resources[0].data.AWS_ACCESS_KEY_ID | b64decode }}"
    aws_secret_access_key: "{{ aws_creds_secret.resources[0].data.AWS_SECRET_ACCESS_KEY | b64decode }}"
  no_log: true

- name: List Route53 hosted zones
  when: aws_access_key_id is defined
  amazon.aws.route53_info:
    query: hosted_zone
  register: r53_zones
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ default_aws_region }}"
  ignore_errors: true

- name: Find subdomain zone ID
  when: aws_access_key_id is defined and r53_zones is not failed
  ansible.builtin.set_fact:
    ep_subdomain_zone_id: >-
      {{ (r53_zones.hosted_zones
          | selectattr('name', 'equalto', cloudaws_domain ~ '.')
          | map(attribute='id')
          | first
          | default(''))
         | regex_replace('^/hostedzone/', '') }}

- name: Remove NS delegation in parent zone
  when:
    - aws_access_key_id is defined
    - ep_subdomain_zone_id | default('') | length > 0
  amazon.aws.route53:
    state: absent
    zone: "{{ ep_base_domain }}"
    record: "{{ cloudaws_domain }}"
    type: NS
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ default_aws_region }}"
  ignore_errors: true

- name: Delete Route53 subdomain zone
  when:
    - aws_access_key_id is defined
    - ep_subdomain_zone_id | default('') | length > 0
  amazon.aws.route53_zone:
    zone: "{{ cloudaws_domain }}"
    state: absent
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ default_aws_region }}"
  ignore_errors: true

- name: Remove temporary AWS credentials secret
  kubernetes.core.k8s:
    host: "{{ services_api_host }}"
    api_key: "{{ services_bearer_token }}"
    validate_certs: false
    state: absent
    api_version: v1
    kind: Secret
    name: "eda-cloudaws-teardown-{{ cloudaws_cr_name }}-aws-creds"
    namespace: "{{ cloudaws_operator_namespace }}"
  ignore_errors: true
