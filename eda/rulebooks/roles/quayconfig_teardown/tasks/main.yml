---
- block:
    - name: Parse event payload
      ansible.builtin.set_fact:
        quayconfig_cr_name: "{{ event_payload.regarding.name }}"
        quayconfig_cr_namespace: "{{ event_payload.regarding.namespace }}"

    - name: Resolve services cluster API connection
      ansible.builtin.include_tasks: "{{ role_path }}/../../common/tasks/resolve_services_cluster_connection.yml"

    - name: Delete Keycloak OIDC client
      block:
        - name: Read Keycloak admin secret
          kubernetes.core.k8s_info:
            host: "{{ services_api_host }}"
            api_key: "{{ services_bearer_token }}"
            validate_certs: false
            kind: Secret
            name: rhbk-admin-credentials
            namespace: "{{ quayconfig_cr_namespace }}"
          register: _kc_secret
          no_log: true

        - name: Decode Keycloak credentials
          ansible.builtin.set_fact:
            kc_admin_user: "{{ _kc_secret.resources[0].data.username | default(_kc_secret.resources[0].data.ADMIN_USERNAME | default('')) | b64decode }}"
            kc_admin_pass: "{{ _kc_secret.resources[0].data.password | default(_kc_secret.resources[0].data.ADMIN_PASSWORD | default('')) | b64decode }}"
          no_log: true
          when: _kc_secret.resources | default([]) | length > 0

        - name: Get Keycloak token
          ansible.builtin.uri:
            url: "{{ keycloak_internal_url }}/realms/master/protocol/openid-connect/token"
            method: POST
            body_format: form-urlencoded
            body:
              grant_type: password
              client_id: admin-cli
              username: "{{ kc_admin_user }}"
              password: "{{ kc_admin_pass }}"
            validate_certs: false
            status_code: [200]
          register: _kc_token
          no_log: true
          when: _kc_secret.resources | default([]) | length > 0

        - name: Find and delete client
          ansible.builtin.uri:
            url: "{{ keycloak_internal_url }}/admin/realms/{{ keycloak_realm }}/clients?clientId=quay-{{ quayconfig_cr_name }}"
            method: GET
            headers:
              Authorization: "Bearer {{ _kc_token.json.access_token }}"
            validate_certs: false
          register: _kc_client
          when: _kc_token is defined

        - name: Delete Keycloak client
          ansible.builtin.uri:
            url: "{{ keycloak_internal_url }}/admin/realms/{{ keycloak_realm }}/clients/{{ _kc_client.json[0].id }}"
            method: DELETE
            headers:
              Authorization: "Bearer {{ _kc_token.json.access_token }}"
            validate_certs: false
            status_code: [204, 404]
          when: _kc_client is defined and _kc_client.json | length > 0
      ignore_errors: true

    - name: Delete OIDC Secret
      kubernetes.core.k8s:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        state: absent
        kind: Secret
        name: "quay-oidc-{{ quayconfig_cr_name }}"
        namespace: "{{ quayconfig_cr_namespace }}"
      ignore_errors: true

    - name: Delete OIDC ConfigMap if present
      kubernetes.core.k8s:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        state: absent
        kind: ConfigMap
        name: "quay-oidc-{{ quayconfig_cr_name }}"
        namespace: "{{ quayconfig_cr_namespace }}"
      ignore_errors: true

    - name: Get current timestamp for status
      ansible.builtin.set_fact:
        quayconfig_delete_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark QuayConfig deletion complete on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: quayconfigs
        cr_name: "{{ quayconfig_cr_name }}"
        cr_namespace: "{{ quayconfig_cr_namespace }}"
        cr_status_body:
          status: ready
          ready: false
          deletionComplete: true
          lastReconciledAt: "{{ quayconfig_delete_transition_time }}"
          message: QuayConfig {{ quayconfig_cr_name }} deleted by EDA

  rescue:
    - name: Mark QuayConfig delete as failed on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: quayconfigs
        cr_name: "{{ quayconfig_cr_name }}"
        cr_namespace: "{{ quayconfig_cr_namespace }}"
        cr_status_body:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA deletion failed')) }}"
      ignore_errors: true
      when: services_api_host is defined and services_bearer_token is defined

    - name: Re-raise teardown failure
      ansible.builtin.fail:
        msg: "QuayConfig {{ quayconfig_cr_name | default('unknown') }} EDA teardown failed"
