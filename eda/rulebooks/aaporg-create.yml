- name: AAPOrg Create Rulebook
  hosts: all
  sources:
  - ansible.eda.event_stream:
      event_stream_name: sovereign-operator-events
  rules:
  - name: Handle AAPOrg Create
    condition: event.payload.reason | default(event.message.reason | default('')) in ["AAPOrgCreateRequested", "AAPOrgReconcileRequested"] and event.payload.regarding.kind | default(event.message.regarding.kind | default(''))
      == "AAPOrg"
    action:
      run_job_template:
        name: aaporg-provision
        organization: sovereign
        job_args:
          extra_vars:
            event_payload: '{{ event.payload }}'
