- name: Vault Delete Rulebook
  hosts: all
  sources:
  - ansible.eda.event_stream:
      event_stream_name: sovereign-operator-events
  rules:
  - name: Handle Vault Delete
    condition: event.payload.reason == "VaultDeleteRequested" and event.payload.regarding.kind
      == "Vault"
    action:
      run_job_template:
        name: vault-teardown
        organization: sovereign
        job_args:
          extra_vars:
            event_payload: '{{ event.payload }}'
