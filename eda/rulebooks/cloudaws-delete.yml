---
- name: CloudAWS Delete Rulebook
  hosts: all
  sources:
    - ansible.eda.kafka:
        host: kafka.apps.central.example.com
        port: "443"
        topic: hybridsovereign-events
        group_id: eda-cloudaws-delete
        security_protocol: SASL_SSL
        sasl_mechanism: SCRAM-SHA-512
        sasl_plain_username: "{{ KAFKA_USERNAME }}"
        sasl_plain_password: "{{ KAFKA_PASSWORD }}"
        check_hostname: false
        verify_mode: CERT_NONE
  rules:
    - name: Handle CloudAWS Delete
      condition: event.payload.reason in ["CloudAWSDeleteRequestedDeleteRequested"] and event.payload.regarding.kind == "CloudAWSDeleteRequested"
      action:
        run_job_template:
          name: cloudaws-teardown
          organization: sovereign
          job_args:
            extra_vars:
              event_payload: "{{ event.payload }}"
