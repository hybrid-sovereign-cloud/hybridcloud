- name: CloudOSO Create Rulebook
  hosts: all
  sources:
  - ansible.eda.event_stream:
      event_stream_name: sovereign-operator-events
  rules:
  - name: Handle CloudOSO Create
    condition: event.payload.reason | default(event.message.reason | default('')) in ["CloudOSOCreateRequested", "CloudOSOReconcileRequested"]
      and event.payload.regarding.kind | default(event.message.regarding.kind | default('')) == "CloudOSO"
    action:
      run_job_template:
        name: cloudoso-provision
        organization: sovereign
        job_args:
          extra_vars:
            event_payload: '{{ event.payload }}'
