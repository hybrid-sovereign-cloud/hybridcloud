---
- name: CloudOSO Create Rulebook
  hosts: all
  sources:
    - ansible.eda.kafka:
        host: {{ KAFKA_BOOTSTRAP_HOST }}
        port: "443"
        topic: hybridsovereign-events
        group_id: eda-cloudoso-create
        security_protocol: SASL_SSL
        sasl_mechanism: SCRAM-SHA-512
        sasl_plain_username: "{{ KAFKA_USERNAME }}"
        sasl_plain_password: "{{ KAFKA_PASSWORD }}"
        check_hostname: false
        verify_mode: CERT_NONE
  rules:
    - name: Handle CloudOSO Create
      condition: event.body.payload.reason in ["CloudOSOCreateRequested", "CloudOSOReconcileRequested"] and event.body.payload.regarding.kind == "CloudOSO"
      action:
        run_job_template:
          name: cloudoso-provision
          organization: sovereign
          job_args:
            extra_vars:
              event_payload: "{{ event.body.payload }}"
