- name: PlatformOpenshift Delete Rulebook
  hosts: all
  sources:
  - ansible.eda.event_stream:
      event_stream_name: sovereign-operator-events
  rules:
  - name: Handle PlatformOpenshift Delete
    condition: event.payload.reason == "PlatformOpenshiftDeleteRequested" and event.payload.regarding.kind
      == "PlatformOpenshift"
    action:
      run_job_template:
        name: platformopenshift-teardown
        organization: sovereign
        job_args:
          extra_vars:
            event_payload: '{{ event.payload }}'
