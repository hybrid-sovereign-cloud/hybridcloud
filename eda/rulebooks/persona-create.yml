- name: Persona Create Automation
  hosts: all
  sources:
  - ansible.eda.event_stream:
      event_stream_name: sovereign-operator-events
  rules:
  - name: Handle Persona Create
    condition: event.payload.reason | default(event.message.reason | default('')) == "PersonaCreateRequested" and event.payload.regarding.kind | default(event.message.regarding.kind | default(''))
      == "Persona"
    action:
      run_job_template:
        name: persona-provision
        organization: sovereign
        job_args:
          extra_vars:
            event_payload: '{{ event.payload }}'
  - name: Handle Persona Reconcile
    condition: event.payload.reason | default(event.message.reason | default('')) == "PersonaReconcileRequested" and event.payload.regarding.kind | default(event.message.regarding.kind | default(''))
      == "Persona"
    action:
      run_job_template:
        name: persona-provision
        organization: sovereign
        job_args:
          extra_vars:
            event_payload: '{{ event.payload }}'
