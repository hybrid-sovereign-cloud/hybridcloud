- name: Persona Delete Automation
  hosts: all
  sources:
  - ansible.eda.event_stream:
      event_stream_name: sovereign-operator-events
  rules:
  - name: Handle Persona Delete
    condition: event.payload.reason | default(event.message.reason | default('')) == "PersonaDeleteRequested" and event.payload.regarding.kind | default(event.message.regarding.kind | default(''))
      == "Persona"
    action:
      run_job_template:
        name: persona-teardown
        organization: sovereign
        job_args:
          extra_vars:
            event_payload: '{{ event.payload }}'
