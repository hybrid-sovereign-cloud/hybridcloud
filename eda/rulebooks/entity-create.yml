---
- name: Entity Create Rulebook
  hosts: all
  sources:
    - ansible.eda.kafka:
        host: kafka.apps.central.example.com
        port: "443"
        topic: hybridsovereign-events
        group_id: eda-entity-create
        security_protocol: SASL_SSL
        sasl_mechanism: SCRAM-SHA-512
        sasl_plain_username: "{{ KAFKA_USERNAME }}"
        sasl_plain_password: "{{ KAFKA_PASSWORD }}"
        check_hostname: false
        verify_mode: CERT_NONE
  rules:
    - name: Handle Entity Create
      condition: event.payload.reason in ["EntityCreateRequested", "EntityReconcileRequested"] and event.payload.regarding.kind == "Entity"
      action:
        run_job_template:
          name: entity-provision
          organization: sovereign
          job_args:
            extra_vars:
              event_payload: "{{ event.payload }}"
