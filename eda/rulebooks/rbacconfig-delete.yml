---
- name: RbacConfig Delete Rulebook
  hosts: all
  sources:
    - ansible.eda.kafka:
        host: kafka.apps.central.example.com
        port: "443"
        topic: hybridsovereign-events
        group_id: eda-rbacconfig-delete
        security_protocol: SASL_SSL
        sasl_mechanism: SCRAM-SHA-512
        sasl_plain_username: "{{ KAFKA_USERNAME }}"
        sasl_plain_password: "{{ KAFKA_PASSWORD }}"
        check_hostname: false
        verify_mode: CERT_NONE
  rules:
    - name: Handle RbacConfig Delete
      condition: event.body.payload.reason in ["RbacConfigDeleteRequestedDeleteRequested"] and event.body.payload.regarding.kind == "RbacConfigDeleteRequested"
      action:
        run_job_template:
          name: rbacconfig-teardown
          organization: sovereign
          job_args:
            extra_vars:
              event_payload: "{{ event.body.payload }}"
