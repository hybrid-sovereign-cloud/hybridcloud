---
- name: Delete ACM OIDC Policy
  kubernetes.core.k8s:
    state: absent
    api_version: policy.open-cluster-management.io/v1
    kind: Policy
    name: "{{ platformopenshift_cr_name }}-keycloak-oidc"
    namespace: openshift-gitops
  ignore_errors: true

- name: Delete ACM OIDC PlacementBinding
  kubernetes.core.k8s:
    state: absent
    api_version: policy.open-cluster-management.io/v1
    kind: PlacementBinding
    name: "{{ platformopenshift_cr_name }}-keycloak-oidc-binding"
    namespace: openshift-gitops
  ignore_errors: true

- name: Delete ACM OIDC Placement
  kubernetes.core.k8s:
    state: absent
    api_version: cluster.open-cluster-management.io/v1beta1
    kind: Placement
    name: "{{ platformopenshift_cr_name }}-keycloak-oidc-placement"
    namespace: openshift-gitops
  ignore_errors: true

- name: Delete cluster RBAC Policy
  kubernetes.core.k8s:
    state: absent
    api_version: policy.open-cluster-management.io/v1
    kind: Policy
    name: "{{ platformopenshift_cr_name }}-cluster-rbac"
    namespace: openshift-gitops
  ignore_errors: true

- name: Delete cluster RBAC PlacementBinding
  kubernetes.core.k8s:
    state: absent
    api_version: policy.open-cluster-management.io/v1
    kind: PlacementBinding
    name: "{{ platformopenshift_cr_name }}-cluster-rbac-binding"
    namespace: openshift-gitops
  ignore_errors: true

- name: Delete cluster RBAC Placement
  kubernetes.core.k8s:
    state: absent
    api_version: cluster.open-cluster-management.io/v1beta1
    kind: Placement
    name: "{{ platformopenshift_cr_name }}-cluster-rbac-placement"
    namespace: openshift-gitops
  ignore_errors: true

- name: Delete ManagedCluster
  kubernetes.core.k8s:
    state: absent
    api_version: cluster.open-cluster-management.io/v1
    kind: ManagedCluster
    name: "{{ platformopenshift_cr_name }}"
  ignore_errors: true

- name: Wait for ManagedCluster deletion
  kubernetes.core.k8s_info:
    api_version: cluster.open-cluster-management.io/v1
    kind: ManagedCluster
    name: "{{ platformopenshift_cr_name }}"
  register: mc_wait
  until: mc_wait.resources | length == 0
  retries: 60
  delay: 10
  ignore_errors: true
