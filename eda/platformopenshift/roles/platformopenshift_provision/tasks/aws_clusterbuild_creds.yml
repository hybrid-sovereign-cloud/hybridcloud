---
- name: Create temporary ExternalSecret for AWS credentials
  kubernetes.core.k8s:
    host: "{{ central_api_host }}"
    api_key: "{{ central_bearer_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: "eda-po-{{ ansible_operator_meta.name }}-aws-creds"
        namespace: "{{ platformopenshift_operator_namespace }}"
        labels:
          app.kubernetes.io/managed-by: eda-platformopenshift
          platformopenshift: "{{ ansible_operator_meta.name }}"
      spec:
        refreshInterval: 1m
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: "eda-po-{{ ansible_operator_meta.name }}-aws-creds"
          creationPolicy: Owner
        data:
          - secretKey: AWS_ACCESS_KEY_ID
            remoteRef:
              key: "{{ cb_provider_creds_vault }}"
              property: AWS_ACCESS_KEY_ID
          - secretKey: AWS_SECRET_ACCESS_KEY
            remoteRef:
              key: "{{ cb_provider_creds_vault }}"
              property: AWS_SECRET_ACCESS_KEY
          - secretKey: ACCOUNT_ID
            remoteRef:
              key: "{{ cb_provider_creds_vault }}"
              property: ACCOUNT_ID

- name: Wait for AWS credentials secret to sync
  kubernetes.core.k8s_info:
    host: "{{ central_api_host }}"
    api_key: "{{ central_bearer_token }}"
    validate_certs: false
    api_version: v1
    kind: Secret
    name: "eda-po-{{ ansible_operator_meta.name }}-aws-creds"
    namespace: "{{ platformopenshift_operator_namespace }}"
  register: aws_creds_secret
  until: >-
    aws_creds_secret.resources | length > 0 and
    aws_creds_secret.resources[0].data is defined
  retries: 30
  delay: 10

- name: Decode AWS credentials
  ansible.builtin.set_fact:
    aws_access_key_id: "{{ aws_creds_secret.resources[0].data.AWS_ACCESS_KEY_ID | b64decode }}"
    aws_secret_access_key: "{{ aws_creds_secret.resources[0].data.AWS_SECRET_ACCESS_KEY | b64decode }}"
    aws_account_id: "{{ aws_creds_secret.resources[0].data.ACCOUNT_ID | b64decode }}"
  no_log: true

- name: Validate AWS credentials via STS GetCallerIdentity
  amazon.aws.aws_caller_info:
  register: sts_info
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ cb_region }}"
  no_log: true

- name: Confirm AWS account ID matches spec
  ansible.builtin.assert:
    that:
      - sts_info.account == aws_account
    fail_msg: >-
      AWS credentials account ({{ sts_info.account }}) does not match
      CloudAWS account ({{ aws_account }})

- name: Create temporary ExternalSecret for OCP pull secret
  kubernetes.core.k8s:
    host: "{{ central_api_host }}"
    api_key: "{{ central_bearer_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: "eda-po-{{ ansible_operator_meta.name }}-pull-secret"
        namespace: "{{ platformopenshift_operator_namespace }}"
        labels:
          app.kubernetes.io/managed-by: eda-platformopenshift
          platformopenshift: "{{ ansible_operator_meta.name }}"
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: "eda-po-{{ ansible_operator_meta.name }}-pull-secret"
          creationPolicy: Owner
        data:
          - secretKey: pull_secret
            remoteRef:
              key: "{{ cb_pull_secret_vault }}"
              property: pull_secret

- name: Create temporary ExternalSecret for SSH key
  kubernetes.core.k8s:
    host: "{{ central_api_host }}"
    api_key: "{{ central_bearer_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: "eda-po-{{ ansible_operator_meta.name }}-ssh-key"
        namespace: "{{ platformopenshift_operator_namespace }}"
        labels:
          app.kubernetes.io/managed-by: eda-platformopenshift
          platformopenshift: "{{ ansible_operator_meta.name }}"
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: "eda-po-{{ ansible_operator_meta.name }}-ssh-key"
          creationPolicy: Owner
        data:
          - secretKey: ssh_public_key
            remoteRef:
              key: "{{ cb_ssh_key_vault }}"
              property: ssh_public_key
          - secretKey: ssh_private_key
            remoteRef:
              key: "{{ cb_ssh_key_vault }}"
              property: ssh_private_key

- name: Wait for pull secret and SSH key secrets to sync
  kubernetes.core.k8s_info:
    host: "{{ central_api_host }}"
    api_key: "{{ central_bearer_token }}"
    validate_certs: false
    api_version: v1
    kind: Secret
    name: "{{ item }}"
    namespace: "{{ platformopenshift_operator_namespace }}"
  register: shared_secrets
  until: >-
    shared_secrets.resources | length > 0 and
    shared_secrets.resources[0].data is defined
  retries: 30
  delay: 10
  loop:
    - "eda-po-{{ ansible_operator_meta.name }}-pull-secret"
    - "eda-po-{{ ansible_operator_meta.name }}-ssh-key"

- name: Decode pull secret and SSH key
  ansible.builtin.set_fact:
    cb_pull_secret_raw: "{{ (shared_secrets.results[0].resources[0].data.pull_secret | b64decode) }}"
    cb_ssh_public_key: "{{ (shared_secrets.results[1].resources[0].data.ssh_public_key | b64decode) }}"
    cb_ssh_private_key: "{{ (shared_secrets.results[1].resources[0].data.ssh_private_key | b64decode) }}"
  no_log: true

- name: Normalize pull secret to valid JSON
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import sys, ast, json
        raw = sys.stdin.read().strip()
        try:
            parsed = json.loads(raw)
            print(json.dumps(parsed, separators=(',', ':')))
        except (json.JSONDecodeError, ValueError):
            try:
                parsed = ast.literal_eval(raw)
                print(json.dumps(parsed, separators=(',', ':')))
            except Exception:
                print(raw)
    stdin: "{{ cb_pull_secret_raw }}"
  register: _pull_secret_json_result
  no_log: true
  changed_when: false

- name: Set normalized pull secret JSON
  ansible.builtin.set_fact:
    cb_pull_secret_json: "{{ _pull_secret_json_result.stdout | trim }}"
  no_log: true
