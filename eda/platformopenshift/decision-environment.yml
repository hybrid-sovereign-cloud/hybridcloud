---
version: 3
images:
  base_image:
    name: "registry.redhat.io/ansible-automation-platform-25/de-supported-rhel9:latest"
dependencies:
  galaxy:
    collections:
      - name: kubernetes.core
        version: ">=3.0.0"
      - name: amazon.aws
        version: ">=8.0.0"
  python:
    - kubernetes>=28.1.0
    - requests>=2.31.0
    - openstacksdk>=2.0.0
    - boto3>=1.34.0
    - PyYAML>=6.0.0
  system: []
options:
  package_manager_path: /usr/bin/microdnf
additional_build_steps:
  append_final:
    - RUN curl -fsSL -o /tmp/helm.tar.gz https://get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz && cd /tmp && python3 -c "import tarfile; t=tarfile.open('helm.tar.gz'); m=t.getmember('linux-amd64/helm'); m.name='helm'; t.extract(m, '/usr/local/bin')" && chmod 755 /usr/local/bin/helm && rm -f /tmp/helm.tar.gz
