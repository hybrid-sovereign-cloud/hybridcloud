---
- block:
    - name: Parse event payload
      ansible.builtin.set_fact:
        project_cr_name: "{{ event_payload.regarding.name }}"
        project_cr_namespace: "{{ event_payload.regarding.namespace }}"

    - name: Resolve services cluster API connection from Vault
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/resolve_services_cluster_connection.yml"

    - name: Get current timestamp for status
      ansible.builtin.set_fact:
        project_delete_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark Project deletion complete on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: projects
        cr_name: "{{ project_cr_name }}"
        cr_namespace: "{{ project_cr_namespace }}"
        cr_status_body:
          status: ready
          ready: false
          deletionComplete: true
          lastReconciledAt: "{{ project_delete_transition_time }}"
          message: Project {{ project_cr_name }} deleted by EDA

  rescue:
    - name: Mark Project delete as failed on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: projects
        cr_name: "{{ project_cr_name }}"
        cr_namespace: "{{ project_cr_namespace }}"
        cr_status_body:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA teardown failed')) }}"
      ignore_errors: true
      when: services_api_host is defined and services_bearer_token is defined

    - name: Re-raise teardown failure
      ansible.builtin.fail:
        msg: "Project {{ project_cr_name | default('unknown') }} EDA teardown failed"
