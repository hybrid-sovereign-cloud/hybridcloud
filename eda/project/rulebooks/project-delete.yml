---
- name: Project Delete Rulebook
  hosts: all
  sources:
    - ansible.eda.event_stream:
        event_stream_name: sovereign-operator-events
  rules:
    - name: Handle Project Delete
      condition: event.payload.reason == "ProjectDeleteRequested" and event.payload.regarding.kind == "Project"
      action:
        run_playbook:
          name: project-teardown-playbook.yml
          extra_vars:
            event_payload: "{{ event.payload }}"
