---
- block:
    - name: Parse event payload
      ansible.builtin.set_fact:
        team_cr_name: "{{ event_payload.regarding.name }}"
        team_cr_namespace: "{{ event_payload.regarding.namespace }}"

    - name: Resolve services cluster API connection from Vault
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/resolve_services_cluster_connection.yml"

    - name: Find per-CR Team viewer RoleBindings by label
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        namespace: "{{ team_cr_namespace }}"
        label_selectors:
          - "app.kubernetes.io/managed-by=team-operator"
          - "hybridsovereign.redhat/cr-name={{ team_cr_name }}"
      register: team_viewer_bindings

    - name: Delete per-CR Team viewer RoleBindings
      kubernetes.core.k8s:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        state: absent
        api_version: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        name: "{{ item.metadata.name }}"
        namespace: "{{ team_cr_namespace }}"
      loop: "{{ team_viewer_bindings.resources | default([]) }}"
      ignore_errors: true

    - name: Delete per-CR Team viewer Role
      kubernetes.core.k8s:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        state: absent
        api_version: rbac.authorization.k8s.io/v1
        kind: Role
        name: "{{ team_cr_name }}-team-viewer"
        namespace: "{{ team_cr_namespace }}"
      ignore_errors: true

    - name: Get current timestamp
      ansible.builtin.set_fact:
        team_delete_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark Team deletion complete on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: teams
        cr_name: "{{ team_cr_name }}"
        cr_namespace: "{{ team_cr_namespace }}"
        cr_status_body:
          status: ready
          ready: false
          deletionComplete: true
          lastReconciledAt: "{{ team_delete_transition_time }}"
          message: >-
            Team {{ team_cr_name }} finalized — viewer Role and RoleBinding removed by EDA

  rescue:
    - name: Mark Team delete as failed on services cluster
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: teams
        cr_name: "{{ team_cr_name }}"
        cr_namespace: "{{ team_cr_namespace }}"
        cr_status_body:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA deletion failed')) }}"
      ignore_errors: true
      when: services_api_host is defined and services_bearer_token is defined

    - name: Re-raise teardown failure
      ansible.builtin.fail:
        msg: "Team {{ team_cr_name | default('unknown') }} EDA teardown failed"
