---
- name: Team Create Rulebook
  hosts: all
  sources:
    - ansible.eda.event_stream:
        event_stream_name: sovereign-operator-events
  rules:
    - name: Handle Team Create
      condition: event.payload.reason in ["TeamCreateRequested", "TeamReconcileRequested"] and event.payload.regarding.kind == "Team"
      action:
        run_playbook:
          name: team-provision-playbook.yml
          extra_vars:
            event_payload: "{{ event.payload }}"
