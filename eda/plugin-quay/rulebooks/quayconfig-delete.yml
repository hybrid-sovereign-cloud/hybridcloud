---
- name: QuayConfig Delete Rulebook
  hosts: all
  sources:
    - ansible.eda.kafka:
        host: "{{ lookup('env', 'KAFKA_BOOTSTRAP_HOST') }}"
        port: "{{ lookup('env', 'KAFKA_BOOTSTRAP_PORT') | default('443') | int }}"
        topic: "{{ lookup('env', 'KAFKA_TOPIC') | default('hybridsovereign-events', true) }}"
        group_id: "{{ lookup('env', 'KAFKA_CONSUMER_GROUP') | default('eda-sovereign-operators', true) }}"
        security_protocol: "{{ lookup('env', 'KAFKA_SECURITY_PROTOCOL') | default('SASL_SSL', true) }}"
        sasl_mechanism: "{{ lookup('env', 'KAFKA_SASL_MECHANISM') | default('SCRAM-SHA-512', true) }}"
        sasl_plain_username: "{{ lookup('env', 'KAFKA_USERNAME') }}"
        sasl_plain_password: "{{ lookup('env', 'KAFKA_PASSWORD') }}"
  rules:
    - name: Handle QuayConfig Delete
      condition: event.payload.reason | default(event.message.reason | default('')) == "QuayConfigDeleteRequested" and event.payload.regarding.kind | default(event.message.regarding.kind | default('')) == "QuayConfig"
      action:
        run_playbook:
          name: quayconfig-teardown-playbook.yml
          extra_vars:
            event_payload: "{{ event.payload }}"
