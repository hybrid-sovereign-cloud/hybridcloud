---
- name: QuayConfig Delete Rulebook
  hosts: all
  sources:
    - ansible.eda.event_stream:
        event_stream_name: sovereign-operator-events
  rules:
    - name: Handle QuayConfig Delete
      condition: event.payload.reason == "QuayConfigDeleteRequested" and event.payload.regarding.kind == "QuayConfig"
      action:
        run_playbook:
          name: quayconfig-teardown-playbook.yml
          extra_vars:
            event_payload: "{{ event.payload }}"
