---
- block:
    - name: Parse event payload
      ansible.builtin.set_fact:
        quayorg_cr_name: "{{ event_payload.regarding.name }}"
        quayorg_cr_namespace: "{{ event_payload.regarding.namespace }}"
        quayorg_spec: "{{ event_payload.note | from_json }}"

    - name: Resolve services cluster API connection
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/resolve_services_cluster_connection.yml"

    - name: Read entity Namespace for teardown
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: v1
        kind: Namespace
        name: "{{ quayorg_cr_namespace }}"
      register: _fin_target_ns
      ignore_errors: true

    - name: Derive entity-prefixed org name
      ansible.builtin.set_fact:
        fin_entity_name: "{{ _fin_target_ns.resources[0].metadata.labels['hybridsovereign.redhat/entity'] | default('') }}"
      when: _fin_target_ns.resources | default([]) | length > 0

    - name: Build org name for Quay cleanup
      ansible.builtin.set_fact:
        fin_org_name: "{{ (fin_entity_name ~ '-' ~ quayorg_cr_name) if (fin_entity_name | default('') | length > 0) else quayorg_cr_name }}"

    - name: Read QuayConfig
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: QuayConfig
        name: "{{ quayorg_spec.quayConfig }}"
        namespace: "{{ plugin_quay_config_namespace }}"
      register: _quay_config
      ignore_errors: true

    - name: Delete Quay org
      when: _quay_config.resources | default([]) | length > 0
      block:
        - name: Read Quay admin secret
          kubernetes.core.k8s_info:
            host: "{{ services_api_host }}"
            api_key: "{{ services_bearer_token }}"
            validate_certs: false
            kind: Secret
            name: "{{ _quay_config.resources[0].spec.secret }}"
            namespace: "{{ plugin_quay_config_namespace }}"
          register: _quay_secret
          no_log: true

        - name: Decode credentials
          ansible.builtin.set_fact:
            quay_api_token: "{{ _quay_secret.resources[0].data.token | b64decode }}"
          no_log: true

        - name: Delete organization from Quay
          ansible.builtin.uri:
            url: "{{ quay_url }}/api/v1/organization/{{ fin_org_name }}"
            method: DELETE
            headers:
              Authorization: "Bearer {{ quay_api_token }}"
            validate_certs: false
            status_code: [200, 204, 404]
      ignore_errors: true

    - name: Get current timestamp for status
      ansible.builtin.set_fact:
        quayorg_delete_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark QuayOrg deletion complete on services cluster
      ansible.builtin.include_tasks: "/opt/eda-project/common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: quayorgs
        cr_name: "{{ quayorg_cr_name }}"
        cr_namespace: "{{ quayorg_cr_namespace }}"
        cr_status_body:
          status: ready
          ready: false
          deletionComplete: true
          lastReconciledAt: "{{ quayorg_delete_transition_time }}"
          message: QuayOrg {{ quayorg_cr_name }} deleted by EDA

  rescue:
    - name: Mark QuayOrg delete as failed on services cluster
      ansible.builtin.include_tasks: "/opt/eda-project/common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: quayorgs
        cr_name: "{{ quayorg_cr_name }}"
        cr_namespace: "{{ quayorg_cr_namespace }}"
        cr_status_body:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA deletion failed')) }}"
      ignore_errors: true
      when: services_api_host is defined and services_bearer_token is defined

    - name: Re-raise teardown failure
      ansible.builtin.fail:
        msg: "QuayOrg {{ quayorg_cr_name | default('unknown') }} EDA teardown failed"
