---
- block:
    - name: Parse event payload
      ansible.builtin.set_fact:
        quayconfig_cr_name: "{{ event_payload.regarding.name }}"
        quayconfig_cr_namespace: "{{ event_payload.regarding.namespace }}"
        quayconfig_spec: "{{ event_payload.note | from_json }}"

    - name: Resolve services cluster API connection from Vault
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/resolve_services_cluster_connection.yml"

    - name: Load Quay admin credentials from Vault
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/obtain_quay_admin_credentials.yml"

    - name: Set Quay token alias for QuayConfig tasks
      ansible.builtin.set_fact:
        quay_token: "{{ quay_api_token }}"
      no_log: true

    - name: Announce AAP job started in CR status
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: quayconfigs
        cr_name: "{{ quayconfig_cr_name }}"
        cr_namespace: "{{ quayconfig_cr_namespace }}"
        cr_status_body:
          status: reconciling
          ready: false
          message: "AAP job started"
      when: lookup('env', 'TOWER_JOB_ID') | length > 0

    - name: Read QuayConfig CR from services cluster
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: QuayConfig
        name: "{{ quayconfig_cr_name }}"
        namespace: "{{ quayconfig_cr_namespace }}"
      register: _quayconfig_cr

    - name: Fail if QuayConfig CR is missing
      ansible.builtin.fail:
        msg: QuayConfig {{ quayconfig_cr_name }} not found in {{ quayconfig_cr_namespace }}
      when: _quayconfig_cr.resources | length == 0

    - name: Set generation fact
      ansible.builtin.set_fact:
        quayconfig_generation: "{{ _quayconfig_cr.resources[0].metadata.generation | default(0) | int }}"

    - name: Read RbacConfig for Keycloak settings
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: RbacConfig
        name: "{{ quayconfig_spec.rbacConfig }}"
        namespace: "{{ quayconfig_cr_namespace }}"
      register: _rbac_config

    - name: Fail if RbacConfig not found
      ansible.builtin.fail:
        msg: "RbacConfig {{ quayconfig_spec.rbacConfig }} not found"
      when: _rbac_config.resources | length == 0

    - name: Set OIDC client ID
      ansible.builtin.set_fact:
        quay_oidc_client_id: "quay-{{ quayconfig_cr_name }}"
        keycloak_vault_path: "{{ _rbac_config.resources[0].spec.secret | default('rhbk-services-admin') }}"

    - name: Load Keycloak admin credentials from Vault
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/obtain_keycloak_admin_credentials.yml"

    - name: Set Keycloak credential facts for QuayConfig tasks
      ansible.builtin.set_fact:
        kc_admin_user: "{{ keycloak_admin_user }}"
        kc_admin_pass: "{{ keycloak_admin_password }}"
      no_log: true

    - name: Discover Keycloak external URL from services cluster Route
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: route.openshift.io/v1
        kind: Route
        namespace: services-rhbk
        label_selectors:
          - "app=keycloak"
      register: kc_route

    - name: Override keycloak_internal_url with discovered Route
      ansible.builtin.set_fact:
        keycloak_internal_url: "https://{{ kc_route.resources[0].spec.host }}"
      when: kc_route.resources | length > 0

    - name: Get Keycloak admin token
      ansible.builtin.uri:
        url: "{{ keycloak_internal_url }}/realms/master/protocol/openid-connect/token"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: password
          client_id: admin-cli
          username: "{{ kc_admin_user }}"
          password: "{{ kc_admin_pass }}"
        validate_certs: false
        status_code: [200]
      register: _kc_token
      no_log: true
      retries: 3
      delay: 5

    - name: Check if OIDC client exists in Keycloak
      ansible.builtin.uri:
        url: "{{ keycloak_internal_url }}/admin/realms/{{ keycloak_realm }}/clients?clientId={{ quay_oidc_client_id }}"
        method: GET
        headers:
          Authorization: "Bearer {{ _kc_token.json.access_token }}"
        validate_certs: false
        status_code: [200]
      register: _kc_existing_client

    - name: Create OIDC client in Keycloak for Quay
      ansible.builtin.uri:
        url: "{{ keycloak_internal_url }}/admin/realms/{{ keycloak_realm }}/clients"
        method: POST
        headers:
          Authorization: "Bearer {{ _kc_token.json.access_token }}"
          Content-Type: application/json
        body_format: json
        body:
          clientId: "{{ quay_oidc_client_id }}"
          name: "Quay OIDC - {{ quayconfig_cr_name }}"
          protocol: openid-connect
          publicClient: false
          directAccessGrantsEnabled: false
          standardFlowEnabled: true
          serviceAccountsEnabled: false
          rootUrl: "{{ quay_url }}"
          redirectUris:
            - "{{ quay_url }}/*"
          webOrigins:
            - "{{ quay_url }}"
          attributes:
            "access.token.lifespan": "3600"
        validate_certs: false
        status_code: [201, 409]
      when: _kc_existing_client.json | length == 0

    - name: Retrieve client UUID
      ansible.builtin.uri:
        url: "{{ keycloak_internal_url }}/admin/realms/{{ keycloak_realm }}/clients?clientId={{ quay_oidc_client_id }}"
        method: GET
        headers:
          Authorization: "Bearer {{ _kc_token.json.access_token }}"
        validate_certs: false
        status_code: [200]
      register: _kc_client_info

    - name: Get client secret
      ansible.builtin.uri:
        url: "{{ keycloak_internal_url }}/admin/realms/{{ keycloak_realm }}/clients/{{ _kc_client_info.json[0].id }}/client-secret"
        method: GET
        headers:
          Authorization: "Bearer {{ _kc_token.json.access_token }}"
        validate_certs: false
        status_code: [200]
      register: _kc_client_secret
      no_log: true

    - name: Store OIDC client details in Secret for Quay
      kubernetes.core.k8s:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "quay-oidc-{{ quayconfig_cr_name }}"
            namespace: "{{ quayconfig_cr_namespace }}"
          type: Opaque
          stringData:
            OIDC_CLIENT_ID: "{{ quay_oidc_client_id }}"
            OIDC_CLIENT_SECRET: "{{ _kc_client_secret.json.value }}"
            OIDC_ISSUER: "{{ keycloak_internal_url }}/realms/{{ keycloak_realm }}"
            QUAY_URL: "{{ quay_url }}"
      no_log: true

    - name: Get current timestamp for status
      ansible.builtin.set_fact:
        quayconfig_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Update QuayConfig status as ready on services cluster
      ansible.builtin.include_tasks: "/opt/eda-project/common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: quayconfigs
        cr_name: "{{ quayconfig_cr_name }}"
        cr_namespace: "{{ quayconfig_cr_namespace }}"
        cr_status_body:
          status: ready
          ready: true
          observedGeneration: "{{ quayconfig_generation }}"
          lastReconciledAt: "{{ quayconfig_status_transition_time }}"
          quayUrl: "{{ quay_url }}"
          oidcConfigured: "true"
          keycloakClientId: "{{ quay_oidc_client_id }}"
          realm: "{{ keycloak_realm }}"
          message: "Quay OIDC configured with client {{ quay_oidc_client_id }}"
          conditions:
            - type: Ready
              status: "True"
              lastTransitionTime: "{{ quayconfig_status_transition_time }}"
              reason: EDASucceeded
              message: QuayConfig {{ quayconfig_cr_name }} provisioned by EDA

  rescue:
    - name: Mark QuayConfig as failed on services cluster
      ansible.builtin.include_tasks: "/opt/eda-project/common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: quayconfigs
        cr_name: "{{ quayconfig_cr_name }}"
        cr_namespace: "{{ quayconfig_cr_namespace }}"
        cr_status_body:
          status: failed
          ready: false
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA provisioning failed')) }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: EDAFailed
              message: "{{ ansible_failed_result.msg | default(ansible_failed_task.name | default('EDA provisioning failed')) }}"
      ignore_errors: true
      when: services_api_host is defined and services_bearer_token is defined

    - name: Re-raise provisioning failure
      ansible.builtin.fail:
        msg: "QuayConfig {{ quayconfig_cr_name | default('unknown') }} EDA provisioning failed"
