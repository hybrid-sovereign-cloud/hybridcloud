---
- block:
    - name: Parse event payload
      ansible.builtin.set_fact:
        transportlink_cr_name: "{{ event_payload.regarding.name }}"
        transportlink_cr_namespace: "{{ event_payload.regarding.namespace }}"
        transportlink_spec: "{{ event_payload.note | from_json }}"

    - name: Resolve services cluster API connection from Vault
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/resolve_services_cluster_connection.yml"

    - name: Stub debug for TransportLink
      ansible.builtin.debug:
        msg: "Stub provision TransportLink/{{ transportlink_cr_name }} in {{ transportlink_cr_namespace }}"

    - name: Read CR generation
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: TransportLink
        name: "{{ transportlink_cr_name }}"
        namespace: "{{ transportlink_cr_namespace }}"
      register: transportlink_cr_lookup

    - name: Set generation fact
      ansible.builtin.set_fact:
        transportlink_generation: "{{ transportlink_cr_lookup.resources[0].metadata.generation | default(0) | int }}"

    - name: Get timestamp
      ansible.builtin.set_fact:
        transportlink_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark TransportLink ready (stub)
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: transportlinks
        cr_name: "{{ transportlink_cr_name }}"
        cr_namespace: "{{ transportlink_cr_namespace }}"
        cr_status_body:
          status: ready
          ready: true
          message: "Stub provisioned by EDA hybridvpc (no infra changes)"
          lastReconciledAt: "{{ transportlink_status_transition_time }}"
          observedGeneration: "{{ transportlink_generation }}"
          tunnelUp: true
          borderEndpoint: "127.0.0.1"
          cloudEndpoint: "127.0.0.1"
          conditions:
            - type: Ready
              status: "True"
              lastTransitionTime: "{{ transportlink_status_transition_time }}"
              reason: EDASucceeded
              message: Stub provision complete

  rescue:
    - name: Mark TransportLink failed
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: transportlinks
        cr_name: "{{ transportlink_cr_name }}"
        cr_namespace: "{{ transportlink_cr_namespace }}"
        cr_status_body:
          status: failed
          ready: false
          message: "{{ ansible_failed_result.msg | default('EDA stub provision failed') }}"
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: EDAFailed
              message: "{{ ansible_failed_result.msg | default('EDA stub provision failed') }}"
      ignore_errors: true
      when: services_api_host is defined and services_bearer_token is defined

    - name: Re-raise
      ansible.builtin.fail:
        msg: "TransportLink {{ transportlink_cr_name | default('unknown') }} stub provision failed"
