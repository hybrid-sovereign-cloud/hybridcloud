---
- block:
    - name: Parse event payload
      ansible.builtin.set_fact:
        hybridfabric_cr_name: "{{ event_payload.regarding.name }}"
        hybridfabric_cr_namespace: "{{ event_payload.regarding.namespace }}"
        hybridfabric_spec: "{{ event_payload.note | from_json }}"

    - name: Resolve services cluster API connection from Vault
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/resolve_services_cluster_connection.yml"

    - name: Stub debug for HybridFabric
      ansible.builtin.debug:
        msg: "Stub provision HybridFabric/{{ hybridfabric_cr_name }} in {{ hybridfabric_cr_namespace }}"

    - name: Read CR generation
      kubernetes.core.k8s_info:
        host: "{{ services_api_host }}"
        api_key: "{{ services_bearer_token }}"
        validate_certs: false
        api_version: hybridsovereign.redhat/v1alpha1
        kind: HybridFabric
        name: "{{ hybridfabric_cr_name }}"
        namespace: "{{ hybridfabric_cr_namespace }}"
      register: hybridfabric_cr_lookup

    - name: Set generation fact
      ansible.builtin.set_fact:
        hybridfabric_generation: "{{ hybridfabric_cr_lookup.resources[0].metadata.generation | default(0) | int }}"

    - name: Get timestamp
      ansible.builtin.set_fact:
        hybridfabric_status_transition_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"

    - name: Mark HybridFabric ready (stub)
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: hybridfabrics
        cr_name: "{{ hybridfabric_cr_name }}"
        cr_namespace: "{{ hybridfabric_cr_namespace }}"
        cr_status_body:
          status: ready
          ready: true
          message: "Stub provisioned by EDA hybridvpc (no infra changes)"
          lastReconciledAt: "{{ hybridfabric_status_transition_time }}"
          observedGeneration: "{{ hybridfabric_generation }}"
          fabricBaseReady: true
          borderBgwReady: true
          allocatedVniCount: 0
          availableVniCount: 512
          conditions:
            - type: Ready
              status: "True"
              lastTransitionTime: "{{ hybridfabric_status_transition_time }}"
              reason: EDASucceeded
              message: Stub provision complete

  rescue:
    - name: Mark HybridFabric failed
      ansible.builtin.include_tasks: "{{ role_path }}/../../../common/tasks/patch_cr_status.yml"
      vars:
        cr_api_version: hybridsovereign.redhat/v1alpha1
        cr_plural: hybridfabrics
        cr_name: "{{ hybridfabric_cr_name }}"
        cr_namespace: "{{ hybridfabric_cr_namespace }}"
        cr_status_body:
          status: failed
          ready: false
          message: "{{ ansible_failed_result.msg | default('EDA stub provision failed') }}"
          lastReconciledAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
          conditions:
            - type: Ready
              status: "False"
              lastTransitionTime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%S.000000Z') }}"
              reason: EDAFailed
              message: "{{ ansible_failed_result.msg | default('EDA stub provision failed') }}"
      ignore_errors: true
      when: services_api_host is defined and services_bearer_token is defined

    - name: Re-raise
      ansible.builtin.fail:
        msg: "HybridFabric {{ hybridfabric_cr_name | default('unknown') }} stub provision failed"
