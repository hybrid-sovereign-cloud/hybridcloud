---
# Kafka consumer credentials for EDA rulebook activations (central cluster)
eda_credentials:
  - name: quay-registry-credential
    description: Quay registry pull credential for decision environments
    credential_type: Container Registry
    organization: Default
    inputs:
      host: "{{ quay_registry_host }}"
      username: "{{ lookup('env', 'OCI_ROBOT_USERNAME') }}"
      password: "{{ lookup('env', 'OCI_ROBOT_PASSWORD') }}"
      verify_ssl: false
  - name: sovereign-github-credential
    description: GitHub PAT for hybrid-sovereign-cloud/eda rulebook sync
    credential_type: GitHub Personal Access Token
    organization: Default
    inputs:
      token: "{{ lookup('env', 'GITHUB_TOKEN') }}"
  - name: sovereign-aap-controller-credential
    description: AAP Controller API access for EDA rulebook jobs
    credential_type: Red Hat Ansible Automation Platform
    organization: Default
    inputs:
      host: "{{ lookup('env', 'AAP_CONTROLLER_URL') }}/api/controller/"
      oauth_token: "{{ lookup('env', 'AAP_RESOURCE_TOKEN') }}"
      verify_ssl: false
  - name: sovereign-kafka-consumer-credential
    description: AMQ Streams SASL credentials for operator event rulebooks
    credential_type: Sovereign Kafka Consumer
    organization: Default
    inputs:
      username: "{{ lookup('env', 'KAFKA_USERNAME') }}"
      password: "{{ lookup('env', 'KAFKA_PASSWORD') }}"

eda_projects:
  - name: sovereign-eda-rulebooks
    description: Hybrid Sovereign EDA rulebooks from hybridcloud/eda
    url: "{{ lookup('env', 'RULEBOOK_REPO_URL') }}"
    credential: sovereign-github-credential
    organization: Default
    sync: true
