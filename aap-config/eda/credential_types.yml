---
# Custom EDA credential types — inject SASL creds for ansible.eda.kafka rulebooks
# (bootstrap host/port/topic are hardcoded in rulebooks)
eda_credential_types:
  - name: Sovereign Kafka Consumer
    description: AMQ Streams SASL credentials for operator event rulebooks
    inputs:
      fields:
        - id: username
          type: string
          label: SASL username
        - id: password
          type: string
          label: SASL password
          secret: true
    injectors:
      extra_vars:
        KAFKA_USERNAME: "{  { username }}"
        KAFKA_PASSWORD: "{  { password }}"
