---
# Controller SCM project and execution environments (quay.example.com/hybrid-sovereign)
controller_projects:
  - name: sovereign-eda-project
    organization: sovereign
    scm_type: git
    scm_url: "{{ lookup('env', 'EDA_REPO_URL') }}"
    credential: sovereign-github-credential
    scm_clean: true
    scm_delete_on_update: false
    scm_update_on_launch: true
    scm_branch: main
    wait: true

controller_execution_environments:
  - name: de-entity
    organization: sovereign
    image: "{{ quay_registry }}/de-entity:0.1.7"
    pull: missing
    credential: quay-robot-credential
