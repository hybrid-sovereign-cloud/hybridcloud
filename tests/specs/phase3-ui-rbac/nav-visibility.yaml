---
id: phase3-rbac-nav-visibility
title: Phase 3 — RBAC nav hides unauthorized kinds
objective: Login as tenant viewer persona; sidebar omits resources denied by SAR; lists show no forbidden rows.
severity: high
tags: [phase3, ui, rbac, personas]
prerequisites:
  - "Tenant dashboard deployed with @hybridsovereign/shared usePermissions hooks"
  - "Keycloak test users provisioned (keycloakTestUsers job)"
  - "Persona CRs mapped to RBAC groups per tests/rbac-access/README.md"
steps:
  - name: Login as acme-platform-eng-viewer
    command: echo "Use Playwright or manual login at tenant dashboard with acme-platform-eng-viewer / AcmeTest123!"
    expect: "200"
  - name: SAR denies team create
    command: |
      oc auth can-i create teams -n entity-acme-corp \
        --as=system:serviceaccount:default:placeholder 2>/dev/null || true
    expect: ""
    on_failure: Substitute --as with OIDC-mapped user for lab
  - name: Topology omits unauthorized nodes
    command: echo "Verify EntityTopology renders only SAR-allowed kinds for viewer persona"
    expect: "EntityTopology"
expected: Unauthorized nav items hidden; topology nodes omitted (not greyed); detail routes return 403 when SAR denies get.
