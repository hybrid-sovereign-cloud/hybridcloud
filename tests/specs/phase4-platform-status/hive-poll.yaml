---
id: phase4-platform-hive-poll
title: Phase 4 — PlatformOpenshift reflects Hive install completion
objective: After clusterbuild Helm wait, monitor polls Hive until Provisioned/installed and sets clusterHealth correctly.
severity: high
tags: [phase4, platformopenshift, hive]
prerequisites:
  - "PlatformOpenshift CR with openstack or aws backend in entity namespace"
  - "EDA platformopenshift monitor roles include Hive poll loop (retries=120, delay=60)"
steps:
  - name: Check PlatformOpenshift status fields
    command: oc get platformopenshift ocp-ses11 -n entity-acme-corp --context=services-admin -o jsonpath='{.status.clusterHealth}{" "}{.status.consoleURL}'
    expect: "Healthy"
    on_failure: Re-run platformopenshift provision job or trigger PlatformOpenshiftReconcileRequested
  - name: Verify Hive ClusterDeployment installed
    command: oc get clusterdeployment ocp-ses11 -n ocp-ses11 --context=central-admin -o jsonpath='{.spec.installed}'
    expect: "true"
  - name: Verify console URL populated
    command: oc get platformopenshift ocp-ses11 -n entity-acme-corp --context=services-admin -o jsonpath='{.status.consoleURL}'
    expect: "https://"
expected: clusterHealth transitions from Provisioning to Healthy/Degraded when Hive reports installed; consoleURL from ClusterDeployment.status.webConsoleURL.
