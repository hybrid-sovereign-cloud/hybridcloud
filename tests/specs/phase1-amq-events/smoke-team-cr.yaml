---
id: phase1-smoke-team-cr
title: Phase 1 — Team CR triggers Kafka → central EDA → ready
objective: Verify operators publish to AMQ Streams and central EDA provisions Team CRs without the event-forwarder.
severity: critical
tags: [phase1, kafka, eda, functional]
prerequisites:
  - "AMQ Streams Kafka Ready on central (amq-streams namespace)"
  - "Vault paths central/data/amq-producer and central/data/amq-consumer populated (amqProducerInit job)"
  - "Primary operator deployed on services with amqKafka.enabled"
  - "Central EDA activations running with ansible.eda.kafka source"
  - "eventForwarder.enabled: false in bootstrap/helm/central/values.yaml"
steps:
  - name: Confirm Kafka cluster ready
    command: oc get kafka hybridsovereign-kafka -n amq-streams --context=central-admin -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
    expect: "True"
  - name: Confirm event-forwarder absent on services
    command: oc get deployment event-forwarder -n sovereign-cloud-plugins --context=services-admin 2>&1
    expect: "NotFound"
    on_failure: Disable eventForwarder Argo app and sync
  - name: Create test Team CR
    command: |
      oc apply --context=services-admin -f - <<'EOF'
      apiVersion: hybridsovereign.redhat/v1alpha1
      kind: Team
      metadata:
        name: spec-smoke-team
        namespace: entity-acme-corp
      spec:
        teamAdmin:
          - acme-corp-platform-engineering-admins
      EOF
    expect: "team/spec-smoke-team"
  - name: Wait for Team ready
    command: |
      oc wait team/spec-smoke-team -n entity-acme-corp --context=services-admin \
        --for=jsonpath='{.status.ready}'=true --timeout=600s
    expect: "condition met"
  - name: Verify Kafka consumer lag acceptable
    command: oc exec -n amq-streams hybridsovereign-kafka-kafka-0 --context=central-admin -- bin/kafka-consumer-groups.sh --bootstrap-server localhost:9092 --describe --group eda-sovereign-operators 2>/dev/null | tail -1
    expect: "hybridsovereign-events"
    on_failure: Check EDA activation logs for SASL/TLS errors
expected: Team CR reaches status.ready=true via central EDA job without HTTP event stream or forwarder.
