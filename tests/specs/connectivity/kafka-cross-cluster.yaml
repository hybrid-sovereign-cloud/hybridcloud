---
id: connectivity-kafka-cross-cluster
title: Kafka TLS bootstrap reachable from services
objective: Services-cluster operators can reach central AMQ external bootstrap on port 443 with SASL_SSL.
severity: critical
tags: [connectivity, kafka, security]
prerequisites:
  - "External Kafka Route on central (port 9094 / bootstrap Route 443)"
  - "Vault central/data/amq-producer credentials seeded"
steps:
  - name: External bootstrap Route exists
    command: oc get route -n amq-streams --context=central-admin | grep kafka-bootstrap
    expect: "kafka"
  - name: Producer ExternalSecret synced on services
    command: oc get externalsecret amq-producer-credentials -n sovereign-cloud --context=services-admin -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "pending"
    expect: "True"
expected: Cross-cluster Kafka connectivity verified before cutover from event-forwarder.
