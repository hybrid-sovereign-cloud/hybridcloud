---
id: phase2-vmware-mtv-connected
title: Phase 2 — MTV VMware provider connected
objective: Confirm CNV and MTV are healthy and VMware vCenter provider is Connected via GitOps credentials.
severity: high
tags: [phase2, virtualization, cnv, mtv, vmware]
prerequisites:
  - "cnv.enabled and mtv.enabled Argo apps Synced on central"
  - "vmwareInit sovereignJob completed; Vault path central/data/vmware-credentials populated"
  - "mtv.values.vmwareProvider.url matches lab vCenter SDK URL"
steps:
  - name: HyperConverged Available
    command: oc get hyperconverged kubevirt-hyperconverged -n openshift-cnv --context=central-admin -o jsonpath='{.status.conditions[?(@.type=="Available")].status}'
    expect: "True"
  - name: ForkliftController pods ready
    command: oc get pods -n openshift-mtv --context=central-admin -l app=forklift-controller -o jsonpath='{.items[*].status.phase}' | tr ' ' '\n' | sort -u
    expect: "Running"
  - name: VMware Provider Connected
    command: oc get provider vmware-vcenter -n openshift-mtv --context=central-admin -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
    expect: "True"
  - name: ExternalSecret synced
    command: oc get externalsecret vmware-vcenter-es -n openshift-mtv --context=central-admin -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
    expect: "True"
expected: CNV HyperConverged Available; MTV ForkliftController Ready; Provider/vmware-vcenter Connected.
