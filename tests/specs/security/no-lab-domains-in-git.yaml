---
id: security-no-lab-domains-in-git
title: No lab domains or private IPs committed to Git
objective: Repository scan finds no private lab domains or lab DNS forwarder IPs in tracked files.
severity: high
tags: [security, hardening]
prerequisites:
  - "git repository clean of .env and values-lab.yaml"
steps:
  - name: Scan for lab domain and forwarder IPs
    command: |
      rg -n 'signal9\.gg|172\.18\.42\.(10|11)' \
        --glob '!.env*' \
        --glob '!**/values-lab.yaml' \
        --glob '!**/docs/archive/**' \
        --glob '!**/architecture/docs/archive/**' \
        --glob '!**/architecture/mocks/**' \
        --glob '!**/hardeningcheck/archive/**' \
        bootstrap eda operator ui Makefile aap-config iaac charts \
        || true
    expect: ""
expected: Lab endpoints live in .env and Vault lab-config only.
