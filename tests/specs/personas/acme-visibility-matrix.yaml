---
id: personas-acme-visibility-matrix
title: Persona QA — acme-corp UI/API visibility matrix
objective: Validate Keycloak test users see resources matching RBAC matrix for entity-acme-corp.
severity: critical
tags: [personas, keycloak, rbac, qa]
prerequisites:
  - "keycloakTestUsers job enabled (syncWave 32)"
  - "Persona samples under samples/persona/ applied"
  - "tests/rbac-access/README.md matrix current"
steps:
  - name: Central admin sees all entities
    command: echo "Login sovereign-test-admin@sovereign-central — list Entities cluster-wide"
    expect: "Entity"
  - name: Platform eng admin sees teams and projects
    command: echo "Login acme-platform-eng-admin — list teams/projects in entity-acme-corp"
    expect: "Team"
  - name: Platform eng viewer read-only
    command: echo "Login acme-platform-eng-viewer — create Team returns 403"
    expect: "403"
  - name: Assignment admin sees assignment-scoped OCP
    command: echo "Login test-assignment-admin — PlatformOpenshift ocp-ses10 visible"
    expect: "PlatformOpenshift"
  - name: Tool RBAC editor visible to entity admin only
    command: echo "RbacGroupsEditor shown only when patch cloudaws/cloudoso CR authorized"
    expect: "RbacGroupsEditor"
expected: Each persona in keycloak_test_users defaults matches UI nav and API SAR expectations documented in tests/rbac-access/.

persona_map:
  sovereign-test-admin: { realm: sovereign-central, scope: platform-wide }
  acme-platform-eng-admin: { namespace: entity-acme-corp, groups: [acme-corp-platform-engineering-admins] }
  acme-platform-eng-viewer: { namespace: entity-acme-corp, groups: [acme-corp-platform-engineering-viewers] }
  test-assignment-admin: { namespace: entity-acme-corp, groups: [acme-corp-assignment-admins] }
