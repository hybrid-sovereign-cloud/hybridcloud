# Spec schema for hybridcloud/tests/specs/
#
# Each spec file is a single YAML document conforming to this shape.

type: object
required:
  - id
  - title
  - objective
  - severity
  - prerequisites
  - steps
  - expected
properties:
  id:
    type: string
    description: Unique spec identifier (e.g. phase1-smoke-team-cr)
  title:
    type: string
  objective:
    type: string
  severity:
    enum: [critical, high, medium, low]
  prerequisites:
    type: array
    items:
      type: string
  steps:
    type: array
    items:
      type: object
      required: [name, command]
      properties:
        name:
          type: string
        command:
          type: string
          description: Shell command (oc, curl, vault, playwright)
        expect:
          type: string
          description: Regex or substring expected in stdout
        on_failure:
          type: string
  expected:
    type: string
  tags:
    type: array
    items:
      type: string
