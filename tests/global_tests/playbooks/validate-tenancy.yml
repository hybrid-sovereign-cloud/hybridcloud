---
- name: Validate Tenancy Operators
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - check_personas
    - check_rbac_bindings
    - check_cluster_builds
  post_tasks:
    - name: Set tenancy check result
      ansible.builtin.set_fact:
        tenancy_check_passed: >-
          {{
            (personas_check_passed | default(false))
            and (rbac_bindings_check_passed | default(false))
            and (cluster_builds_check_passed | default(false))
          }}
    - name: Tenancy Summary
      ansible.builtin.debug:
        msg: >-
          Tenancy: {{ 'PASS' if tenancy_check_passed else 'FAIL' }} |
          Personas: {{ 'PASS' if personas_check_passed | default(false) else 'FAIL' }} |
          RBAC: {{ 'PASS' if rbac_bindings_check_passed | default(false) else 'FAIL' }} |
          Cluster builds: {{ 'PASS' if cluster_builds_check_passed | default(false) else 'FAIL' }}
