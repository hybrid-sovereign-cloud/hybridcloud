---
- name: Full Platform Validation
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    report_dir: "{{ playbook_dir }}/../reports"

  pre_tasks:
    - name: Ensure report directory exists
      ansible.builtin.file:
        path: "{{ report_dir }}"
        state: directory

- import_playbook: validate-infrastructure.yml
- import_playbook: validate-operators.yml
- import_playbook: validate-services.yml
- import_playbook: validate-tenancy.yml
- import_playbook: validate-eda.yml
- import_playbook: validate-dashboards.yml

- name: Generate Summary Report
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    report_timestamp: "{{ ansible_date_time.iso8601 }}"
    overall_passed: >-
      {{
        (argocd_check_passed | default(false))
        and (nodes_check_passed | default(false))
        and (operators_check_passed | default(false))
        and (services_check_passed | default(false))
        and (tenancy_check_passed | default(false))
        and (eda_check_passed | default(false))
        and (dashboards_check_passed | default(false))
      }}
  tasks:
    - name: Create HTML report
      ansible.builtin.template:
        src: report.html.j2
        dest: "{{ playbook_dir }}/../reports/latest-report.html"

    - name: Platform Validation Summary
      ansible.builtin.debug:
        msg: >-
          Overall: {{ 'PASS' if overall_passed else 'FAIL' }} |
          ArgoCD: {{ 'PASS' if argocd_check_passed | default(false) else 'FAIL' }} |
          Nodes: {{ 'PASS' if nodes_check_passed | default(false) else 'FAIL' }} |
          Operators: {{ 'PASS' if operators_check_passed | default(false) else 'FAIL' }} |
          Services: {{ 'PASS' if services_check_passed | default(false) else 'FAIL' }} |
          Tenancy: {{ 'PASS' if tenancy_check_passed | default(false) else 'FAIL' }} |
          EDA: {{ 'PASS' if eda_check_passed | default(false) else 'FAIL' }} |
          Dashboards: {{ 'PASS' if dashboards_check_passed | default(false) else 'FAIL' }}
