---
- name: Validate Platform Services
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - check_vault_connectivity
    - check_keycloak_oidc
  post_tasks:
    - name: Set services check result
      ansible.builtin.set_fact:
        services_check_passed: >-
          {{
            (vault_connectivity_check_passed | default(false))
            and (keycloak_oidc_check_passed | default(false))
          }}
    - name: Services Summary
      ansible.builtin.debug:
        msg: >-
          Services: {{ 'PASS' if services_check_passed else 'FAIL' }} |
          Vault: {{ 'PASS' if vault_connectivity_check_passed | default(false) else 'FAIL' }} |
          Keycloak OIDC: {{ 'PASS' if keycloak_oidc_check_passed | default(false) else 'FAIL' }}
