---
- name: Validate Infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - check_argocd
    - check_nodes
  post_tasks:
    - name: Infrastructure Summary
      ansible.builtin.debug:
        msg: "ArgoCD: {{ 'PASS' if argocd_check_passed else 'FAIL' }} | Nodes: {{ 'PASS' if nodes_check_passed else 'FAIL' }}"
