all:
  hosts:
    localhost:
      ansible_connection: local
  vars:
    ocp_central_server: "{{ lookup('env', 'OCP_CENTRAL_SERVER') }}"
    ocp_central_username: "{{ lookup('env', 'OCP_CENTRAL_USERNAME') }}"
    ocp_central_password: "{{ lookup('env', 'OCP_CENTRAL_PASSWORD') }}"
    ocp_services_server: "{{ lookup('env', 'OCP_SERVICES_SERVER') }}"
    ocp_services_username: "{{ lookup('env', 'OCP_SERVICES_USERNAME') }}"
    ocp_services_password: "{{ lookup('env', 'OCP_SERVICES_PASSWORD') }}"
    aws_excluded: true
