---
- name: Login to services cluster
  ansible.builtin.command:
    argv:
      - oc
      - login
      - "{{ ocp_services_server }}"
      - "-u{{ ocp_services_username }}"
      - "-p{{ ocp_services_password }}"
      - "--insecure-skip-tls-verify=true"
  no_log: true
  changed_when: false

- name: Get services cluster API token
  ansible.builtin.command:
    argv:
      - oc
      - whoami
      - --show-token
  register: services_api_token
  no_log: true
  changed_when: false

- name: Set services cluster API connection
  ansible.builtin.set_fact:
    services_k8s_host: "{{ ocp_services_server }}"
    services_k8s_token: "{{ services_api_token.stdout | trim }}"
  no_log: true

- name: Get entity namespaces
  kubernetes.core.k8s_info:
    host: "{{ services_k8s_host }}"
    api_key: "{{ services_k8s_token }}"
    validate_certs: false
    api_version: v1
    kind: Namespace
  register: all_namespaces

- name: Build entity namespace list
  ansible.builtin.set_fact:
    entity_namespaces: >-
      {{
        all_namespaces.resources
        | default([])
        | map(attribute='metadata.name')
        | select('match', '^entity-')
        | list
      }}

- name: Initialize Rbac CR collection
  ansible.builtin.set_fact:
    rbac_crs: []

- name: List Rbac CRs in entity namespaces
  kubernetes.core.k8s_info:
    host: "{{ services_k8s_host }}"
    api_key: "{{ services_k8s_token }}"
    validate_certs: false
    api_version: hybridsovereign.redhat/v1alpha1
    kind: Rbac
    namespace: "{{ item }}"
  register: rbac_namespace_results
  loop: "{{ entity_namespaces }}"
  loop_control:
    label: "{{ item }}"

- name: Aggregate Rbac CRs
  ansible.builtin.set_fact:
    rbac_crs: "{{ rbac_crs + (item.resources | default([])) }}"
  loop: "{{ rbac_namespace_results.results }}"
  loop_control:
    label: "{{ item.item | default('unknown') }}"

- name: Assert Rbac CRs exist
  ansible.builtin.assert:
    that:
      - rbac_crs | length > 0
    fail_msg: "No Rbac CRs found in entity namespaces"
    success_msg: "Found {{ rbac_crs | length }} Rbac CRs across {{ entity_namespaces | length }} entity namespaces"

- name: Check each Rbac CR is ready
  ansible.builtin.assert:
    that:
      - item.status.ready | default(false) | bool
    fail_msg: "Rbac {{ item.metadata.namespace }}/{{ item.metadata.name }} is not ready"
    success_msg: "Rbac {{ item.metadata.namespace }}/{{ item.metadata.name }} is ready"
  loop: "{{ rbac_crs }}"
  loop_control:
    label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"
  ignore_errors: true
  register: rbac_ready_checks

- name: Get plugin-rbac ClusterRoleBinding
  kubernetes.core.k8s_info:
    host: "{{ services_k8s_host }}"
    api_key: "{{ services_k8s_token }}"
    validate_certs: false
    api_version: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    name: plugin-rbac-manager
  register: plugin_rbac_crb

- name: Get ClusterRoleBindings on services cluster
  kubernetes.core.k8s_info:
    host: "{{ services_k8s_host }}"
    api_key: "{{ services_k8s_token }}"
    validate_certs: false
    api_version: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
  register: all_clusterrolebindings

- name: Count Rbac-related ClusterRoleBindings
  ansible.builtin.set_fact:
    rbac_clusterrolebinding_count: >-
      {{
        all_clusterrolebindings.resources
        | default([])
        | map(attribute='metadata.name')
        | select('search', 'plugin-rbac|rbac-manager')
        | list
        | length
      }}

- name: Get RoleBindings in entity namespaces
  kubernetes.core.k8s_info:
    host: "{{ services_k8s_host }}"
    api_key: "{{ services_k8s_token }}"
    validate_certs: false
    api_version: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    namespace: "{{ item }}"
  register: entity_rolebinding_results
  loop: "{{ entity_namespaces }}"
  loop_control:
    label: "{{ item }}"

- name: Aggregate entity RoleBindings
  ansible.builtin.set_fact:
    entity_rolebindings: >-
      {{
        entity_rolebinding_results.results
        | default([])
        | map(attribute='resources')
        | flatten
      }}

- name: Record RBAC binding check result
  ansible.builtin.set_fact:
    check_rbac_bindings_result:
      entity_namespaces: "{{ entity_namespaces | length }}"
      rbac_total: "{{ rbac_crs | length }}"
      rbac_ready: "{{ rbac_crs | selectattr('status.ready', 'equalto', true) | list | length }}"
      plugin_rbac_crb_present: "{{ (plugin_rbac_crb.resources | default([]) | length) > 0 }}"
      rbac_clusterrolebinding_count: "{{ rbac_clusterrolebinding_count }}"
      entity_rolebinding_count: "{{ entity_rolebindings | length }}"
    rbac_bindings_check_passed: >-
      {{
        (rbac_crs | length) > 0
        and (rbac_crs | selectattr('status.ready', 'equalto', true) | list | length)
            == (rbac_crs | length)
        and (plugin_rbac_crb.resources | default([]) | length) > 0
        and (entity_rolebindings | length) > 0
      }}

- name: Report RBAC binding check summary
  ansible.builtin.debug:
    msg: >-
      RBAC: {{ 'PASS' if rbac_bindings_check_passed else 'FAIL' }} |
      {{ check_rbac_bindings_result.rbac_ready }}/{{ check_rbac_bindings_result.rbac_total }} Rbac CRs ready |
      plugin-rbac CRB: {{ 'yes' if check_rbac_bindings_result.plugin_rbac_crb_present else 'no' }} |
      entity RoleBindings: {{ check_rbac_bindings_result.entity_rolebinding_count }}
