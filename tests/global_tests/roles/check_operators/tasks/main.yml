---
- name: Login to services cluster
  ansible.builtin.command:
    argv:
      - oc
      - login
      - "{{ ocp_services_server }}"
      - "-u{{ ocp_services_username }}"
      - "-p{{ ocp_services_password }}"
      - "--insecure-skip-tls-verify=true"
  no_log: true
  changed_when: false

- name: Get services cluster API token
  ansible.builtin.command:
    argv:
      - oc
      - whoami
      - --show-token
  register: services_api_token
  no_log: true
  changed_when: false

- name: Set services cluster API connection
  ansible.builtin.set_fact:
    services_k8s_host: "{{ ocp_services_server }}"
    services_k8s_token: "{{ services_api_token.stdout | trim }}"
  no_log: true

- name: Get sovereign-cloud operator pods
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: sovereign-cloud
    host: "{{ services_k8s_host }}"
    api_key: "{{ services_k8s_token }}"
    validate_certs: false
  register: sovereign_cloud_pods

- name: Get sovereign-cloud-plugins operator pods
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: sovereign-cloud-plugins
    host: "{{ services_k8s_host }}"
    api_key: "{{ services_k8s_token }}"
    validate_certs: false
  register: sovereign_plugins_pods

- name: Build operator pod list
  ansible.builtin.set_fact:
    operator_pods: >-
      {{
        (sovereign_cloud_pods.resources | default([]))
        + (sovereign_plugins_pods.resources | default([]))
      }}

- name: Initialize operator pod results
  ansible.builtin.set_fact:
    operator_pod_results: []

- name: Evaluate operator pod health
  ansible.builtin.set_fact:
    operator_pod_results: "{{ operator_pod_results + [pod_result] }}"
  vars:
    pod_phase: "{{ item.status.phase | default('Unknown') }}"
    containers_ready: >-
      {{
        (item.status.containerStatuses | default([]) | length) > 0
        and (item.status.containerStatuses | map(attribute='ready') | list | min)
      }}
    pod_result:
      namespace: "{{ item.metadata.namespace }}"
      name: "{{ item.metadata.name }}"
      phase: "{{ pod_phase }}"
      passed: "{{ pod_phase == 'Running' and containers_ready }}"
      skipped: false
  loop: "{{ operator_pods }}"
  when:
    - item.metadata.name is defined
    - not (aws_excluded | bool and ('cloudaws' in item.metadata.name | lower))

- name: Record skipped CloudAWS operator pods
  ansible.builtin.set_fact:
    operator_pod_results: "{{ operator_pod_results + [pod_result] }}"
  vars:
    pod_result:
      namespace: "{{ item.metadata.namespace }}"
      name: "{{ item.metadata.name }}"
      phase: "{{ item.status.phase | default('Unknown') }}"
      passed: true
      skipped: true
  loop: "{{ operator_pods }}"
  when:
    - aws_excluded | bool
    - "'cloudaws' in item.metadata.name | lower"

- name: Report operator pod results
  ansible.builtin.debug:
    msg: >-
      {{ 'SKIP' if item.skipped else ('PASS' if item.passed else 'FAIL') }}:
      {{ item.namespace }}/{{ item.name }} (phase={{ item.phase }})
  loop: "{{ operator_pod_results }}"
  loop_control:
    label: "{{ item.namespace }}/{{ item.name }}"

- name: Set operators check result
  ansible.builtin.set_fact:
    operators_check_passed: >-
      {{
        (operator_pod_results | rejectattr('skipped', 'equalto', true) | list | length) > 0
        and (operator_pod_results | rejectattr('skipped', 'equalto', true) | selectattr('passed') | list | length)
            == (operator_pod_results | rejectattr('skipped', 'equalto', true) | list | length)
      }}
