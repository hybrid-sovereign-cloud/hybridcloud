---
- name: Login to services cluster
  ansible.builtin.command:
    argv:
      - oc
      - login
      - "{{ ocp_services_server }}"
      - "-u{{ ocp_services_username }}"
      - "-p{{ ocp_services_password }}"
      - "--insecure-skip-tls-verify=true"
  no_log: true
  changed_when: false

- name: Get services cluster API token
  ansible.builtin.command:
    argv:
      - oc
      - whoami
      - --show-token
  register: services_api_token
  no_log: true
  changed_when: false

- name: Set services cluster API connection
  ansible.builtin.set_fact:
    services_k8s_host: "{{ ocp_services_server }}"
    services_k8s_token: "{{ services_api_token.stdout | trim }}"
  no_log: true

- name: Check Persona CRs exist
  kubernetes.core.k8s_info:
    host: "{{ services_k8s_host }}"
    api_key: "{{ services_k8s_token }}"
    validate_certs: false
    api_version: hybridsovereign.redhat/v1alpha1
    kind: Persona
  register: persona_list

- name: Assert Personas exist
  ansible.builtin.assert:
    that:
      - persona_list.resources | length > 0
    fail_msg: "No Persona CRs found on services cluster"
    success_msg: "Found {{ persona_list.resources | length }} Persona CRs"

- name: Check each Persona is ready
  ansible.builtin.assert:
    that:
      - item.status.ready | default(false) | bool
    fail_msg: "Persona {{ item.metadata.name }} is not ready"
    success_msg: "Persona {{ item.metadata.name }} is ready"
  loop: "{{ persona_list.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"
  ignore_errors: true
  register: persona_ready_checks

- name: Record persona check result
  ansible.builtin.set_fact:
    check_personas_result:
      total: "{{ persona_list.resources | length }}"
      ready: "{{ persona_list.resources | selectattr('status.ready', 'equalto', true) | list | length }}"
    personas_check_passed: >-
      {{
        (persona_list.resources | length) > 0
        and (persona_list.resources | selectattr('status.ready', 'equalto', true) | list | length)
            == (persona_list.resources | length)
      }}

- name: Report persona check summary
  ansible.builtin.debug:
    msg: >-
      Personas: {{ 'PASS' if personas_check_passed else 'FAIL' }}
      ({{ check_personas_result.ready }}/{{ check_personas_result.total }} ready)
