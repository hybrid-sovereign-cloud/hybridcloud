---
- name: Login to services cluster
  ansible.builtin.command:
    argv:
      - oc
      - login
      - "{{ ocp_services_server }}"
      - "-u{{ ocp_services_username }}"
      - "-p{{ ocp_services_password }}"
      - "--insecure-skip-tls-verify=true"
  no_log: true
  changed_when: false

- name: Get services cluster API token
  ansible.builtin.command:
    argv:
      - oc
      - whoami
      - --show-token
  register: services_api_token
  no_log: true
  changed_when: false

- name: Set services cluster API connection
  ansible.builtin.set_fact:
    services_k8s_host: "{{ ocp_services_server }}"
    services_k8s_token: "{{ services_api_token.stdout | trim }}"
  no_log: true

- name: Get services cluster routes
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    host: "{{ services_k8s_host }}"
    api_key: "{{ services_k8s_token }}"
    validate_certs: false
  register: services_routes

- name: Login to central cluster
  ansible.builtin.command:
    argv:
      - oc
      - login
      - "{{ ocp_central_server }}"
      - "-u{{ ocp_central_username }}"
      - "-p{{ ocp_central_password }}"
      - "--insecure-skip-tls-verify=true"
  no_log: true
  changed_when: false

- name: Get central cluster API token
  ansible.builtin.command:
    argv:
      - oc
      - whoami
      - --show-token
  register: central_api_token
  no_log: true
  changed_when: false

- name: Set central cluster API connection
  ansible.builtin.set_fact:
    central_k8s_host: "{{ ocp_central_server }}"
    central_k8s_token: "{{ central_api_token.stdout | trim }}"
  no_log: true

- name: Get central cluster routes
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    host: "{{ central_k8s_host }}"
    api_key: "{{ central_k8s_token }}"
    validate_certs: false
  register: central_routes

- name: Initialize dashboard route targets
  ansible.builtin.set_fact:
    dashboard_route_targets: []

- name: Build services cluster dashboard route targets
  ansible.builtin.set_fact:
    dashboard_route_targets: "{{ dashboard_route_targets + [route_target] }}"
  vars:
    route_name: "{{ item.metadata.name | lower }}"
    route_host: "{{ item.spec.host }}"
    route_category: >-
      {{
        'vault' if 'vault' in route_name
        else 'keycloak' if ('rhbk' in route_name or 'keycloak' in route_name)
        else 'gitea' if 'gitea' in route_name
        else 'aap' if 'aap' in route_name
        else 'dashboard' if ('dashboard' in route_name or 'tenancy' in route_name or 'sovereign' in route_name)
        else ''
      }}
    route_target:
      cluster: services
      category: "{{ route_category }}"
      name: "{{ item.metadata.name }}"
      host: "{{ route_host }}"
  loop: "{{ services_routes.resources | default([]) }}"
  when:
    - route_category | length > 0
    - route_category in ['keycloak', 'vault', 'gitea', 'aap', 'dashboard']

- name: Add central cluster dashboard route targets
  ansible.builtin.set_fact:
    dashboard_route_targets: "{{ dashboard_route_targets + [route_target] }}"
  vars:
    route_name: "{{ item.metadata.name | lower }}"
    route_host: "{{ item.spec.host }}"
    route_category: >-
      {{
        'vault' if 'vault' in route_name
        else 'keycloak' if ('rhbk' in route_name or 'keycloak' in route_name)
        else 'gitea' if 'gitea' in route_name
        else ''
      }}
    route_target:
      cluster: central
      category: "{{ route_category }}"
      name: "{{ item.metadata.name }}"
      host: "{{ route_host }}"
  loop: "{{ central_routes.resources | default([]) }}"
  when:
    - route_category | length > 0
    - route_category in ['keycloak', 'vault', 'gitea']

- name: Initialize dashboard route results
  ansible.builtin.set_fact:
    dashboard_route_results: []

- name: Probe dashboard route health endpoints
  ansible.builtin.uri:
    url: "https://{{ item.host }}{{ health_path }}"
    method: GET
    validate_certs: false
    follow_redirects: all
    status_code: [200, 201, 204, 301, 302, 401, 403, 404, 405, 503]
    timeout: 15
  vars:
    health_path: >-
      {{
        '/v1/sys/health?standbyok=true' if item.category == 'vault'
        else '/api/v1/version' if item.category == 'gitea'
        else '/api/controller/v2/ping/' if item.category == 'aap'
        else '/health' if item.category == 'dashboard'
        else '/'
      }}
  register: route_probe
  loop: "{{ dashboard_route_targets | default([]) }}"
  loop_control:
    label: "{{ item.cluster }}/{{ item.name }}"
  ignore_errors: true

- name: Record dashboard route probe results
  ansible.builtin.set_fact:
    dashboard_route_results: "{{ dashboard_route_results + [route_result] }}"
  vars:
    route_result:
      cluster: "{{ item.item.cluster }}"
      category: "{{ item.item.category }}"
      name: "{{ item.item.name }}"
      host: "{{ item.item.host }}"
      status: "{{ item.status | default(0) }}"
      passed: "{{ item.status | default(0) in [200, 201, 204, 301, 302, 401, 403, 503] }}"
  loop: "{{ route_probe.results }}"
  loop_control:
    label: "{{ item.item.cluster }}/{{ item.item.name }}"

- name: Report dashboard route results
  ansible.builtin.debug:
    msg: >-
      {{ 'PASS' if item.passed else 'FAIL' }}:
      {{ item.cluster }}/{{ item.name }} ({{ item.host }}, HTTP {{ item.status }})
  loop: "{{ dashboard_route_results }}"
  loop_control:
    label: "{{ item.cluster }}/{{ item.name }}"

- name: Set dashboards check result
  ansible.builtin.set_fact:
    dashboards_check_passed: >-
      {{
        (dashboard_route_results | length) > 0
        and (dashboard_route_results | rejectattr('passed') | list | length) == 0
      }}
