---
- name: Login to central cluster
  ansible.builtin.command:
    argv:
      - oc
      - login
      - "{{ ocp_central_server }}"
      - "-u{{ ocp_central_username }}"
      - "-p{{ ocp_central_password }}"
      - "--insecure-skip-tls-verify=true"
  no_log: true
  changed_when: false

- name: Get central cluster API token
  ansible.builtin.command:
    argv:
      - oc
      - whoami
      - --show-token
  register: central_api_token
  no_log: true
  changed_when: false

- name: Set central cluster API connection
  ansible.builtin.set_fact:
    central_k8s_host: "{{ ocp_central_server }}"
    central_k8s_token: "{{ central_api_token.stdout | trim }}"
  no_log: true

- name: Get central cluster nodes
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
    host: "{{ central_k8s_host }}"
    api_key: "{{ central_k8s_token }}"
    validate_certs: false
  register: central_nodes

- name: Login to services cluster
  ansible.builtin.command:
    argv:
      - oc
      - login
      - "{{ ocp_services_server }}"
      - "-u{{ ocp_services_username }}"
      - "-p{{ ocp_services_password }}"
      - "--insecure-skip-tls-verify=true"
  no_log: true
  changed_when: false

- name: Get services cluster API token
  ansible.builtin.command:
    argv:
      - oc
      - whoami
      - --show-token
  register: services_api_token
  no_log: true
  changed_when: false

- name: Set services cluster API connection
  ansible.builtin.set_fact:
    services_k8s_host: "{{ ocp_services_server }}"
    services_k8s_token: "{{ services_api_token.stdout | trim }}"
  no_log: true

- name: Get services cluster nodes
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
    host: "{{ services_k8s_host }}"
    api_key: "{{ services_k8s_token }}"
    validate_certs: false
  register: services_nodes

- name: Initialize node check results
  ansible.builtin.set_fact:
    node_check_results: []

- name: Evaluate central cluster node readiness
  ansible.builtin.set_fact:
    node_check_results: "{{ node_check_results + [node_result] }}"
  vars:
    ready_condition: "{{ item.status.conditions | default([]) | selectattr('type', 'equalto', 'Ready') | list | first | default({}) }}"
    node_result:
      cluster: central
      name: "{{ item.metadata.name }}"
      ready: "{{ ready_condition.status | default('Unknown') == 'True' }}"
      reason: "{{ ready_condition.reason | default('') }}"
      message: "{{ ready_condition.message | default('') }}"
  loop: "{{ central_nodes.resources | default([]) }}"

- name: Evaluate services cluster node readiness
  ansible.builtin.set_fact:
    node_check_results: "{{ node_check_results + [node_result] }}"
  vars:
    ready_condition: "{{ item.status.conditions | default([]) | selectattr('type', 'equalto', 'Ready') | list | first | default({}) }}"
    node_result:
      cluster: services
      name: "{{ item.metadata.name }}"
      ready: "{{ ready_condition.status | default('Unknown') == 'True' }}"
      reason: "{{ ready_condition.reason | default('') }}"
      message: "{{ ready_condition.message | default('') }}"
  loop: "{{ services_nodes.resources | default([]) }}"

- name: Report node readiness results
  ansible.builtin.debug:
    msg: >-
      {{ 'PASS' if item.ready else 'FAIL' }}:
      {{ item.cluster }}/{{ item.name }}
      {% if not item.ready %} ({{ item.reason }}: {{ item.message }}){% endif %}
  loop: "{{ node_check_results }}"
  loop_control:
    label: "{{ item.cluster }}/{{ item.name }}"

- name: Report NotReady nodes
  ansible.builtin.debug:
    msg: "NotReady: {{ item.cluster }}/{{ item.name }} — {{ item.message }}"
  loop: "{{ node_check_results | rejectattr('ready') | list }}"
  when: node_check_results | rejectattr('ready') | list | length > 0

- name: Set nodes check result
  ansible.builtin.set_fact:
    nodes_check_passed: "{{ node_check_results | length > 0 and (node_check_results | rejectattr('ready') | list | length) == 0 }}"
