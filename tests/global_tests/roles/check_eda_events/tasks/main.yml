---
- name: Set test Entity name
  ansible.builtin.set_fact:
    test_entity_name: "test-eda-{{ lookup('pipe', 'date +%s') }}"

- name: Login to services cluster
  ansible.builtin.command:
    argv:
      - oc
      - login
      - "{{ ocp_services_server }}"
      - "-u{{ ocp_services_username }}"
      - "-p{{ ocp_services_password }}"
      - "--insecure-skip-tls-verify=true"
  no_log: true
  changed_when: false

- name: Get services cluster API token
  ansible.builtin.command:
    argv:
      - oc
      - whoami
      - --show-token
  register: services_api_token
  no_log: true
  changed_when: false

- name: Set services cluster API connection
  ansible.builtin.set_fact:
    services_k8s_host: "{{ ocp_services_server }}"
    services_k8s_token: "{{ services_api_token.stdout | trim }}"
  no_log: true

- block:
    - name: Create test Entity CR
      kubernetes.core.k8s:
        state: present
        host: "{{ services_k8s_host }}"
        api_key: "{{ services_k8s_token }}"
        validate_certs: false
        definition:
          apiVersion: hybridsovereign.redhat/v1alpha1
          kind: Entity
          metadata:
            name: "{{ test_entity_name }}"
            namespace: sovereign-cloud
          spec:
            billingID: "TEST-EDA-001"
            description: "Global test EDA validation entity"
            websiteLink: "https://test-eda.example.com"

    - name: Wait for EntityCreateRequested event
      kubernetes.core.k8s_info:
        api_version: events.k8s.io/v1
        kind: Event
        namespace: sovereign-cloud
        host: "{{ services_k8s_host }}"
        api_key: "{{ services_k8s_token }}"
        validate_certs: false
        field_selectors:
          - "regarding.name={{ test_entity_name }}"
      register: create_events
      until: >-
        create_events.resources | default([])
        | selectattr('reason', 'equalto', 'EntityCreateRequested')
        | list | length > 0
      retries: 12
      delay: 5

    - name: Wait for Entity status to leave reconciling
      kubernetes.core.k8s_info:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Entity
        name: "{{ test_entity_name }}"
        namespace: sovereign-cloud
        host: "{{ services_k8s_host }}"
        api_key: "{{ services_k8s_token }}"
        validate_certs: false
      register: entity_status
      until: >-
        entity_status.resources | length > 0
        and (entity_status.resources[0].status.status | default('reconciling'))
            in ['ready', 'failed']
      retries: 24
      delay: 5

    - name: Record Entity provisioning status
      ansible.builtin.set_fact:
        eda_provision_status: "{{ entity_status.resources[0].status.status | default('unknown') }}"
        eda_provision_ready: "{{ entity_status.resources[0].status.ready | default(false) | bool }}"

    - name: Delete test Entity CR
      kubernetes.core.k8s:
        state: absent
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Entity
        name: "{{ test_entity_name }}"
        namespace: sovereign-cloud
        host: "{{ services_k8s_host }}"
        api_key: "{{ services_k8s_token }}"
        validate_certs: false
        wait: true
        wait_timeout: 120

    - name: Wait for EntityDeleteRequested event
      kubernetes.core.k8s_info:
        api_version: events.k8s.io/v1
        kind: Event
        namespace: sovereign-cloud
        host: "{{ services_k8s_host }}"
        api_key: "{{ services_k8s_token }}"
        validate_certs: false
        field_selectors:
          - "regarding.name={{ test_entity_name }}"
      register: delete_events
      until: >-
        delete_events.resources | default([])
        | selectattr('reason', 'equalto', 'EntityDeleteRequested')
        | list | length > 0
      retries: 12
      delay: 5

    - name: Verify test Entity CR is removed
      kubernetes.core.k8s_info:
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Entity
        name: "{{ test_entity_name }}"
        namespace: sovereign-cloud
        host: "{{ services_k8s_host }}"
        api_key: "{{ services_k8s_token }}"
        validate_certs: false
      register: entity_removed
      until: entity_removed.resources | length == 0
      retries: 12
      delay: 5

    - name: Set EDA check result
      ansible.builtin.set_fact:
        eda_check_passed: "{{ eda_provision_status == 'ready' and eda_provision_ready | bool }}"

  rescue:
    - name: Mark EDA check as failed
      ansible.builtin.set_fact:
        eda_check_passed: false

  always:
    - name: Clean up leftover test Entity CR
      kubernetes.core.k8s:
        state: absent
        api_version: hybridsovereign.redhat/v1alpha1
        kind: Entity
        name: "{{ test_entity_name }}"
        namespace: sovereign-cloud
        host: "{{ services_k8s_host }}"
        api_key: "{{ services_k8s_token }}"
        validate_certs: false
      ignore_errors: true

    - name: Report EDA check result
      ansible.builtin.debug:
        msg: "EDA: {{ 'PASS' if eda_check_passed | default(false) else 'FAIL' }} (entity={{ test_entity_name }})"
