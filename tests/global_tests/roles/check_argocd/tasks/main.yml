---
- name: Login to central cluster
  ansible.builtin.command:
    argv:
      - oc
      - login
      - "{{ ocp_central_server }}"
      - "-u{{ ocp_central_username }}"
      - "-p{{ ocp_central_password }}"
      - "--insecure-skip-tls-verify=true"
  no_log: true
  changed_when: false

- name: Get central cluster API token
  ansible.builtin.command:
    argv:
      - oc
      - whoami
      - --show-token
  register: central_api_token
  no_log: true
  changed_when: false

- name: Set central cluster API connection
  ansible.builtin.set_fact:
    central_k8s_host: "{{ ocp_central_server }}"
    central_k8s_token: "{{ central_api_token.stdout | trim }}"
  no_log: true

- name: Get ArgoCD Applications
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1alpha1
    kind: Application
    namespace: openshift-gitops
    host: "{{ central_k8s_host }}"
    api_key: "{{ central_k8s_token }}"
    validate_certs: false
  register: argocd_apps

- name: Initialize ArgoCD application results
  ansible.builtin.set_fact:
    argocd_app_results: []

- name: Evaluate ArgoCD application health
  ansible.builtin.set_fact:
    argocd_app_results: "{{ argocd_app_results + [app_result] }}"
  vars:
    app_name: "{{ item.metadata.name }}"
    sync_status: "{{ item.status.sync.status | default('Unknown') }}"
    health_status: "{{ item.status.health.status | default('Unknown') }}"
    app_result:
      name: "{{ app_name }}"
      sync: "{{ sync_status }}"
      health: "{{ health_status }}"
      passed: "{{ sync_status == 'Synced' and health_status == 'Healthy' }}"
      skipped: false
  loop: "{{ argocd_apps.resources | default([]) }}"
  when:
    - item.metadata.name not in ['base-config-chart', 'base-configs']
    - not (aws_excluded | bool and ('aws' in item.metadata.name | lower))

- name: Record skipped AWS ArgoCD applications
  ansible.builtin.set_fact:
    argocd_app_results: "{{ argocd_app_results + [skipped_result] }}"
  vars:
    skipped_result:
      name: "{{ item.metadata.name }}"
      sync: "{{ item.status.sync.status | default('Unknown') }}"
      health: "{{ item.status.health.status | default('Unknown') }}"
      passed: true
      skipped: true
  loop: "{{ argocd_apps.resources | default([]) }}"
  when:
    - aws_excluded | bool
    - "'aws' in item.metadata.name | lower"
    - item.metadata.name not in ['base-config-chart', 'base-configs']

- name: Report ArgoCD application results
  ansible.builtin.debug:
    msg: >-
      {{ 'SKIP' if item.skipped else ('PASS' if item.passed else 'FAIL') }}:
      {{ item.name }} (sync={{ item.sync }}, health={{ item.health }})
  loop: "{{ argocd_app_results }}"
  loop_control:
    label: "{{ item.name }}"

- name: Set ArgoCD check result
  ansible.builtin.set_fact:
    argocd_check_passed: >-
      {{
        (argocd_app_results | rejectattr('skipped', 'equalto', true) | list | length) > 0
        and (argocd_app_results | rejectattr('skipped', 'equalto', true) | selectattr('passed') | list | length)
            == (argocd_app_results | rejectattr('skipped', 'equalto', true) | list | length)
      }}
