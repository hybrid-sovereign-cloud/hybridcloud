---
- name: Check sovereign-tenants OIDC discovery endpoint
  ansible.builtin.uri:
    url: "https://sso-rhbk-services.apps.services.{{ lookup('env', 'LAB_DOMAIN') }}/realms/sovereign-tenants/.well-known/openid-configuration"
    method: GET
    validate_certs: false
    status_code: [200, 301, 302, 401, 403, 503]
    timeout: 15
  register: keycloak_oidc

- name: Record Keycloak OIDC result
  ansible.builtin.set_fact:
    check_keycloak_oidc_result:
      status: "{{ keycloak_oidc.status | default(0) }}"
      issuer: "{{ keycloak_oidc.json.issuer | default('') }}"
      authorization_endpoint: "{{ keycloak_oidc.json.authorization_endpoint | default('') }}"
    keycloak_oidc_check_passed: >-
      {{
        (keycloak_oidc.status | default(0)) == 200
        and (keycloak_oidc.json.issuer | default('') | length) > 0
      }}

- name: Report Keycloak OIDC summary
  ansible.builtin.debug:
    msg: >-
      Keycloak OIDC: {{ 'PASS' if keycloak_oidc_check_passed else 'FAIL' }} |
      HTTP {{ check_keycloak_oidc_result.status }} |
      issuer={{ check_keycloak_oidc_result.issuer | default('missing') }}
