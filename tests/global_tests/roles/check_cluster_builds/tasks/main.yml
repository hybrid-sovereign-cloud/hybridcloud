---
- name: Login to services cluster
  ansible.builtin.command:
    argv:
      - oc
      - login
      - "{{ ocp_services_server }}"
      - "-u{{ ocp_services_username }}"
      - "-p{{ ocp_services_password }}"
      - "--insecure-skip-tls-verify=true"
  no_log: true
  changed_when: false

- name: Get services cluster API token
  ansible.builtin.command:
    argv:
      - oc
      - whoami
      - --show-token
  register: services_api_token
  no_log: true
  changed_when: false

- name: Set services cluster API connection
  ansible.builtin.set_fact:
    services_k8s_host: "{{ ocp_services_server }}"
    services_k8s_token: "{{ services_api_token.stdout | trim }}"
  no_log: true

- name: List PlatformOpenshift CRs
  kubernetes.core.k8s_info:
    host: "{{ services_k8s_host }}"
    api_key: "{{ services_k8s_token }}"
    validate_certs: false
    api_version: hybridsovereign.redhat/v1alpha1
    kind: PlatformOpenshift
  register: platformopenshift_list

- name: Assert PlatformOpenshift CRs exist
  ansible.builtin.assert:
    that:
      - platformopenshift_list.resources | length > 0
    fail_msg: "No PlatformOpenshift CRs found on services cluster"
    success_msg: "Found {{ platformopenshift_list.resources | length }} PlatformOpenshift CRs"

- name: Initialize cluster build results
  ansible.builtin.set_fact:
    cluster_build_results: []

- name: Evaluate each PlatformOpenshift cluster build
  ansible.builtin.set_fact:
    cluster_build_results: "{{ cluster_build_results + [build_result] }}"
  vars:
    health: "{{ item.status.clusterHealth | default('Unknown') }}"
    console_url: "{{ item.status.consoleURL | default('') }}"
    cluster_version: "{{ item.status.clusterVersion | default('') }}"
    build_result:
      namespace: "{{ item.metadata.namespace }}"
      name: "{{ item.metadata.name }}"
      cluster_health: "{{ health }}"
      console_url: "{{ console_url }}"
      cluster_version: "{{ cluster_version }}"
      passed: >-
        {{
          health == 'Healthy'
          and (console_url | length) > 0
          and (cluster_version | length) > 0
        }}
  loop: "{{ platformopenshift_list.resources | default([]) }}"
  loop_control:
    label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"

- name: Report cluster build results
  ansible.builtin.debug:
    msg: >-
      {{ 'PASS' if item.passed else 'FAIL' }}:
      {{ item.namespace }}/{{ item.name }}
      (health={{ item.cluster_health }}, version={{ item.cluster_version }}, console={{ item.console_url }})
  loop: "{{ cluster_build_results }}"
  loop_control:
    label: "{{ item.namespace }}/{{ item.name }}"

- name: Record cluster build check result
  ansible.builtin.set_fact:
    check_cluster_builds_result:
      total: "{{ cluster_build_results | length }}"
      healthy: "{{ cluster_build_results | selectattr('passed') | list | length }}"
      clusters: "{{ cluster_build_results }}"
    cluster_builds_check_passed: >-
      {{
        (cluster_build_results | length) > 0
        and (cluster_build_results | rejectattr('passed') | list | length) == 0
      }}

- name: Report cluster build summary
  ansible.builtin.debug:
    msg: >-
      Cluster builds: {{ 'PASS' if cluster_builds_check_passed else 'FAIL' }}
      ({{ check_cluster_builds_result.healthy }}/{{ check_cluster_builds_result.total }} healthy)
