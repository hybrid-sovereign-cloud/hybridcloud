---
- name: Check central Vault health endpoint
  ansible.builtin.uri:
    url: "https://vault-central.apps.central.{{ lookup('env', 'LAB_DOMAIN') }}/v1/sys/health"
    method: GET
    validate_certs: false
    status_code: [200, 429, 472, 473, 501, 503]
    timeout: 15
  register: central_vault_health

- name: Check services Vault health endpoint
  ansible.builtin.uri:
    url: "https://vault-services.apps.services.{{ lookup('env', 'LAB_DOMAIN') }}/v1/sys/health"
    method: GET
    validate_certs: false
    status_code: [200, 429, 472, 473, 501, 503]
    timeout: 15
  register: services_vault_health

- name: Record Vault connectivity result
  ansible.builtin.set_fact:
    check_vault_connectivity_result:
      central:
        status: "{{ central_vault_health.status | default(0) }}"
        initialized: "{{ central_vault_health.json.initialized | default(false) }}"
        sealed: "{{ central_vault_health.json.sealed | default(true) }}"
      services:
        status: "{{ services_vault_health.status | default(0) }}"
        initialized: "{{ services_vault_health.json.initialized | default(false) }}"
        sealed: "{{ services_vault_health.json.sealed | default(true) }}"
    vault_connectivity_check_passed: >-
      {{
        (central_vault_health.status | default(0)) == 200
        and not (central_vault_health.json.sealed | default(true) | bool)
        and (services_vault_health.status | default(0)) == 200
        and not (services_vault_health.json.sealed | default(true) | bool)
      }}

- name: Report Vault connectivity summary
  ansible.builtin.debug:
    msg: >-
      Vault: {{ 'PASS' if vault_connectivity_check_passed else 'FAIL' }} |
      central HTTP {{ check_vault_connectivity_result.central.status }}
      (initialized={{ check_vault_connectivity_result.central.initialized }},
      sealed={{ check_vault_connectivity_result.central.sealed }}) |
      services HTTP {{ check_vault_connectivity_result.services.status }}
      (initialized={{ check_vault_connectivity_result.services.initialized }},
      sealed={{ check_vault_connectivity_result.services.sealed }})
