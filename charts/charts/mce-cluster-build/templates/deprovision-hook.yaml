---
# deprovision-hook resources.
# The ServiceAccount, Role, and RoleBinding are regular chart resources so they exist
# whenever the chart is installed (needed for Helm pre-delete hook execution).
# The Job carries BOTH argocd.argoproj.io/hook: PreDelete (for ArgoCD-managed releases)
# AND helm.sh/hook: pre-delete (for direct Helm-managed releases).
# Without helm.sh/hook, Helm runs the Job as a regular resource during install/upgrade
# which would delete the ClusterDeployment that was just created in the same release.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deprovision-hook
  namespace: {{ .Values.cluster.name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deprovision-hook
  namespace: {{ .Values.cluster.name }}
rules:
- apiGroups: ["hive.openshift.io"]
  resources: ["clusterdeployments"]
  verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deprovision-hook
  namespace: {{ .Values.cluster.name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: deprovision-hook
subjects:
- kind: ServiceAccount
  name: deprovision-hook
  namespace: {{ .Values.cluster.name }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: deprovision-wait
  namespace: {{ .Values.cluster.name }}
  annotations:
    # ArgoCD: run this Job before ArgoCD deletes the Application
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    # Helm: run this Job only during `helm uninstall`, NOT during install/upgrade.
    # Without this annotation Helm treats it as a regular resource and runs the Job
    # during install, which deletes the ClusterDeployment immediately after creation.
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: hook-succeeded
    helm.sh/hook-weight: "0"
spec:
  activeDeadlineSeconds: 3600
  template:
    spec:
      serviceAccountName: deprovision-hook
      restartPolicy: OnFailure
      containers:
      - name: wait
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          CLUSTER={{ .Values.cluster.name }}
          NS={{ .Values.cluster.name }}
          if oc get clusterdeployment "$CLUSTER" -n "$NS" &>/dev/null; then
            echo "Deleting ClusterDeployment $CLUSTER to trigger Hive deprovision..."
            oc delete clusterdeployment "$CLUSTER" -n "$NS"
            echo "Waiting for Hive deprovision to complete..."
            oc wait --for=delete clusterdeployment/"$CLUSTER" -n "$NS" --timeout=3600s
          else
            echo "ClusterDeployment $CLUSTER already gone, nothing to do."
          fi
