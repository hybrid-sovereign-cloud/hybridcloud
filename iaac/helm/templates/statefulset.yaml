apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: iaac-git-sync
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: iaac-git-sync
    app.kubernetes.io/part-of: hybridsovereign
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  serviceName: iaac-git-sync
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: iaac-git-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iaac-git-sync
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: sync
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: GITEA_URL
              value: {{ .Values.gitea.url | quote }}
            - name: GITEA_REPO_OWNER
              value: {{ .Values.gitea.repoOwner | quote }}
            - name: GITEA_REPO_NAME
              value: {{ .Values.gitea.repoName | quote }}
            - name: GITEA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gitea.externalSecret.targetSecretName }}
                  key: {{ .Values.gitea.externalSecret.tokenKey }}
            - name: GIT_CLONE_PATH
              value: /data/git/tenancy_repo
            - name: RECONCILE_INTERVAL
              value: {{ .Values.reconcileInterval | quote }}
          volumeMounts:
            - name: git-data
              mountPath: /data/git
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: git-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
